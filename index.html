// MODULE: DROP_ZONE — Paste + drag-and-drop for any screen
// ═══════════════════════════════════════════════════════════════

function DropZone({onFiles, label, active}) {
  const [dragOver, setDragOver] = useState(false);
  const [staged, setStaged] = useState([]);
  const ref = useRef(null);

  // Paste handler — attach to window when active
  useEffect(() => {
    if(!active) return;
    const handler = (e) => {
      const items = e.clipboardData?.items;
      if(!items) return;
      const files = [];
      for(const item of items) {
        if(item.kind==='file') files.push(item.getAsFile());
      }
      if(files.length) { e.preventDefault(); setStaged(prev=>[...prev,...files.map(f=>({file:f,preview:f.type.startsWith('image/')?URL.createObjectURL(f):null}))].slice(0,200)); }
    };
    window.addEventListener('paste', handler);
    return () => window.removeEventListener('paste', handler);
  }, [active]);

  const onDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    const files = Array.from(e.dataTransfer.files);
    if(files.length) setStaged(prev=>[...prev,...files.map(f=>({file:f,preview:f.type.startsWith('image/')?URL.createObjectURL(f):null}))].slice(0,200));
  };
  const removeStaged = (i) => { setStaged(prev=>{const n=[...prev];if(n[i].preview)URL.revokeObjectURL(n[i].preview);n.splice(i,1);return n;}); };
  const clearStaged = () => { staged.forEach(s=>{if(s.preview)URL.revokeObjectURL(s.preview)}); setStaged([]); };
  const submit = () => { if(staged.length && onFiles){onFiles(staged.map(s=>s.file));clearStaged();} };

  if(staged.length > 0) return (
    <div style={{padding:14,background:'rgba(59,130,246,.06)',border:'2px solid rgba(59,130,246,.3)',borderRadius:12,marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:600,color:'var(--blue2)'}}>📎 {staged.length} file{staged.length>1?'s':''} ready</div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn-primary btn-sm" onClick={submit}>✨ Extract with AI</button>
          <button className="btn-danger btn-sm" onClick={clearStaged}>Clear</button>
        </div>
      </div>
      <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>
        {staged.map((s,i) => (
          <div key={i} style={{position:'relative',flexShrink:0}}>
            {s.preview ? <img src={s.preview} style={{width:72,height:72,objectFit:'cover',borderRadius:8,border:'1px solid var(--border)'}} />
              : <div style={{width:72,height:72,borderRadius:8,border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'var(--text3)',background:'var(--bg3)',padding:4,textAlign:'center',wordBreak:'break-all'}}>{s.file.name.slice(0,200)}</div>}
            <button onClick={()=>removeStaged(i)} style={{position:'absolute',top:-4,right:-4,width:18,height:18,borderRadius:'50%',background:'var(--red)',color:'#fff',border:'none',fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
          </div>
        ))}
      </div>
      <div style={{fontSize:10,color:'var(--text3)',marginTop:6}}>Paste more images (Ctrl+V) or drag more files, then hit Extract</div>
    </div>
  );

  return (
    <div ref={ref}
      onDragOver={e=>{e.preventDefault();setDragOver(true);}}
      onDragLeave={()=>setDragOver(false)}
      onDrop={onDrop}
      style={{padding:dragOver?20:14,background:dragOver?'rgba(59,130,246,.1)':'rgba(59,130,246,.03)',border:`2px dashed ${dragOver?'var(--blue)':'var(--border)'}`,borderRadius:12,marginBottom:12,textAlign:'center',cursor:'default',transition:'all .2s'}}>
      <div style={{fontSize:13,color:dragOver?'var(--blue2)':'var(--text3)',fontWeight:dragOver?600:400}}>
        {dragOver ? '📎 Drop files here…' : (label || '📎 Drag & drop files here, or paste images (Ctrl+V)')}
      </div>
    </div>
  );
}

                    <option value="escalating">Escalating (starts lower, +2%/yr)</option>
                  </select>
                </div>
              </div>
              <div className="grid-2">
                <div className="field"><label>Payout Start Age</label><input type="number" value={p.cpfStartAge||65} onChange={e=>set('cpfStartAge',e.target.value)} min="65" max="70" /><div style={{fontSize:9,color:'var(--text3)'}}>65–70 (↑7%/yr deferred)</div></div>
                <div className="field"><label>SA Top-up ($)</label><input type="number" value={p.cpfTopUp||''} onChange={e=>set('cpfTopUp',e.target.value)} placeholder="0" /><div style={{fontSize:9,color:'var(--text3)'}}>Voluntary top-up to RA</div></div>
              </div>
              {p.cpfScheme && p.cpfScheme !== 'none' && (() => {
                const startAge = parseInt(p.cpfStartAge)||65;
                const clientAge = age || 35;
                const yearsTo55 = Math.max(0, 55 - clientAge);
                const schemeBase = getCPFSchemeAmount(p.cpfScheme);
                const projectedScheme = Math.round(schemeBase * Math.pow(1.035, yearsTo55));
                const totalRA55 = projectedScheme + (parseFloat(p.cpfTopUp)||0);
                // RA at age 65 = compound from 55 to 65 (fixed baseline for all columns)
                const raAt65 = projectRAToAge(totalRA55, 65);
                // Base payout at 65 (no deferment)
                const basePayout65 = estimateCPFLifePayout(raAt65, 'standard', 65);
                return (
                  <div style={{marginTop:6}}>
                    {clientAge && clientAge < 55 && (
                      <div style={{padding:'6px 10px',background:'rgba(91,168,160,.06)',borderRadius:6,marginBottom:6,fontSize:10}}>
                        <strong>Age {clientAge}</strong> → turns 55 in {2026 + yearsTo55} · Projected {p.cpfScheme}: <strong>${projectedScheme.toLocaleString()}</strong> at 55 (today's ${schemeBase.toLocaleString()} + 3.5%/yr × {yearsTo55}yr)
                        {parseFloat(p.cpfTopUp)>0 && <span> · +${parseInt(p.cpfTopUp).toLocaleString()} top-up</span>}
                        <span style={{color:'var(--green2)',marginLeft:6}}>→ RA at 65: <strong>${raAt65.toLocaleString()}</strong></span>
                      </div>
                    )}
                    {clientAge >= 55 && (
                      <div style={{padding:'6px 10px',background:'rgba(91,168,160,.06)',borderRadius:6,marginBottom:6,fontSize:10}}>
                        <strong>Age {clientAge}</strong> (55+) · {p.cpfScheme}: ${schemeBase.toLocaleString()}
                        {parseFloat(p.cpfTopUp)>0 && <span> · +${parseInt(p.cpfTopUp).toLocaleString()} top-up</span>}
                        <span style={{color:'var(--green2)',marginLeft:6}}>→ RA at 65: <strong>${raAt65.toLocaleString()}</strong></span>
                      </div>
                    )}
                    {/* All 3 plans × deferment table */}
                    <div style={{borderRadius:6,border:'1px solid var(--border)',overflow:'hidden'}}>
                      <table style={{width:'100%',fontSize:10,borderCollapse:'collapse'}}>
                        <thead><tr style={{background:'var(--bg2)'}}>
                          <th style={{padding:'4px 8px',textAlign:'left',fontSize:9}}>Plan</th>
                          {[65,66,67,68,69,70].map(a=>(
                            <th key={a} style={{padding:'4px 6px',textAlign:'center',fontSize:9,color:a===startAge?'var(--green2)':'var(--text3)',fontWeight:a===startAge?700:400}}>
                              {a===65?'Start 65':'Defer → '+a}
                            </th>
                          ))}
                        </tr></thead>
                        <tbody>
                          {['standard','basic','escalating'].map(plan => {
                            const label = {standard:'Standard',basic:'Basic',escalating:'Escalating (+2%/yr)'}[plan];
                            const isSelected = (p.cpfPlan||'standard') === plan;
                            // Base monthly at 65 for this plan (no deferment)
                            const base65 = estimateCPFLifePayout(raAt65, plan, 65).monthly;
                            return (
                              <tr key={plan} style={{borderTop:'1px solid var(--border)',background:isSelected?'rgba(91,168,160,.06)':'transparent',cursor:'pointer'}} onClick={()=>set('cpfPlan',plan)}>
                                <td style={{padding:'4px 8px',fontWeight:isSelected?700:400,color:isSelected?'var(--green2)':'var(--text2)'}}>
                                  {isSelected?'● ':''}{label}
                                </td>
                                {[65,66,67,68,69,70].map(a=>{
                                  // CPF deferment: +7% per year deferred (includes extra interest + longevity credit)
                                  const deferYears = a - 65;
                                  const payout = Math.round(base65 * (1 + deferYears * CPF_CONSTANTS.DEFER_BONUS_PER_YEAR));
                                  const isCur = a === startAge;
                                  return <td key={a} style={{padding:'4px 6px',textAlign:'center',fontWeight:isCur&&isSelected?700:400,color:isCur&&isSelected?'var(--green2)':'var(--text2)'}}>${payout.toLocaleString()}</td>;
                                })}
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                    <div style={{marginTop:4,fontSize:9,color:'var(--text3)'}}>
                      Click a row to select · Deferment: +7%/yr (CPF Board published rate, incl extra interest + longevity credit) · Payout is fixed once started (Escalating: +2%/yr after start)
                    </div>
                  </div>
                );
              })()}
            </>) : (<>
              {/* Custom balance mode */}
              <div style={{padding:8,background:'rgba(91,168,160,.06)',borderRadius:6,marginBottom:8,fontSize:10,color:'var(--teal)'}}>
                📊 Enter actual CPF balances to project RA growth → CPF LIFE payout estimates
              </div>
              <div className="grid-3" style={{marginBottom:6}}>
                <div className="field"><label>OA Balance ($)</label><input type="number" value={p.cpfOA||''} onChange={e=>set('cpfOA',e.target.value)} placeholder="0" /><div style={{fontSize:9,color:'var(--text3)'}}>Ordinary Account @ 2.5%</div></div>
                <div className="field"><label>SA Balance ($)</label><input type="number" value={p.cpfSA||''} onChange={e=>set('cpfSA',e.target.value)} placeholder="0" /><div style={{fontSize:9,color:'var(--text3)'}}>Special Account @ 4.0%</div></div>
                <div className="field"><label>MA Balance ($)</label><input type="number" value={p.cpfMA||''} onChange={e=>set('cpfMA',e.target.value)} placeholder="0" /><div style={{fontSize:9,color:'var(--text3)'}}>MediSave @ 4.0% · BHS $79k</div></div>
              </div>
              <div className="grid-3" style={{marginBottom:6}}>
                <div className="field"><label>Monthly Salary ($)</label><input type="number" value={p.cpfMonthlySalary||''} onChange={e=>set('cpfMonthlySalary',e.target.value)} placeholder="e.g. 6000" /><div style={{fontSize:9,color:'var(--text3)'}}>OW ceiling: $8,000/mth</div></div>
                <div className="field"><label>Payout Start Age</label><input type="number" value={p.cpfStartAge||65} onChange={e=>set('cpfStartAge',e.target.value)} min="65" max="70" /></div>
                <div className="field"><label>CPF LIFE Plan</label>
                  <select value={p.cpfPlan||'standard'} onChange={e=>set('cpfPlan',e.target.value)}>
                    <option value="standard">Standard</option><option value="basic">Basic</option><option value="escalating">Escalating</option>
                  </select>
                </div>
              </div>

              {/* Projection result */}
              {age && parseFloat(p.cpfMonthlySalary) > 0 && (() => {
                const salary = parseFloat(p.cpfMonthlySalary)||0;
                const oaBal = parseFloat(p.cpfOA)||0;
                const saBal = parseFloat(p.cpfSA)||0;
                const maBal = parseFloat(p.cpfMA)||0;
                const startAge = parseInt(p.cpfStartAge)||65;
                // Always project to 65 as the base for payout estimation
                const proj = projectCPFToRetirement(age, salary, oaBal, saBal, maBal, 65);
                const contribRate = getCPFContribRate(age);
                const allocRate = getCPFAllocRate(age);
                const monthlyContrib = Math.round(Math.min(salary, CPF_CONSTANTS.OW_CEILING) * contribRate.total);

                return (
                  <div style={{marginTop:6}}>
                    {/* Current contribution info */}
                    <div style={{padding:'6px 10px',background:'var(--bg2)',borderRadius:6,marginBottom:6,fontSize:10}}>
                      <strong>Age {age}:</strong> Total CPF {(contribRate.total*100).toFixed(1)}% ({(contribRate.employee*100).toFixed(1)}% ee + {(contribRate.employer*100).toFixed(1)}% er) = <strong>${monthlyContrib.toLocaleString()}/mth</strong>
                      <span style={{color:'var(--text3)',marginLeft:6}}>· OA {(allocRate.oa*100).toFixed(1)}% · {age>=55?'RA':'SA'} {(allocRate.sa*100).toFixed(1)}% · MA {(allocRate.ma*100).toFixed(1)}%</span>
                    </div>
                    {/* Projected balances at 65 */}
                    <div style={{padding:'8px 12px',background:'rgba(91,168,160,.06)',borderRadius:8,marginBottom:6}}>
                      <div style={{fontSize:9,fontWeight:700,color:'var(--teal)',textTransform:'uppercase',marginBottom:4}}>Projected Balances at Age 65</div>
                      <div className="grid-3" style={{gap:6}}>
                        <div><div style={{fontSize:9,color:'var(--text3)'}}>OA</div><div style={{fontSize:14,fontWeight:600}}>${proj.oa.toLocaleString()}</div></div>
                        <div><div style={{fontSize:9,color:'var(--text3)'}}>RA</div><div style={{fontSize:14,fontWeight:700,color:'var(--green2)'}}>${proj.ra.toLocaleString()}</div></div>
                        <div><div style={{fontSize:9,color:'var(--text3)'}}>MA</div><div style={{fontSize:14,fontWeight:600}}>${proj.ma.toLocaleString()}</div></div>
                      </div>
                    </div>
                    {/* All 3 plan estimates — RA at 65 as baseline, deferment applied by estimateCPFLifePayout */}
                    <div style={{borderRadius:6,border:'1px solid var(--border)',overflow:'hidden'}}>
                      <table style={{width:'100%',fontSize:10,borderCollapse:'collapse'}}>
                        <thead><tr style={{background:'var(--bg2)'}}>
                          <th style={{padding:'4px 8px',textAlign:'left',fontSize:9}}>Plan</th>
                          <th style={{padding:'4px 8px',textAlign:'right',fontSize:9}}>{startAge===65?'Est. Monthly':'Start '+startAge+' (deferred)'}</th>
                          <th style={{padding:'4px 8px',textAlign:'right',fontSize:9}}>Est. Annual</th>
                        </tr></thead>
                        <tbody>
                          {['standard','basic','escalating'].map(plan => {
                            const est = estimateCPFLifePayout(proj.ra, plan, startAge);
                            const isSelected = (p.cpfPlan||'standard') === plan;
                            return (
                              <tr key={plan} style={{borderTop:'1px solid var(--border)',background:isSelected?'rgba(91,168,160,.06)':'transparent',cursor:'pointer'}} onClick={()=>set('cpfPlan',plan)}>
                                <td style={{padding:'4px 8px',fontWeight:isSelected?700:400,color:isSelected?'var(--green2)':'var(--text2)'}}>
                                  {isSelected?'● ':''}{plan.charAt(0).toUpperCase()+plan.slice(1)}{plan==='escalating'?' (+2%/yr)':''}
                                </td>
                                <td style={{padding:'4px 8px',textAlign:'right',fontWeight:isSelected?700:500,color:isSelected?'var(--green2)':'var(--text2)'}}>${est.monthly.toLocaleString()}</td>
                                <td style={{padding:'4px 8px',textAlign:'right',color:'var(--text3)'}}>${est.annual.toLocaleString()}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                    <div style={{fontSize:9,color:'var(--text3)',marginTop:4}}>
                      RA at 65: ${proj.ra.toLocaleString()} · {startAge>65?'Deferment +7%/yr to age '+startAge+' · ':''}Salary constant · CPF 2026 rates · Estimates only
                    </div>
                  </div>
                );
              })()}
              {age && !parseFloat(p.cpfMonthlySalary) && (
                <div style={{fontSize:10,color:'var(--gold)',padding:6}}>Enter monthly salary to see CPF projection</div>
              )}
            </>)}
          </div>
          <div style={{background:'var(--bg3)',borderRadius:8,padding:12,border:'1px solid rgba(157,138,191,.2)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{fontSize:10,fontWeight:700,color:'#9d8abf',textTransform:'uppercase',letterSpacing:'.5px'}}>Other Retirement Income</div>
              <button className="btn-secondary btn-sm" onClick={()=>set('otherRetIncome',[...(p.otherRetIncome||[]),{id:'ori_'+Date.now(),source:'',amount:'',appreciation:'2',fromAge:'65',toAge:'85'}])} style={{fontSize:9,padding:'2px 8px'}}>+ Add</button>
            </div>
            {(p.otherRetIncome||[]).length === 0 && <div style={{fontSize:10,color:'var(--text3)',textAlign:'center',padding:8}}>Rental, dividends, part-time work, spousal support…</div>}
            {(p.otherRetIncome||[]).map((inc,i) => (
              <div key={inc.id||i} style={{display:'grid',gridTemplateColumns:'1fr 70px 50px 45px 45px 24px',gap:4,marginBottom:4,alignItems:'end'}}>
                <div className="field" style={{marginBottom:0}}>{i===0 && <label style={{fontSize:8}}>Source</label>}<input value={inc.source} onChange={e=>{const a=[...(p.otherRetIncome||[])];a[i]={...a[i],source:e.target.value};set('otherRetIncome',a);}} placeholder="Rental" style={{fontSize:11}} /></div>
                <div className="field" style={{marginBottom:0}}>{i===0 && <label style={{fontSize:8}}>$/mth</label>}<input type="number" value={inc.amount} onChange={e=>{const a=[...(p.otherRetIncome||[])];a[i]={...a[i],amount:e.target.value};set('otherRetIncome',a);}} placeholder="2000" style={{fontSize:11}} /></div>
                <div className="field" style={{marginBottom:0}}>{i===0 && <label style={{fontSize:8}}>↑%/yr</label>}<input type="number" value={inc.appreciation} onChange={e=>{const a=[...(p.otherRetIncome||[])];a[i]={...a[i],appreciation:e.target.value};set('otherRetIncome',a);}} style={{fontSize:11}} /></div>
                <div className="field" style={{marginBottom:0}}>{i===0 && <label style={{fontSize:8}}>From</label>}<input type="number" value={inc.fromAge} onChange={e=>{const a=[...(p.otherRetIncome||[])];a[i]={...a[i],fromAge:e.target.value};set('otherRetIncome',a);}} style={{fontSize:11}} /></div>
                <div className="field" style={{marginBottom:0}}>{i===0 && <label style={{fontSize:8}}>To</label>}<input type="number" value={inc.toAge} onChange={e=>{const a=[...(p.otherRetIncome||[])];a[i]={...a[i],toAge:e.target.value};set('otherRetIncome',a);}} style={{fontSize:11}} /></div>
                <button className="btn-danger" onClick={()=>{const a=[...(p.otherRetIncome||[])];a.splice(i,1);set('otherRetIncome',a);}} style={{padding:'2px 4px',fontSize:10,marginBottom:0,height:28}}>×</button>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Dependants */}
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            <h3 style={{fontSize:14,fontWeight:600}}>Dependants</h3>
            <p style={{fontSize:12,color:'var(--text3)'}}>Spouse, children, parents — any life insured under your client's policies</p>
          </div>
          <button className="btn-primary btn-sm" onClick={addDep}>+ Add Dependant</button>
        </div>
        {(!p.dependants||p.dependants.length===0) ? (
          <div style={{textAlign:'center',padding:24,color:'var(--text3)'}}>
            <div style={{fontSize:24,marginBottom:6}}>👨‍👩‍👧‍👦</div>
            <div style={{fontSize:12}}>No dependants added yet. Click + Add Dependant or use 📷 Scan to extract from documents.</div>
          </div>
        ) : (p.dependants||[]).map((d,i) => (
          <div key={d.id||i} style={{padding:12,background:'var(--bg3)',borderRadius:10,marginBottom:8,border:'1px solid var(--border)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:13,fontWeight:600}}>{d.name||'Dependant '+(i+1)}</span>
              <button className="btn-danger btn-sm" onClick={()=>removeDep(i)}>×</button>
            </div>
            <div className="grid-3">
              <div className="field"><label>Name</label><input value={d.name||''} onChange={e=>updateDep(i,'name',e.target.value)} /></div>
              <div className="field"><label>Relationship</label><select value={d.relationship||''} onChange={e=>updateDep(i,'relationship',e.target.value)}>
                <option value="">—</option><option>Spouse</option><option>Child</option><option>Parent</option><option>Sibling</option><option>Other</option>
              </select></div>
              <div className="field"><label>Date of Birth</label><input type="date" value={d.dob||''} onChange={e=>updateDep(i,'dob',e.target.value)} /></div>
            </div>
            <div className="grid-3">
              <div className="field"><label>Gender</label><select value={d.gender||''} onChange={e=>updateDep(i,'gender',e.target.value)}><option value="">—</option><option>Male</option><option>Female</option></select></div>
              <div className="field"><label>Smoker</label><select value={d.smoker||''} onChange={e=>updateDep(i,'smoker',e.target.value)}><option value="">—</option><option>Non-smoker</option><option>Smoker</option></select></div>
              <div className="field"><label>Nationality</label><select value={d.nationality||''} onChange={e=>updateDep(i,'nationality',e.target.value)}><option value="">—</option><option value="SC">SC</option><option value="PR">PR</option><option value="Foreigner">Foreigner</option></select></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MODULE: RETIREMENT — Retirement Lite Dashboard (condensed RetireLens)
// ═══════════════════════════════════════════════════════════════

const RetirementLiteDashboard = memo(function RetirementLiteDashboard({data,age,retAge,p,policies,cvTimeline,toSGD,fxRates}) {
  const chartRef = useRef(null);
  const chartInst = useRef(null);
  const [shareMode,setShareMode] = useState(false);

  const {desiredMonthly,cpfPayout,policyMonthlyIncome,policyDividends,lumpSum,otherMonthly,otherSources,timeline,cpfScheme,cpfStartAge} = data;

  const totalAtRet = (cpfScheme!=='none'?cpfPayout.mid:0) + policyMonthlyIncome + policyDividends + otherMonthly;
  const gap = Math.max(0, desiredMonthly - totalAtRet);
  const coveragePct = desiredMonthly > 0 ? Math.min(100, Math.round(totalAtRet/desiredMonthly*100)) : 0;
  const yearsFromLump = gap > 0 && lumpSum > 0 ? Math.round(lumpSum / (gap * 12)) : 0;

  // Chart
  useEffect(() => {
    if(!chartRef.current || timeline.length === 0) return;
    if(chartInst.current) chartInst.current.destroy();
    const filtered = timeline.filter(r => r.age >= Math.max(55, retAge-5) && r.age <= 90);
    chartInst.current = new Chart(chartRef.current, {
      type:'bar',
      data:{
        labels:filtered.map(r=>r.age),
        datasets:[
          {label:'CPF LIFE',data:filtered.map(r=>r.cpf),backgroundColor:'rgba(91,168,160,.7)',borderRadius:2,stack:'income'},
          {label:'Policy Income',data:filtered.map(r=>r.policy),backgroundColor:'rgba(212,169,106,.7)',borderRadius:2,stack:'income'},
          {label:'Dividends',data:filtered.map(r=>r.dividends),backgroundColor:'rgba(157,138,191,.7)',borderRadius:2,stack:'income'},
          {label:'Other Income',data:filtered.map(r=>r.other),backgroundColor:'rgba(91,143,217,.5)',borderRadius:2,stack:'income'},
          {label:'Desired',data:filtered.map(r=>r.desired),type:'line',borderColor:'rgba(239,83,80,.6)',borderWidth:2,borderDash:[6,3],pointRadius:0,fill:false},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        scales:{
          x:{stacked:true,grid:{color:'rgba(212,169,106,.06)'},ticks:{color:'#6b6050',font:{size:9}}},
          y:{stacked:true,grid:{color:'rgba(212,169,106,.06)'},ticks:{color:'#6b6050',callback:v=>'$'+v.toLocaleString()},beginAtZero:true}
        },
        plugins:{legend:{labels:{color:'#a39580',font:{size:9},boxWidth:12}},tooltip:{callbacks:{footer:items=>{const total=items.filter(i=>i.dataset.stack==='income').reduce((s,i)=>s+i.raw,0);return'Total: $'+total.toLocaleString()+'/mth';}}}}
      }
    });
    return ()=>{if(chartInst.current)chartInst.current.destroy()};
  },[timeline,retAge]);

  // ── SHARE VIEW GENERATOR — Full condensed dashboard ──
  const generateShareView = () => {
    const clientName = p.name || 'Client';
    const retRow = cvTimeline.find(r => r.age === retAge);
    const totalPrem = policies.filter(pol=>pol.category!=='cash_investments'&&!pol.premSingle&&pol.premiumStructure!=='Single Premium'&&pol.premFrequency!=='single'&&pol.status!=='matured').reduce((s,pol)=>s+(pol.premFrequency==='monthly'?(parseFloat(pol.annualPremium)||0)*12:(parseFloat(pol.annualPremium)||0)),0);
    const totalSinglePrem = policies.filter(pol=>pol.category!=='cash_investments'&&(pol.premSingle||pol.premiumStructure==='Single Premium'||pol.premFrequency==='single')&&pol.status!=='matured').reduce((s,pol)=>s+(parseFloat(pol.annualPremium)||0),0);
    // Premium by mode
    const premByMode = {cash:0, srs:0, cpfoa:0, medisave:0};
    policies.filter(pol=>pol.category!=='cash_investments'&&pol.status!=='matured'&&!pol.premSingle&&pol.premiumStructure!=='Single Premium'&&pol.premFrequency!=='single').forEach(pol => {
      const prem = pol.premFrequency==='monthly'?(parseFloat(pol.annualPremium)||0)*12:(parseFloat(pol.annualPremium)||0);
      const method = (pol.paymentMethod||'').toLowerCase();
      if(method.includes('medisave')) premByMode.medisave += prem;
      else if(method.includes('srs')) premByMode.srs += prem;
      else if(method.includes('cpf')) premByMode.cpfoa += prem;
      else premByMode.cash += prem;
    });
    const activePols = policies.filter(pol => !(pol.category==='cash_investments' && pol.fdMaturityDate && new Date(pol.fdMaturityDate)<new Date() && !pol.fdAutoRenew));

    // Coverage totals
    let cvDeath=0,cvTPD=0,cvCI=0,cvECI=0,cvDI=0;
    let hasISP=false,ispRiderName='';
    activePols.forEach(pol => {
      const sa = parseFloat(pol.sumAssured)||0;
      if(pol.category==='protection' && !['Personal Accident','Critical Illness','Disability Income'].includes(pol.subType)) { cvDeath+=sa; cvTPD+=sa; }
      if(pol.subType==='Critical Illness') cvCI+=sa;
      if(pol.subType==='Disability Income') cvDI+=(parseFloat(pol.diMonthlyBenefit)||0);
      if(pol.subType==='Integrated Shield Plan') { hasISP=true; if(pol.hasRider) ispRiderName=pol.riderList||'Rider'; }
      (pol.riders||[]).forEach(rd => {
        const rsa=parseFloat(rd.sa)||0;
        if(rd.type==='death') cvDeath+=rsa;
        if(rd.type==='tpd') cvTPD+=rsa;
        if(rd.type==='ci') cvCI+=rsa;
        if(rd.type==='eci') cvECI+=rsa;
        if(rd.type==='di') cvDI+=rsa;
      });
    });

    // Insurer concentration
    const insurerMap = {};
    activePols.forEach(pol => { const ins = pol.insurer||'Unknown'; insurerMap[ins]=(insurerMap[ins]||0)+1; });
    const topInsurers = Object.entries(insurerMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

    // Category summary
    const catCounts = {};
    activePols.forEach(pol => { const c = CATEGORIES[pol.category]?.label||pol.category; catCounts[c] = (catCounts[c]||0)+1; });

    // Grouped policy sections
    const policyGroups = [
      {id:'protection', main:'Insurance', sub:'🛡 Protection', match: pol => pol.category==='protection' && !['Universal Life (UL)','Indexed UL (IUL)','Variable UL (VUL)'].includes(pol.subType), cols:['Provider','Product','Sub-type','Sum Assured','Premium','Mode']},

            <span>Total</span>
            <span style={{color:totalAtRet>=desiredMonthly?'var(--green2)':'var(--red)'}}>${totalAtRet.toLocaleString()}/mth</span>
          </div>

          {/* Lump sum */}
          {lumpSum > 0 && (
            <div style={{marginTop:8,padding:'6px 8px',background:'var(--bg2)',borderRadius:6}}>
              <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',fontWeight:600}}>Lump Sum at {retAge}</div>
              <div style={{fontSize:14,fontWeight:700,color:'var(--gold)'}}>${Math.round(lumpSum).toLocaleString()}</div>
              {gap > 0 && <div style={{fontSize:9,color:'var(--text3)'}}>Covers ~{yearsFromLump} yrs shortfall</div>}
            </div>
          )}

          {gap > 0 && lumpSum > 0 && (
            <div style={{marginTop:6,fontSize:10,color:'var(--text3)'}}>
              Total runway: <span style={{fontWeight:600,color:'var(--gold)'}}>{Math.round(lumpSum/(gap*12) + (totalAtRet>0?(90-retAge):0))} years</span> with income + drawdown
            </div>
          )}
        </div>
      </div>

      {/* ── SHARE PREVIEW ── */}
      {shareMode && (
        <div style={{marginTop:12,border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'var(--bg3)'}}>
            <span style={{fontSize:11,fontWeight:600}}>Client-Facing Summary Preview</span>
            <button className="btn-primary btn-sm" onClick={handleShare} style={{fontSize:10}}>📤 Download HTML</button>
          </div>
          <div style={{padding:12,fontSize:10,color:'var(--text3)'}}>
            Downloads a clean, standalone HTML file — full condensed dashboard with protection coverage, retirement income breakdown, policy portfolio table, insurer concentration, income projection chart, and lump sum summary. No API keys, no edit buttons — safe to email or WhatsApp to clients.
          </div>
        </div>
      )}
    </div>
  );
});

// MODULE: CASHFLOW — Premium cashflow chart
// ═══════════════════════════════════════════════════════════════

const PremiumCashflowChart = memo(function PremiumCashflowChart({policies,age,retAge}) {
  const chartRef = useRef(null);
  const chartInst = useRef(null);

  const data = useMemo(() => {
    const rows = [];
    for(let yr=age; yr<=Math.max(retAge+5,80); yr++) {
      const row = {age:yr, total:0, byPolicy:{}};
      policies.forEach(pol => {
        // Skip inactive policies from cashflow
        if(pol.status==='matured'||pol.status==='surrendered'||pol.status==='lapsed') return;
        // Skip matured FDs/T-bills from cashflow
        if(pol.category==='cash_investments' && pol.fdMaturityDate && new Date(pol.fdMaturityDate) < new Date()) return;
        // FDs don't have ongoing premiums — skip from cashflow chart
        if(pol.category==='cash_investments') return;
        const startAge = parseInt(pol.premStartAge)||parseInt(pol.ageAtEntry)||age;
        const premTerm = pol.premSingle ? 1 : (pol.premWholeLife ? Math.max(65-startAge,30) : (parseInt(pol.premTerm)||(parseInt(pol.premEndAge)>0?parseInt(pol.premEndAge)-startAge:25)));
        const prem = parseFloat(pol.annualPremium)||0;
        if(yr >= startAge && yr < startAge + premTerm && prem > 0) {
          const name = (pol.insurer?pol.insurer.split(' ')[0]+' ':'')+(pol.productName||pol.subType||'Policy');
          row.byPolicy[name] = (row.byPolicy[name]||0) + prem;
          row.total += prem;
        }
      });
      rows.push(row);
    }
    return rows;
  }, [policies,age,retAge]);

  // Get unique policy names
  const policyNames = useMemo(() => {
    const names = new Set();
    data.forEach(r => Object.keys(r.byPolicy).forEach(n => names.add(n)));
    return [...names];
  }, [data]);

  useEffect(() => {
    if(!chartRef.current || data.length === 0) return;
    if(chartInst.current) chartInst.current.destroy();
    const colors = ['#5b8fd9','#5ba8a0','#d4a96a','#c97b9a','#9d8abf','#7ca87c','#d98e5b','#8fb8d9','#b89d5b','#a07cbd'];
    chartInst.current = new Chart(chartRef.current, {
      type:'bar',
      data:{
        labels:data.map(r=>r.age),
        datasets:policyNames.map((name,i) => ({
          label:name,
          data:data.map(r=>r.byPolicy[name]||0),
          backgroundColor:colors[i%colors.length]+'99',
          borderColor:colors[i%colors.length],
          borderWidth:1,
          borderRadius:2,
        }))
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        scales:{
          x:{stacked:true,grid:{color:'rgba(212,169,106,.06)'},ticks:{color:'#6b6050',font:{size:9}}},
          y:{stacked:true,grid:{color:'rgba(212,169,106,.06)'},ticks:{color:'#6b6050',callback:v=>v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v}}
        },
        plugins:{
          legend:{labels:{color:'#a39580',font:{size:9},boxWidth:12}},
          tooltip:{callbacks:{footer:items=>{const total=items.reduce((s,it)=>s+it.raw,0);return'Total: $'+total.toLocaleString();}}}
        }
      }
    });
    return ()=>{if(chartInst.current)chartInst.current.destroy()};
  },[data,policyNames]);

  if(data.every(r=>r.total===0)) return null;

  // Find key milestones
  const dropEvents = [];
  for(let i=1; i<data.length; i++) {
    const drop = data[i-1].total - data[i].total;
    if(drop > 500) {
      const ended = Object.keys(data[i-1].byPolicy).filter(n => !data[i].byPolicy[n] || data[i].byPolicy[n] < data[i-1].byPolicy[n]);
      if(ended.length > 0) dropEvents.push({age:data[i].age, drop, ended});
    }
  }

  return (
    <div className="card" style={{marginBottom:16}}>
      <h3 style={{fontSize:13,fontWeight:600,marginBottom:4}}>Premium Cashflow</h3>
      <p style={{fontSize:10,color:'var(--text3)',marginBottom:10}}>Year-by-year premium commitments — see when payments end and total outflow drops</p>
      <div style={{height:200}}><canvas ref={chartRef} /></div>
      {dropEvents.length > 0 && (
        <div style={{marginTop:8}}>
          <div style={{fontSize:9,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Key Premium Drops</div>
          {dropEvents.slice(0,5).map((ev,i) => (
            <div key={i} style={{padding:'5px 8px',background:'rgba(91,168,160,.05)',borderRadius:6,fontSize:10,marginBottom:3,borderLeft:'2px solid var(--green2)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:600,color:'var(--green2)'}}>Age {ev.age}</span>
                <span style={{color:'var(--green2)',fontWeight:600}}>−{fmt(ev.drop)}/yr</span>
              </div>
              <div style={{fontSize:9,color:'var(--text3)',marginTop:2}}>
                {ev.ended.map((name,j) => <div key={j}>{j+1}. {name.length>40?name.substring(0,37)+'…':name}</div>)}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
});

// ═══════════════════════════════════════════════════════════════
// MODULE: REVIEW — Guided client review walkthrough
// ═══════════════════════════════════════════════════════════════
function ReviewSession({onClose}) {
  const {policies, clientProfile, clientName} = useContext(AppCtx);
  const [step, setStep] = useState(0);
  const p = clientProfile || {};
  const age = p.dob ? Math.floor((Date.now()-new Date(p.dob).getTime())/31557600000) : 35;
  const retAge = parseInt(p.retirementAge)||65;
  const income = parseFloat(p.annualIncome)||0;
  const active = policies.filter(pol=>pol.status!=='matured'&&pol.status!=='surrendered'&&pol.status!=='lapsed');

  // Coverage analysis
  let cDeath=0,cTPD=0,cCI=0,cECI=0,cDI=0,hasISP=false;
  active.forEach(pol=>{
    (pol.riders||[]).forEach(rd=>{const sa=parseFloat(rd.sa)||0;if(rd.type==='death')cDeath+=sa;if(rd.type==='tpd')cTPD+=sa;if(rd.type==='ci')cCI+=sa;if(rd.type==='eci')cECI+=sa;if(rd.type==='di')cDI+=sa;});
    if(pol.category==='protection'&&!['Personal Accident','Critical Illness'].includes(pol.subType)){cDeath+=parseFloat(pol.sumAssured)||0;cTPD+=parseFloat(pol.sumAssured)||0;}
    if(pol.subType==='Critical Illness') cCI+=parseFloat(pol.sumAssured)||0;
    if(pol.subType==='Integrated Shield Plan') hasISP=true;
    if(pol.subType==='Disability Income') cDI+=parseFloat(pol.diMonthlyBenefit)||0;
  });
  const rDeath=income>0?income*10:500000; const rCI=income>0?income*5:300000;
  const rDI=income>0?Math.round(income/12*0.75):3000;

  // Premium analysis
  const totalAnnual = active.filter(pol=>!pol.premSingle&&pol.premFrequency!=='single'&&pol.category!=='cash_investments').reduce((s,pol)=>s+(pol.premFrequency==='monthly'?(parseFloat(pol.annualPremium)||0)*12:(parseFloat(pol.annualPremium)||0)),0);
  const premRatio = income > 0 ? Math.round(totalAnnual/income*100) : 0;
  const highPremPolicies = active.filter(pol=>(parseFloat(pol.annualPremium)||0)>5000 && pol.category!=='cash_investments').sort((a,b)=>(parseFloat(b.annualPremium)||0)-(parseFloat(a.annualPremium)||0));

  // Cash value
  const cvPolicies = active.filter(pol=>parseFloat(pol.cashValue)>0).sort((a,b)=>(parseFloat(b.cashValue)||0)-(parseFloat(a.cashValue)||0));
  const totalCV = cvPolicies.reduce((s,p)=>s+(parseFloat(p.cashValue)||0),0);

  // Retirement
  const retPolicies = active.filter(pol=>pol.category==='retirement');
  const retIncome = retPolicies.reduce((s,pol)=>s+(parseFloat(pol.annuityMonthly)||parseFloat(pol.monthlyBenefit)||0),0);

  const steps = [
    {title:'Coverage Gaps',icon:'🛡',color:'#5b8fd9'},
    {title:'Premium Efficiency',icon:'💰',color:'var(--gold)'},
    {title:'Cash Value Check',icon:'📊',color:'var(--green2)'},
    {title:'Retirement Readiness',icon:'🏦',color:'#9d8abf'},
    {title:'Recommendations',icon:'✅',color:'var(--teal)'},
  ];

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal" style={{maxWidth:700,maxHeight:'90vh',padding:0,overflow:'hidden'}}>
        {/* Header */}
        <div style={{background:'var(--bg2)',padding:'16px 20px',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><h3 style={{fontSize:16,fontWeight:700,margin:0}}>📋 Policy Review Session</h3>
              <div style={{fontSize:11,color:'var(--text3)'}}>Client: {clientName||'Unknown'} · Age {age} · {active.length} active policies</div></div>
            <button onClick={onClose} style={{background:'none',color:'var(--text3)',fontSize:20}}>×</button>
          </div>
          {/* Step indicator */}
          <div style={{display:'flex',gap:2,marginTop:12}}>
            {steps.map((s,i) => (
              <button key={i} onClick={()=>setStep(i)} style={{flex:1,padding:'6px 4px',borderRadius:6,fontSize:9,fontWeight:step===i?700:400,
                background:step===i?s.color+'22':'transparent',color:step===i?s.color:'var(--text3)',border:'1px solid '+(step===i?s.color+'44':'transparent'),
                cursor:'pointer',textAlign:'center',transition:'all .2s'}}>
                <div style={{fontSize:14}}>{s.icon}</div>{s.title}
              </button>
            ))}
          </div>
        </div>

        {/* Content */}
        <div style={{padding:20,overflowY:'auto',maxHeight:'65vh'}}>

          {/* Step 0: Coverage Gaps */}
          {step===0 && (<div className="fade-in">
            <h4 style={{fontSize:14,fontWeight:700,marginBottom:12}}>🛡 Protection Coverage vs LIA Benchmarks</h4>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:12}}>Industry benchmarks: Death 10× income · CI 5× expenses · DI 75% monthly · ISP required</div>
            {[
              {label:'Death & Total Invalidity',have:cDeath,need:rDeath,icon:'💀'},
              {label:'Total Permanent Disability',have:cTPD,need:rDeath,icon:'🦽'},
              {label:'Critical Illness',have:cCI,need:rCI,icon:'🏥'},
              {label:'Early Critical Illness',have:cECI,need:rCI*0.4,icon:'⚕️'},
              {label:'Disability Income/mth',have:cDI,need:rDI,icon:'📉'},
              {label:'Hospitalisation (ISP)',have:hasISP?1:0,need:1,icon:'🏨',flag:true},
            ].map(g => {
              const pct = g.flag ? (g.have>=g.need?100:0) : Math.min(100,Math.round(g.have/Math.max(1,g.need)*100));
              const ok = pct >= 80;
              return (
                <div key={g.label} style={{marginBottom:10,padding:10,background:ok?'rgba(91,168,160,.04)':'rgba(239,83,80,.04)',borderRadius:8,border:'1px solid '+(ok?'rgba(91,168,160,.15)':'rgba(239,83,80,.15)')}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                    <span style={{fontSize:12,fontWeight:600}}>{g.icon} {g.label}</span>
                    <span style={{fontSize:12,fontWeight:700,color:ok?'var(--green2)':'var(--red)'}}>{g.flag?(g.have?'✅ Covered':'❌ Not covered'):pct+'%'}</span>
                  </div>
                  {!g.flag && <div className="gap-bar"><div style={{width:pct+'%',height:'100%',background:ok?'var(--green2)':'var(--red)',borderRadius:4}} /></div>}
                  {!g.flag && <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginTop:3}}>
                    <span>Have: {fmt(g.have)}</span><span>Need: {fmt(g.need)}</span>{g.have<g.need && <span style={{color:'var(--red)',fontWeight:600}}>Gap: {fmt(g.need-g.have)}</span>}
                  </div>}
                  {!ok && <div style={{fontSize:10,color:'var(--red)',marginTop:4,fontWeight:500}}>
                    💡 {g.flag?'Client needs an Integrated Shield Plan with rider':g.label.includes('Disability')?'Consider a DI plan covering 75% of monthly income':'Consider increasing coverage by '+fmt(g.need-g.have)}
                  </div>}
                </div>
              );
            })}
          </div>)}

          {/* Step 1: Premium Efficiency */}
          {step===1 && (<div className="fade-in">
            <h4 style={{fontSize:14,fontWeight:700,marginBottom:12}}>💰 Premium Efficiency Analysis</h4>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
              <div style={{background:'var(--bg3)',borderRadius:8,padding:10,textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Annual Premiums</div>
                <div style={{fontSize:20,fontWeight:700,color:'var(--gold)'}}>{fmt(totalAnnual)}</div>
              </div>
              <div style={{background:'var(--bg3)',borderRadius:8,padding:10,textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>% of Income</div>
                <div style={{fontSize:20,fontWeight:700,color:premRatio>20?'var(--red)':premRatio>15?'var(--gold)':'var(--green2)'}}>{premRatio||'—'}%</div>
                <div style={{fontSize:9,color:'var(--text3)'}}>{premRatio>20?'⚠️ High — review needed':premRatio>15?'Moderate':'✅ Healthy range'}</div>
              </div>
            </div>
            <div style={{fontSize:11,fontWeight:600,marginBottom:6}}>Top Premium Policies</div>
            {highPremPolicies.slice(0,8).map(pol => (
              <div key={pol.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 8px',borderBottom:'1px solid var(--border)',fontSize:11}}>
                <div><span style={{fontWeight:500}}>{pol.productName||pol.policyName}</span> <span style={{color:'var(--text3)',fontSize:10}}>{pol.insurer}</span></div>
                <div style={{fontWeight:600,color:'var(--gold)'}}>{fmt(parseFloat(pol.annualPremium)||0)}/yr</div>
              </div>
            ))}
            {premRatio > 15 && <div style={{marginTop:10,padding:10,background:'rgba(212,169,106,.06)',borderRadius:8,fontSize:11,color:'var(--gold)'}}>
              📊 Premium-to-income ratio: {premRatio}%. Industry guideline: 10-15%.
            </div>}
          </div>)}

          {/* Step 2: Cash Value */}
          {step===2 && (<div className="fade-in">
            <h4 style={{fontSize:14,fontWeight:700,marginBottom:12}}>📊 Cash Value & Surrender Value Check</h4>
            <div style={{background:'var(--bg3)',borderRadius:8,padding:12,marginBottom:12,textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Total Portfolio Surrender Value</div>
              <div style={{fontSize:24,fontWeight:700,color:'var(--gold)'}}>{fmt(totalCV)}</div>
              <div style={{fontSize:10,color:'var(--text3)'}}>{cvPolicies.length} policies with cash value</div>
            </div>
            {cvPolicies.slice(0,10).map(pol => {
              const cv = parseFloat(pol.cashValue)||0;
              const prem = parseFloat(pol.annualPremium)||0;
              const yrs = parseInt(pol.premStartAge) ? age - parseInt(pol.premStartAge) : 5;
              const totalPaid = pol.premSingle ? prem : prem * yrs;
              const gain = cv - totalPaid;
              return (
                <div key={pol.id} style={{padding:'8px',borderBottom:'1px solid var(--border)',fontSize:11}}>
                  <div style={{display:'flex',justifyContent:'space-between'}}>
                    <span style={{fontWeight:500}}>{pol.productName||pol.policyName} <span style={{color:'var(--text3)',fontSize:9}}>{pol.insurer}</span></span>
                    <span style={{fontWeight:600,color:'var(--gold)'}}>{fmt(cv)}</span>
                  </div>
                  {totalPaid > 0 && <div style={{fontSize:9,color:gain>=0?'var(--green2)':'var(--red)'}}>
                    Paid: {fmt(totalPaid)} · {gain>=0?'Gain':'Loss'}: {fmt(Math.abs(gain))} ({totalPaid>0?Math.round(gain/totalPaid*100):0}%)
                  </div>}
                </div>
              );
            })}
          </div>)}

          {/* Step 3: Retirement */}
          {step===3 && (<div className="fade-in">
            <h4 style={{fontSize:14,fontWeight:700,marginBottom:12}}>🏦 Retirement Readiness</h4>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
              <div style={{background:'var(--bg3)',borderRadius:8,padding:10,textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Years to Retirement</div>
                <div style={{fontSize:20,fontWeight:700}}>{Math.max(0,retAge-age)}</div>
              </div>
              <div style={{background:'var(--bg3)',borderRadius:8,padding:10,textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Policy Income</div>
                <div style={{fontSize:20,fontWeight:700,color:'var(--gold)'}}>{fmt(retIncome)}/m</div>
              </div>
              <div style={{background:'var(--bg3)',borderRadius:8,padding:10,textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Lump Sum (CV)</div>
                <div style={{fontSize:20,fontWeight:700,color:'var(--green2)'}}>{fmt(totalCV)}</div>
              </div>
            </div>
            {retPolicies.length > 0 && (<div style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:600,marginBottom:4}}>Income-Producing Policies</div>
              {retPolicies.map(pol => (
                <div key={pol.id} style={{padding:'6px 8px',borderBottom:'1px solid var(--border)',fontSize:11,display:'flex',justifyContent:'space-between'}}>
                  <span>{pol.productName} <span style={{color:'var(--text3)',fontSize:9}}>{pol.insurer}</span></span>
                  <span style={{color:'var(--green2)',fontWeight:600}}>{fmt(parseFloat(pol.annuityMonthly)||parseFloat(pol.monthlyBenefit)||0)}/m</span>
                </div>
              ))}
            </div>)}
            <div style={{padding:10,background:'rgba(157,138,191,.06)',borderRadius:8,fontSize:11}}>
              📊 {retAge-age<=10?'Retirement within 10 years — income certainty and capital preservation are priorities.':retAge-age<=20?'Good time horizon. Consider balancing growth investments with guaranteed income streams.':'Long runway to retirement. Growth potential can be maximised while building protection base.'}
            </div>
          </div>)}

          {/* Step 4: Recommendations */}
          {step===4 && (<div className="fade-in">
            <h4 style={{fontSize:14,fontWeight:700,marginBottom:12}}>✅ Key Recommendations</h4>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>Auto-generated based on portfolio analysis. Customise before presenting to client.</div>
            {[
              cDeath<rDeath && {pri:'high',text:'Increase life cover by '+fmt(rDeath-cDeath)+' to meet 10× income benchmark',cat:'Protection'},
              cCI<rCI && {pri:'high',text:'Critical Illness cover gap of '+fmt(rCI-cCI)+'. Consider standalone CI or multi-pay CI plan',cat:'Protection'},
              !hasISP && {pri:'high',text:'No Integrated Shield Plan detected. Essential for hospitalisation coverage',cat:'Health'},
              cDI<rDI && {pri:'medium',text:'Disability income shortfall. Consider DI plan covering '+fmt(rDI)+'/month',cat:'Protection'},
              premRatio>20 && {pri:'medium',text:'Premium-to-income ratio at '+premRatio+'%. Review ILP/endowment premiums for potential restructuring',cat:'Efficiency'},
              retIncome===0 && retAge-age<20 && {pri:'medium',text:'No retirement income policies. Consider annuity or income plan',cat:'Retirement'},
              totalCV>100000 && {pri:'low',text:'Portfolio has '+fmt(totalCV)+' in surrender value. Review if any underperforming policies should be restructured',cat:'Value'},
            ].filter(Boolean).map((rec,i) => (
              <div key={i} style={{padding:10,marginBottom:6,borderRadius:8,borderLeft:'3px solid '+(rec.pri==='high'?'var(--red)':rec.pri==='medium'?'var(--gold)':'var(--teal)'),background:rec.pri==='high'?'rgba(239,83,80,.04)':rec.pri==='medium'?'rgba(212,169,106,.04)':'rgba(91,168,160,.04)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:12,fontWeight:500}}>{rec.text}</span>
                  <span style={{fontSize:8,padding:'1px 6px',borderRadius:4,background:rec.pri==='high'?'rgba(239,83,80,.15)':'rgba(212,169,106,.1)',color:rec.pri==='high'?'var(--red)':'var(--gold)',fontWeight:600,flexShrink:0,marginLeft:8}}>{rec.cat}</span>
                </div>
              </div>
            ))}
            {cDeath>=rDeath && cCI>=rCI && hasISP && <div style={{padding:12,background:'rgba(91,168,160,.06)',borderRadius:8,textAlign:'center'}}>
              <div style={{fontSize:16}}>🎉</div>
              <div style={{fontSize:13,fontWeight:600,color:'var(--green2)'}}>Portfolio is well-balanced!</div>
              <div style={{fontSize:11,color:'var(--text3)'}}>Core protection adequately covered. Focus review on premium efficiency and retirement planning.</div>
            </div>}
          </div>)}
        </div>

        {/* Footer nav */}
        <div style={{padding:'12px 20px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--bg2)'}}>
          <button className="btn-secondary btn-sm" onClick={()=>setStep(Math.max(0,step-1))} disabled={step===0}>← Previous</button>
          <span style={{fontSize:10,color:'var(--text3)'}}>Step {step+1} of {steps.length}</span>
          {step<steps.length-1 ? <button className="btn-primary btn-sm" onClick={()=>setStep(step+1)}>Next →</button>
            : <button className="btn-primary btn-sm" onClick={onClose}>Done ✓</button>}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MODULE: UPLOAD_PORTAL — Client document collection link
// ═══════════════════════════════════════════════════════════════
function Dashboard() {
  const {policies,setTab,apiKey,clientProfile,saveProfile} = useContext(AppCtx);
  const p = clientProfile || {};
  const age = p.dob ? Math.floor((Date.now()-new Date(p.dob).getTime())/31557600000) : 35;
  const retAge = parseInt(p.retirementAge)||65;
  const annualIncome = parseFloat(p.annualIncome)||0;
  const monthlyIncome = annualIncome/12;
  const monthlyExpenses = parseFloat(p.monthlyExpenses)||0;

  // SA Override for retired clients
  const [deathOverride,setDeathOverride] = useState('');
  const [tpdOverride,setTpdOverride] = useState('');
  const [ciOverride,setCiOverride] = useState('');
  const [eciOverride,setEciOverride] = useState('');
  const [diOverride,setDiOverride] = useState('');

  // LIA parameters
  const [deathYrs,setDeathYrs] = useState(10);
  const [tpdYrs,setTpdYrs] = useState(10);
  const [ciYrs,setCiYrs] = useState(5);
  const [eciYrs,setEciYrs] = useState(2);
  const [diPct,setDiPct] = useState(75);
  const [ciMethod,setCiMethod] = useState('expenses'); // 'income' or 'expenses'
  const [ciIncExp,setCiIncExp] = useState(true);
  const [ciIncMort,setCiIncMort] = useState(true);
  const [ciIncDep,setCiIncDep] = useState(false);

  // ── FX RATE STATE ──
  const [fxRates, setFxRates] = useState({USDSGD:1.34, GBPSGD:1.70, EURSGD:1.45});
  const [fxManual, setFxManual] = useState(false);
  const [fxLoading, setFxLoading] = useState(false);
  useEffect(() => {
    (async () => {
      setFxLoading(true);
      try {
        const r = await fetchFXRate('USD','SGD');
        if(r) setFxRates(prev => ({...prev, USDSGD:r}));
        const g = await fetchFXRate('GBP','SGD');
        if(g) setFxRates(prev => ({...prev, GBPSGD:g}));
        const e = await fetchFXRate('EUR','SGD');
        if(e) setFxRates(prev => ({...prev, EURSGD:e}));
      } catch(err) { setFxManual(true); }
      setFxLoading(false);
    })();
  }, []);

  const toSGD = (amount, currency) => {
    if(!currency || currency === 'SGD') return amount;
    const key = currency + 'SGD';
    return amount * (fxRates[key] || 1);
  };

  // ── CURRENCY CONSOLIDATION ──
  const currencyBreakdown = useMemo(() => {
    const byCcy = {};
    policies.forEach(pol => {
      const ccy = pol.currency || 'SGD';
      if(!byCcy[ccy]) byCcy[ccy] = {premium:0,coverage:0,cv:0,count:0,policies:[]};
      byCcy[ccy].premium += parseFloat(pol.annualPremium)||0;
      byCcy[ccy].coverage += parseFloat(pol.sumAssured)||0;
      byCcy[ccy].count += 1;
      byCcy[ccy].policies.push(pol);
      // Estimate CV
      const yr = age - (parseInt(pol.premStartAge)||parseInt(pol.ageAtEntry)||age);
      if(yr > 0 && parseFloat(pol.cashValue)>0) byCcy[ccy].cv += parseFloat(pol.cashValue);
    });
    return byCcy;
  }, [policies, age]);

  const hasForeignCurrency = Object.keys(currencyBreakdown).some(c => c !== 'SGD');

  // ── RETIREMENT LITE COMPUTATION ──
  // Dashboard drop handler
  const handleDashDrop = async (files) => {
    const gk = ((await dbGet('settings','geminiKey').catch(()=>null))?.value || '').trim();
    const ck = ((await dbGet('settings','anthropicKey').catch(()=>null))?.value || '').trim();
    if(!gk && !ck){toast('Set your API key in Settings first','warning');return;}
    const choice = confirm('What are these documents?\n\nOK = Client profile (NRIC, FNA, KYC)\nCancel = Policy documents');
    if(choice) setTab('profile');
    else setTab('policies');
    window._pendingDropFiles = files;
  };

  const byCategory = useMemo(() => {
    const m = {};
    Object.keys(CATEGORIES).forEach(k => m[k]=[]);
    policies.forEach(p => {if(m[p.category])m[p.category].push(p)});
    return m;
  }, [policies]);

  // Premium breakdown by payment mode and frequency
  const premiumBreakdown = useMemo(() => {
    const modes = {cash:{annual:0,single:0}, srs:{annual:0,single:0}, cpfoa:{annual:0,single:0}, cpfsa:{annual:0,single:0}, medisave:{annual:0,single:0}, other:{annual:0,single:0}};
    policies.forEach(p => {
      if(p.category==='cash_investments') return;
      if(p.status==='matured'||p.status==='surrendered'||p.status==='lapsed') return;
      if(p.maturityDate && new Date(p.maturityDate) < new Date() && p.category==='savings') return;
      const prem = parseFloat(p.annualPremium)||0;
      if(!prem) return;
      const isSingle = p.premSingle || p.premiumStructure==='Single Premium' || p.premFrequency==='single';
      const annualized = isSingle ? 0 : (p.premFrequency==='monthly' ? prem*12 : prem);
      const singleAmt = isSingle ? prem : 0;
      // Determine mode
      const method = (p.paymentMethod||'').toLowerCase().replace(/\s/g,'');
      if(method.includes('medisave')) { modes.medisave.annual += annualized; modes.medisave.single += singleAmt; }
      else if(method.includes('srs')) { modes.srs.annual += annualized; modes.srs.single += singleAmt; }
      else if(method.includes('cpfsa')||method.includes('cpf sa')) { modes.cpfsa.annual += annualized; modes.cpfsa.single += singleAmt; }
      else if(method.includes('cpfoa')||method.includes('cpf oa')) { modes.cpfoa.annual += annualized; modes.cpfoa.single += singleAmt; }
      else { modes.cash.annual += annualized; modes.cash.single += singleAmt; }
    });
    const totalAnnual = Object.values(modes).reduce((s,m) => s+m.annual, 0);
    const totalSingle = Object.values(modes).reduce((s,m) => s+m.single, 0);
    return { modes, totalAnnual, totalSingle, total: totalAnnual + totalSingle };
  }, [policies]);
  // Legacy alias
  const totalPremium = { annual: premiumBreakdown.totalAnnual, single: premiumBreakdown.totalSingle, total: premiumBreakdown.total };
  const totalCoverage = useMemo(() => policies.filter(p=>p.status!=='matured'&&p.status!=='surrendered'&&p.status!=='lapsed').reduce((s,p) => s + (parseFloat(p.sumAssured)||0), 0), [policies]);

  // ── COVERAGE FROM ALL POLICIES (riders + base SA) ──
  const coverage = useMemo(() => {
    let death=0,tpd=0,ci=0,eci=0,di=0,add=0,amr=0,tcm=0;
    let hasISP=false, ispRider=false, ispDeductible=0, ispCoIns=0;
    policies.forEach(pol => {
      (pol.riders||[]).forEach(rd => {
        const sa = parseFloat(rd.sa)||0;
        const expAge = parseInt(rd.expiryAge)||99;
        if(expAge <= age) return;
        if(rd.type==='death') death += sa;
        if(rd.type==='tpd') tpd += sa;
        if(rd.type==='ci') ci += sa;
        if(rd.type==='eci') eci += sa;
        if(rd.type==='di') di += sa;
        if(rd.type==='accidental') add += sa;
      });
      if(pol.category==='protection' && !['Personal Accident','Critical Illness'].includes(pol.subType)) {
        const sa = parseFloat(pol.sumAssured)||0;
        const mult = parseFloat(pol.saMultiplier)||1;
        const multEnd = parseInt(pol.multiplierEndAge)||70;
        const effSA = age < multEnd ? sa * mult : sa;
        death += effSA; tpd += effSA;
      }
      if(pol.subType==='Critical Illness') { ci += parseFloat(pol.sumAssured)||0; }
      if(pol.subType==='Early Critical Illness') { eci += parseFloat(pol.sumAssured)||0; }
      if(pol.subType==='Personal Accident') { add += parseFloat(pol.addSA)||0; amr += parseFloat(pol.accMedical)||0; tcm += parseFloat(pol.tcmReimb)||0; }
      if(pol.subType==='Disability Income') di += parseFloat(pol.diMonthlyBenefit)||0;
      if(pol.subType==='Integrated Shield Plan') { hasISP=true; ispRider=pol.hasRider||false; ispDeductible=parseFloat(pol.ispDeductible)||3500; ispCoIns=parseFloat(pol.ispCoinsurance)||10; }
    });
    return {death,tpd,ci,eci,di,add,amr,tcm,hasISP,ispRider,ispDeductible,ispCoIns};
  },[policies,age]);

  // ── REQUIRED COVERAGE — income-based or SA override ──
  const selExpenses = (ciIncExp?(parseFloat(p.monthlyExpenses)||0):0) + (ciIncMort?(parseFloat(p.mortgagePayment)||0):0) + (ciIncDep?(parseFloat(p.dependantSupport)||0):0);
  const annualExpenses = selExpenses > 0 ? selExpenses * 12 : (parseFloat(p.monthlyExpenses)||0) * 12;
  const basisAnnual = ciMethod==='income' ? annualIncome : (annualExpenses > 0 ? annualExpenses : annualIncome);
  const basisMonthly = ciMethod==='income' ? monthlyIncome : (selExpenses > 0 ? selExpenses : monthlyIncome);
  const basisLabel = ciMethod==='income' ? 'income' : 'expenses';
  const reqDeath = parseFloat(deathOverride) || (basisAnnual > 0 ? basisAnnual * deathYrs : 500000);
  const reqTPD = parseFloat(tpdOverride) || (basisAnnual > 0 ? basisAnnual * tpdYrs : 500000);
  const reqCI = parseFloat(ciOverride) || (basisAnnual > 0 ? basisMonthly * 12 * ciYrs : 300000);
  const reqECI = parseFloat(eciOverride) || (basisAnnual > 0 ? basisMonthly * 12 * eciYrs : 120000);
  const reqDI = parseFloat(diOverride) || (basisMonthly > 0 ? basisMonthly * diPct/100 : 3000);

  const gaps = [
    {label:'Death & TI (' + deathYrs + 'yr ' + basisLabel + ')', cur:coverage.death, need:reqDeath, weight:20},
    {label:'TPD (' + tpdYrs + 'yr ' + basisLabel + ')', cur:coverage.tpd, need:reqTPD, weight:20},
    {label:'Critical Illness (' + ciYrs + 'yr ' + basisLabel + ')', cur:coverage.ci, need:reqCI, weight:25},
    {label:'Early CI (' + eciYrs + 'yr ' + basisLabel + ')', cur:coverage.eci, need:reqECI, weight:10},
    {label:'Disability/mth', cur:coverage.di, need:reqDI, weight:10},
    {label:'Hospitalisation', cur:coverage.hasISP?1:0, need:1, weight:15, isFlag:true, note:coverage.hasISP?(coverage.ispRider?'ISP + Rider':'ISP only — deductible & co-insurance apply'):'No ISP held'},
  ];

  const overallScore = Math.round(gaps.reduce((s,g) => {
    const pct = g.isFlag ? (g.cur>=g.need?100:(g.cur>0?50:0)) : (g.need===0?100:Math.min(100, g.cur/g.need*100));
    return s + pct * g.weight/100;
  },0));
  const scoreColor = overallScore >= 80 ? 'var(--green2)' : overallScore >= 50 ? 'var(--gold)' : 'var(--red)';
  const scoreLabel = overallScore >= 80 ? 'Well Protected' : overallScore >= 50 ? 'Partially Protected' : 'Significantly Underprotected';

  // ── CASH VALUE TIMELINE ──
  const cvTimeline = useMemo(() => {
    const rows = [];
    for(let yr=age; yr<=Math.max(retAge+20,90); yr++) {
      const row = {age:yr, policies:[], totalCV:0, income:0, maturities:0, dividends:0};
      policies.forEach(pol => {
        const startAge = parseInt(pol.premStartAge)||parseInt(pol.ageAtEntry)||age;
        const yearsInForce = yr - startAge;
        if(yearsInForce < 0) return;
        const prem = parseFloat(pol.annualPremium)||0;
        const isSingle = pol.premSingle;
        const premTerm = isSingle ? 1 : (pol.premWholeLife ? Math.max(65-startAge, 30) : (parseInt(pol.premTerm)||(parseInt(pol.premEndAge)>0?parseInt(pol.premEndAge)-startAge:25)));

        if(pol.category==='savings') {
          const sub = pol.endSubtype||'limited';
          const payYrs = parseInt(pol.endPayYrs)||premTerm;
          const policyTerm = sub==='lifetime' ? 99-startAge : (parseInt(pol.endPolicyTerm)||payYrs+(parseInt(pol.endWaitYrs)||0));
          const matAge = startAge + policyTerm;
          const r = (parseFloat(pol.endYield)||parseFloat(pol.cvGrowthRate)||4)/100;
          let cv;
          if(parseFloat(pol.cashValue) > 0 && yearsInForce <= 1) cv = parseFloat(pol.cashValue);
          else if(parseFloat(pol.endGuaranteedCV) > 0 && yearsInForce >= policyTerm) cv = parseFloat(pol.endGuaranteedCV) + (parseFloat(pol.endNonGuarBonus)||0);
          else { const paid = Math.min(payYrs, yearsInForce+1); cv = isSingle ? prem * Math.pow(1+r, yearsInForce) : (r>0 ? prem*(Math.pow(1+r,paid)-1)/r*Math.pow(1+r, Math.max(0,yearsInForce-paid)) : prem*paid); }
          if(yr === matAge && sub!=='lifetime') { row.maturities += Math.round(cv); }
          else if(yr <= matAge || sub==='lifetime') { row.totalCV += Math.round(cv); row.policies.push({name:pol.productName||pol.insurer,cv:Math.round(cv),type:'endowment'}); }
        }

        if(pol.category==='retirement') {
          const payoutStart = parseInt(pol.annuityStartAge)||65;
          const payoutEnd = parseInt(pol.annuityEndAge)||85;
          const annPayout = parseFloat(pol.annuityPayout)||(parseFloat(pol.annuityMonthly)||parseFloat(pol.monthlyBenefit)||0)*12;
          const r = (parseFloat(pol.retAccumYield)||3.5)/100;
          const paidYrs = Math.min(premTerm, yearsInForce+1);
          let cv = parseFloat(pol.cashValue) > 0 && yearsInForce <= 1 ? parseFloat(pol.cashValue) :
            (isSingle ? prem * Math.pow(1+r, yearsInForce) : (r>0 ? prem*(Math.pow(1+r,paidYrs)-1)/r*Math.pow(1+r,Math.max(0,yearsInForce-paidYrs)) : prem*paidYrs));
          if(yr >= payoutStart && yr <= payoutEnd && pol.retPayoutMode!=='reinvest') cv = Math.max(0, cv - annPayout*(yr-payoutStart+1));
          if(yr >= payoutStart && yr <= payoutEnd) row.income += annPayout;
          if(yr <= payoutEnd) { row.totalCV += Math.max(0,Math.round(cv)); row.policies.push({name:pol.productName||pol.insurer,cv:Math.max(0,Math.round(cv)),type:'annuity'}); }
        }

        if(pol.category==='protection' && !['Term Life','Personal Accident','Critical Illness'].includes(pol.subType)) {
          const r = (parseFloat(pol.cvGrowthRate)||3)/100;
          const totalPremPaid = isSingle ? prem : prem * Math.min(premTerm, yearsInForce+1);
          let cv = parseFloat(pol.cashValue) > 0 && yearsInForce <= 1 ? parseFloat(pol.cashValue) :
            (r>0 && !isSingle ? prem*(Math.pow(1+r,Math.min(premTerm,yearsInForce+1))-1)/r*Math.pow(1+r,Math.max(0,yearsInForce-premTerm)) : totalPremPaid*Math.pow(1+r,yearsInForce));
          row.totalCV += Math.round(cv); row.policies.push({name:pol.productName||pol.insurer,cv:Math.round(cv),type:'protection'});
        }

        if(pol.category==='investment') {
          const growth = (parseFloat(pol.ilpGrowth)||6)/100;
          const div = (parseFloat(pol.ilpDivYield)||0)/100;
          const fee = (parseFloat(pol.ilpMgmtFee)||1.5)/100;
          const isReinvest = pol.divReinvest;
          // Reinvest: total yield compounds into fund. Payout: only growth-fee compounds, div paid separately.
          const netRate = isReinvest ? (growth + div - fee) : (growth - fee);
          const drawdownAge = parseInt(pol.ilpDivDrawdownAge)||retAge;
          const totalPremPaid = isSingle ? prem : prem * Math.min(premTerm, yearsInForce+1);
          let fv = parseFloat(pol.cashValue) > 0 && yearsInForce <= 1 ? parseFloat(pol.cashValue) :
            (netRate>0 && !isSingle ? prem*(Math.pow(1+netRate,Math.min(premTerm,yearsInForce+1))-1)/netRate*Math.pow(1+netRate,Math.max(0,yearsInForce-premTerm)) : totalPremPaid*Math.pow(1+Math.max(0,netRate),yearsInForce));
          // Dividend income (only when NOT reinvesting)
          if(!isReinvest && yr >= drawdownAge && div > 0) {
            const divAmt = Math.round(fv * div);
            row.dividends += divAmt; row.income += divAmt;
          }
          row.totalCV += Math.round(fv); row.policies.push({name:pol.productName||pol.insurer,cv:Math.round(fv),type:'ilp',divReinvest:isReinvest});
        }
      });
      rows.push(row);
    }
    return rows;
  },[policies,age,retAge]);

  // ── RETIREMENT LITE COMPUTATION ──
  const retirementLite = useMemo(() => {
    const baseDesired = parseFloat(p.desiredRetIncome) || parseFloat(p.monthlyExpenses) || monthlyIncome * 0.7 || 5000;
    const inflationRate = (parseFloat(p.inflationRate) || 2.8) / 100;
    const yearsToRet = Math.max(0, retAge - (age||35));
    const desiredMonthly = Math.round(baseDesired * Math.pow(1 + inflationRate, yearsToRet));
    const cpfScheme = p.cpfScheme || 'FRS';
    const cpfPlan = p.cpfPlan || 'standard';
    const cpfStartAge = parseInt(p.cpfStartAge) || 65;
    // Age-aware CPF LIFE payout
    let cpfPayout = {low:0, mid:0, high:0};
    if(cpfScheme !== 'none') {
      let raAt65 = 0;
      if(p.cpfUseScheme === false && parseFloat(p.cpfMonthlySalary) > 0) {
        // Custom balance mode — project from actual CPF balances to age 65
        const proj = projectCPFToRetirement(age||35, parseFloat(p.cpfMonthlySalary)||0, parseFloat(p.cpfOA)||0, parseFloat(p.cpfSA)||0, parseFloat(p.cpfMA)||0, 65);
        raAt65 = proj.ra;
      } else {
        // Scheme mode — project scheme amount growing 3.5%/yr to age 55, then compound to 65
        const schemeBase = getCPFSchemeAmount(cpfScheme);
        const yearsTo55 = Math.max(0, 55 - (age||35));
        const projectedScheme = Math.round(schemeBase * Math.pow(1.035, yearsTo55)) + (parseFloat(p.cpfTopUp)||0);
        raAt65 = projectRAToAge(projectedScheme, 65);
      }
      // estimateCPFLifePayout takes RA at 65, applies deferment internally
      const est = estimateCPFLifePayout(raAt65, cpfPlan, cpfStartAge);
      cpfPayout = {low: Math.round(est.monthly*0.94), mid: est.monthly, high: Math.round(est.monthly*1.06)};
    }
    const retRow = cvTimeline.find(r => r.age === retAge);
    const policyMonthlyIncome = retRow ? Math.round(retRow.income/12) : 0;
    const policyDividends = retRow ? Math.round(retRow.dividends/12) : 0;
    const lumpSum = retRow ? retRow.totalCV + retRow.maturities : 0;
    const otherSources = (p.otherRetIncome || []).map(src => {
      const fromAge = parseInt(src.fromAge)||65;
      const toAge = parseInt(src.toAge)||85;
      const base = parseFloat(src.amount)||0;
      const appr = (parseFloat(src.appreciation)||0)/100;
      const yearsToRet = Math.max(0, retAge - (age || 35));
      const adjustedAmt = appr > 0 ? Math.round(base * Math.pow(1+appr, yearsToRet)) : base;
      return { ...src, adjustedAmt, fromAge, toAge, active: retAge >= fromAge && retAge <= toAge };
    });
    const otherMonthly = otherSources.filter(s=>s.active).reduce((sum,s) => sum + s.adjustedAmt, 0);
    const timeline = [];
    for(let yr=Math.max(55,age); yr<=95; yr++) {
      const yrInflation = Math.pow(1 + inflationRate, yr - (age||35));
      const desiredAtYr = Math.round(baseDesired * yrInflation);
      const row = {age:yr, cpf:0, policy:0, dividends:0, other:0, total:0, desired:desiredAtYr};
      if(yr >= cpfStartAge && cpfScheme !== 'none') {
        row.cpf = cpfPlan === 'escalating' ? Math.round(cpfPayout.mid * Math.pow(1.02, yr - cpfStartAge)) : cpfPayout.mid;
      }
      const cvRow = cvTimeline.find(r => r.age === yr);
      if(cvRow) { row.policy = Math.round(cvRow.income/12); row.dividends = Math.round(cvRow.dividends/12); }
      otherSources.forEach(s => {
        if(yr >= s.fromAge && yr <= s.toAge) {
          const appr = (parseFloat(s.appreciation)||0)/100;
          row.other += Math.round((parseFloat(s.amount)||0) * Math.pow(1+appr, yr - (age||35)));
        }
      });
      row.total = row.cpf + row.policy + row.dividends + row.other;
      timeline.push(row);
    }
    return { desiredMonthly, baseDesired, inflationRate: inflationRate*100, cpfPayout, policyMonthlyIncome, policyDividends, lumpSum, otherMonthly, otherSources, timeline, cpfScheme, cpfStartAge };
  }, [p, cvTimeline, retAge, age, monthlyIncome]);

  // CV timeline chart
  const chartRef2 = useRef(null);
  const chartInst2 = useRef(null);
  useEffect(() => {
    if(!chartRef2.current || cvTimeline.length === 0) return;
    if(chartInst2.current) chartInst2.current.destroy();
    chartInst2.current = new Chart(chartRef2.current, {
      type:'line',
      data:{labels:cvTimeline.map(r=>r.age),datasets:[
        {label:'Surrender Value',data:cvTimeline.map(r=>r.totalCV),borderColor:'#d4a96a',backgroundColor:'rgba(212,169,106,.06)',fill:true,tension:.3,pointRadius:0,borderWidth:2,pointStyle:'rect'},
        {label:'Cumulative Premiums Paid',data:cvTimeline.map(r=>{
          let cumPrem=0;
          policies.forEach(pol=>{
            if(pol.status==='matured'||pol.status==='surrendered'||pol.category==='cash_investments'||pol.category==='other_assets') return;
            if(pol.premFrequency==='unknown') return; // Skip unconfirmed
            const sa=parseInt(pol.premStartAge)||parseInt(pol.ageAtEntry)||age;
            const pt=pol.premSingle?1:(pol.premWholeLife?Math.max(65-sa,30):(parseInt(pol.premTerm)||(parseInt(pol.premEndAge)>0?parseInt(pol.premEndAge)-sa:25)));
            const annPrem=pol.premFrequency==='monthly'?(parseFloat(pol.annualPremium)||0)*12:(parseFloat(pol.annualPremium)||0);
            if(!annPrem) return;
            const yrsInForce=Math.max(0, Math.min(r.age-sa, pt));
            cumPrem += pol.premSingle ? annPrem : annPrem * yrsInForce;
          });
          return cumPrem;
        }),borderColor:'rgba(239,83,80,.6)',backgroundColor:'rgba(239,83,80,.03)',fill:true,tension:.3,pointRadius:0,borderWidth:1.5,borderDash:[5,3],pointStyle:'line'},
        ...(cvTimeline.some(r=>r.maturities>0)?[{label:'Maturities',data:cvTimeline.map(r=>r.maturities),type:'bar',backgroundColor:'rgba(91,168,160,.5)',borderRadius:3,barPercentage:.4,pointStyle:'rect'}]:[]),
      ]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        scales:{
          x:{grid:{color:'rgba(212,169,106,.06)'},ticks:{color:'#6b6050',font:{size:10}}},
          y:{grid:{color:'rgba(212,169,106,.06)'},ticks:{color:'#d4a96a',font:{size:10},callback:v=>v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v}}
        },
        plugins:{legend:{labels:{color:'#a39580',font:{size:10},usePointStyle:true,pointStyleWidth:8}},

      {/* ═══ LIA SETTINGS + SA OVERRIDE ═══ */}

            <label style={{display:'flex',alignItems:'center',gap:3,cursor:'pointer',color:ciMethod==='expenses'?'var(--gold)':'var(--text3)'}}><input type="radio" name="ciMethod" checked={ciMethod==='expenses'} onChange={()=>setCiMethod('expenses')} style={{accentColor:'var(--gold)'}} /> Expenses ×Years</label>

          <div className="field"><label>TPD (yrs)</label><input type="number" value={tpdYrs} onChange={e=>setTpdYrs(+e.target.value||10)} /><div style={{fontSize:9,color:'var(--text3)'}}>LIA: 9–10× {ciMethod==='income'?'income':'expenses'}</div></div>

            <div className="field"><label>TPD SA</label><input type="number" value={tpdOverride} onChange={e=>setTpdOverride(e.target.value)} placeholder="Auto" /></div>
            <div className="field"><label>CI SA</label><input type="number" value={ciOverride} onChange={e=>setCiOverride(e.target.value)} placeholder="Auto" /></div>
            <div className="field"><label>ECI SA</label><input type="number" value={eciOverride} onChange={e=>setEciOverride(e.target.value)} placeholder="Auto" /></div>

      {/* ═══ SURRENDER VALUE vs PREMIUMS PAID ═══ */}
      {cvTimeline.some(r=>r.totalCV>0) && (

                </div>
              </div>
              <div style={{gridColumn:'1/-1',background:'var(--bg3)',borderRadius:8,padding:'6px 10px',textAlign:'center'}}>
                {(() => {
                  let totalPaid=0;policies.forEach(pol=>{if(pol.status==='matured'||pol.category==='cash_investments'||pol.category==='other_assets')return;const pt=pol.premSingle?1:(pol.premWholeLife?Math.max(65-(parseInt(pol.premStartAge)||parseInt(pol.ageAtEntry)||35),30):(parseInt(pol.premTerm)||(parseInt(pol.premEndAge)>0?parseInt(pol.premEndAge)-(parseInt(pol.premStartAge)||35):25)));const ann=pol.premFrequency==='monthly'?(parseFloat(pol.annualPremium)||0)*12:(parseFloat(pol.annualPremium)||0);totalPaid+=pol.premSingle?ann:ann*pt;});
                  const net = retRow.totalCV - totalPaid;

                  <th style={{padding:'6px 8px',textAlign:'right'}}>Total CV</th>
                  <th style={{padding:'6px 8px',textAlign:'right'}}>Income/yr</th>
                  <th style={{padding:'6px 8px',textAlign:'right'}}>Maturities</th>
                  <th style={{padding:'6px 8px',textAlign:'right'}}>Dividends</th>
                  <th style={{padding:'6px 8px',textAlign:'left'}}>Policies</th>
                </tr></thead>
                <tbody>
                  {cvTimeline.filter(r => r.totalCV > 0 || r.income > 0 || r.maturities > 0).map(r => (
                    <tr key={r.age} style={{borderTop:'1px solid var(--border)',background:r.age===retAge?'rgba(212,169,106,.08)':''}}>
                      <td style={{padding:'4px 8px',fontWeight:r.age===retAge?700:400}}>{r.age}{r.age===retAge?' ★':''}</td>
                      <td style={{padding:'4px 8px',textAlign:'right'}}>{r.totalCV>0?fmt(r.totalCV):'-'}</td>
                      <td style={{padding:'4px 8px',textAlign:'right',color:r.income>0?'var(--green2)':'var(--text3)'}}>{r.income>0?fmt(r.income):'-'}</td>
                      <td style={{padding:'4px 8px',textAlign:'right',color:r.maturities>0?'var(--gold)':'var(--text3)'}}>{r.maturities>0?fmt(r.maturities):'-'}</td>
                      <td style={{padding:'4px 8px',textAlign:'right',color:r.dividends>0?'#9d8abf':'var(--text3)'}}>{r.dividends>0?fmt(r.dividends):'-'}</td>
                      <td style={{padding:'4px 8px',fontSize:9,color:'var(--text3)'}}>{r.policies.map(p=>p.name).join(', ')}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </details>
        </div>

      {/* ═══ TIER 1: INSURER CONCENTRATION ═══ */}
      {(() => {
        const byInsurer = {};
        policies.forEach(pol => {
          const ins = pol.insurer||'Unknown';
          byInsurer[ins] = (byInsurer[ins]||0) + (parseFloat(pol.annualPremium)||0);
        });
        const entries = Object.entries(byInsurer).sort((a,b)=>b[1]-a[1]);
        const total = entries.reduce((s,e)=>s+e[1],0);
        const topPct = total > 0 ? Math.round(entries[0][1]/total*100) : 0;

        if(entries.length < 2) return null;
        return (
          <div className="card" style={{marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>

            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {entries.map(([ins,amt],i) => {

                const colors = ['#5b8fd9','#5ba8a0','#d4a96a','#c97b9a','#9d8abf','#7ca87c'];
                return (
                  <div key={ins} style={{flex:'1 0 120px',maxWidth:200,background:'var(--bg3)',borderRadius:8,padding:10,borderLeft:`3px solid ${colors[i%colors.length]}`}}>

                      <span style={{fontSize:16,fontWeight:700}}>{pct}%</span>

                    </div>
                    <div style={{height:4,background:'var(--bg4)',borderRadius:2,marginTop:4}}>
                      <div style={{height:4,borderRadius:2,background:colors[i%colors.length],width:`${pct}%`,transition:'width .3s'}}></div>
                    </div>
                    <div style={{fontSize:9,color:'var(--text3)',marginTop:2}}>{policies.filter(p=>(p.insurer||'Unknown')===ins).length} policies</div>
                  </div>

              })}
            </div>
          </div>
