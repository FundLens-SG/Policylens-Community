            </div>
            <div className="grid-3">
              <div className="field"><label>Loyalty Bonus (%)</label><input type="number" step="0.01" value={form.loyaltyBonus?.rate||''} onChange={e=>setNested('loyaltyBonus','rate',e.target.value)} /></div>
              <div className="field"><label>Bonus Start Year</label><input type="number" value={form.loyaltyBonus?.startYear||''} onChange={e=>setNested('loyaltyBonus','startYear',e.target.value)} /></div>
              <div className="field"><label>Loan Rate</label><input value={form.loanRate||''} onChange={e=>set('loanRate',e.target.value)} placeholder="e.g. Variable" /></div>
            </div>
            {isVUL && (
              <div className="grid-3">
                <div className="field"><label>Solved Premium</label><input type="number" value={form.solvedPremium||''} onChange={e=>set('solvedPremium',e.target.value)} /></div>
                <div className="field"><label>Assumed Return (%)</label><input type="number" step="0.5" value={form.assumedReturn||''} onChange={e=>set('assumedReturn',e.target.value)} /></div>
                <div className="field"><label>Investment Risk</label><input disabled value="Client" /></div>
              </div>
            )}
          </div>
        )}

        {/* ═══ MATERNITY FIELDS ═══ */}
        {isMaternity && (
          <div style={{marginTop:8,padding:14,background:'var(--bg3)',borderRadius:10,border:'1px solid var(--border)'}}>
            <h4 style={{fontSize:13,fontWeight:600,marginBottom:10,color:'var(--red)'}}>Maternity Fields</h4>
            <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
              <label style={{fontSize:12}}><input type="checkbox" checked={form.dualInsured} onChange={e=>set('dualInsured',e.target.checked)} /> Dual Insured (Mother+Child)</label>
              <label style={{fontSize:12}}><input type="checkbox" checked={form.guaranteedIssuance} onChange={e=>set('guaranteedIssuance',e.target.checked)} /> Guaranteed Issuance</label>
              <label style={{fontSize:12}}><input type="checkbox" checked={form.conversionRights} onChange={e=>set('conversionRights',e.target.checked)} /> Conversion Rights</label>
            </div>
          </div>
        )}

        {/* ═══ ILP FUND ALLOCATIONS ═══ */}
        {isILP && (
          <div style={{marginTop:8,padding:14,background:'var(--bg3)',borderRadius:10,border:'1px solid var(--border)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <h4 style={{fontSize:13,fontWeight:600,color:'var(--purple)',margin:0}}>Fund Allocations</h4>
              <div style={{fontSize:10,color:'var(--text3)'}}>Per-fund overrides → weighted policy rates</div>
            </div>
            <FundAllocationEditor allocations={form.fundAllocations||[]} onChange={v=>set('fundAllocations',v)} reinvest={form.divReinvest} onSyncWeighted={w=>{
              if((form.fundAllocations||[]).length>0){set('ilpGrowth',w.growth);set('ilpDivYield',w.dividend);set('ilpMgmtFee',w.fee);}
            }} />
          </div>
        )}

        {/* ═══ CASH / SURRENDER VALUE ═══ */}
        {hasCV && (
          <div style={{marginTop:8,padding:14,background:'var(--bg3)',borderRadius:10,border:'1px dashed var(--border)'}}>
            <h4 style={{fontSize:13,fontWeight:600,marginBottom:10,color:'var(--text2)'}}>Surrender Value {isILP?'/ Fund Value':''}</h4>
            <div className="grid-3">
              <div className="field">
                <label>Current Surrender Value</label>
                <div style={{display:'flex',gap:6}}>
                  <button className={`btn-sm ${form.cvKnown!==false?'btn-primary':'btn-secondary'}`} onClick={()=>set('cvKnown',true)} style={{flex:1,fontSize:10}}>✏ I know my SV</button>
                  <button className={`btn-sm ${form.cvKnown===false?'btn-primary':'btn-secondary'}`} onClick={()=>set('cvKnown',false)} style={{flex:1,fontSize:10}}>? I don't know</button>
                </div>
                {form.cvKnown!==false && <input type="number" value={form.cashValue||''} onChange={e=>set('cashValue',e.target.value)} placeholder="From latest statement" style={{marginTop:4}} />}
                {form.cvKnown===false && <div style={{fontSize:10,color:'var(--gold)',marginTop:4}}>Auto-estimated from premiums × yield × time</div>}
              </div>
              <div className="field"><label>Surrender Charge Period (yrs)</label><input type="number" value={form.surrenderPeriod||''} onChange={e=>set('surrenderPeriod',e.target.value)} placeholder="e.g. 15" /><div style={{fontSize:10,color:'var(--text3)'}}>Year where surrender charges = 0%</div></div>
              <div className="field"><label>Breakeven Year</label><input type="number" value={form.breakEvenYear||''} onChange={e=>set('breakEvenYear',e.target.value)} placeholder="e.g. 20" /><div style={{fontSize:10,color:'var(--gold)'}}>SV ≥ total premiums paid</div></div>
            </div>
            {/* ── Auto-estimated CV and projection ── */}
            {(() => {
              const prem = parseFloat(form.annualPremium)||0;
              const startAge = parseInt(form.premStartAge)||0;
              const premTerm = form.premSingle ? 1 : (parseInt(form.premTerm)||0);
              // Use weighted fund growth if available, else fallback to cvGrowthRate or 3%
              const fundGrowth = (form.fundAllocations||[]).length > 0 ? 
                (()=>{const tp=(form.fundAllocations||[]).reduce((s,a)=>s+(parseFloat(a.pct)||0),0);return tp>0?(form.fundAllocations||[]).reduce((s,a)=>s+(parseFloat(a.pct)||0)*(parseFloat(a.growth)||0),0)/tp:0})() : 0;
              const r = (fundGrowth > 0 ? fundGrowth : parseFloat(form.cvGrowthRate)||parseFloat(form.ilpGrowth)||3)/100;
              const retAge = parseInt(clientProfile?.retirementAge)||65;
              const age = clientAge;
              const yearsInForce = Math.max(0, age - startAge);
              const totalPaid = form.premSingle ? prem : prem * Math.min(premTerm, Math.max(premTerm, retAge-startAge));
              const yrsToRet = Math.max(0, retAge - age);

              // Auto-estimate current CV if unknown
              let estCV;
              if(form.cvKnown!==false && parseFloat(form.cashValue) > 0) {
                estCV = parseFloat(form.cashValue);
              } else if(prem > 0 && r > 0 && yearsInForce > 0) {
                const paid = Math.min(premTerm, yearsInForce);
                estCV = form.premSingle ? prem * Math.pow(1+r, yearsInForce) : prem*(Math.pow(1+r,paid)-1)/r * Math.pow(1+r, Math.max(0,yearsInForce-paid));
              } else { estCV = 0; }

              // Project to retirement age
              const paidRemaining = Math.max(0, premTerm - yearsInForce);
              let retCV;
              if(estCV > 0) {
                retCV = estCV * Math.pow(1+r, yrsToRet);
                if(!form.premSingle && paidRemaining > 0 && r > 0) retCV += prem*(Math.pow(1+r,Math.min(paidRemaining,yrsToRet))-1)/r * Math.pow(1+r, Math.max(0,yrsToRet-paidRemaining));
              } else if(prem > 0 && r > 0) {
                const totalYrs = retAge - startAge;
                const paid = Math.min(premTerm, totalYrs);
                retCV = form.premSingle ? prem * Math.pow(1+r, totalYrs) : prem*(Math.pow(1+r,paid)-1)/r * Math.pow(1+r, Math.max(0,totalYrs-paid));
              } else { retCV = 0; }

              const netGain = retCV - totalPaid;
              if(prem === 0 && estCV === 0) return null;
              return (
                <div style={{marginTop:10}}>
                  {fundGrowth > 0 && <div style={{fontSize:9,color:'var(--teal)',marginBottom:6}}>Using weighted fund growth rate: {fundGrowth.toFixed(1)}% p.a. from Fund Allocations above</div>}
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                    <div style={{background:'var(--bg2)',borderRadius:8,padding:10,textAlign:'center',border:'1px solid var(--border)'}}>
                      <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Auto-Estimated CV</div>
                      <div style={{fontSize:16,fontWeight:700,color:'var(--gold)'}}>${Math.round(estCV).toLocaleString()}</div>
                      <div style={{fontSize:9,color:'var(--text3)'}}>Auto: yield × premiums × {yearsInForce}yr in force</div>
                    </div>
                    <div style={{background:'var(--bg2)',borderRadius:8,padding:10,textAlign:'center',border:'1px solid var(--border)'}}>
                      <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Projected CV at Age {retAge}</div>
                      <div style={{fontSize:16,fontWeight:700,color:'var(--gold2)'}}>${Math.round(retCV).toLocaleString()}</div>
                      <div style={{fontSize:9,color:'var(--text3)'}}>at {(r*100).toFixed(1)}% p.a.</div>
                    </div>
                    <div style={{background:'var(--bg2)',borderRadius:8,padding:10,textAlign:'center',border:'1px solid var(--border)'}}>
                      <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Net Gain / (Loss)</div>
                      <div style={{fontSize:16,fontWeight:700,color:netGain>=0?'var(--green2)':'var(--red)'}}>{netGain>=0?'+':''}${Math.round(netGain).toLocaleString()}</div>
                      <div style={{fontSize:9,color:'var(--text3)'}}>total premiums: ${Math.round(totalPaid).toLocaleString()}</div>
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {/* ═══ KEY HIGHLIGHTS (from AI scan) ═══ */}
        {form.highlights && form.highlights.length > 0 && (
          <div style={{marginTop:8,padding:14,background:'rgba(245,158,11,.06)',borderRadius:10,border:'1px solid rgba(245,158,11,.2)'}}>
            <h4 style={{fontSize:13,fontWeight:600,marginBottom:8,color:'var(--orange)'}}>📋 Key Policy Highlights</h4>
            <div style={{display:'grid',gap:4}}>
              {form.highlights.map((h,i) => (
                <div key={i} style={{fontSize:12,color:'var(--text2)',padding:'4px 8px',background:'var(--bg2)',borderRadius:6,display:'flex',alignItems:'flex-start',gap:6}}>
                  <span style={{color:'var(--orange)',fontWeight:700,flexShrink:0}}>•</span>
                  <span>{h}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ═══ NOTES ═══ */}
        <div style={{marginTop:12}}>
          <label style={{fontSize:11,textTransform:'uppercase',fontWeight:600,color:'var(--text3)',letterSpacing:'.5px'}}>Notes — freeform OK, use AI Tidy to clean up</label>
          <textarea rows={3} value={form.notes} onChange={e=>set('notes',e.target.value)} style={{width:'100%',marginTop:4}} placeholder="Key policy details, rider info, anything — AI will clean it up" />
          {form.userRemarks !== undefined && form.userRemarks !== '' ? (
            <div style={{marginTop:6,padding:'8px 10px',background:'rgba(212,169,106,.08)',border:'1px solid rgba(212,169,106,.2)',borderRadius:8}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                <div style={{fontSize:10,fontWeight:600,color:'var(--gold)',textTransform:'uppercase',letterSpacing:'.3px'}}>Advisor Remark</div>
                <button style={{fontSize:9,padding:'2px 6px',borderRadius:4,background:'rgba(239,83,80,.08)',color:'var(--red)',border:'1px solid rgba(239,83,80,.15)',cursor:'pointer'}} onClick={()=>set('userRemarks','')}>Remove</button>
              </div>
              <textarea rows={2} value={form.userRemarks} onChange={e=>set('userRemarks',e.target.value)} style={{width:'100%',background:'transparent',border:'1px solid rgba(212,169,106,.2)',borderRadius:6,padding:'6px 8px',fontSize:12,color:'var(--text)',fontStyle:'italic',resize:'vertical'}} />
            </div>
          ) : (
            <button className="btn-secondary btn-sm" style={{marginTop:6,fontSize:10}} onClick={()=>set('userRemarks',' ')}>+ Add Advisor Remark</button>
          )}
          <div style={{display:'flex',gap:6,marginTop:6}}>
            <button className="btn-secondary btn-sm" disabled={!form.notes||form.notes.length<10||tidying} onClick={async()=>{
              const ak = ((await dbGet('settings','geminiKey').catch(()=>null))?.value||'').trim();
              if(!ak){toast('Set Gemini API key in Settings first','warning');return;}
              setTidying(true);
              try{
                const tidyResp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+ak,{
                  method:'POST',headers:{'Content-Type':'application/json'},
                  body:JSON.stringify({contents:[{parts:[{text:'Clean up these rough insurance policy notes into a concise FC reference card. Keep key numbers, conditions, exclusions, premium details. Be factual and brief. Return ONLY the cleaned text:\n\n'+form.notes}]}],
                    systemInstruction:{parts:[{text:'You are an insurance product analyst for Singapore Financial Consultants.'}]},
                    generationConfig:{maxOutputTokens:1000}})});
                const tidyData = await tidyResp.json();
                if(tidyData.error) throw new Error(tidyData.error.message);
                set('notes',tidyData.candidates?.[0]?.content?.parts?.[0]?.text||form.notes);
              }catch(e){toast('AI error: '+e.message,'error')}
              setTidying(false);
            }}>{tidying?'Tidying...':'AI Tidy'}</button>
            {!isEdit && form.productName && <button className="btn-secondary btn-sm" onClick={()=>{
              const repoItem = {
                id:'repo-'+Date.now().toString(36),insurer:form.insurer,productName:form.productName,
                productCode:'',category:form.category,subType:form.subType,currency:form.currency,
                notes:form.notes,features:[],charges:{},
                ...(form.creditingMechanism?{ulSubType:isVUL?'VUL':isIUL?'IUL':'UL',creditingMechanism:form.creditingMechanism}:{}),
                ...(form.creditingRates?.current?{creditingRates:form.creditingRates}:{}),
                ...(form.loyaltyBonus?.rate?{loyaltyBonus:form.loyaltyBonus}:{}),
              };
              const matches = fuzzyMatch(form.insurer+' '+form.productName, repo, 0.35);
              if(matches.length > 0){ setRepoMatches(matches.slice(0,3)); setPendingRepoItem(repoItem); }
              else { onSaveRepo(repoItem); toast('Saved to repository','success'); }
            }}>📤 Save to Repository</button>}
          </div>

          {repoMatches && pendingRepoItem && (
            <div style={{marginTop:10,padding:14,background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.25)',borderRadius:10}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--orange)',marginBottom:8}}>⚠ Similar products in repository</div>
              {repoMatches.map(m => (
                <div key={m.id} style={{background:'var(--bg3)',borderRadius:8,padding:10,marginBottom:6}}>
                  <div><span style={{fontWeight:600,fontSize:13}}>{m.insurer} — {m.productName}</span> <span className="mono" style={{color:'var(--orange)',fontSize:11}}>{Math.round(m.score*100)}%</span></div>
                  <div style={{display:'flex',gap:6,marginTop:6}}>
                    <button className="btn-secondary btn-sm" onClick={()=>{const c={...m,notes:(m.notes||'')+'\n\n--- Updated ---\n'+(pendingRepoItem.notes||'')};delete c.score;onSaveRepo(c);setRepoMatches(null);setPendingRepoItem(null);toast('Combined','success');}}>🔀 Combine</button>
                    <button className="btn-secondary btn-sm" onClick={()=>{onSaveRepo({...pendingRepoItem,id:m.id});setRepoMatches(null);setPendingRepoItem(null);toast('Overwritten','success');}}>↻ Overwrite</button>
                  </div>
                </div>
              ))}
              <div style={{display:'flex',gap:6,marginTop:8}}>
                <button className="btn-primary btn-sm" onClick={()=>{onSaveRepo(pendingRepoItem);setRepoMatches(null);setPendingRepoItem(null);toast('Saved as new','success');}}>➕ Save as New</button>
                <button className="btn-secondary btn-sm" onClick={()=>{setRepoMatches(null);setPendingRepoItem(null);}}>Cancel</button>
              </div>
            </div>
          )}
        </div>

        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:16}}>
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={handleSubmit}>{isEdit?'Save Changes':'Add Policy'}</button>
        </div>
      </div>
    </div>
  );
}

function FundAllocationEditor({allocations,onChange,reinvest,onSyncWeighted}) {
  const add = () => onChange([...allocations, {fundName:'',pct:'',growth:'6',dividend:'2',fee:'1.5',riskRating:''}]);
  const update = (i,k,v) => {const n=[...allocations];n[i]={...n[i],[k]:v};onChange(n)};
  const remove = i => onChange(allocations.filter((_,idx)=>idx!==i));
  const [showSuggestions,setShowSuggestions] = useState(-1);
  const [suggestions,setSuggestions] = useState([]);
  // Lookup from fund DB — FUND_DB format: [name, type, region, sector, risk, date, isin]
  const lookup = (i,name) => {
    if(!name || name.length < 2) { setSuggestions([]); setShowSuggestions(-1); return; }
    const q = name.toLowerCase();
    const matches = FUND_DB.filter(f => f[0].toLowerCase().includes(q)).slice(0,8);
    if(matches.length > 0) { setSuggestions(matches); setShowSuggestions(i); }
    else { setSuggestions([]); setShowSuggestions(-1); }
    // Only auto-fill risk for EXACT or single match — never for no-match
    const exact = matches.find(f => f[0].toLowerCase() === q);
    if(exact) { update(i,'riskRating',exact[4]); update(i,'_newFund',false); }
    else if(matches.length === 1) { update(i,'riskRating',matches[0][4]); update(i,'_newFund',false); }
    else if(matches.length === 0) { update(i,'_newFund',true); update(i,'riskRating',''); }
  };
  const selectFund = (i, fund) => {
    const n=[...allocations];
    n[i]={...n[i], fundName:fund[0], riskRating:fund[4]};
    onChange(n); setSuggestions([]); setShowSuggestions(-1);
  };

  // Weighted calculations
  const totalPct = allocations.reduce((s,a) => s + (parseFloat(a.pct)||0), 0);
  const wGrowth = totalPct > 0 ? allocations.reduce((s,a) => s + (parseFloat(a.pct)||0) * (parseFloat(a.growth)||0), 0) / totalPct : 0;
  const wDiv = totalPct > 0 ? allocations.reduce((s,a) => s + (parseFloat(a.pct)||0) * (parseFloat(a.dividend)||0), 0) / totalPct : 0;
  const wFee = totalPct > 0 ? allocations.reduce((s,a) => s + (parseFloat(a.pct)||0) * (parseFloat(a.fee)||0), 0) / totalPct : 0;
  const wRisk = totalPct > 0 ? allocations.reduce((s,a) => s + (parseFloat(a.pct)||0) * (parseFloat(a.riskRating)||5), 0) / totalPct : 0;
  const netReturn = reinvest ? (wGrowth + wDiv - wFee) : (wGrowth - wFee);

  // Sync weighted values to parent form
  useEffect(() => {
    if(onSyncWeighted && totalPct > 0) onSyncWeighted({growth:wGrowth.toFixed(2), dividend:wDiv.toFixed(2), fee:wFee.toFixed(2), risk:wRisk.toFixed(1)});
  }, [wGrowth, wDiv, wFee, wRisk, totalPct]);

  const riskColor = r => r>=7?'var(--red2)':r>=5?'var(--orange)':'var(--green2)';

  return (
    <div>
      {/* Header row */}
      {allocations.length > 0 && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 60px 60px 60px 60px 36px 28px',gap:6,marginBottom:4,padding:'0 2px'}}>
          <div style={{fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase'}}>Fund Name</div>
          <div style={{fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',textAlign:'center'}}>Alloc %</div>
          <div style={{fontSize:9,color:'var(--green2)',fontWeight:600,textTransform:'uppercase',textAlign:'center'}}>Growth</div>
          <div style={{fontSize:9,color:'#9d8abf',fontWeight:600,textTransform:'uppercase',textAlign:'center'}}>Div %</div>
          <div style={{fontSize:9,color:'var(--red)',fontWeight:600,textTransform:'uppercase',textAlign:'center'}}>Fee %</div>
          <div style={{fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',textAlign:'center'}}>Risk</div>
          <div></div>
        </div>
      )}
      {allocations.map((a,i) => (
        <div key={i} style={{position:'relative'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 60px 60px 60px 60px 36px 28px',gap:6,marginBottom:4,alignItems:'center'}}>
            <input value={a.fundName} onChange={e=>{update(i,'fundName',e.target.value);lookup(i,e.target.value)}} onFocus={()=>lookup(i,a.fundName)} onBlur={()=>setTimeout(()=>{setShowSuggestions(-1);setSuggestions([])},200)} placeholder="Search fund…" style={{fontSize:12}} />
            {a._newFund && <div style={{display:'flex',alignItems:'center',gap:4,marginTop:2}}>
              <span style={{fontSize:8,padding:'1px 5px',borderRadius:3,background:'rgba(212,169,106,.12)',color:'var(--gold)',fontWeight:600}}>🆕 New Fund</span>
              <a href={'https://www.google.com/search?q='+encodeURIComponent((a.fundName||'')+' factsheet Singapore')} target="_blank" rel="noopener" style={{fontSize:8,color:'var(--teal)',textDecoration:'underline'}}>Search Factsheet</a>
            </div>}
            <input value={a.pct} onChange={e=>update(i,'pct',e.target.value)} placeholder="%" type="number" style={{textAlign:'center',fontSize:12}} />
            <input value={a.growth||''} onChange={e=>update(i,'growth',e.target.value)} placeholder="6" type="number" step="0.5" style={{textAlign:'center',fontSize:12,color:'var(--green2)'}} />
            <input value={a.dividend||''} onChange={e=>update(i,'dividend',e.target.value)} placeholder="2" type="number" step="0.5" style={{textAlign:'center',fontSize:12,color:'#9d8abf'}} />
            <input value={a.fee||''} onChange={e=>update(i,'fee',e.target.value)} placeholder="1.5" type="number" step="0.1" style={{textAlign:'center',fontSize:12,color:'var(--red)'}} />
            <span className="mono" style={{textAlign:'center',fontSize:11,fontWeight:600,color:riskColor(a.riskRating)}}>{a.riskRating||'-'}</span>
            <button className="btn-danger btn-sm" onClick={()=>remove(i)} style={{padding:'2px 6px',fontSize:11}}>×</button>
          </div>
          {/* Autocomplete dropdown */}
          {showSuggestions===i && suggestions.length > 0 && (
            <div style={{position:'absolute',top:'100%',left:0,right:200,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,maxHeight:180,overflowY:'auto',zIndex:20,boxShadow:'0 8px 24px rgba(0,0,0,.3)'}}>
              {suggestions.map((f,j) => (
                <div key={j} onMouseDown={()=>selectFund(i,f)} style={{padding:'6px 10px',cursor:'pointer',borderBottom:'1px solid var(--border)',fontSize:11,display:'flex',justifyContent:'space-between',alignItems:'center'}}
                  onMouseOver={e=>e.currentTarget.style.background='var(--bg3)'} onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                  <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f[0]}</span>
                  <span style={{flexShrink:0,display:'flex',gap:6,alignItems:'center'}}>
                    <span style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>{f[1]}/{f[2]}</span>
                    <span className="mono" style={{fontSize:10,fontWeight:600,color:riskColor(f[4])}}>{f[4]}</span>
                  </span>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
      <div style={{display:'flex',gap:8,alignItems:'center',marginTop:4}}>
        <button className="btn-secondary btn-sm" onClick={add}>+ Add Fund</button>
        {totalPct > 0 && totalPct !== 100 && (
          <span style={{fontSize:10,fontWeight:600,color:Math.abs(totalPct-100)<=1?'var(--gold)':'var(--red)'}}>{totalPct.toFixed(0)}% allocated {totalPct<100?`(${(100-totalPct).toFixed(0)}% unallocated)`:`(${(totalPct-100).toFixed(0)}% over)`}</span>
        )}
        {totalPct === 100 && <span style={{fontSize:10,color:'var(--green2)',fontWeight:600}}>✓ 100% allocated</span>}
      </div>

      {/* ── Weighted Summary Panel ── */}
      {allocations.length > 0 && totalPct > 0 && (
        <div style={{marginTop:10,padding:10,background:'var(--bg2)',borderRadius:8,border:'1px solid var(--border)'}}>
          <div className="resp-5col" style={{textAlign:'center'}}>
            <div>
              <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',fontWeight:600}}>Wtd Growth</div>
              <div style={{fontSize:15,fontWeight:700,color:'var(--green2)'}}>{wGrowth.toFixed(2)}%</div>
              <div style={{fontSize:9,color:'var(--text3)'}}>Unit price</div>
            </div>
            <div>
              <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',fontWeight:600}}>Wtd Dividend</div>
              <div style={{fontSize:15,fontWeight:700,color:'#9d8abf'}}>{wDiv.toFixed(2)}%</div>
              <div style={{fontSize:9,color:'var(--text3)'}}>{reinvest?'Reinvested':'Paid out'}</div>
            </div>
            <div>
              <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',fontWeight:600}}>Avg Fee</div>
              <div style={{fontSize:15,fontWeight:700,color:'var(--red)'}}>{wFee.toFixed(2)}%</div>
              <div style={{fontSize:9,color:'var(--text3)'}}>Mgmt fee</div>
            </div>
            <div>
              <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',fontWeight:600}}>{reinvest?'Total Yield':'Net Growth'}</div>
              <div style={{fontSize:15,fontWeight:700,color:'var(--gold)'}}>{netReturn.toFixed(2)}%</div>
              <div style={{fontSize:9,color:'var(--text3)'}}>{reinvest?'Growth+Div−Fee':'Growth−Fee'}</div>
            </div>
            <div>
              <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',fontWeight:600}}>Wtd Risk</div>
              <div style={{fontSize:15,fontWeight:700,color:riskColor(wRisk)}}>{wRisk.toFixed(1)}</div>
              <div style={{fontSize:9,color:'var(--text3)'}}>out of 10</div>
            </div>
          </div>
          {!reinvest && wDiv > 0 && (
            <div style={{marginTop:6,padding:'4px 8px',background:'rgba(157,138,191,.08)',borderRadius:6,fontSize:10,color:'#9d8abf',textAlign:'center'}}>
              Dividends paid out separately at {wDiv.toFixed(2)}% p.a. — Total return incl. dividends: {(wGrowth + wDiv - wFee).toFixed(2)}%
            </div>
          )}
        </div>
      )}
      <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Risk ratings auto-looked up from {FUND_DB.length.toLocaleString()} instruments (iFAST universe). Per-fund growth/div/fee override the policy-level defaults.</div>
    </div>
  );
}

// MODULE: REPOSITORY — Product database browser
// ═══════════════════════════════════════════════════════════════

function Repository() {
  const {repo,saveRepo,deleteRepo,refreshRepo,repoSource} = useContext(AppCtx);
  const [repoScanning, setRepoScanning] = useState(false);

  const handleRepoDrop = async (files) => {
    if(!files||!files.length) return;
    setRepoScanning(true);
    try {
      const content = [];
      for(const file of Array.from(files).slice(0,8)) {
        const blocks = await processFile(file);
        content.push(...blocks);
      }
      content.push({type:'text',text:'Extract ALL insurance product information from these documents. For EACH product, return a JSON object in an array with: insurer, productName, productCode, category (protection/savings/health/investment/retirement/maternity), subType, currency, notes (comprehensive product summary including: charges, features, bonus structure, riders that attach, key terms). This is for a product REPOSITORY — extract product-level data, NOT client-specific data. Return a JSON array of products.'});
      const text = await callAI('You are an insurance product analyst. Extract product repository data from documents. Return ONLY a JSON array.', content, 8000);
      const parsed = repairJSON(text);
      let arr;
      if (Array.isArray(parsed)) arr = parsed;
      else if (parsed && typeof parsed === 'object') {
        const wk = ['products','data','results','items','extracted','records'];
        const found = wk.find(k => Array.isArray(parsed[k]));
        arr = found ? parsed[found] : [parsed];
      } else arr = [parsed];
      arr = arr.filter(p => p && typeof p === 'object' && (p.productName || p.insurer));
      let added = 0;
      for(const item of arr) {
        if(!item.productName) continue;
        const exists = repo.find(r => r.productName === item.productName && r.insurer === item.insurer);
        if(exists) {
          if(confirm('Product "'+item.insurer+' '+item.productName+'" already exists. Update notes?')) {
            await saveRepo({...exists, notes: item.notes || exists.notes, editHistory:[...(exists.editHistory||[]),{by:window._prof?.full_name||window._user?.user_metadata?.full_name||'Advisor',at:new Date().toISOString(),action:'updated from document'}]});
            added++;
          }
        } else {
          await saveRepo({id:'repo-'+Date.now()+'-'+Math.random().toString(36).slice(2,6), ...item, editHistory:[{by:window._prof?.full_name||window._user?.user_metadata?.full_name||'Advisor',at:new Date().toISOString(),action:'added from document'}]});
          added++;
        }
      }
      toast('Added/updated '+added+' products to repository','success');
    } catch(e) { toast(e.message,'error'); }
    setRepoScanning(false);
  };
  const [search, setSearch] = useState('');
  const [expanded, setExpanded] = useState(null);
  const [editingRepo, setEditingRepo] = useState(null); // id of item being edited
  const [editNotes, setEditNotes] = useState('');
  const [comment, setComment] = useState('');
  const [syncing, setSyncing] = useState(false);

  // Get current user info from auth globals
  const userName = (window._prof?.full_name || window._user?.email || 'Unknown');
  const userEmail = (window._user?.email || '');
  const isAdmin = window._isAdmin || false;

  const filtered = (search ? repo.filter(r =>
    (r.productName+' '+r.insurer+' '+(r.productCode||'')).toLowerCase().includes(search.toLowerCase())
  ) : repo).slice().sort((a,b) => {
    const va = Object.values(a.votes||{}).reduce((s,v)=>s+v,0);
    const vb = Object.values(b.votes||{}).reduce((s,v)=>s+v,0);
    return vb - va; // highest votes first
  });

  const addFootprint = (action) => ({name:userName,by:userName,email:userEmail,date:new Date().toISOString(),at:new Date().toISOString(),action});

  // Voting
  const handleVote = (r, direction) => {
    const votes = {...(r.votes||{})};
    const myVote = votes[window._user?.id||'anon'];
    if(myVote === direction) { delete votes[window._user?.id||'anon']; } // toggle off
    else { votes[window._user?.id||'anon'] = direction; }
    saveRepo({...r, votes, editHistory:[...(r.editHistory||[]), addFootprint(direction>0?'Upvoted':'Downvoted')]});
  };
  const getVoteCount = (r) => Object.values(r.votes||{}).reduce((s,v)=>s+v,0);
  const getMyVote = (r) => (r.votes||{})[window._user?.id||'anon']||0;
  const getContributors = (r) => {
    const names = new Set();
    (r.editHistory||[]).forEach(h => { if(h.by||h.name) names.add(h.by||h.name); });
    return [...names];
  };

  // Admin: save full edit with footprint
  const handleAdminSave = (r) => {
    const history = [...(r.editHistory||[]), addFootprint('Edited notes')];
    saveRepo({...r, notes:editNotes, editHistory:history});
    setEditingRepo(null);
  };

  // Advisor: add comment with footprint
  const handleAddComment = (r) => {
    if(!comment.trim()) return;
    const existing = r.notes || '';
    const newNotes = existing + '\n\n💬 ' + userName + ' (' + new Date().toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'}) + '):\n' + comment.trim();
    const history = [...(r.editHistory||[]), addFootprint('Added comment')];
    saveRepo({...r, notes:newNotes, editHistory:history});
    setComment('');
  };

  return (
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:600}}>Product Repository</h2>
          <p style={{fontSize:12,color:'var(--text3)'}}>
            {repo.length} products • {repoSource==='supabase'?'☁️ Shared (Supabase)':'💾 Local only'} • {isAdmin?'Admin: full edit + delete':'Advisor: add comments'}
          </p>
        </div>
        <div style={{display:'flex',gap:6}}>
          {refreshRepo && <button className="btn-secondary btn-sm" disabled={syncing} onClick={async()=>{setSyncing(true);const ok=await refreshRepo();setSyncing(false);if(ok)toast('Synced '+repo.length+' products from cloud','success');else toast('Sync failed — check connection','error');}}>
            {syncing?'Syncing…':'🔄 Sync'}
          </button>}
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search products…" style={{width:200}} />
        </div>
      </div>

      <DropZone active={true} onFiles={handleRepoDrop} label={repoScanning?"🔄 Scanning documents for products...":"📎 Drop product summaries, benefit illustrations, or policy documents here to add to the repository"} />

      <div style={{display:'grid',gap:12}}>
        {filtered.map(r => (
          <div key={r.id} className="card card-sm" style={{borderLeft:`3px solid ${catColor(r.category)}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',cursor:'pointer'}} onClick={()=>{setExpanded(expanded===r.id?null:r.id);setEditingRepo(null);setComment('');}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14,display:'flex',alignItems:'center',gap:6}}><InsurerBadge name={r.insurer} size="lg" /> <span>— {r.productName}</span></div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:2,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  {r.productCode && <span>{r.productCode}</span>}{r.productCode && <span>•</span>}
                  <span>{r.currency||'SGD'}</span> •
                  <span className="badge" style={{background:`${catColor(r.category)}22`,color:catColor(r.category)}}>{r.subType}</span>
                  {getContributors(r).length > 0 && <span style={{fontSize:10,color:'var(--text3)'}}>• {getContributors(r).length} contributor{getContributors(r).length>1?'s':''}</span>}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}} onClick={e=>e.stopPropagation()}>
                <button onClick={()=>handleVote(r,1)} style={{background:getMyVote(r)===1?'var(--green-dim)':'transparent',border:'1px solid '+(getMyVote(r)===1?'var(--green2)':'var(--border)'),borderRadius:4,padding:'2px 6px',cursor:'pointer',fontSize:12,color:getMyVote(r)===1?'var(--green2)':'var(--text3)'}}>👍</button>
                <span style={{fontSize:12,fontWeight:700,color:getVoteCount(r)>0?'var(--green2)':getVoteCount(r)<0?'var(--red)':'var(--text3)',minWidth:20,textAlign:'center'}}>{getVoteCount(r)>0?'+':''}{getVoteCount(r)}</span>
                <button onClick={()=>handleVote(r,-1)} style={{background:getMyVote(r)===-1?'var(--red-dim)':'transparent',border:'1px solid '+(getMyVote(r)===-1?'var(--red)':'var(--border)'),borderRadius:4,padding:'2px 6px',cursor:'pointer',fontSize:12,color:getMyVote(r)===-1?'var(--red)':'var(--text3)'}}>👎</button>
                <span style={{color:'var(--text3)',fontSize:16,marginLeft:4}}>{expanded===r.id?'▾':'▸'}</span>
              </div>
            </div>

            {expanded===r.id && (
              <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}>
                {/* UL details */}
                {r.ulSubType && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>UL Details ({r.ulSubType})</div>
                    <div style={{fontSize:12,color:'var(--text2)',display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
                      <span>Crediting: {r.creditingMechanism}</span>
                      {r.creditingRates && <span>Rates: {r.creditingRates.current}% / {r.creditingRates.guaranteed}% guar.</span>}
                      {r.loyaltyBonus && <span>Loyalty: {r.loyaltyBonus.rate}% from Yr{r.loyaltyBonus.startYear}</span>}
                      {r.solvedPremium && <span>Solved Premium: min {r.solvedPremium.currency} {r.solvedPremium.min?.toLocaleString()}</span>}
                      {r.loanRate && <span>Loan: {r.loanRate}</span>}
                      {r.faMinGuaranteed && <span>FA Min Guar: {r.faMinGuaranteed}%</span>}
                    </div>
                  </div>
                )}
                {/* Index sub-accounts */}
                {r.indexSubAccounts && r.indexSubAccounts.length>0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Index Sub-Accounts</div>
                    {r.indexSubAccounts.map((idx,i)=>(
                      <div key={i} className="tag" style={{marginRight:4,marginBottom:4}}>
                        {idx.name}{idx.capExample ? ` (cap ${idx.capExample}%)`:''} — {idx.crediting}
                      </div>
                    ))}
                  </div>
                )}
                {/* Maternity */}
                {r.maternityDetails && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Maternity Details</div>
                    <div style={{fontSize:12,color:'var(--text2)'}}>
                      <div>Dual insured: {r.maternityDetails.dualInsured?'Yes – '+r.maternityDetails.dualInsuredDesc:'No'}</div>
                      <div>Guaranteed issuance: {r.maternityDetails.guaranteedIssuance?r.maternityDetails.guaranteedIssuanceDesc:'No'}</div>
                      <div>Conversion rights: {r.maternityDetails.conversionRights?r.maternityDetails.conversionRightsDesc:'No'}</div>
                      {r.maternityDetails.benefitTypes?.map((b,i)=>(
                        <div key={i} style={{marginTop:4}}>• {b.name} ({b.payoutType}){b.amountPerDay?` $${b.amountPerDay}/day, max ${b.maxDays} days`:''}</div>
                      ))}
                    </div>
                  </div>
                )}
                {/* Charges */}
                {r.charges && Object.keys(r.charges).length>0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Charges</div>
                    <div style={{fontSize:12,color:'var(--text2)'}}>
                      {Object.entries(r.charges).map(([k,v])=><div key={k}>• {k}: {typeof v==='object'?v.desc:v}</div>)}
                    </div>
                  </div>
                )}
                {/* Features */}
                {r.features && r.features.length>0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Features</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {r.features.map((f,i)=><span key={i} className="tag">{f}</span>)}
                    </div>
                  </div>
                )}

                {/* Notes — with edit/comment based on role */}
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Notes & Comments</div>
                  {editingRepo===r.id && isAdmin ? (
                    <div>
                      <textarea rows={5} value={editNotes} onChange={e=>setEditNotes(e.target.value)} style={{width:'100%',fontSize:12}} />
                      <div style={{display:'flex',gap:6,marginTop:6}}>
                        <button className="btn-primary btn-sm" onClick={()=>handleAdminSave(r)}>Save Edit</button>
                        <button className="btn-secondary btn-sm" onClick={()=>setEditingRepo(null)}>Cancel</button>
                      </div>
                    </div>
                  ) : (
                    <div>
                      {r.notes ? <div style={{fontSize:12,color:'var(--text2)',whiteSpace:'pre-line'}}>{r.notes}</div> : <div style={{fontSize:12,color:'var(--text3)',fontStyle:'italic'}}>No notes yet</div>}
                      {isAdmin && <button className="btn-secondary btn-sm" style={{marginTop:6}} onClick={e=>{e.stopPropagation();setEditingRepo(r.id);setEditNotes(r.notes||'')}}>✏️ Edit Notes</button>}
                    </div>
                  )}
                  {/* Advisor comment box — always visible */}
                  <div style={{marginTop:8}}>
                    <div style={{display:'flex',gap:6}}>
                      <input value={expanded===r.id?comment:''} onChange={e=>setComment(e.target.value)} placeholder="Add a comment…" style={{flex:1,fontSize:12,padding:'6px 10px'}} onKeyDown={e=>{if(e.key==='Enter')handleAddComment(r)}} />
                      <button className="btn-secondary btn-sm" onClick={()=>handleAddComment(r)} disabled={!comment.trim()}>💬 Comment</button>
                    </div>
                  </div>
                </div>

                {/* Contributors */}
                {getContributors(r).length > 0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Contributors</div>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                      {getContributors(r).map((name,i) => (
                        <span key={i} style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'var(--gold-dim)',color:'var(--gold)',fontWeight:500}}>{name}</span>
                      ))}
                    </div>
                  </div>
                )}

                {/* Edit history trail */}
                {r.editHistory && r.editHistory.length>0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Edit History</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>
                      {r.editHistory.slice(-5).reverse().map((h,i)=>(
                        <div key={i} style={{marginBottom:2}}>
                          {h.by||h.name||'—'} — {h.action} — {new Date(h.date||h.at).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
                        </div>
                      ))}
                      {r.editHistory.length>5 && <div style={{fontStyle:'italic'}}>…and {r.editHistory.length-5} earlier edits</div>}
                    </div>
                  </div>
                )}

                {/* Admin-only actions */}
                {isAdmin && (
                  <div style={{marginTop:10,paddingTop:8,borderTop:'1px solid var(--border)',display:'flex',gap:6}}>
                    <button className="btn-danger btn-sm" onClick={e=>{e.stopPropagation();if(confirm('Delete "'+r.insurer+' — '+r.productName+'" from repository?'))deleteRepo(r.id)}}>Delete</button>
                  </div>
                )}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}
