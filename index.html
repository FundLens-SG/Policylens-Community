              if(words.length >= 2) best = FUND_DB.find(f => words.every(w => f[0].toLowerCase().includes(w)));
            }
            if(best) {
              result.fundAllocations[i] = {...fa, fundName:best[0], riskRating:best[4]};
            }
          });
        }

        return result;
      });

      // Merge client info from first policy
      if(b === 0 && arr[0]) mergeToProfile(arr[0], clientProfile, saveProfile);

      // Check for inferred parent plans (ISP detected from rider only)
      const inferredParents = processed.filter(p => p._inferredParent);
      if(inferredParents.length > 0) {
        const names = inferredParents.map(p => p.insurer + ' ' + p.productName).join(', ');
        setTimeout(() => toast('Auto-created parent ISP for ' + names + ' — please review ward class, premium & policy number','warning',6000), 100);
      }

      // ── CROSS-BATCH CORRELATION ──
      // Merge partial policies across batches (e.g. page 1 in batch 1, page 3 in batch 2)
      if(allExtracted.length > 0 && processed.length > 0) {
        const merged = [];
        for(const newItem of processed) {
          const newIns = (newItem.insurer||'').toLowerCase().trim();
          const newName = (newItem.productName||newItem.policyName||'').toLowerCase().trim();
          const newPol = (newItem.policyNumber||'').toLowerCase().trim();
          // Find match in previous batches by policyNumber OR insurer+productName
          let match = null;
          if(newPol && newPol.length > 3) {
            match = allExtracted.find(ex => (ex.policyNumber||'').toLowerCase().trim() === newPol);
          }
          if(!match && newIns && newName && newName.length > 3) {
            match = allExtracted.find(ex => {
              const exIns = (ex.insurer||'').toLowerCase().trim();
              const exName = (ex.productName||ex.policyName||'').toLowerCase().trim();
              return exIns === newIns && (exName === newName || exName.includes(newName) || newName.includes(exName));
            });
          }
          if(match) {
            // Merge: fill missing fields from newItem into match
            let fills = 0;
            for(const [k,v] of Object.entries(newItem)) {
              if(k.startsWith('_') || k === 'id') continue;
              if(v && v !== 0 && v !== '' && (!match[k] || match[k] === '' || match[k] === 0)) {
                match[k] = v; fills++;
              }
            }
            // Merge riders
            if(newItem.riders?.length && (!match.riders?.length || newItem.riders.length > match.riders.length)) {
              match.riders = newItem.riders; fills++;
            }
            if(fills > 0) console.log('[Correlate] Merged', fills, 'fields into', match.productName, 'from batch', b+1);
          } else {
            merged.push(newItem);
          }
        }
        allExtracted = [...allExtracted, ...merged];
      } else {
        allExtracted = [...allExtracted, ...processed];
      }

      // ── DUPLICATE DETECTION ──
      // Mark items that match existing policies or earlier extractions
      const existingKeys = new Set(policies.map(p => ((p.insurer||'')+'|'+(p.productName||p.policyName||'')+'|'+Math.round(parseFloat(p.annualPremium)||0)).toLowerCase()));
      const seenKeys = new Set();
      allExtracted.forEach(item => {
        const key = ((item.insurer||'')+'|'+(item.productName||item.policyName||'')+'|'+Math.round(parseFloat(item.annualPremium)||0)).toLowerCase();
        if(existingKeys.has(key)) {
          item._dupOf = 'existing'; item._selected = false;
          console.log('[Extract] Duplicate of existing:', item.productName);
        } else if(seenKeys.has(key)) {
          item._dupOf = 'batch'; item._selected = false;
          console.log('[Extract] Duplicate within batch:', item.productName);
        }
        seenKeys.add(key);
      });

      console.log('[Extract] Batch', b+1, 'done:', processed.length, 'policies. Total so far:', allExtracted.length);

      // Show first batch results immediately so user can start reviewing
      if(!firstBatchShown) {
        firstBatchShown = true;
        if(processed.length === 1 && totalBatches === 1) {
          setScanResult(processed[0]);
        } else {
          setBulkExtracted([...allExtracted]);
        }
      } else {
        // Subsequent batches — append to existing bulk modal
        setBulkExtracted([...allExtracted]);
      }

      setScanProgress({batch:b+1, totalBatches, totalFiles:allFiles.length, status:b+1<totalBatches?`Batch ${b+1} done (${allExtracted.length} policies). Extracting next...`:`All ${totalBatches} batches complete! ${allExtracted.length} policies extracted.`, pctComplete:Math.round((b+1)/totalBatches*100)});
      }

      // All batches done
      clearStaged();
      setScanning(false);
      setTimeout(()=>setScanProgress(null), 3000);
    } catch(e){
      console.error('[Extract] Error:', e);
      const hasAnthropicKey = !!(await dbGet('settings','anthropicKey').catch(()=>null))?.value;
      let msg = 'Extraction error: ' + e.message;
      const errMsg = (e.message||'').toLowerCase();
      if(errMsg.includes('networkerror') || errMsg.includes('failed to fetch') || errMsg.includes('network') || e instanceof TypeError) {
        msg = '🚫 Network Error — API calls are being blocked.\n\nThis is usually caused by:\n\n';
        msg += '1. Firefox Enhanced Tracking Protection — click the shield 🛡️ icon in URL bar → turn OFF for this site\n';
        msg += '2. Ad blocker (Adblock Plus, uBlock, etc.) — disable for this site\n';
        msg += '3. Browser privacy extensions blocking API requests\n';
        msg += '4. Corporate firewall/proxy blocking external API calls\n\n';
        msg += 'Fix: Click 🛡️ shield icon → disable protection for this site\n';
        msg += 'Or: Settings → Privacy → Enhanced Tracking Protection → add exception for fundlens-sg.github.io';
      } else if(errMsg.includes('cors') || errMsg.includes('origin')) {
        msg = '🚫 CORS Error — Browser is blocking API requests.\n\nDisable ad blocker or try Incognito mode.';
      } else if(errMsg.includes('parse') || errMsg.includes('json')) {
        msg += '\n\nThe AI could not extract structured data from this document.';
        if(!hasAnthropicKey) msg += '\n\nTip: Add an Anthropic (Claude) API key in Settings for much more reliable extraction.';
        else msg += '\n\nTry uploading a clearer image or fewer documents at once.';
      } else if(errMsg.includes('api key') || errMsg.includes('key')) {
        msg += '\n\nCheck your API keys in Settings.';
      }
      toast(msg,'warning',5000);
      // If some batches succeeded, show partial results
      if(allExtracted.length > 0) {
        setBulkExtracted([...allExtracted]);
        toast(allExtracted.length + ' policies extracted before error — review now','warning',5000);
      }
      setScanning(false); setScanProgress(null);
    }
  };

  const cameraRef = useRef(null);
  const uploadRef = useRef(null);

  return (
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <h2 style={{fontSize:18,fontWeight:600}}>Policies</h2>
          <select value={filter} onChange={e=>setFilter(e.target.value)} style={{fontSize:12,padding:'4px 8px'}}>
            <option value="all">All Categories</option>
            {Object.entries(CATEGORIES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>{stagePhotos(e.target.files);e.target.value='';}} />
          <input ref={uploadRef} type="file" accept="image/*,.pdf,.xlsx,.xls,.csv,.doc,.docx,.html,.htm,.txt,.rtf" multiple style={{display:'none'}} onChange={e=>{handleExtract(Array.from(e.target.files));e.target.value='';}} />
          <button className="btn-secondary btn-sm" onClick={async()=>{const files=await openCameraModal();if(files&&files.length){const newStaged=files.map(f=>({file:f,preview:URL.createObjectURL(f)}));setStaged(prev=>[...prev,...newStaged].slice(0,200));}}} disabled={scanning}>
            📷 Camera
          </button>
          <button className="btn-secondary btn-sm" onClick={()=>{const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.multiple=true;inp.onchange=e=>{const files=Array.from(e.target.files);if(files.length){const newStaged=files.map(f=>({file:f,preview:URL.createObjectURL(f)}));setStaged(prev=>[...prev,...newStaged].slice(0,200));}};inp.click();}} disabled={scanning}>
            🖼 Gallery
          </button>
          <button className="btn-secondary btn-sm" onClick={()=>uploadRef.current?.click()} disabled={scanning}>
            {scanning?'Extracting…':'📄 Upload'}
          </button>
          <button className="btn-secondary btn-sm" onClick={async()=>{
            try {
              const items = await navigator.clipboard.read();
              const files = [];
              for(const item of items) {
                for(const type of item.types) {
                  if(type.startsWith('image/')) { const blob = await item.getType(type); files.push(new File([blob],'paste_'+Date.now()+'.'+type.split('/')[1],{type})); }
                }
              }
              if(files.length > 0) { handleExtract(files); }
              else { const text = await navigator.clipboard.readText(); if(text && text.length > 20) { handleExtract([new File([text],'paste.txt',{type:'text/plain'})]); } else { toast('No content in clipboard — copy a screenshot or text first','warning'); } }
            } catch(e) { toast('Clipboard access denied — try Ctrl+V on the drop zone','error'); }
          }} disabled={scanning} title="Paste from clipboard">
            📋 Paste
          </button>
          <button className="btn-primary btn-sm" onClick={()=>{setEditing(null);setScanResult(null);setShowForm(true)}}>+ Add</button>
          {selected.size > 0 && <button className="btn-danger btn-sm" onClick={deleteSelected}>🗑 Delete ({selected.size})</button>}
          {policies.length > 0 && selected.size === 0 && <button className="btn-danger btn-sm" style={{opacity:.7}} onClick={async()=>{
            if(!confirm('⚠️ Delete ALL '+policies.length+' policies?\n\nThis cannot be undone. Client profile will not be affected.')) return;
            if(!confirm('Final confirmation — permanently delete all policies?')) return;
            for(const pol of policies) await deletePolicy(pol.id);
            toast('All policies deleted','success');
          }}>🗑 Delete All</button>}
        </div>
      </div>

      {/* Drop / Paste zone for policy extraction */}
      {!showForm && <DropZone active={!showForm} onFiles={(files)=>handleExtract(files)} label="📎 Drop or paste any document or images — client profile, policy summaries, policy contracts, benefit illustrations" />}

      {/* Draft restore banner */}
      {draftBanner && !showForm && (
        <div className="card" style={{marginBottom:12,padding:14,borderLeft:'3px solid var(--orange)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'var(--orange)'}}>📝 Unsaved Draft</div>
              <div style={{fontSize:12,color:'var(--text3)'}}>You have an unfinished policy entry</div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn-primary btn-sm" onClick={restoreDraft}>Resume Editing</button>
              <button className="btn-danger btn-sm" onClick={dismissDraft}>Discard</button>
            </div>
          </div>
        </div>
      )}

      {/* Batch extraction progress bar */}
      {scanProgress && (
        <div className="card" style={{marginBottom:12,padding:14,borderLeft:'3px solid var(--gold)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--gold)'}}>✨ AI Extraction</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{scanProgress.batch}/{scanProgress.totalBatches} batches · {scanProgress.totalFiles} files</div>
          </div>
          <div style={{height:6,background:'var(--bg4)',borderRadius:3,overflow:'hidden',marginBottom:6}}>
            <div style={{height:'100%',width:scanProgress.pctComplete+'%',background:'linear-gradient(90deg,var(--gold),var(--green2))',borderRadius:3,transition:'width .5s ease'}} />
          </div>
          <div style={{fontSize:10,color:'var(--text2)'}}>{scanProgress.status}</div>
          {scanProgress.pctComplete > 0 && scanProgress.pctComplete < 100 && (
            <div style={{fontSize:9,color:'var(--text3)',marginTop:4}}>You can review extracted policies below while remaining batches process</div>
          )}
        </div>
      )}

      {/* Staged photos strip */}
      {staged.length > 0 && (
        <div className="card" style={{marginBottom:12,padding:14,borderLeft:'3px solid var(--blue)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:600}}>"📷" {staged.length} photo{staged.length>1?'s':''} staged</div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn-secondary btn-sm" onClick={async()=>{const files=await openCameraModal();if(files&&files.length){const newStaged=files.map(f=>({file:f,preview:URL.createObjectURL(f)}));setStaged(prev=>[...prev,...newStaged].slice(0,200));}}}>+ Take More</button>
              <button className="btn-primary btn-sm" onClick={()=>handleExtract(staged.map(s=>s.file))} disabled={scanning}>{scanning?'Extracting…':'✨ Extract All'}</button>
              <button className="btn-danger btn-sm" onClick={clearStaged}>Clear</button>
            </div>
          </div>
          <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>
            {staged.map((s,i) => (
              <div key={i} style={{position:'relative',flexShrink:0}}>
                <img src={s.preview} style={{width:72,height:72,objectFit:'cover',borderRadius:8,border:'1px solid var(--border2)'}} />
                <button onClick={()=>removeStaged(i)} style={{position:'absolute',top:-4,right:-4,width:18,height:18,borderRadius:'50%',background:'var(--red)',color:'#fff',border:'none',fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                <div style={{position:'absolute',bottom:2,left:2,background:'rgba(0,0,0,.6)',color:'#fff',fontSize:9,padding:'1px 4px',borderRadius:4}}>{i+1}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:10,color:'var(--text3)',marginTop:6}}>Take all the photos you need, then hit Extract All</div>
        </div>
      )}

      {/* Scan result preview */}
      {scanResult && !showForm && (
        <div className="card" style={{marginBottom:16,borderLeft:'3px solid var(--green)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'var(--green2)'}}>✅ Extracted Policy</div>
              <div style={{fontSize:15,fontWeight:600,marginTop:4,display:'flex',alignItems:'center',gap:6}}>{scanResult.insurer && <InsurerBadge name={scanResult.insurer} />} <span>{scanResult.productName}</span></div>
              <div style={{fontSize:12,color:'var(--text3)'}}>
                {scanResult.subType} • {scanResult.currency} {(scanResult.sumAssured||0).toLocaleString()} • Premium: {scanResult.currency} {(scanResult.annualPremium||0).toLocaleString()}
              </div>
              {scanResult.notes && <div style={{fontSize:11,color:'var(--text2)',marginTop:4,fontStyle:'italic'}}>{typeof scanResult.notes==='string'?scanResult.notes:JSON.stringify(scanResult.notes)}</div>}
              {scanResult.userRemarks && <div style={{fontSize:11,color:'var(--gold)',marginTop:4,padding:'4px 8px',background:'rgba(212,169,106,.08)',borderRadius:6}}>Remark: "{scanResult.userRemarks}"</div>}
            </div>
            <div style={{display:'flex',gap:4}}>
              <button className="btn-primary btn-sm" onClick={()=>{setEditing(scanResult);setShowForm(true)}}>Review & Save</button>
              <button className="btn-danger btn-sm" onClick={()=>setScanResult(null)}>×</button>
            </div>
          </div>
        </div>
      )}

      {filtered.length === 0 && !scanResult && staged.length===0 ? (
        <div className="card" style={{textAlign:'center',padding:40,color:'var(--text3)'}}>
          <div style={{fontSize:32,marginBottom:8}}>📋</div>
          <div>No policies {filter!=='all'?'in this category':''} yet</div>
          <div style={{fontSize:11,marginTop:8}}>📷 Camera (snap multiple) · 📄 Upload (PDF, Excel, Word, images) · + Add manually</div>
        </div>
      ) : (<>
        {(() => {
          // Group policies into sections
          const isCPFLifePolicy = p => (p.insurer||'').toLowerCase().includes('cpf board') || (p.productName||'').toLowerCase().includes('cpf life');
          const insuranceGroups = [
            {id:'protection', sub:'Protection', icon:'🛡', color:'#5b8fd9', match: p => p.category==='protection' && !['Universal Life (UL)','Indexed UL (IUL)','Variable UL (VUL)'].includes(p.subType)},
            {id:'ul', sub:'Universal Life', icon:'💎', color:'#9d8abf', match: p => ['Universal Life (UL)','Indexed UL (IUL)','Variable UL (VUL)'].includes(p.subType)},
            {id:'investment', sub:'Investment', icon:'📈', color:'var(--green2)', match: p => p.category==='investment'},
            {id:'savings', sub:'Endowment & Savings', icon:'💰', color:'var(--blue2)', match: p => p.category==='savings'},
            {id:'retirement', sub:'Retirement & Annuities', icon:'🏦', color:'var(--green2)', match: p => p.category==='retirement' && !isCPFLifePolicy(p)},
            {id:'health', sub:'Accident & Medical', icon:'🏥', color:'#c97b9a', match: p => p.category==='health' || p.category==='maternity'},
          ];
          const fiItems = activePolicies.filter(p => p.category==='cash_investments');
          const otherItems = activePolicies.filter(p => p.category==='other_assets');
          const insGroups = insuranceGroups.map(g => ({...g, items: activePolicies.filter(g.match).sort((a,b) => (a.subType||'').localeCompare(b.subType||'') || (a.insurer||'').localeCompare(b.insurer||'') || (parseFloat(b.annualPremium)||0)-(parseFloat(a.annualPremium)||0))})).filter(g => g.items.length > 0);
          // Unmatched (not in any group above)
          const cpfLifePols = activePolicies.filter(isCPFLifePolicy);
          const allGrouped = new Set([...insGroups.flatMap(g=>g.items.map(p=>p.id)), ...fiItems.map(p=>p.id), ...otherItems.map(p=>p.id), ...cpfLifePols.map(p=>p.id)]);
          const unmatchedIns = activePolicies.filter(p => !allGrouped.has(p.id));
          if(unmatchedIns.length) insGroups.push({id:'other_ins', sub:'Other', icon:'📋', color:'var(--text3)', items:unmatchedIns});
          const hasInsurance = insGroups.length > 0;
          const hasFI = fiItems.length > 0;
          const hasOther = otherItems.length > 0;

          // Benefit icons renderer
          const benIcons = (p) => {
            const bens = [];
            const rds = p.riders||[];
            if(rds.some(r=>r.type==='death'&&parseFloat(r.sa)>0)||(p.category==='protection'&&parseFloat(p.sumAssured)>0)) bens.push({l:'D',c:'#5b8fd9'});
            if(rds.some(r=>r.type==='tpd'&&parseFloat(r.sa)>0)) bens.push({l:'T',c:'#9d8abf'});
            if(rds.some(r=>r.type==='ci'&&parseFloat(r.sa)>0)||p.subType==='Critical Illness') bens.push({l:'CI',c:'#c97b9a'});
            if(rds.some(r=>r.type==='eci'&&parseFloat(r.sa)>0)) bens.push({l:'E',c:'#d4a96a'});
            if(rds.some(r=>r.type==='di'&&parseFloat(r.sa)>0)||p.subType==='Disability Income') bens.push({l:'DI',c:'#5ba8a0'});
            if(parseFloat(p.cashValue)>0||['Whole Life','Universal Life (UL)','Indexed UL (IUL)','Variable UL (VUL)'].includes(p.subType)||p.category==='savings'||p.category==='investment'||p.category==='retirement') bens.push({l:'SV',c:'#d4a96a'});
            return bens;
          };

          // Premium cell
          const premCell = (p) => {
            if(p.premSingle||p.premiumStructure==='Single Premium'||p.premFrequency==='single') return <div><div style={{fontSize:11}}>{fmt(p.annualPremium,p.currency||'SGD')}</div><div style={{fontSize:9,color:'var(--gold)'}}>Single Premium</div></div>;
            if(p.premFrequency==='monthly') return <div><div style={{fontSize:11}}>{fmt(p.annualPremium,p.currency||'SGD')}/mth</div><div style={{fontSize:9,color:'var(--text3)'}}>{fmt(parseFloat(p.annualPremium)*12,p.currency||'SGD')}/yr</div></div>;
            if(p.premFrequency==='unknown') return <div><div style={{fontSize:11}}>{fmt(p.annualPremium,p.currency||'SGD')}</div><div style={{fontSize:9,color:'var(--orange)'}}>Unconfirmed</div></div>;
            return <div>{fmt(p.annualPremium,p.currency||'SGD')}</div>;
          };

          // Action buttons
          const actions = (p) => <div style={{display:'flex',gap:4}}><button className="btn-secondary btn-sm" onClick={()=>{setEditing(p);setTimeout(()=>setShowForm(true),50)}}>Edit</button><button className="btn-danger btn-sm" onClick={()=>{if(confirm('Delete?'))deletePolicy(p.id)}}>×</button></div>;

          return (<>
            {/* ═══ INSURANCE ═══ */}
            {hasInsurance && (<>
              <div style={{display:'flex',alignItems:'center',gap:10,margin:'8px 0 6px'}}>
                <h3 style={{fontSize:17,fontWeight:800,color:'var(--gold)',letterSpacing:'.3px',margin:0}}>Insurance</h3>
                <div style={{flex:1,height:2,background:'linear-gradient(90deg,var(--gold3),transparent)'}} />
              </div>
              <div style={{overflowX:'auto',marginBottom:12}}>
                <table>
                  <colgroup><col style={{width:32}}/><col/><col style={{width:'14%'}}/><col style={{width:'12%'}}/><col style={{width:'13%'}}/><col style={{width:'14%'}}/><col style={{width:90}}/></colgroup>
                  {insGroups.map(group => (
                    <React.Fragment key={group.id}>
                      <thead><tr>
                        <th colSpan={7} style={{padding:'10px 8px 6px',background:'var(--bg2)',borderBottom:'2px solid '+group.color,fontSize:0}}>
                          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                            <div style={{display:'flex',alignItems:'center',gap:6}}>
                              <input type='checkbox' checked={group.items.every(p=>selected.has(p.id))&&group.items.length>0} onChange={()=>{const ids=group.items.map(p=>p.id);const allSel=ids.every(id=>selected.has(id));setSelected(prev=>{const n=new Set(prev);ids.forEach(id=>allSel?n.delete(id):n.add(id));return n;});}} style={{accentColor:'var(--gold)'}} />
                              <span style={{fontSize:13,fontWeight:700,color:group.color}}>{group.icon} {group.sub}</span>
                              <span style={{fontSize:11,color:'var(--text3)',fontWeight:400}}>({group.items.length})</span>
                            </div>
                          </div>
                        </th>
                      </tr>
                      <tr style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px'}}>
                        <th style={{width:32}}></th><th style={{textAlign:'left'}}>Policy</th><th>Sub-type</th><th>Insurer</th><th style={{textAlign:'right'}}>Sum Assured</th><th style={{textAlign:'right'}}>Premium</th><th>Actions</th>
                      </tr></thead>
                      <tbody>
                        {group.items.map(p => {
                          const bens = benIcons(p);
                          return (
                            <tr key={p.id} style={{background:selected.has(p.id)?'rgba(212,169,106,.06)':'transparent'}}>
                              <td><input type='checkbox' checked={selected.has(p.id)} onChange={()=>toggleSelect(p.id)} style={{accentColor:'var(--gold)'}} /></td>
                              <td>
                                <div style={{fontWeight:500}}>{p.policyName||p.productName||'Unnamed'}</div>
                                {p.policyNumber && <div style={{fontSize:10,color:'var(--text3)'}}>{p.policyNumber}</div>}

                    <th style={{textAlign:'left'}}>Instrument</th><th>Type</th><th>Bank</th><th style={{textAlign:'right'}}>Principal</th><th style={{textAlign:'right'}}>Yield</th><th>Actions</th>
                  </tr></thead>
                  <tbody>
                    {fiItems.sort((a,b)=>(a.insurer||'').localeCompare(b.insurer||'')).map(p => (
                      <tr key={p.id} style={{background:selected.has(p.id)?'rgba(212,169,106,.06)':'transparent'}}>
                        <td><input type='checkbox' checked={selected.has(p.id)} onChange={()=>toggleSelect(p.id)} style={{accentColor:'var(--gold)'}} /></td>
                        <td>
                          <div style={{fontWeight:500}}>{p.productName||p.policyName||p.subType||'Unnamed'}</div>
                          {p.userRemarks && <div style={{fontSize:9,color:'var(--gold)',fontStyle:'italic'}}>"{p.userRemarks.length>35?p.userRemarks.substring(0,35)+'…':p.userRemarks}"</div>}
                          {p.fdMaturityDate && <div style={{fontSize:9,color:new Date(p.fdMaturityDate)<new Date()?'var(--gold)':'var(--text3)'}}>{new Date(p.fdMaturityDate)<new Date()?'Matured':('Mat: '+new Date(p.fdMaturityDate).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'2-digit'}))}</div>}
                        </td>
                        <td style={{fontSize:11,color:'var(--text2)'}}>{p.subType||'FD'}</td>
                        <td>{p.insurer?<InsurerBadge name={p.insurer}/>:'—'}</td>
                        <td className="mono" style={{textAlign:'right'}}>{p.fdPrincipal?'$'+parseInt(p.fdPrincipal).toLocaleString():'—'}</td>
                        <td className="mono" style={{textAlign:'right'}}>{p.fdYieldPct?<span style={{color:'var(--green2)',fontWeight:600}}>{p.fdYieldPct}%</span>:'—'}</td>
                        <td>{actions(p)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </>)}

            {/* ═══ OTHER ASSETS ═══ */}
            {hasOther && (<>
              <div style={{display:'flex',alignItems:'center',gap:10,margin:'12px 0 6px'}}>
                <h3 style={{fontSize:17,fontWeight:800,color:'#8b7355',letterSpacing:'.3px',margin:0}}>Other Assets</h3>
                <div style={{flex:1,height:2,background:'linear-gradient(90deg,rgba(139,115,85,.3),transparent)'}} />

                  <colgroup><col style={{width:32}}/><col/><col style={{width:'14%'}}/><col style={{width:'12%'}}/><col style={{width:'13%'}}/><col style={{width:'12%'}}/><col style={{width:90}}/></colgroup>

                    <th style={{width:32}}></th><th style={{textAlign:'left'}}>Asset</th><th>Type</th><th>Provider</th><th style={{textAlign:'right'}}>Value</th><th style={{textAlign:'right'}}>Yield / Return</th><th>Actions</th>

                  <tbody>
                    {otherItems.sort((a,b)=>(a.subType||'').localeCompare(b.subType||'')).map(p => (
                      <tr key={p.id}>

                        <td className="mono" style={{textAlign:'right'}}>{p.fdYieldPct?p.fdYieldPct+'%':p.retAccumYield?p.retAccumYield+'%':'—'}</td>

        {/* ═══ MATURED FIXED DEPOSITS / T-BILLS ═══ */}
        {maturedPolicies.length > 0 && (
          <div style={{marginTop:16}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>

              <div style={{flex:1,height:1,background:'var(--border)'}} />
            </div>
            <div style={{opacity:.6}}>
              {maturedPolicies.map(p => (
                <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'var(--bg3)',borderRadius:8,marginBottom:4,border:'1px solid var(--border)'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontWeight:500,fontSize:12}}>{p.productName||p.policyName||p.subType||'Unnamed'}</span>
                    <span style={{fontSize:10,color:'var(--text3)',marginLeft:8}}>{p.insurer}</span>

                    {p.fdMaturityDate && !p.maturityDate && <span style={{fontSize:9,color:'var(--gold)',marginLeft:8}}>Matured {new Date(p.fdMaturityDate).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'})}</span>}
                    <span style={{fontSize:9,marginLeft:8,padding:'1px 5px',borderRadius:3,background:`${catColor(p.category)}15`,color:catColor(p.category)}}>{CATEGORIES[p.category]?.label||p.category}</span>
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
                    <span className="mono" style={{fontSize:12}}>{p.fdPrincipal?'$'+parseInt(p.fdPrincipal).toLocaleString():p.sumAssured?fmt(p.sumAssured,p.currency||'SGD'):p.annualPremium?fmt(p.annualPremium,p.currency||'SGD'):''}</span>
                    <button className="btn-secondary btn-sm" onClick={()=>{setEditing(p);setShowForm(true);}} style={{fontSize:9,padding:'3px 8px'}}>Edit</button>
                    <button className="btn-danger btn-sm" onClick={()=>{if(confirm('Delete this matured entry?'))deletePolicy(p.id);}} style={{fontSize:9,padding:'3px 8px'}}>×</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </>)}

      {/* Bulk Verification Modal */}
      {bulkExtracted && <BulkVerifyModal extracted={bulkExtracted} repo={repo} policies={policies} onSavePolicy={savePolicy} scanProgress={scanProgress} onClose={()=>{try{sessionStorage.removeItem('policylens_pendingExtract')}catch(e){}setBulkExtracted(null)}} onAccept={async(selected) => {
        let count = 0;
        for(const p of selected) {
          const result = {...p, id:genId()};
          if(result.premiumStructure==='Single Premium' || result.premFrequency==='single') result.premSingle = true;
          if(result.premStartAge && result.premTerm && !result.premEndAge) result.premEndAge = String(parseInt(result.premStartAge)+parseInt(result.premTerm));
          if(result.ageAtEntry && !result.premStartAge) result.premStartAge = result.ageAtEntry;
          await savePolicy(result);
          count++;
        }
        setBulkExtracted(null);
        toast('Imported '+count+' policies','success');
      }} />}

      {showForm && <ErrorBoundary onReset={()=>setShowForm(false)}><PolicyFormModal policy={editing||scanResult} onSave={handleFormSave} onClose={handleFormClose} repo={repo} onSaveRepo={saveRepo} onDraftChange={saveDraft} onDraftClear={clearDraft} /></ErrorBoundary>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MODULE: POLICY_FORM — Policy form with sub-type fields & fuzzy matching
// ═══════════════════════════════════════════════════════════════

function PolicyFormModal({policy,onSave,onClose,repo,onSaveRepo,onDraftChange,onDraftClear}) {
  const isEdit = !!policy;
  const [tidying, setTidying] = useState(false);
  const [repoMatches, setRepoMatches] = useState(null);
  const [pendingRepoItem, setPendingRepoItem] = useState(null);
  const [formScanning, setFormScanning] = useState(false);
  const formCamRef = useRef(null);
  const formUploadRef = useRef(null);

  // Build life insured dropdown from profile
  const {clientProfile:_cp, saveProfile:_sp} = useContext(AppCtx);
  const clientAge = useMemo(() => _cp?.dob ? Math.floor((Date.now()-new Date(_cp.dob).getTime())/31557600000) : 35, [_cp]);
  const profileNames = useMemo(() => {
    const names = [];
    if(_cp?.name) names.push(_cp.name);
    (_cp?.dependants||[]).forEach(d=>{if(d.name)names.push(d.name + (d.relationship?' ('+d.relationship+')':''))});
    return names;
  }, [_cp]);

  const DEFAULT_RIDERS = {
    'Term Life':       [{type:'death',riderName:'Death & Terminal Illness',sa:'',premium:'',expiryAge:'65',bundled:true}],
    'Whole Life':      [{type:'death',riderName:'Death & Terminal Illness',sa:'',premium:'',expiryAge:'99',bundled:true},{type:'tpd',riderName:'Total Permanent Disability',sa:'',premium:'',expiryAge:'70',bundled:true},{type:'ci',riderName:'Critical Illness',sa:'',premium:'',expiryAge:'85',bundled:true}],
    'Universal Life (UL)': [{type:'death',riderName:'Death & Terminal Illness',sa:'',premium:'',expiryAge:'100',bundled:true}],
    'Indexed UL (IUL)':    [{type:'death',riderName:'Death & Terminal Illness',sa:'',premium:'',expiryAge:'100',bundled:true}],
    'Variable UL (VUL)':   [{type:'death',riderName:'Death & Terminal Illness',sa:'',premium:'',expiryAge:'100',bundled:true}],
    'Critical Illness':    [{type:'death',riderName:'Death & Terminal Illness',sa:'',premium:'',expiryAge:'65',bundled:true},{type:'tpd',riderName:'Total Permanent Disability',sa:'',premium:'',expiryAge:'65',bundled:true},{type:'ci',riderName:'Critical Illness',sa:'',premium:'',expiryAge:'65',bundled:true,multiClaim:false,totalClaimPct:300}],
    'Personal Accident':   [{type:'accidental',riderName:'Accidental Death',sa:'',premium:'',expiryAge:'70',bundled:true},{type:'tpd',riderName:'Permanent Total Disablement',sa:'',premium:'',expiryAge:'70',bundled:true},{type:'acc_dismember',riderName:'Accidental Dismemberment & Burns',sa:'',premium:'',expiryAge:'70',bundled:true},{type:'acc_medical',riderName:'Accidental Medical Reimbursement',sa:'',premium:'',expiryAge:'70',bundled:true},{type:'acc_tcm',riderName:'TCM/Chiropractic Reimbursement',sa:'',premium:'',expiryAge:'70',bundled:true}],
    'Disability Income':   [{type:'di',riderName:'Disability Income',sa:'',premium:'',expiryAge:'65',bundled:true}],
    'Long-term Care':      [],
    'ILP (Protection)': [{type:'death',riderName:'Death & Terminal Illness',sa:'',premium:'',expiryAge:'65',bundled:true},{type:'tpd',riderName:'Total Permanent Disability',sa:'',premium:'',expiryAge:'65',bundled:true},{type:'ci',riderName:'Critical Illness',sa:'',premium:'',expiryAge:'65',bundled:true}],
    'ILP (Investment)': [{type:'death',riderName:'Death & Terminal Illness',sa:'',premium:'',expiryAge:'65',bundled:true},{type:'tpd',riderName:'Total Permanent Disability',sa:'',premium:'',expiryAge:'65',bundled:true},{type:'ci',riderName:'Critical Illness',sa:'',premium:'',expiryAge:'65',bundled:true}],
  };

  const [form, setForm] = useState(() => {
    const init = policy || {
    id:genId(), category:'protection', subType:'', insurer:'', productName:'', policyName:'', policyNumber:'',
    currency:'SGD', sumAssured:'', annualPremium:'', premFrequency:'annual', premiumStructure:'Regular Premium',
    policyOwner:'', lifeInsured:'', gender:'', dob:'', ageAtEntry:'', smoker:'', nationality:'', occupation:'',
    inceptionDate:'', maturityDate:'', status:'inforce', paymentMethod:'',
    // Premium structure (RetireWell)
    premStartAge:'', premTerm:'', premEndAge:'65', premSingle:false, premWholeLife:false,
    // Riders
    riders:[], saMultiplier:'1', multiplierEndAge:'70',
    // ISP
    ispClass:'', hasRider:false, riderList:'', riderPremium:'', ispDeductible:'3500', ispCoinsurance:'5', ispCoInsCap:'',
    // Cash value
    cashValue:'', cvGrowthRate:'3.0', cvKnown:true, surrenderPeriod:'',
    // ILP (RetireWell)
    ilpGrowth:'6', ilpDivYield:'2', ilpMgmtFee:'1.5', ilpPaymentYrs:'10', ilpProtPct:'101',
    divReinvest:false, ilpDivDrawdownAge:'',
    // UL fields
    ulSubType:'', creditingMechanism:'', creditingRates:{current:'',guaranteed:''},
    loyaltyBonus:{rate:'',startYear:'',endDesc:''}, loanRate:'', elpPremium:'', qsiFlag:false,
    faAllocation:'', iaAllocation:'', indexSubAccounts:[],
    solvedPremium:'', assumedReturn:'', minLiquidity:'', investmentRisk:'client',
    // Maternity
    dualInsured:false, guaranteedIssuance:false, conversionRights:false,
    // Retirement
    monthlyBenefit:'', fundingSource:'',
    annuityMonthly:'', annuityPayout:'', annuityStartAge:'65', annuityEndAge:'85',
    retAccumYield:'', retPayoutMode:'payout', retDeathBenefit:'cv', retMaturitySum:'', financed:false, finLoan:'', finRate:'', finTenure:'',
    endSubtype:'limited', endPayYrs:'', endWaitYrs:'', endPolicyTerm:'', endYield:'4', endGuaranteedCV:'', endNonGuarBonus:'',
    diMonthlyBenefit:'', defermentMths:'3', diBenefitAge:'65',
    cslMonthlyBenefit:'600', cslEscalation:'0', cslPayoutAge:'67', cslLifetime:'yes',
    addSA:'', accMedical:'', tcmReimb:'',
    // General
    notes:'', userRemarks:'', highlights:[], fundAllocations:[],
    // Fixed Deposits / T-bills / SSB
    fdPrincipal:'', fdYieldPct:'', fdStartDate:'', fdMaturityDate:'', fdAutoRenew:false, fdTenureMonths:'',
  };
    // Sync premSingle from premiumStructure on load
    if(init.premiumStructure==='Single Premium' || init.premFrequency==='single') { init.premSingle = true; init.premFrequency = 'single'; }
    if(!init.premFrequency) init.premFrequency = init.premSingle ? 'single' : 'annual';
    // ── AUTO-CALC ageAtEntry from inceptionDate + profile DOB on load ──
    if(!init.ageAtEntry && !init.premStartAge && init.inceptionDate && _cp?.dob) {
      const entryAge = Math.floor((new Date(init.inceptionDate).getTime()-new Date(_cp.dob).getTime())/31557600000);
      if(entryAge > 0 && entryAge < 100) { init.ageAtEntry = String(entryAge); init.premStartAge = String(entryAge); }
    }
    // ── SYNC premStartAge ↔ ageAtEntry on load ──
    if(init.ageAtEntry && !init.premStartAge) init.premStartAge = init.ageAtEntry;
    if(init.premStartAge && !init.ageAtEntry) init.ageAtEntry = init.premStartAge;
    // ── AUTO-CALC premEndAge from premStartAge + premTerm on load ──
    if(init.premStartAge && init.premTerm && !init.premEndAge) init.premEndAge = String(parseInt(init.premStartAge)+parseInt(init.premTerm));
    return init;
  });

  const set = (k,v) => setForm(f=>{
    const nf={...f,[k]:v};
    // ── AUTO-CALC ageAtEntry from inceptionDate + profile DOB ──
    if((k==='inceptionDate' || k==='dob') && _cp?.dob) {
      const inception = k==='inceptionDate' ? v : nf.inceptionDate;
      const dob = _cp.dob;
      if(inception && dob) {
        const entryAge = Math.floor((new Date(inception).getTime()-new Date(dob).getTime())/31557600000);
        if(entryAge > 0 && entryAge < 100) {
          nf.ageAtEntry = String(entryAge);
          nf.premStartAge = String(entryAge);
          // Recalc premEndAge if premTerm exists
          if(parseInt(nf.premTerm) > 0) nf.premEndAge = String(entryAge + parseInt(nf.premTerm));
        }
      }
    }
    // ── SYNC ageAtEntry ↔ premStartAge bidirectionally ──
    if(k==='ageAtEntry' && v) { nf.premStartAge = v; if(parseInt(nf.premTerm)>0) nf.premEndAge = String(parseInt(v)+parseInt(nf.premTerm)); }
    if(k==='premStartAge' && v) { nf.ageAtEntry = v; }
    // Auto-populate riders when subType changes
    if(k==='subType' && DEFAULT_RIDERS[v] && (!f.riders || f.riders.length===0)){
      nf.riders = DEFAULT_RIDERS[v].map(r=>({...r,id:'r_'+Date.now()+Math.random().toString(36).slice(2,5)}));
    }
    // Sync premSingle ↔ premiumStructure ↔ premFrequency
    if(k==='premFrequency') {
      nf.premSingle = (v === 'single');
      if(v === 'single') nf.premiumStructure = 'Single Premium';
      else if(nf.premiumStructure === 'Single Premium') nf.premiumStructure = 'Regular Premium';
    }
    if(k==='premSingle' && v) { nf.premiumStructure = 'Single Premium'; nf.premFrequency = 'single'; }
    if(k==='premSingle' && !v && nf.premiumStructure==='Single Premium') { nf.premiumStructure = 'Regular Premium'; if(nf.premFrequency==='single') nf.premFrequency = 'annual'; }
    if(k==='premiumStructure') { nf.premSingle = (v === 'Single Premium'); if(v==='Single Premium') nf.premFrequency = 'single'; }
    // Auto-calc premium end age
    // Bidirectional premium sync
    if(!nf.premWholeLife && !nf.premSingle) {
      const sa = parseInt(nf.premStartAge)||0, pt = parseInt(nf.premTerm)||0, ea = parseInt(nf.premEndAge)||0;
      if(k==='premEndAge' && sa > 0 && ea > sa) {
        nf.premTerm = String(ea - sa);
      } else if(k==='premStartAge' && ea > 0 && ea > sa) {
        nf.premTerm = String(ea - sa);
      } else if((k==='premStartAge'||k==='premTerm') && sa > 0 && pt > 0) {
        nf.premEndAge = String(sa + pt);
      }
    }
    if(onDraftChange)onDraftChange(nf);
    return nf;
  });
  const setNested = (parent,k,v) => setForm(f=>{const nf={...f,[parent]:{...f[parent],[k]:v}};if(onDraftChange)onDraftChange(nf);return nf});

  const PREMIUM_STRUCTURES = ['Regular Premium','Single Premium','Limited Pay','Flexible Premium'];
  const isUL = ['Universal Life (UL)','Indexed UL (IUL)','Variable UL (VUL)'].includes(form.subType);
  const isULPlain = form.subType==='Universal Life (UL)';
  const isIUL = form.subType==='Indexed UL (IUL)';
  const isVUL = form.subType==='Variable UL (VUL)';
  const isMaternity = form.category === 'maternity';
  const isCashInvestment = form.category === 'cash_investments';
  const isOtherAsset = form.category === 'other_assets';
  const isFD = ['Fixed Deposit','T-bill','Singapore Savings Bond','Corporate Bond','Money Market'].includes(form.subType);
  const isILP = form.subType==='ILP (Protection)' || form.subType==='ILP (Investment)';
  const isISP = form.subType==='Integrated Shield Plan';
  const isProtection = form.category==='protection';
  const isInvestment = form.category==='investment';
  const isSavings = form.category==='savings';
  const isRetirement = form.category==='retirement';
  const isHealth = form.category==='health';
  const isDI = form.subType==='Disability Income';
  const isCSL = form.subType==='CareShield Life / Supplement' || form.subType==='ElderShield 300' || form.subType==='ElderShield 400';
  const isPA = form.subType==='Personal Accident';
  const isEndowment = isSavings;
  const isAnnuity = isRetirement;
  const noRiderCategories = isISP || isCSL || isCashInvestment;
  const hasCoverageSection = !noRiderCategories;
  const hasCV = (isProtection||isSavings||isInvestment||isRetirement) && form.subType!=='Term Life' && !isISP && !isCSL && !isDI && !isPA && !isCashInvestment;
  // Matured check for FD/T-bills
  const fdMatured = isFD && form.fdMaturityDate && new Date(form.fdMaturityDate) < new Date();

  // ILP effective rate
  const ilpEffRate = Math.max(0, parseFloat(form.ilpGrowth||6) + parseFloat(form.ilpDivYield||2) - parseFloat(form.ilpMgmtFee||1.5));

  // Fuzzy matching
  const [showFuzzy, setShowFuzzy] = useState(false);
  const [fuzzyMatches, setFuzzyMatches] = useState([]);
  useEffect(() => {
    if(!form.productName || form.productName.length < 3 || isEdit) return;
    const matches = fuzzyMatch(form.productName + ' ' + form.insurer, repo);
    setFuzzyMatches(matches.slice(0,3));
    setShowFuzzy(matches.length > 0);
  }, [form.productName, form.insurer]);

  const handleSubmit = () => {
    if(onDraftClear)onDraftClear();
    onSave({...form, sumAssured:parseFloat(form.sumAssured)||0, annualPremium:parseFloat(form.annualPremium)||0, monthlyBenefit:parseFloat(form.monthlyBenefit)||0});
    // Auto-offer to save to repository
    if(form.productName && form.insurer && repo) {
      const exists = repo.find(r => r.productName === form.productName && r.insurer === form.insurer);
      const advisorName = window._prof?.full_name||window._user?.user_metadata?.full_name||'Advisor';
      if(!exists && confirm('Save "'+form.insurer+' '+form.productName+'" to the shared Policy Repository?\n\nThis makes it available for all advisors to search and auto-fill.')) {
        // Build clean notes from form data
        const notesParts = [];
        if(form.subType) notesParts.push(form.subType+'.');
        if(form.premiumStructure) notesParts.push('Premium: '+form.premiumStructure+'.');
        if(form.notes) notesParts.push(form.notes);
        // Rider summary
        const riderNotes = (form.riders||[]).filter(r=>r.riderName||!r.bundled||r.sa).map(r=>(r.riderName||{death:'Death & TI',tpd:'TPD',ci:'CI',eci:'ECI',di:'DI',accidental:'ADD',acc_medical:'Med Reimb',acc_tcm:'TCM',acc_dismember:'Dismember',premium_waiver:'Waiver',other:'Other'}[r.type]||r.type)+' SA $'+(parseFloat(r.sa)||0).toLocaleString()+(r.bundled===false?' (separate rider)':' (part of plan)')).join('; ');
        if(riderNotes) notesParts.push('Riders: '+riderNotes+'.');
        const repoItem = {
          id:'repo-'+Date.now(),
          insurer:form.insurer, productName:form.productName, productCode:form.productCode||'',
          category:form.category, subType:form.subType, currency:form.currency||'SGD',
          notes:notesParts.join(' '),
          votes:{}, editHistory:[{by:advisorName,name:advisorName,at:new Date().toISOString(),date:new Date().toISOString(),action:'Created from policy form'}],
        };
        if(onSaveRepo) onSaveRepo(repoItem);
      } else if(exists) {
        // Product exists — offer to update with this advisor's version
        const hasNewInfo = form.notes && form.notes.length > 20 && !exists.notes?.includes(form.notes.slice(0,30));
        if(hasNewInfo && confirm('Update repository notes for "'+exists.productName+'" with your version?')) {
          const advisorName2 = window._prof?.full_name||window._user?.user_metadata?.full_name||'Advisor';
          const updatedNotes = exists.notes + '\n\n📝 '+advisorName2+' ('+new Date().toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'})+'):\n'+form.notes;
          if(onSaveRepo) onSaveRepo({...exists, notes:updatedNotes, editHistory:[...(exists.editHistory||[]),{by:advisorName2,name:advisorName2,at:new Date().toISOString(),date:new Date().toISOString(),action:'Updated notes from policy form'}]});
        }
      }
    }
  };

  // ── Scan into existing form ──
  const scanIntoForm = async (files) => {
    if(!files||!files.length) return;
    // Keys read internally by callAI()
    setFormScanning(true);
    try {
      const content = [];
      for(const file of Array.from(files).slice(0,8)){
        const blocks = await processFile(file);
        content.push(...blocks);
      }
      const formExtractPrompt = 'Extract insurance policy details. Return a JSON object with ALL fields: insurer, productName, policyNumber, category (protection/savings/health/investment/retirement/maternity), subType, currency, sumAssured (number), annualPremium (number), premFrequency (annual/monthly/single/unknown — if document does not clearly state frequency, use unknown), premiumStructure, paymentMethod, policyOwner, lifeInsured, gender, dob, ageAtEntry, smoker, nationality, occupation, inceptionDate, maturityDate, status, premStartAge, premTerm, premEndAge. Riders: riders (array) — CAPTURE-FIRST: for EVERY benefit listed, set riderName to EXACT name from document, THEN classify type from death/tpd/ci/eci/di/accidental/acc_medical/acc_tcm/acc_dismember/premium_waiver/other. If unsure, use type:"other". NEVER duplicate types for different benefits — use riderName to distinguish. Each: {type, riderName (ALWAYS filled), sa:number, premium:0 if bundled, expiryAge, bundled:boolean, multiClaim, totalClaimPct}. SA: saMultiplier, multiplierEndAge. ISP: ispClass, hasRider, riderList, riderPremium, ispDeductible, ispCoinsurance. ILP: ilpGrowth, ilpDivYield, ilpMgmtFee, fundAllocations (array of {fundName:string, allocation:number}). Cash: cashValue, cvGrowthRate, surrenderPeriod. Notes: notes (FC review headline). Return ONLY valid JSON starting with { ending with }.';
      content.push({type:'text',text:'Extract all policy information from these documents/images.'});
      const rawText2 = await callAI(formExtractPrompt, content, 4000);
      const parsed = repairJSON(rawText2);
      const overwrites = [];
      const updates = {};
      Object.entries(parsed).forEach(([k,v])=>{
        if(v===null||v===undefined||v==='') return;
        if(k==='faceAmount') k='sumAssured';
        const current = form[k];
        if(current && current!=='' && current!==0 && current!=='0' && JSON.stringify(current)!==JSON.stringify(v)) overwrites.push(k);
        updates[k] = typeof v==='number'?v:(typeof v==='string'?v:JSON.stringify(v));
      });
      if(overwrites.length>0 && !confirm('Scanned data will update: '+overwrites.join(', ')+'. Proceed?')){setFormScanning(false);return;}
      setForm(f=>({...f,...updates}));
      if(onDraftChange)onDraftChange({...form,...updates});
      // Merge client details to profile
      mergeToProfile(parsed, _cp, _sp);
    } catch(e){toast('Scan error: '+e.message,'error');}
    setFormScanning(false);
  };

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 style={{fontSize:16,fontWeight:600}}>{isEdit?'Edit Policy':'Add Policy'}</h3>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <input ref={formCamRef} type="file" accept="image/*" capture="environment" multiple style={{display:'none'}} onChange={e=>{scanIntoForm(e.target.files);e.target.value='';}} />
            <input ref={formUploadRef} type="file" accept="image/*,.pdf,.xlsx,.xls,.csv,.doc,.docx" multiple style={{display:'none'}} onChange={e=>{scanIntoForm(e.target.files);e.target.value='';}} />
            <button className="btn-secondary btn-sm" onClick={async()=>{const files=await openCameraModal();if(files&&files.length) scanIntoForm(files);}} disabled={formScanning}>{formScanning?'Scanning…':'📷'}</button>
            <button className="btn-secondary btn-sm" onClick={()=>{const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.multiple=true;inp.onchange=e=>{if(e.target.files.length) scanIntoForm(e.target.files);};inp.click();}} disabled={formScanning}>🖼</button>
            <button className="btn-secondary btn-sm" onClick={()=>formUploadRef.current?.click()} disabled={formScanning}>{formScanning?'…':'📄'}</button>
            <button onClick={onClose} style={{background:'none',color:'var(--text3)',fontSize:20,marginLeft:4}}>×</button>
          </div>
        </div>

        {/* Drop / Paste zone inside form */}
        <DropZone active={true} onFiles={(files)=>scanIntoForm(files)} label="📎 Drop or paste policy docs here to auto-fill this form" />

        {/* Fuzzy match alert */}
        {showFuzzy && !isEdit && (
          <div className="fuzzy-alert">
            <h4>🔍 Possible Repository Matches</h4>
            <p style={{fontSize:12,color:'var(--text2)',marginBottom:8}}>These products look similar.</p>
            {fuzzyMatches.map(m => (
              <div key={m.id} style={{background:'var(--bg3)',borderRadius:8,padding:10,marginBottom:6,fontSize:12}}>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontWeight:600}}>{m.insurer} — {m.productName}</span>
                  <span className="mono" style={{color:'var(--orange)',fontSize:11}}>{Math.round(m.score*100)}%</span>
                </div>
                <button className="btn-secondary btn-sm" style={{marginTop:4}} onClick={()=>{
                  setForm(f=>({...f,...m,id:f.id,status:f.status}));setShowFuzzy(false);
                }}>Use as template</button>
              </div>
            ))}
          </div>
        )}

        {/* ═══ SECTION 1: BASIC INFO ═══ */}
        <div className="grid-2">
          <div className="field"><label>Category</label><select value={form.category} onChange={e=>{set('category',e.target.value);set('subType','');}}>
            {Object.entries(CATEGORIES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select></div>
          <div className="field"><label>Sub-type</label><select value={form.subType} onChange={e=>set('subType',e.target.value)}>
            <option value="">Select…</option>
            {(SUB_TYPES[form.category]||[]).map(s=><option key={s}>{s}</option>)}
          </select></div>
        </div>
        <div className="grid-2">
          <div className="field"><label>{isCashInvestment ? 'Provider / Bank' : 'Insurer'}</label><InsurerSelect value={form.insurer} onChange={v=>set('insurer',v)} /></div>
          <div className="field"><label>Product Name</label><FuzzyInput value={form.productName} onChange={v=>set('productName',v)} 
            suggestions={repo.filter(r=>!form.insurer||form.insurer===''||r.insurer===form.insurer).map(r=>({label:r.productName,sub:r.insurer+' · '+r.subType+(r.notes?' · '+r.notes.substring(0,60)+'…':''),item:r}))}
            onSelect={item=>{if(item.item){set('insurer',item.item.insurer);set('subType',item.item.subType);set('category',item.item.category);if(item.item.currency)set('currency',item.item.currency);}}}
            placeholder="e.g. Heirloom VII — type to search repository" /></div>
        </div>

        {/* ═══ SECTION 2: POLICY IDENTITY ═══ */}
        <div className="grid-3">
          <div className="field"><label>Policy Number</label><input value={form.policyNumber} onChange={e=>set('policyNumber',e.target.value)} placeholder="e.g. 12345678" /></div>
          <div className="field"><label>Policy Owner</label>
            <select value={form.policyOwner||''} onChange={e=>set('policyOwner',e.target.value)}>
              <option value="">— Select from profile —</option>
              {profileNames.map(n=><option key={n} value={n}>{n}</option>)}
              <option value="__other">Other (type below)</option>
            </select>
            {form.policyOwner==='__other' && <input value={form.policyOwnerOther||''} onChange={e=>set('policyOwnerOther',e.target.value)} placeholder="Owner name" style={{marginTop:4}} />}
          </div>
          <div className="field"><label>Life Assured</label>
            <select value={form.lifeInsured||''} onChange={e=>set('lifeInsured',e.target.value)}>
              <option value="">— Select from profile —</option>
              {profileNames.map(n=><option key={n} value={n}>{n}</option>)}
              <option value="__other">Other (type below)</option>
            </select>
            {form.lifeInsured==='__other' && <input value={form.lifeInsuredOther||''} onChange={e=>set('lifeInsuredOther',e.target.value)} placeholder="Name" style={{marginTop:4}} />}
          </div>
          <div className="field"><label>Currency</label><select value={form.currency} onChange={e=>set('currency',e.target.value)}><option>SGD</option><option>USD</option><option>HKD</option><option>GBP</option><option>EUR</option><option>AUD</option><option>MYR</option></select></div>
        </div>

        {/* ═══ SECTION 3: PREMIUM STRUCTURE ═══ */}
        {!isCashInvestment && !isOtherAsset && (
        <div style={{marginTop:8,padding:14,background:'var(--bg3)',borderRadius:10,border:'1px solid var(--border)'}}>
          <h4 style={{fontSize:13,fontWeight:600,marginBottom:10,color:'var(--text2)'}}>Premium Structure</h4>
          <div className="grid-3">
            <div className="field">
              <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span>Premium ($)</span>
                <select value={form.premFrequency||'annual'} onChange={e=>set('premFrequency',e.target.value)} style={{fontSize:10,padding:'2px 6px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:4,color:form.premFrequency==='unknown'?'var(--orange)':'var(--text2)'}}>
                  <option value="annual">Annual</option>
                  <option value="monthly">Monthly</option>
                  <option value="single">Single</option>
                  <option value="unknown">Unconfirmed</option>
                </select>
              </label>
              <input type="number" value={form.annualPremium} onChange={e=>set('annualPremium',e.target.value)} />
              {form.annualPremium && form.premFrequency==='annual' && <div style={{fontSize:10,color:'var(--text3)'}}>${(parseFloat(form.annualPremium)/12).toFixed(0)}/mth</div>}
              {form.annualPremium && form.premFrequency==='monthly' && <div style={{fontSize:10,color:'var(--teal)'}}>${Math.round(parseFloat(form.annualPremium)*12).toLocaleString()}/yr annualised</div>}
              {form.premFrequency==='single' && <div style={{fontSize:10,color:'var(--gold)'}}>Single lump sum</div>}
              {form.premFrequency==='unknown' && <div style={{fontSize:10,color:'var(--orange)'}}>Confirm frequency above</div>}
            </div>
            <div className="field"><label>Payment Method</label><select value={form.paymentMethod||''} onChange={e=>set('paymentMethod',e.target.value)}>
              <option value="">—</option>
              <option value="Cash">Cash</option>
              {(isISP||isCSL) && <option value="MediSave">MediSave</option>}
              {(isISP||isCSL) && <option value="MediSave+Cash">MediSave + Cash</option>}
              {!isISP && !isCSL && <option value="CPF OA">CPF OA</option>}
              {!isISP && !isCSL && <option value="CPF SA">CPF SA</option>}
              {!isISP && !isCSL && <option value="SRS">SRS</option>}
            </select>
            {isISP && <div style={{fontSize:10,color:'var(--teal)'}}>ISP: MediSave (AWL) + Cash overflow</div>}
            {isCSL && <div style={{fontSize:10,color:'var(--green2)'}}>MediSave cap $600/yr · overflow → Cash</div>}
            </div>
            {!isISP && !isCSL && <div className="field"><label>Sum Assured / Face Amount</label><input type="number" value={form.sumAssured} onChange={e=>set('sumAssured',e.target.value)} placeholder="Notional for par/annuity" /></div>}
          </div>
          <div className="grid-3" style={{marginTop:4}}>
            <div className="field"><label>Age at Entry</label><input type="number" value={form.premStartAge||form.ageAtEntry||''} onChange={e=>{set('premStartAge',e.target.value);set('ageAtEntry',e.target.value)}} placeholder="e.g. 30" /></div>
            <div className="field">
              <label>Premium Term (years)</label>
              <input type="number" value={form.premTerm||''} onChange={e=>set('premTerm',e.target.value)} placeholder={form.premSingle?'N/A':'e.g. 25'} disabled={form.premSingle||form.premWholeLife} style={form.premSingle||form.premWholeLife?{opacity:.35,background:'var(--bg4)'}:{}} />
              {!form.premSingle && <div style={{display:'flex',gap:12,marginTop:4}}>
                <label style={{fontSize:11,display:'flex',alignItems:'center',gap:3,cursor:'pointer',color:form.premWholeLife?'var(--gold)':'var(--text3)'}}><input type="checkbox" checked={form.premWholeLife||false} onChange={e=>{set('premWholeLife',e.target.checked);if(e.target.checked){set('premSingle',false);set('premEndAge','Whole Life');}}} /> Whole Life</label>
              </div>}
              {form.premSingle && <div style={{fontSize:9,color:'var(--gold)',marginTop:2}}>N/A — single premium</div>}
            </div>
            <div className="field"><label>Premium End Age</label><input type="number" value={form.premWholeLife?'':form.premEndAge||''} disabled={form.premWholeLife||form.premSingle} onChange={e=>set('premEndAge',e.target.value)} placeholder={form.premWholeLife?'Whole Life':form.premSingle?'N/A':'auto: start + term'} style={form.premSingle?{opacity:.4}:{}} />{form.premWholeLife && <div style={{fontSize:10,color:'var(--gold)'}}>Whole Life</div>}</div>
          </div>
          <div className="grid-3" style={{marginTop:4}}>
            <div className="field"><label>Inception Date</label><input type="date" value={form.inceptionDate} onChange={e=>set('inceptionDate',e.target.value)} /></div>
            <div className="field"><label>Maturity Date</label><input type="date" value={form.maturityDate} onChange={e=>set('maturityDate',e.target.value)} /></div>
            <div className="field"><label>Status</label><select value={form.status} onChange={e=>set('status',e.target.value)}><option value="inforce">In-force</option><option value="lapsed">Lapsed</option><option value="paid-up">Paid-up</option><option value="surrendered">Surrendered</option><option value="matured">Matured</option></select></div>
          </div>
        </div>
        )}

        {/* ═══ RETIREMENT / ANNUITY PLAN ═══ */}
        {isRetirement && (
          <div style={{marginTop:8,padding:14,background:'var(--bg3)',borderRadius:10,border:'1px solid rgba(45,106,79,.25)'}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--green2)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:12}}>Retirement / Annuity Plan</div>
            {(() => {
              const payYrs = form.premSingle ? 1 : (form.premWholeLife ? Math.max(65-(parseInt(form.premStartAge)||35),30) : (parseInt(form.premTerm)||25));
              const startAge = parseInt(form.premStartAge)||30;
              const payoutStart = parseInt(form.annuityStartAge)||65;
              const payoutEnd = parseInt(form.annuityEndAge)||85;
              const prem = parseFloat(form.annualPremium)||0;
              const totalPaid = form.premSingle ? prem : prem * payYrs;
              const accumYrs = Math.max(0, payoutStart - startAge - payYrs);
              const payoutYrs = payoutEnd - payoutStart;
              const annPayout = parseFloat(form.annuityPayout) || (parseFloat(form.annuityMonthly)||0)*12;
              const matSum = parseFloat(form.retMaturitySum)||0;
              const totalPayouts = annPayout * payoutYrs;
              // Auto-calculate yield if maturity sum + payout are known
              const totalReturns = totalPayouts + matSum;
              const autoYield = totalPaid > 0 && totalReturns > 0 && (payoutEnd - startAge) > 0
                ? ((Math.pow(totalReturns / totalPaid, 1/(payoutEnd - startAge)) - 1) * 100).toFixed(2)
                : null;
              return (<>
                <div style={{fontSize:11,background:'var(--bg2)',borderRadius:6,padding:'8px 12px',marginBottom:12,border:'1px solid var(--border)',display:'flex',flexWrap:'wrap',alignItems:'center',gap:4}}>
                  <span style={{fontWeight:600,color:'var(--green2)'}}>Pay {payYrs} yr{payYrs!==1?'s':''}</span>
                  <span style={{color:'var(--text3)'}}>→</span>
                  {accumYrs > 0 && <><span style={{fontWeight:600,color:'var(--orange)'}}>Wait {accumYrs} yr{accumYrs!==1?'s':''}</span><span style={{color:'var(--text3)'}}>→</span></>}
                  <span style={{fontWeight:600,color:'var(--blue2)'}}>Payout {payoutStart}–{payoutEnd} ({payoutYrs}yr)</span>
                  {totalPaid > 0 && <span style={{fontSize:9,color:'var(--text3)',marginLeft:4}}>· Total paid: ${Math.round(totalPaid).toLocaleString()}</span>}
                </div>

                {/* Payout Row */}
                <div className="resp-2col" style={{gap:8,marginBottom:8}}>
                  <div className="grid-2" style={{gap:6}}>
                    <div className="field"><label>Monthly Payout ($)</label><input type="number" value={form.annuityMonthly||''} onChange={e=>{set('annuityMonthly',e.target.value);set('annuityPayout',String((parseFloat(e.target.value)||0)*12));}} style={{fontWeight:600}} /></div>
                    <div className="field"><label>Annual Payout</label><input disabled value={annPayout ? '$'+Math.round(annPayout).toLocaleString()+'/yr' : '—'} style={{background:'var(--bg2)',fontWeight:600,color:'var(--gold)'}} /></div>
                  </div>
                  <div className="grid-2" style={{gap:6}}>
                    <div className="field"><label>Starts Age</label><input type="number" value={form.annuityStartAge||65} onChange={e=>set('annuityStartAge',e.target.value)} /></div>
                    <div className="field"><label>Ends Age</label><input type="number" value={form.annuityEndAge||85} onChange={e=>set('annuityEndAge',e.target.value)} /></div>
                  </div>
                </div>

                {/* Maturity + Yield Row */}
                <div className="resp-2col" style={{gap:8,marginBottom:8}}>
                  <div>
                    <div className="field"><label>Maturity Sum ($)</label>
                      <input type="number" value={form.retMaturitySum||''} onChange={e=>set('retMaturitySum',e.target.value)} placeholder="0 = fully consumed by payouts" />
                      <div style={{fontSize:9,color:'var(--text3)'}}>Amount returned at end · $0 means capital is fully drawn down through payouts</div>
                    </div>
                  </div>
                  <div>
                    <div className="field"><label>Yield % p.a.{autoYield && !form.retAccumYield ? ' ⚡' : ''}</label>
                      <input type="number" step="0.1" value={form.retAccumYield||''} onChange={e=>set('retAccumYield',e.target.value)}
                        placeholder={autoYield ? autoYield+'% (auto)' : '3.5'}
                        style={autoYield && !form.retAccumYield ? {borderColor:'var(--green2)',background:'rgba(91,168,160,.04)'} : {}} />
                      {autoYield && (
                        <div style={{fontSize:9,color:'var(--green2)',marginTop:2}}>
                          Auto: {autoYield}% p.a. ({annPayout>0?'$'+Math.round(totalPayouts).toLocaleString()+' payouts':''}
                          {matSum>0?' + $'+Math.round(matSum).toLocaleString()+' maturity':''} = ${Math.round(totalReturns).toLocaleString()} from ${Math.round(totalPaid).toLocaleString()} paid)
                          {!form.retAccumYield && <button style={{marginLeft:6,fontSize:9,padding:'1px 6px',borderRadius:4,background:'var(--green2)',color:'#0b0f1a',border:'none',cursor:'pointer',fontWeight:600}} onClick={()=>set('retAccumYield',autoYield)}>Use</button>}
                        </div>
                      )}
                      {!autoYield && <div style={{fontSize:9,color:'var(--text3)'}}>Enter payout + maturity sum to auto-calculate, or set manually</div>}
                    </div>
                  </div>
                </div>

                {/* Options Row */}
                <div className="grid-3" style={{gap:6}}>
                  <div className="field"><label>Reinvest Payouts?</label>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginTop:5,cursor:'pointer'}} onClick={()=>set('retPayoutMode',form.retPayoutMode==='reinvest'?'payout':'reinvest')}>
                      <input type="checkbox" checked={form.retPayoutMode==='reinvest'} readOnly style={{width:15,height:15,accentColor:'var(--green2)',pointerEvents:'none'}} />
                      <span style={{fontSize:11,fontWeight:600,color:form.retPayoutMode==='reinvest'?'var(--green2)':'var(--text3)'}}>{form.retPayoutMode==='reinvest'?'Yes':'No — paid out'}</span>
                    </div>
                  </div>
                  <div className="field"><label>Death Benefit</label>
                    <select value={form.retDeathBenefit||'cv'} onChange={e=>set('retDeathBenefit',e.target.value)} style={{fontSize:11}}>
                      <option value="cv">= Cash Value</option>
                      <option value="higher_cv_prem">Higher of CV or Premiums</option>
                      <option value="custom">Custom amount</option>
                    </select>
                  </div>
                  <div className="field"><label>Funding Source</label>
                    <select value={form.fundingSource||''} onChange={e=>set('fundingSource',e.target.value)} style={{fontSize:11}}>
                      <option value="">Cash</option>
                      <option value="SRS">SRS</option>
                      <option value="CPF OA">CPF OA</option>
                    </select>
                  </div>
                </div>
              </>);
            })()}
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,cursor:'pointer',userSelect:'none'}} onClick={()=>set('financed',!form.financed)}>
              <div style={{width:36,height:20,borderRadius:10,background:form.financed?'var(--orange)':'var(--border)',position:'relative',flexShrink:0}}>
                <div style={{position:'absolute',top:2,left:form.financed?18:2,width:16,height:16,borderRadius:'50%',background:'#fff',transition:'left .2s'}}></div>
              </div>
              <span style={{fontSize:12,fontWeight:600,color:form.financed?'var(--orange)':'var(--text3)'}}>Premium Financing (Interest-Only Loan)</span>
            </div>
            {form.financed && (
              <div style={{background:'rgba(245,158,11,.06)',borderRadius:7,padding:10,border:'1px solid rgba(245,158,11,.25)',marginBottom:8}}>

                <option value="lifetime">Lifetime Endowment</option>

                <div className="field"><label>Est. Yield % p.a.</label><input type="number" step="0.1" value={form.endYield||'4'} onChange={e=>set('endYield',e.target.value)} /></div>

                <div className="field"><label>Est. Yield % p.a.</label><input type="number" step="0.1" value={form.endYield||'4'} onChange={e=>set('endYield',e.target.value)} /><div style={{fontSize:10,color:'var(--text3)'}}>Growth after premiums paid</div></div>

              {(() => {
                const payYrs = parseInt(form.endPayYrs||form.premTerm)||10;

                const prem = parseFloat(form.annualPremium)||0;
                const calcCV = form.endGuaranteedCV > 0 ? parseFloat(form.endGuaranteedCV) : Math.round(prem * (Math.pow(1+r, payYrs)-1)/r);
                const bonus = parseFloat(form.endNonGuarBonus)||0;
                const total = calcCV + bonus;
                const totalPrem = prem * payYrs;
                const effYield = totalPrem > 0 && payYrs > 0 ? ((Math.pow(total/totalPrem, 1/((parseInt(form.endPolicyTerm)||payYrs)))-1)*100).toFixed(1) : '—';
                return (
                  <div style={{background:'var(--bg2)',borderRadius:8,padding:10,border:'1px solid var(--border)',textAlign:'center'}}>

                          </label>

                    <td><input type="number" value={rd.expiryAge||''} onChange={e=>{const riders=[...(form.riders||[])];riders[ri]={...riders[ri],expiryAge:e.target.value};set('riders',riders);}} style={{width:'100%',fontSize:11}} /></td>

              // Build premium projection for key ages
              const projectionAges = [];
              const startProj = Math.max(useAge, 25);
              for(let a = startProj; a <= 95; a += 5) projectionAges.push(a);
              // Ensure current age is first
              if(!projectionAges.includes(useAge)) projectionAges.unshift(useAge);
              projectionAges.sort((a,b)=>a-b);

                <div style={{fontSize:10,fontWeight:700,color:'var(--teal)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:12}}>

                      <th style={{textAlign:'left',padding:'6px 8px',minWidth:120}}>Component</th>

                      <th style={{textAlign:'right',padding:'6px 8px',whiteSpace:'nowrap'}}>MediSave</th>

                    </tr></thead>
                    <tbody>
                      <tr style={{borderTop:'1px solid var(--border)'}}>
                        <td style={{padding:'6px 10px'}}><strong>① MediShield Life</strong><div style={{fontSize:10,color:'var(--text3)'}}>CPF Board rate · ANB {anb} band · incl 9% GST · fully MediSave</div></td>
                        <td style={{textAlign:'right',padding:'6px 10px'}}>${bd.msl.toLocaleString()}</td>
                        <td style={{textAlign:'right',padding:'6px 10px',color:'var(--teal)',fontWeight:600}}>${bd.msl.toLocaleString()}</td>
                        <td style={{textAlign:'right',padding:'6px 10px',color:'var(--text3)'}}>—</td>
                      </tr>
                      <tr style={{borderTop:'1px solid var(--border)'}}>
                        <td style={{padding:'6px 10px'}}><strong>② ISP Additional Component</strong><div style={{fontSize:10,color:'var(--text3)'}}>Private coverage top-up · MediSave up to AWL ${bd.awl}/yr (ANB {anb})</div></td>

                              const projTotalPrem = Math.round(projMSL * premRatio);
                              const projAdditional = Math.max(0, projTotalPrem - projMSL);
                              const projMediSave = projMSL + Math.min(projAdditional, projAWL);
