<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--bg4:#243049;
--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
--border:#1e293b;--border2:#334155;
--blue:#3b82f6;--blue2:#60a5fa;--green:#10b981;--green2:#34d399;
--teal:#14b8a6;--purple:#8b5cf6;--orange:#f59e0b;--pink:#ec4899;
--red:#ef4444;--red2:#fca5a5;
--cat-protection:#3b82f6;--cat-savings:#10b981;--cat-health:#14b8a6;
--cat-investment:#8b5cf6;--cat-retirement:#f59e0b;--cat-maternity:#ec4899;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
#root{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
input,select,textarea{font-family:inherit;background:var(--bg2);color:var(--text);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:13px;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
select{cursor:pointer}
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#2563eb}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}.btn-secondary:hover{background:var(--bg4)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red2)}.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:5px 10px;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border)}
td{padding:8px 12px;font-size:13px;border-bottom:1px solid var(--border)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{padding:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:720px;width:95%;max-height:85vh;overflow-y:auto;padding:24px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px}
.field{margin-bottom:12px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;background:rgba(59,130,246,.12);color:var(--blue2)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
.fuzzy-alert{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:14px;margin:12px 0}
.fuzzy-alert h4{color:var(--orange);font-size:13px;margin-bottom:6px}
.gap-bar{height:8px;border-radius:4px;background:var(--bg4);overflow:hidden;position:relative}
.gap-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
@media(max-width:768px){
.grid-2,.grid-3{grid-template-columns:1fr}
.desktop-only{display:none!important}
}

/* ══════ AUTH GATE ══════ */
#auth-gate{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
#auth-gate .auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:400px;width:100%;padding:32px}
#auth-gate h2{font-size:22px;font-weight:700;margin-bottom:4px}
#auth-gate .auth-sub{font-size:13px;color:var(--text3);margin-bottom:20px}
#auth-gate .af{margin-bottom:14px}
#auth-gate .af label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px}
#auth-gate .af input{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
#auth-gate .af input:focus{border-color:var(--blue)}
#auth-gate .abtn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.abtn-p{background:var(--blue);color:#fff}.abtn-p:hover{background:#2563eb}
.abtn-s{background:transparent;color:var(--text2);border:1px solid var(--border2)!important;margin-top:8px}.abtn-s:hover{background:var(--bg3)}
.auth-msg{font-size:12px;padding:10px;border-radius:8px;margin-bottom:12px}
.auth-msg-error{background:rgba(239,68,68,.1);color:var(--red2);border:1px solid rgba(239,68,68,.2)}
.auth-msg-info{background:rgba(16,185,129,.1);color:var(--green2);border:1px solid rgba(16,185,129,.2)}
.auth-link{font-size:12px;color:var(--blue2);cursor:pointer;text-align:center;margin-top:12px}
.auth-pending{text-align:center;padding:20px 0}
.auth-pending-icon{font-size:40px;margin-bottom:12px}
.auth-pending-title{font-size:16px;font-weight:600;margin-bottom:6px}
.auth-pending-sub{font-size:13px;color:var(--text3);line-height:1.5}
#admin-fab{position:fixed;bottom:20px;right:20px;z-index:9998;background:var(--blue);color:#fff;border:none;border-radius:50%;width:48px;height:48px;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);display:none}
#admin-panel{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
#admin-panel .acard{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:640px;width:100%;max-height:80vh;overflow-y:auto;padding:24px}
#admin-panel .atitle{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
#admin-panel table{width:100%;border-collapse:collapse}
#admin-panel th{text-align:left;padding:8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border)}
#admin-panel td{padding:8px;font-size:13px;border-bottom:1px solid var(--border)}
.logout-pill{position:fixed;top:12px;right:16px;z-index:9998;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:500;cursor:pointer;color:var(--text3);font-family:inherit;display:none}
.logout-pill:hover{background:var(--bg4)}
</style>
</head>
<body>

<!-- ══════ AUTH GATE ══════ -->
<div id="auth-gate">
  <div class="auth-card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <span style="font-size:28px">🔍</span>
      <div><h2>PolicyLens</h2><div class="auth-sub">Sign in to access your portfolio</div></div>
    </div>
    <div id="auth-message" style="display:none"></div>
    <div id="auth-login">
      <div class="af"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com"></div>
      <div class="af"><label>Password</label><input type="password" id="auth-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')authLogin()"></div>
      <button class="abtn abtn-p" onclick="authLogin()">Sign In</button>
      <button class="abtn abtn-s" onclick="authShow('signup')">Create Account</button>
      <div class="auth-link" onclick="authShow('reset')">Forgot password?</div>
    </div>
    <div id="auth-signup" style="display:none">
      <div class="af"><label>Full Name</label><input type="text" id="auth-sname" placeholder="Your name"></div>
      <div class="af"><label>Email</label><input type="email" id="auth-semail" placeholder="you@example.com"></div>
      <div class="af"><label>Password</label><input type="password" id="auth-spass" placeholder="Min 6 characters"></div>
      <button class="abtn abtn-p" onclick="authSignup()">Create Account</button>
      <button class="abtn abtn-s" onclick="authShow('login')">Back to Sign In</button>
    </div>
    <div id="auth-reset" style="display:none">
      <div class="af"><label>Email</label><input type="email" id="auth-remail" placeholder="you@example.com"></div>
      <button class="abtn abtn-p" onclick="authReset()">Send Reset Link</button>
      <button class="abtn abtn-s" onclick="authShow('login')">Back to Sign In</button>
    </div>
    <div id="auth-pending" style="display:none">
      <div class="auth-pending">
        <div class="auth-pending-icon">⏳</div>
        <div class="auth-pending-title">Account Pending Approval</div>
        <div class="auth-pending-sub">Your account has been created and is awaiting admin approval.<br>You'll receive access once approved.</div>
      </div>
      <button class="abtn abtn-s" onclick="authLogout()">Sign Out</button>
    </div>
  </div>
</div>
<button class="logout-pill" id="logout-pill" onclick="authLogout()">Sign Out</button>
<button id="admin-fab" onclick="openAdmin()">👥</button>
<div id="admin-panel" onclick="if(event.target===this)closeAdmin()">
  <div class="acard">
    <div class="atitle"><span>User Management</span><button onclick="closeAdmin()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3)">×</button></div>
    <div id="admin-list">Loading…</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  SUPABASE AUTH — UPDATE THESE 3 VALUES
// ══════════════════════════════════════════════════
var SB_URL = 'https://mgbxxwoasrwlraffcvab.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nYnh4d29hc3J3bHJhZmZjdmFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIzMjMsImV4cCI6MjA5MDM1ODMyM30.kJoq_dded4cmW56ymY3NmvmhNxYKFKrwOxbSJvBIfc4';
var ADMIN_EMAILS = ['chungakwanc@gmail.com'];

var _sb=null,_user=null,_prof=null,_isAdmin=false;
function sb(){if(!_sb&&window.supabase){_sb=window.supabase.createClient(SB_URL,SB_KEY);window._sbClient=_sb;}return _sb;}
function authMsg(t,type){var e=document.getElementById('auth-message');e.className='auth-msg auth-msg-'+(type||'error');e.textContent=t;e.style.display='block';}
function authClear(){document.getElementById('auth-message').style.display='none';}
function authShow(v){authClear();['login','signup','reset','pending'].forEach(function(s){document.getElementById('auth-'+s).style.display=s===v?'':'none';});}

async function authLogin(){
  authClear();
  var e=document.getElementById('auth-email').value.trim(),p=document.getElementById('auth-pass').value;
  if(!e||!p)return authMsg('Please enter email and password');
  try {
    authMsg('Signing in…','info');
    var r=await sb().auth.signInWithPassword({email:e,password:p});
    if(r.error)return authMsg(r.error.message);
    await authCheck();
  } catch(err) {
    console.error('[Auth] Login error:', err);
    authMsg('Login error: '+err.message);
  }
}

async function authSignup(){
  authClear();
  var n=document.getElementById('auth-sname').value.trim(),e=document.getElementById('auth-semail').value.trim(),p=document.getElementById('auth-spass').value;
  if(!n||!e||!p)return authMsg('Please fill in all fields');
  if(p.length<6)return authMsg('Password must be at least 6 characters');
  var r=await sb().auth.signUp({email:e,password:p,options:{data:{full_name:n}}});
  if(r.error)return authMsg(r.error.message);
  if(r.data&&r.data.user)await sb().from('profiles').upsert({id:r.data.user.id,email:e,full_name:n,approved:false,role:'user'});
  authMsg('Account created! Awaiting admin approval.','info');
  setTimeout(function(){authShow('pending');},1500);
}

async function authReset(){
  authClear();
  var e=document.getElementById('auth-remail').value.trim();
  if(!e)return authMsg('Please enter your email');
  var r=await sb().auth.resetPasswordForEmail(e);
  if(r.error)return authMsg(r.error.message);
  authMsg('Reset link sent! Check your inbox.','info');
}

async function authLogout(){
  await sb().auth.signOut();
  _user=null;_prof=null;_isAdmin=false;
  document.getElementById('auth-gate').style.display='flex';
  document.getElementById('logout-pill').style.display='none';
  document.getElementById('admin-fab').style.display='none';
  authShow('login');
}

async function authCheck(){
  try {
  var s=sb();
  if(!s){authGrant();return;}
  var sess=await s.auth.getSession();
  if(!sess.data||!sess.data.session){document.getElementById('auth-gate').style.display='flex';return;}
  _user=sess.data.session.user;
  console.log('[PolicyLens Auth] User:', _user.email, 'UID:', _user.id);
  // Check if admin by email
  var emailIsAdmin = ADMIN_EMAILS.indexOf(_user.email)>=0;
  console.log('[PolicyLens Auth] Email is admin?', emailIsAdmin);
  // Fetch profile — use maybeSingle to avoid error on 0 rows
  var p=await s.from('profiles').select('*').eq('id',_user.id).maybeSingle();
  console.log('[PolicyLens Auth] Profile fetch:', p.error?p.error.message:'ok', p.data?'found':'not found');
  if(p.error){
    console.warn('[PolicyLens Auth] Profile fetch error:', p.error.message);
    if(emailIsAdmin){_isAdmin=true;console.log('[PolicyLens Auth] Admin bypass — granting access');authGrant();return;}
    authMsg('Database error: '+p.error.message);return;
  }
  if(!p.data){
    console.log('[PolicyLens Auth] No profile — creating new');
    var m=_user.user_metadata||{};
    var isAdm=emailIsAdmin;
    var ins=await s.from('profiles').insert({id:_user.id,email:_user.email,full_name:m.full_name||'',approved:isAdm,role:isAdm?'admin':'user'});
    console.log('[PolicyLens Auth] Insert result:', ins.error?ins.error.message:'ok');
    if(ins.error){
      // Insert failed (maybe RLS) — admin bypass
      if(isAdm){_isAdmin=true;authGrant();return;}
      authMsg('Profile creation failed: '+ins.error.message);return;
    }
    if(isAdm){_isAdmin=true;authGrant();return;}
    authShow('pending');return;
  }
  _prof=p.data;
  _isAdmin=emailIsAdmin||_prof.role==='admin';
  if(_isAdmin&&(!_prof.approved||_prof.role!=='admin')){
    await s.from('profiles').update({approved:true,role:'admin'}).eq('id',_user.id);
    _prof.approved=true;_prof.role='admin';
  }
  console.log('[PolicyLens Auth] Approved:', _prof.approved, 'Admin:', _isAdmin);
  if(!_prof.approved){authShow('pending');return;}
  authGrant();
  } catch(err) {
    console.error('[PolicyLens Auth] authCheck error:', err);
    // If admin email, grant access even on error
    if(_user && ADMIN_EMAILS.indexOf(_user.email)>=0){_isAdmin=true;authGrant();return;}
    authMsg('Auth error: '+err.message);
  }
}

function authGrant(){
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('logout-pill').style.display='block';
  if(_isAdmin)document.getElementById('admin-fab').style.display='flex';
}

// ── Admin ──
async function openAdmin(){document.getElementById('admin-panel').style.display='flex';await loadUsers();}
function closeAdmin(){document.getElementById('admin-panel').style.display='none';}
async function loadUsers(){
  var r=await sb().from('profiles').select('*').order('created_at',{ascending:false});
  if(r.error){document.getElementById('admin-list').innerHTML='<p style="color:var(--red2)">Error: '+r.error.message+'</p>';return;}
  var u=r.data||[],h='<table><thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Role</th><th>Joined</th><th>Action</th></tr></thead><tbody>';
  u.forEach(function(x){
    var ok=x.approved,col=ok?'var(--green2)':'var(--orange)',bg=ok?'rgba(16,185,129,.1)':'rgba(245,158,11,.1)';
    var d=x.created_at?new Date(x.created_at).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'}):'—';
    var uid=x.id;
    var btn;
    if(ok){
      btn='<button onclick="adminAct(&quot;'+uid+'&quot;,false)" style="background:rgba(239,68,68,.15);color:var(--red2);border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">Revoke</button>';
    } else {
      btn='<button onclick="adminAct(&quot;'+uid+'&quot;,true)" style="background:rgba(16,185,129,.15);color:var(--green2);border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">Approve</button>';
    }
    h+='<tr><td style="font-weight:500">'+(x.full_name||'—')+'</td><td style="font-size:12px">'+(x.email||'—')+'</td>'
      +'<td><span class="badge" style="background:'+bg+';color:'+col+'">'+(ok?'Approved':'Pending')+'</span></td>'
      +'<td style="font-size:11px">'+(x.role||'user')+'</td><td style="font-size:11px;color:var(--text3)">'+d+'</td><td>'+btn+'</td></tr>';
  });
  h+='</tbody></table><div style="font-size:11px;color:var(--text3);margin-top:12px">'+u.length+' users · '+u.filter(function(x){return x.approved}).length+' approved</div>';
  document.getElementById('admin-list').innerHTML=h;
}
async function adminAct(id,approve){await sb().from('profiles').update({approved:approve}).eq('id',id);await loadUsers();}

// ── Init ──
document.addEventListener('DOMContentLoaded',function(){
  if(SB_KEY==='DISABLED'){console.warn('PolicyLens: Supabase auth disabled');authGrant();return;}
  authCheck();
  var s=sb();if(s)s.auth.onAuthStateChange(function(ev){
    if(ev==='SIGNED_OUT'){document.getElementById('auth-gate').style.display='flex';document.getElementById('logout-pill').style.display='none';document.getElementById('admin-fab').style.display='none';}
  });
});
</script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo,createContext,useContext} = React;

// ═══════════════════════════════════════════════════════════════

const PREMIUM_STRUCTURES = ['Single Premium','Regular Premium','Limited Pay','Flexible Premium'];

// Gap analysis recommended coverage (SGD)
const RECOMMENDED_COVERAGE = {

  health: {isp:true,hospitalCash:200},
  savings: {targetFund:100000},
  retirement: {monthlyIncome:3000},

// ═══════════════════════════════════════════════════════════════
// REPOSITORY SEED DATA — from memory specs
// ═══════════════════════════════════════════════════════════════

// IndexedDB LAYER

const DB_NAME='PolicyLensV4';const DB_VER=1;
const openDB=()=>new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{
    const db=e.target.result;
    if(!db.objectStoreNames.contains('policies'))db.createObjectStore('policies',{keyPath:'id'});
    if(!db.objectStoreNames.contains('repository'))db.createObjectStore('repository',{keyPath:'id'});
    if(!db.objectStoreNames.contains('settings'))db.createObjectStore('settings',{keyPath:'key'});
  };
  r.onsuccess=e=>res(e.target.result);
  r.onerror=e=>rej(e.target.error);
});
const dbOp=(store,mode,fn)=>openDB().then(db=>new Promise((res,rej)=>{
  const tx=db.transaction(store,mode);const s=tx.objectStore(store);const r=fn(s);
  r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);
}));
const dbGetAll=store=>dbOp(store,'readonly',s=>s.getAll());
const dbPut=(store,val)=>dbOp(store,'readwrite',s=>s.put(val));
const dbDel=(store,id)=>dbOp(store,'readwrite',s=>s.delete(id));
const dbGet=(store,key)=>dbOp(store,'readonly',s=>s.get(key));

// ═══════════════════════════════════════════════════════════════
// FUZZY MATCHING
// ═══════════════════════════════════════════════════════════════

function fuzzyMatch(input, candidates, threshold=0.4) {
  const normalize = s => (s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  const ngrams = (s,n=2) => {const r=[];for(let i=0;i<=s.length-n;i++)r.push(s.slice(i,i+n));return r;};
  const similarity = (a,b) => {
    const na=normalize(a),nb=normalize(b);
    if(na===nb)return 1;
    if(!na||!nb)return 0;
    // Dice coefficient on bigrams
    const ga=ngrams(na),gb=ngrams(nb);
    const setB=new Set(gb);
    let inter=0;ga.forEach(g=>{if(setB.has(g))inter++});
    return (2*inter)/(ga.length+gb.length);
  };
  const results = candidates.map(c => {
    // Match on product name and product code
    const nameScore = similarity(input, c.productName);
    const codeScore = similarity(input, c.productCode || '');
    const insurerScore = similarity(input, c.insurer || '');
    const best = Math.max(nameScore, codeScore, insurerScore * 0.7);
    // Also check if input contains key tokens from product
    const inputLow = input.toLowerCase();
    const tokens = (c.productName + ' ' + (c.productCode||'')).toLowerCase().split(/\s+/);
    const tokenHits = tokens.filter(t => t.length > 2 && inputLow.includes(t)).length;
    const tokenBonus = tokenHits / Math.max(tokens.length, 1) * 0.3;
    return {...c, score: Math.min(best + tokenBonus, 1)};
  }).filter(c => c.score >= threshold).sort((a,b) => b.score - a.score);
  return results;
}

function getSB() {
  // Reuse the single Supabase client from the auth script — never create a second one
  if(window._sbClient) return window._sbClient;
  // Fallback: if auth script hasn't initialized yet, create and share
  if(window.supabase && typeof SB_URL !== 'undefined' && typeof SB_KEY !== 'undefined') {
    window._sbClient = window.supabase.createClient(SB_URL, SB_KEY);
    return window._sbClient;
  }
  return null;
}

async function sbRepoLoad() {
  const s = getSB();
  if(!s) return null;
  try {
    const {data,error} = await s.from('repository').select('*').order('created_at',{ascending:true});
    if(error) { console.warn('[Repo] Supabase load error:', error.message); return null; }
    return (data||[]).map(r => ({...r.data, _sbId:r.id, _createdBy:r.created_by}));
  } catch(e) { console.warn('[Repo] Supabase unreachable:', e.message); return null; }
}

async function sbRepoSave(item) {
  const s = getSB();
  if(!s) return false;
  const email = window._user?.email || '';
  const {error} = await s.from('repository').upsert({id:item.id, data:item, created_by:email});
  if(error) console.warn('[Repo] Save error:', error.message);
  return !error;
}

async function sbRepoDelete(id) {
  const s = getSB();
  if(!s) return false;
  const {error} = await s.from('repository').delete().eq('id', id);
  if(error) console.warn('[Repo] Delete error:', error.message);
  return !error;
}

function App() {
  const [tab, setTab] = useState('dashboard');
  const [policies, setPolicies] = useState([]);
  const [repo, setRepo] = useState([]);
  const [apiKey, setApiKey] = useState('');
  const [clientName, setClientName] = useState('');
  const [loading, setLoading] = useState(true);
  const [repoSource, setRepoSource] = useState('loading'); // 'supabase' | 'local' | 'loading'

  useEffect(() => {
    (async () => {
      // Load policies + settings from local IndexedDB
      const ps = await dbGetAll('policies');
      const sk = await dbGet('settings','apiKey').catch(()=>null);
      const cn = await dbGet('settings','clientName').catch(()=>null);
      setPolicies(ps || []);
      if(sk) setApiKey(sk.value||'');
      if(cn) setClientName(cn.value||'');

      // Load repository from Supabase (primary) with local fallback
      // Only try Supabase if user is authenticated (session exists)
      const s = getSB();
      let hasSession = false;
      if(s) { try { const sess = await s.auth.getSession(); hasSession = !!(sess?.data?.session); } catch(e){} }
      
      let repoData = hasSession ? await sbRepoLoad() : null;
      if(repoData !== null) {
        setRepoSource('supabase');
        // Merge: ensure seed products exist in Supabase (add missing, never overwrite)
        const sbIds = new Set(repoData.map(r=>r.id));
        let seeded = 0;
        for(const s of SEED_REPOSITORY) {
          if(!sbIds.has(s.id)) { await sbRepoSave(s); repoData.push(s); seeded++; }
        }
        if(seeded) console.log('[Repo] Seeded', seeded, 'missing products to Supabase');
        setRepo(repoData);
        console.log('[Repo] Loaded', repoData.length, 'products from Supabase');
      } else {
        // Fallback to local IndexedDB
        setRepoSource('local');
        const rs = await dbGetAll('repository').catch(()=>[]);
        if(!rs || rs.length === 0) {
          for(const s of SEED_REPOSITORY) await dbPut('repository', s);
          setRepo(SEED_REPOSITORY);
        } else {
          setRepo(rs);
        }
        console.log('[Repo] Fallback to local IndexedDB');
      }
      setLoading(false);
    })();
  }, []);

  // Re-check Supabase repo after auth state changes (user logs in)
  useEffect(() => {
    const s = getSB();
    if(!s) return;
    const {data:{subscription}} = s.auth.onAuthStateChange(async (event) => {
      if(event === 'SIGNED_IN') {
        console.log('[Repo] Auth signed in — reloading from Supabase');
        const data = await sbRepoLoad();
        if(data !== null) {
          setRepoSource('supabase');
          const sbIds = new Set(data.map(r=>r.id));
          for(const seed of SEED_REPOSITORY) {
            if(!sbIds.has(seed.id)) { await sbRepoSave(seed); data.push(seed); }
          }
          setRepo(data);
        }
      }
    });
    return () => subscription?.unsubscribe();
  }, []);

  const savePolicy = async (p) => {
    await dbPut('policies', p);
    setPolicies(prev => {const idx=prev.findIndex(x=>x.id===p.id);if(idx>=0){const n=[...prev];n[idx]=p;return n}return[...prev,p]});
  };
  const deletePolicy = async (id) => {
    await dbDel('policies', id);
    setPolicies(prev => prev.filter(x=>x.id!==id));
  };

  // Repo operations — Supabase primary, local fallback
  const saveRepo = async (item) => {
    if(repoSource==='supabase') {
      await sbRepoSave(item);
    } else {
      await dbPut('repository', item);
    }
    setRepo(prev => {const idx=prev.findIndex(x=>x.id===item.id);if(idx>=0){const n=[...prev];n[idx]=item;return n}return[...prev,item]});
  };
  const deleteRepo = async (id) => {
    if(repoSource==='supabase') {
      await sbRepoDelete(id);
    } else {
      await dbDel('repository', id);
    }
    setRepo(prev => prev.filter(x=>x.id!==id));
  };
  // Force refresh from Supabase
  const refreshRepo = async () => {
    const data = await sbRepoLoad();
    if(data !== null) { setRepo(data); setRepoSource('supabase'); return true; }
    return false;
  };

  const saveApiKey = async (k) => {
    setApiKey(k);
    await dbPut('settings',{key:'apiKey',value:k});
  };
  const saveClientName = async (n) => {
    setClientName(n);
    await dbPut('settings',{key:'clientName',value:n});
  };

  const ctx = {policies,repo,apiKey,clientName,savePolicy,deletePolicy,saveRepo,deleteRepo,refreshRepo,repoSource,saveApiKey,saveClientName,tab,setTab};

  if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}}>
    <div style={{textAlign:'center'}}><div style={{fontSize:28,marginBottom:8}}>🔍</div><div style={{color:'var(--text2)',fontSize:14}}>Loading PolicyLens…</div></div>
  </div>;

  return (
    <AppCtx.Provider value={ctx}>
      <Header />
      <div style={{flex:1,overflow:'auto',padding:'16px 20px 40px'}}>
        {tab==='dashboard' && <Dashboard />}
        {tab==='policies' && <Policies />}
        {tab==='repository' && <Repository />}
        {tab==='funds' && <FundLookup />}
        {tab==='report' && <ReportTab />}
        {tab==='settings' && <Settings />}
      </div>
    </AppCtx.Provider>
  );
}

  useEffect(() => {
    const draft = loadDraft();
    if(draft && draft.productName) setDraftBanner(true);
  }, []);

  const restoreDraft = () => {
    const draft = loadDraft();
    if(draft) { setEditing(draft); setShowForm(true); setDraftBanner(false); }
  };
  const dismissDraft = () => { clearDraft(); setDraftBanner(false); };

  const handleFormClose = () => { setShowForm(false); };
  const handleFormSave = (p) => { savePolicy(p); setShowForm(false); setScanResult(null); clearDraft(); };

  const filtered = filter==='all'?policies:policies.filter(p=>p.category===filter);

  // ── MIME type detection ──
  const MIME_MAP = {
    pdf:'application/pdf', xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    xls:'application/vnd.ms-excel', csv:'text/csv', doc:'application/msword',
    docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    html:'text/html', htm:'text/html', txt:'text/plain', rtf:'application/rtf',
    jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png', gif:'image/gif', webp:'image/webp', heic:'image/heic',
  };
  const getExt = name => (name||'').split('.').pop().toLowerCase();
  const getMime = file => file.type || MIME_MAP[getExt(file.name)] || 'application/octet-stream';
  const isImage = file => getMime(file).startsWith('image/');
  const isText = file => ['text/plain','text/html','text/csv'].includes(getMime(file));

  const EXTRACT_PROMPT = `You are a senior insurance policy analyst for a Singapore Financial Advisory firm. Extract ALL insurance policies from this document with institutional-level detail.

For EACH policy, return a JSON object with:

CORE: insurer, productName, policyName, policyNumber, category (protection/savings/health/investment/retirement/maternity), subType (Term Life/Whole Life/Universal Life (UL)/Indexed UL (IUL)/Variable UL (VUL)/Critical Illness/Personal Accident/Disability Income/Long-term Care/Endowment/Lifetime Endowment/Education Plan/Short-term Endowment/Integrated Shield Plan/Hospital Income/Investment-Linked Policy (ILP)/Retirement/Annuity/Maternity Coverage), currency (default SGD), sumAssured (number), annualPremium (number), premiumStructure (Single Premium/Regular Premium/Limited Pay/Flexible Premium), paymentMethod (Cash/MediSave/SRS/MediSave+Cash/CPF OA)

CLIENT: lifeInsured, gender (Male/Female), dob (YYYY-MM-DD), ageAtEntry (number), smoker (Non-smoker/Smoker), nationality (SC/PR/Foreigner), occupation

DATES: inceptionDate (YYYY-MM-DD), maturityDate (YYYY-MM-DD), status (inforce/lapsed/paid-up/surrendered/matured)

RIDERS: riders (JSON array). Each rider: {type (death/tpd/ci/eci/di/accidental/premium_waiver), sa (number — sum assured or monthly benefit for DI), premium (number — 0 if bundled), expiryAge (number), bundled (boolean — true if included in base premium), multiClaim (boolean — for CI/ECI)}
Extract EVERY benefit/rider listed in the document. Death & TI coverage = type "death". TPD = type "tpd". CI with sum = type "ci". Early CI = type "eci". Disability income = type "di" with sa as monthly amount. Accidental death = type "accidental".

SA MULTIPLIER: saMultiplier (number e.g. 2 for 2x), multiplierEndAge (number — age when multiplier reverts to 1x)

ISP (if Integrated Shield Plan): ispClass (A/B1/B2+), hasRider (boolean), riderList (rider name), riderPremium (number), ispDeductible (number), ispCoinsurance (number — percentage)

CASH VALUE: cashValue (number — current surrender/cash value if stated), cvGrowthRate (number — projected growth % p.a.), surrenderPeriod (number — years)

UL/IUL/VUL: creditingMechanism (fixed/indexed/client-directed), creditingRates {current (number), guaranteed (number)}, loyaltyBonus {rate (number), startYear (number)}

NOTES: notes (string — concise FC review meeting headline: 3-5 key numbers an adviser would present to a client. Include: key coverage amounts, premium breakdown, surrender value milestones, benefit triggers, exclusions, waiting periods, and any unique features)

If multiple policies found, return a JSON array. If single, return a JSON object.
Return ONLY valid JSON, no markdown fences, no explanation.`;

  // ── Stage camera photos ──
  const stagePhotos = (files) => {
    if(!files||!files.length) return;
    const newStaged = [];
    for(const f of Array.from(files)){
      newStaged.push({file:f, preview:URL.createObjectURL(f)});
    }
    setStaged(prev => [...prev, ...newStaged].slice(0,12));
  };
  const removeStaged = (idx) => {
    setStaged(prev => { const n=[...prev]; URL.revokeObjectURL(n[idx].preview); n.splice(idx,1); return n; });
  };
  const clearStaged = () => { staged.forEach(s=>URL.revokeObjectURL(s.preview)); setStaged([]); };

  // ── Extract from any files ──
  const handleExtract = async (files) => {
    if(!files||!files.length) return;
    if(!apiKey){alert('Set your Anthropic API key in Settings first');return;}
    setScanning(true);
    try {
      const content = [];
      for(const file of Array.from(files).slice(0,12)){
        const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});
        const mime = getMime(file);
        if(isImage(file)) content.push({type:'image',source:{type:'base64',media_type:mime,data:b64}});
        else if(isText(file)){ const t=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsText(file)}); content.push({type:'text',text:'[File: '+file.name+']\n'+t.slice(0,50000)}); }
        else content.push({type:'document',source:{type:'base64',media_type:mime,data:b64}});
      }
      content.push({type:'text',text:EXTRACT_PROMPT});
      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,messages:[{role:'user',content}]})
      });
      const data = await resp.json();
      if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
      const text = data.content?.[0]?.text||'';
      const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
      const arr = Array.isArray(parsed)?parsed:[parsed];
      if(arr.length===1){
        const p=arr[0]; const result = {...p,id:genId(),status:p.status||'inforce',sumAssured:parseFloat(p.sumAssured||p.faceAmount)||0,annualPremium:parseFloat(p.annualPremium)||0};
        setEditing(result); setShowForm(true); // Open edit form directly
      } else {
        if(confirm('Found '+arr.length+' policies. Import all?')){
          let c=0; for(const p of arr){await savePolicy({...p,id:genId(),status:p.status||'inforce',sumAssured:parseFloat(p.sumAssured||p.faceAmount)||0,annualPremium:parseFloat(p.annualPremium)||0,monthlyBenefit:parseFloat(p.monthlyBenefit)||0});c++;}
          alert('Imported '+c+' policies');
        } else { const p=arr[0]; const result={...p,id:genId(),status:p.status||'inforce',sumAssured:parseFloat(p.sumAssured||p.faceAmount)||0,annualPremium:parseFloat(p.annualPremium)||0}; setEditing(result);setShowForm(true); }
      }
      clearStaged(); setScanning(false);
    } catch(e){console.error(e);alert('Extraction error: '+e.message);setScanning(false);}
  };

  const cameraRef = useRef(null);
  const uploadRef = useRef(null);

  return (
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <h2 style={{fontSize:18,fontWeight:600}}>Policies</h2>
          <select value={filter} onChange={e=>setFilter(e.target.value)} style={{fontSize:12,padding:'4px 8px'}}>
            <option value="all">All Categories</option>
            {Object.entries(CATEGORIES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>{stagePhotos(e.target.files);e.target.value='';}} />
          <input ref={uploadRef} type="file" accept="image/*,.pdf,.xlsx,.xls,.csv,.doc,.docx,.html,.htm,.txt,.rtf" multiple style={{display:'none'}} onChange={e=>{handleExtract(Array.from(e.target.files));e.target.value='';}} />
          <button className="btn-secondary btn-sm" onClick={()=>cameraRef.current?.click()} disabled={scanning}>
            "📷" {staged.length>0?'('+staged.length+') Take More':'Camera'}
          </button>
          <button className="btn-secondary btn-sm" onClick={()=>uploadRef.current?.click()} disabled={scanning}>
            {scanning?'Extracting…':'📄 Upload'}
          </button>
          <button className="btn-primary btn-sm" onClick={()=>{setEditing(null);setScanResult(null);setShowForm(true)}}>+ Add</button>
        </div>
      </div>

      {/* Draft restore banner */}
      {draftBanner && !showForm && (
        <div className="card" style={{marginBottom:12,padding:14,borderLeft:'3px solid var(--orange)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'var(--orange)'}}>📝 Unsaved Draft</div>
              <div style={{fontSize:12,color:'var(--text3)'}}>You have an unfinished policy entry</div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn-primary btn-sm" onClick={restoreDraft}>Resume Editing</button>
              <button className="btn-danger btn-sm" onClick={dismissDraft}>Discard</button>
            </div>
          </div>
        </div>
      )}

      {/* Staged photos strip */}
      {staged.length > 0 && (
        <div className="card" style={{marginBottom:12,padding:14,borderLeft:'3px solid var(--blue)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:600}}>"📷" {staged.length} photo{staged.length>1?'s':''} staged</div>
            <div style={{display:'flex',gap:6}}>
              <button className="btn-secondary btn-sm" onClick={()=>cameraRef.current?.click()}>+ Take More</button>
              <button className="btn-primary btn-sm" onClick={()=>handleExtract(staged.map(s=>s.file))} disabled={scanning}>{scanning?'Extracting…':'✨ Extract All'}</button>
              <button className="btn-danger btn-sm" onClick={clearStaged}>Clear</button>
            </div>
          </div>
          <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>
            {staged.map((s,i) => (
              <div key={i} style={{position:'relative',flexShrink:0}}>
                <img src={s.preview} style={{width:72,height:72,objectFit:'cover',borderRadius:8,border:'1px solid var(--border2)'}} />
                <button onClick={()=>removeStaged(i)} style={{position:'absolute',top:-4,right:-4,width:18,height:18,borderRadius:'50%',background:'var(--red)',color:'#fff',border:'none',fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                <div style={{position:'absolute',bottom:2,left:2,background:'rgba(0,0,0,.6)',color:'#fff',fontSize:9,padding:'1px 4px',borderRadius:4}}>{i+1}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:10,color:'var(--text3)',marginTop:6}}>Take all the photos you need, then hit Extract All</div>
        </div>
      )}

      {/* Scan result preview */}
      {scanResult && !showForm && (
        <div className="card" style={{marginBottom:16,borderLeft:'3px solid var(--green)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'var(--green2)'}}>✅ Extracted Policy</div>
              <div style={{fontSize:15,fontWeight:600,marginTop:4}}>{scanResult.insurer} — {scanResult.productName}</div>
              <div style={{fontSize:12,color:'var(--text3)'}}>
                {scanResult.subType} • {scanResult.currency} {(scanResult.sumAssured||0).toLocaleString()} • Premium: {scanResult.currency} {(scanResult.annualPremium||0).toLocaleString()}
              </div>
              {scanResult.notes && <div style={{fontSize:11,color:'var(--text2)',marginTop:4,fontStyle:'italic'}}>{typeof scanResult.notes==='string'?scanResult.notes:JSON.stringify(scanResult.notes)}</div>}
            </div>
            <div style={{display:'flex',gap:4}}>
              <button className="btn-primary btn-sm" onClick={()=>{setEditing(scanResult);setShowForm(true)}}>Review & Save</button>
              <button className="btn-danger btn-sm" onClick={()=>setScanResult(null)}>×</button>
            </div>
          </div>
        </div>
      )}

      {filtered.length === 0 && !scanResult && staged.length===0 ? (
        <div className="card" style={{textAlign:'center',padding:40,color:'var(--text3)'}}>
          <div style={{fontSize:32,marginBottom:8}}>📋</div>
          <div>No policies {filter!=='all'?'in this category':''} yet</div>
          <div style={{fontSize:11,marginTop:8}}>📷 Camera (snap multiple) · 📄 Upload (PDF, Excel, Word, images) · + Add manually</div>
        </div>
      ) : (
        <div style={{overflowX:'auto'}}>
          <table>
            <thead><tr>
              <th>Policy</th><th>Category</th><th>Sub-type</th><th>Insurer</th><th>Currency</th><th>Sum Assured</th><th>Premium</th><th>Actions</th>
            </tr></thead>
            <tbody>
              {filtered.map(p => (
                <tr key={p.id}>
                  <td>
                    <div style={{fontWeight:500}}>{p.policyName || p.productName || 'Unnamed'}</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>{p.policyNumber || ''}</div>
                  </td>
                  <td><span className="badge" style={{background:`${catColor(p.category)}22`,color:catColor(p.category)}}>{CATEGORIES[p.category]?.label||p.category}</span></td>
                  <td style={{fontSize:12,color:'var(--text2)'}}>{p.subType||'-'}</td>
                  <td>{p.insurer||'-'}</td>
                  <td className="mono">{p.currency||'SGD'}</td>
                  <td className="mono">{fmt(p.sumAssured,p.currency||'SGD')}</td>
                  <td className="mono">{fmt(p.annualPremium,p.currency||'SGD')}</td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn-secondary btn-sm" onClick={()=>{setEditing(p);setShowForm(true)}}>Edit</button>
                      <button className="btn-danger btn-sm" onClick={()=>{if(confirm('Delete this policy?'))deletePolicy(p.id)}}>×</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {showForm && <PolicyFormModal policy={editing||scanResult} onSave={handleFormSave} onClose={handleFormClose} repo={repo} onSaveRepo={saveRepo} onDraftChange={saveDraft} onDraftClear={clearDraft} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// POLICY FORM MODAL — with sub-type fields & fuzzy matching
// ═══════════════════════════════════════════════════════════════

function PolicyFormModal({policy,onSave,onClose,repo,onSaveRepo,onDraftChange,onDraftClear}) {
  const isEdit = !!policy;
  const [tidying, setTidying] = useState(false);
  const [repoMatches, setRepoMatches] = useState(null); // fuzzy matches for repo save
  const [pendingRepoItem, setPendingRepoItem] = useState(null);
  const [form, setForm] = useState(policy || {
    id:genId(), category:'protection', subType:'', insurer:'', productName:'', policyName:'', policyNumber:'',
    currency:'SGD', sumAssured:'', annualPremium:'', premiumStructure:'Regular Premium',
    lifeInsured:'', gender:'', dob:'', ageAtEntry:'', smoker:'', nationality:'', occupation:'',
    inceptionDate:'', maturityDate:'', status:'inforce',
    // UL fields
    ulSubType:'', creditingMechanism:'', creditingRates:{current:'',guaranteed:''},
    loyaltyBonus:{rate:'',startYear:'',endDesc:''}, loanRate:'', elpPremium:'', qsiFlag:false,
    // IUL fields
    faAllocation:'', iaAllocation:'', indexSubAccounts:[],
    // VUL fields
    solvedPremium:'', assumedReturn:'', minLiquidity:'', investmentRisk:'client',
    // Maternity fields
    dualInsured:false, guaranteedIssuance:false, conversionRights:false,
    // Health
    ispClass:'', riderList:'',
    // General
    monthlyBenefit:'', fundingSource:'', paymentMethod:'',
    // Riders
    riders:[], saMultiplier:'1', multiplierEndAge:'',
    // ISP
    hasRider:false, riderPremium:'', ispDeductible:'', ispCoinsurance:'',
    // Cash value
    cashValue:'', cvGrowthRate:'', surrenderPeriod:'',
    // General
    notes:'', fundAllocations:[],
  });
  const [fuzzyMatches, setFuzzyMatches] = useState([]);
  const [showFuzzy, setShowFuzzy] = useState(false);

  const set = (k,v) => setForm(f=>{const nf={...f,[k]:v};if(onDraftChange)onDraftChange(nf);return nf});
  const setNested = (parent,k,v) => setForm(f=>{const nf={...f,[parent]:{...f[parent],[k]:v}};if(onDraftChange)onDraftChange(nf);return nf});

  const isUL = UL_FAMILY.includes(form.subType);
  const isIUL = form.subType === 'Indexed UL (IUL)';
  const isVUL = form.subType === 'Variable UL (VUL)';
  const isULPlain = form.subType === 'Universal Life (UL)';
  const isMaternity = form.category === 'maternity' || form.subType === 'Maternity';
  const isILP = form.subType === 'Investment-Linked Policy (Investment)';

  // Fuzzy match on product name change
  useEffect(() => {
    if(!form.productName || form.productName.length < 3 || isEdit) return;
    const matches = fuzzyMatch(form.productName + ' ' + form.insurer, repo);
    setFuzzyMatches(matches.slice(0,3));
    setShowFuzzy(matches.length > 0);
  }, [form.productName, form.insurer]);

  const handleSubmit = () => {
    if(onDraftClear)onDraftClear();
    onSave({...form, sumAssured:parseFloat(form.sumAssured)||0, annualPremium:parseFloat(form.annualPremium)||0, monthlyBenefit:parseFloat(form.monthlyBenefit)||0});
  };

  const [formScanning, setFormScanning] = useState(false);
  const formCamRef = useRef(null);
  const formUploadRef = useRef(null);

  // ── Scan into existing form — merges AI-extracted fields ──
  const scanIntoForm = async (files) => {
    if(!files||!files.length) return;
    const ak = await dbGet('settings','apiKey').catch(()=>null);
    if(!ak?.value){alert('Set Anthropic API key in Settings first');return;}
    setFormScanning(true);
    try {
      const content = [];
      for(const file of Array.from(files).slice(0,8)){
        const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});
        const mime = file.type||'image/jpeg';
        if(mime.startsWith('image/')) content.push({type:'image',source:{type:'base64',media_type:mime,data:b64}});
        else content.push({type:'document',source:{type:'base64',media_type:mime,data:b64}});
      }
      content.push({type:'text',text:`Extract insurance policy details from this document. Return a JSON object with ALL fields you can find. Core: insurer, productName, policyNumber, category, subType, currency, sumAssured (number), annualPremium (number), premiumStructure, paymentMethod, lifeInsured, gender, dob, ageAtEntry, smoker, nationality, occupation, inceptionDate, maturityDate, status. Riders: riders (array of {type:death/tpd/ci/eci/di/accidental/premium_waiver, sa:number, premium:number, expiryAge:number, bundled:boolean, multiClaim:boolean}). SA: saMultiplier (number), multiplierEndAge (number). ISP: ispClass, hasRider, riderList, riderPremium, ispDeductible, ispCoinsurance. Cash: cashValue, cvGrowthRate, surrenderPeriod. Notes: notes (FC review meeting headline — key numbers, riders, triggers). Return ONLY valid JSON, no markdown.`});
      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json','x-api-key':ak.value,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content}]})
      });
      const data = await resp.json();
      if(data.error) throw new Error(data.error.message);
      const text = data.content?.[0]?.text||'';
      const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
      // Merge: only overwrite non-empty fields, confirm if overwriting existing values
      const overwrites = [];
      const updates = {};
      Object.entries(parsed).forEach(([k,v])=>{
        if(v===null||v===undefined||v==='') return;
        if(k==='faceAmount') k='sumAssured'; // backwards compat
        const current = form[k];
        if(current && current!=='' && current!==0 && current!=='0' && JSON.stringify(current)!==JSON.stringify(v)){
          overwrites.push(k);
        }
        updates[k] = typeof v==='number'?v:(typeof v==='string'?v:JSON.stringify(v));
      });
      if(overwrites.length > 0){
        const proceed = confirm('Scanned data will update these fields that already have values:\n\n• '+overwrites.join('\n• ')+'\n\nProceed?');
        if(!proceed){setFormScanning(false);return;}
      }
      setForm(f=>({...f,...updates}));
      if(onDraftChange) onDraftChange({...form,...updates});
      alert('Form updated with scanned data!');
    } catch(e){alert('Scan error: '+e.message);}
    setFormScanning(false);
  };

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 style={{fontSize:16,fontWeight:600}}>{isEdit?'Edit Policy':'Add Policy'}</h3>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <input ref={formCamRef} type="file" accept="image/*" capture="environment" multiple style={{display:'none'}} onChange={e=>{scanIntoForm(e.target.files);e.target.value='';}} />
            <input ref={formUploadRef} type="file" accept="image/*,.pdf,.xlsx,.xls,.csv,.doc,.docx,.html,.htm,.txt" multiple style={{display:'none'}} onChange={e=>{scanIntoForm(e.target.files);e.target.value='';}} />
            <button className="btn-secondary btn-sm" onClick={()=>formCamRef.current?.click()} disabled={formScanning}>
              {formScanning?'Scanning…':'📷'}
            </button>
            <button className="btn-secondary btn-sm" onClick={()=>formUploadRef.current?.click()} disabled={formScanning}>
              {formScanning?'…':'📄'}
            </button>
            <button onClick={onClose} style={{background:'none',color:'var(--text3)',fontSize:20,marginLeft:4}}>×</button>
          </div>
        </div>

        {/* Fuzzy match alert */}
        {showFuzzy && !isEdit && (
          <div className="fuzzy-alert">
            <h4>🔍 Possible Repository Matches</h4>
            <p style={{fontSize:12,color:'var(--text2)',marginBottom:8}}>These products look similar. Variations are shown — review before proceeding.</p>
            {fuzzyMatches.map(m => (
              <div key={m.id} style={{background:'var(--bg3)',borderRadius:8,padding:10,marginBottom:6,fontSize:12}}>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontWeight:600}}>{m.insurer} — {m.productName}</span>
                  <span className="mono" style={{color:'var(--orange)'}}>{Math.round(m.score*100)}% match</span>
                </div>
                <div style={{color:'var(--text3)',marginTop:2}}>
                  {m.productCode} • {m.currency} • {CATEGORIES[m.category]?.label} • {m.subType}
                </div>
                {/* Show variations */}
                {form.insurer && form.insurer.toLowerCase()!==m.insurer.toLowerCase() && (
                  <div style={{color:'var(--orange)',marginTop:4,fontSize:11}}>⚠ Insurer differs: you entered "{form.insurer}", repo has "{m.insurer}"</div>
                )}
                {form.currency && form.currency!==m.currency && (

              if(!ak?.value){alert('Set Anthropic API key in Settings first');return;}
              setTidying(true);
              try{
                const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ak.value,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
                  body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
                    messages:[{role:'user',content:`You are an insurance product analyst for Singapore Financial Consultants. Clean up and structure these rough policy notes into a concise FC reference card. Keep key numbers, conditions, exclusions, and premium details. Be factual and brief. Return ONLY the cleaned text, no headers or labels.\n\nRaw notes:\n${form.notes}`}]})});
                const d=await r.json();
                const t=d.content?.[0]?.text||form.notes;
                set('notes',t);
              }catch(e){alert('AI error: '+e.message)}

                notes:form.notes,features:[],charges:{},
                ...(form.creditingMechanism?{ulSubType:form.subType==='Variable UL (VUL)'?'VUL':form.subType==='Indexed UL (IUL)'?'IUL':'UL',creditingMechanism:form.creditingMechanism}:{}),

              const matches = fuzzyMatch(form.insurer+' '+form.productName, repo, 0.35);

                setRepoMatches(matches.slice(0,3));

                    <button className="btn-secondary btn-sm" onClick={()=>{
                      // Combine: merge notes, keep existing + add new info
                      const combined = {...m, notes: (m.notes||'')+'\n\n--- Updated ---\n'+(pendingRepoItem.notes||''),
                        ...(pendingRepoItem.creditingRates?.current?{creditingRates:pendingRepoItem.creditingRates}:{}),
                        ...(pendingRepoItem.loyaltyBonus?.rate?{loyaltyBonus:pendingRepoItem.loyaltyBonus}:{}),
                      };
                      delete combined.score;
                      onSaveRepo(combined);
                      setRepoMatches(null);setPendingRepoItem(null);
                      alert('Combined with existing entry!');
                    }}>🔀 Combine</button>
                    <button className="btn-secondary btn-sm" onClick={()=>{
                      // Overwrite: replace existing with new
                      const overwritten = {...pendingRepoItem, id:m.id};
                      onSaveRepo(overwritten);
                      setRepoMatches(null);setPendingRepoItem(null);
                      alert('Overwritten!');
                    }}>↻ Overwrite</button>
                  </div>
                </div>
              ))}
              <div style={{display:'flex',gap:6,marginTop:8}}>
                <button className="btn-primary btn-sm" onClick={()=>{
                  onSaveRepo(pendingRepoItem);
                  setRepoMatches(null);setPendingRepoItem(null);
                  alert('Saved as new entry!');
                }}>➕ Save as New Anyway</button>
                <button className="btn-secondary btn-sm" onClick={()=>{setRepoMatches(null);setPendingRepoItem(null);}}>Cancel</button>
              </div>
            </div>
          )}
        </div>

        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:16}}>
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={handleSubmit}>{isEdit?'Save Changes':'Add Policy'}</button>
        </div>
      </div>
    </div>
  );
}

function FundAllocationEditor({allocations,onChange}) {
  const add = () => onChange([...allocations, {fundName:'',pct:'',riskRating:''}]);
  const update = (i,k,v) => {const n=[...allocations];n[i]={...n[i],[k]:v};onChange(n)};
  const remove = i => onChange(allocations.filter((_,idx)=>idx!==i));
  // Lookup from fund DB — FUND_DB format: [name, type, region, sector, risk, date, isin]
  const lookup = (i,name) => {
    if(!name || name.length < 3) return;
    const q = name.toLowerCase();
    const match = FUND_DB.find(f => f[0].toLowerCase().includes(q));
    if(match) update(i,'riskRating',match[4]);
  };

  return (
    <div>
      {allocations.map((a,i) => (
        <div key={i} style={{display:'flex',gap:8,marginBottom:6,alignItems:'center'}}>
          <input style={{flex:2}} value={a.fundName} onChange={e=>{update(i,'fundName',e.target.value);lookup(i,e.target.value)}} placeholder="Fund name" />
          <input style={{width:70}} value={a.pct} onChange={e=>update(i,'pct',e.target.value)} placeholder="%" type="number" />
          <span className="mono" style={{width:40,textAlign:'center',color:a.riskRating>=7?'var(--red2)':a.riskRating>=5?'var(--orange)':'var(--green2)'}}>{a.riskRating||'-'}</span>
          <button className="btn-danger btn-sm" onClick={()=>remove(i)}>×</button>
        </div>
      ))}
      <button className="btn-secondary btn-sm" onClick={add}>+ Add Fund</button>
      <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Risk ratings auto-looked up from {FUND_DB.length.toLocaleString()} instruments (iFAST universe)</div>
    </div>
  );
}

// REPOSITORY — Browse & manage product database

function Repository() {
  const {repo,saveRepo,deleteRepo,refreshRepo,repoSource} = useContext(AppCtx);
  const [search, setSearch] = useState('');
  const [expanded, setExpanded] = useState(null);
  const [editingRepo, setEditingRepo] = useState(null); // id of item being edited
  const [editNotes, setEditNotes] = useState('');
  const [comment, setComment] = useState('');
  const [syncing, setSyncing] = useState(false);

  // Get current user info from auth globals
  const userName = (window._prof?.full_name || window._user?.email || 'Unknown');
  const userEmail = (window._user?.email || '');
  const isAdmin = window._isAdmin || false;

  const filtered = search ? repo.filter(r =>
    (r.productName+' '+r.insurer+' '+(r.productCode||'')).toLowerCase().includes(search.toLowerCase())
  ) : repo;

  const addFootprint = (action) => ({name:userName,email:userEmail,date:new Date().toISOString(),action});

  // Admin: save full edit with footprint
  const handleAdminSave = (r) => {
    const history = [...(r.editHistory||[]), addFootprint('Edited notes')];
    saveRepo({...r, notes:editNotes, editHistory:history});
    setEditingRepo(null);
  };

  // Advisor: add comment with footprint
  const handleAddComment = (r) => {
    if(!comment.trim()) return;
    const existing = r.notes || '';
    const newNotes = existing + '\n\n💬 ' + userName + ' (' + new Date().toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'}) + '):\n' + comment.trim();
    const history = [...(r.editHistory||[]), addFootprint('Added comment')];
    saveRepo({...r, notes:newNotes, editHistory:history});
    setComment('');
  };

  return (
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:600}}>Product Repository</h2>
          <p style={{fontSize:12,color:'var(--text3)'}}>
            {repo.length} products • {repoSource==='supabase'?'☁️ Shared (Supabase)':'💾 Local only'} • {isAdmin?'Admin: full edit + delete':'Advisor: add comments'}
          </p>
        </div>
        <div style={{display:'flex',gap:6}}>
          {refreshRepo && <button className="btn-secondary btn-sm" disabled={syncing} onClick={async()=>{setSyncing(true);const ok=await refreshRepo();setSyncing(false);if(ok)alert('Synced '+repo.length+' products from cloud');else alert('Sync failed — check connection');}}>
            {syncing?'Syncing…':'🔄 Sync'}
          </button>}
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search products…" style={{width:200}} />
        </div>
      </div>

      <div style={{display:'grid',gap:12}}>
        {filtered.map(r => (
          <div key={r.id} className="card card-sm" style={{borderLeft:`3px solid ${catColor(r.category)}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',cursor:'pointer'}} onClick={()=>{setExpanded(expanded===r.id?null:r.id);setEditingRepo(null);setComment('');}}>
              <div>
                <div style={{fontWeight:600,fontSize:14}}>{r.insurer} — {r.productName}</div>
                <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>
                  {r.productCode} • {r.currency} • <span className="badge" style={{background:`${catColor(r.category)}22`,color:catColor(r.category)}}>{r.subType}</span>
                </div>
              </div>
              <span style={{color:'var(--text3)',fontSize:16}}>{expanded===r.id?'▾':'▸'}</span>
            </div>

            {expanded===r.id && (
              <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}>
                {/* UL details */}
                {r.ulSubType && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>UL Details ({r.ulSubType})</div>
                    <div style={{fontSize:12,color:'var(--text2)',display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
                      <span>Crediting: {r.creditingMechanism}</span>
                      {r.creditingRates && <span>Rates: {r.creditingRates.current}% / {r.creditingRates.guaranteed}% guar.</span>}
                      {r.loyaltyBonus && <span>Loyalty: {r.loyaltyBonus.rate}% from Yr{r.loyaltyBonus.startYear}</span>}
                      {r.solvedPremium && <span>Solved Premium: min {r.solvedPremium.currency} {r.solvedPremium.min?.toLocaleString()}</span>}
                      {r.loanRate && <span>Loan: {r.loanRate}</span>}
                      {r.faMinGuaranteed && <span>FA Min Guar: {r.faMinGuaranteed}%</span>}
                    </div>
                  </div>
                )}
                {/* Index sub-accounts */}
                {r.indexSubAccounts && r.indexSubAccounts.length>0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Index Sub-Accounts</div>
                    {r.indexSubAccounts.map((idx,i)=>(
                      <div key={i} className="tag" style={{marginRight:4,marginBottom:4}}>
                        {idx.name}{idx.capExample ? ` (cap ${idx.capExample}%)`:''} — {idx.crediting}
                      </div>
                    ))}
                  </div>
                )}
                {/* Maternity */}
                {r.maternityDetails && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Maternity Details</div>
                    <div style={{fontSize:12,color:'var(--text2)'}}>
                      <div>Dual insured: {r.maternityDetails.dualInsured?'Yes – '+r.maternityDetails.dualInsuredDesc:'No'}</div>
                      <div>Guaranteed issuance: {r.maternityDetails.guaranteedIssuance?r.maternityDetails.guaranteedIssuanceDesc:'No'}</div>
                      <div>Conversion rights: {r.maternityDetails.conversionRights?r.maternityDetails.conversionRightsDesc:'No'}</div>
                      {r.maternityDetails.benefitTypes?.map((b,i)=>(
                        <div key={i} style={{marginTop:4}}>• {b.name} ({b.payoutType}){b.amountPerDay?` $${b.amountPerDay}/day, max ${b.maxDays} days`:''}</div>
                      ))}
                    </div>
                  </div>
                )}
                {/* Charges */}
                {r.charges && Object.keys(r.charges).length>0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Charges</div>
                    <div style={{fontSize:12,color:'var(--text2)'}}>
                      {Object.entries(r.charges).map(([k,v])=><div key={k}>• {k}: {typeof v==='object'?v.desc:v}</div>)}
                    </div>
                  </div>
                )}
                {/* Features */}
                {r.features && r.features.length>0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Features</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {r.features.map((f,i)=><span key={i} className="tag">{f}</span>)}
                    </div>
                  </div>
                )}

                {/* Notes — with edit/comment based on role */}
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Notes & Comments</div>
                  {editingRepo===r.id && isAdmin ? (
                    <div>
                      <textarea rows={5} value={editNotes} onChange={e=>setEditNotes(e.target.value)} style={{width:'100%',fontSize:12}} />
                      <div style={{display:'flex',gap:6,marginTop:6}}>
                        <button className="btn-primary btn-sm" onClick={()=>handleAdminSave(r)}>Save Edit</button>
                        <button className="btn-secondary btn-sm" onClick={()=>setEditingRepo(null)}>Cancel</button>
                      </div>
                    </div>
                  ) : (
                    <div>
                      {r.notes ? <div style={{fontSize:12,color:'var(--text2)',whiteSpace:'pre-line'}}>{r.notes}</div> : <div style={{fontSize:12,color:'var(--text3)',fontStyle:'italic'}}>No notes yet</div>}
                      {isAdmin && <button className="btn-secondary btn-sm" style={{marginTop:6}} onClick={e=>{e.stopPropagation();setEditingRepo(r.id);setEditNotes(r.notes||'')}}>✏️ Edit Notes</button>}
                    </div>
                  )}
                  {/* Advisor comment box — always visible */}
                  <div style={{marginTop:8}}>
                    <div style={{display:'flex',gap:6}}>
                      <input value={expanded===r.id?comment:''} onChange={e=>setComment(e.target.value)} placeholder="Add a comment…" style={{flex:1,fontSize:12,padding:'6px 10px'}} onKeyDown={e=>{if(e.key==='Enter')handleAddComment(r)}} />
                      <button className="btn-secondary btn-sm" onClick={()=>handleAddComment(r)} disabled={!comment.trim()}>💬 Comment</button>
                    </div>
                  </div>
                </div>

                {/* Edit history trail */}
                {r.editHistory && r.editHistory.length>0 && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',marginBottom:4}}>Edit History</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>
                      {r.editHistory.slice(-5).reverse().map((h,i)=>(
                        <div key={i} style={{marginBottom:2}}>
                          {h.name} — {h.action} — {new Date(h.date).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
                        </div>
                      ))}
                      {r.editHistory.length>5 && <div style={{fontStyle:'italic'}}>…and {r.editHistory.length-5} earlier edits</div>}
                    </div>
                  </div>
                )}

                {/* Admin-only actions */}
                {isAdmin && (
                  <div style={{marginTop:10,paddingTop:8,borderTop:'1px solid var(--border)',display:'flex',gap:6}}>
                    <button className="btn-danger btn-sm" onClick={e=>{e.stopPropagation();if(confirm('Delete "'+r.insurer+' — '+r.productName+'" from repository?'))deleteRepo(r.id)}}>Delete</button>
                  </div>
                )}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function FundLookup() {

  const [acFilter, setAcFilter] = useState('all');
  const [regionFilter, setRegionFilter] = useState('all');
  const [sectorFilter, setSectorFilter] = useState('all');
  const [riskFilter, setRiskFilter] = useState('all');
  const [page, setPage] = useState(0);
  const PAGE_SIZE = 50;

  // ── Exact FundLens label mappings ──
  const ASSET_LABELS = {
    equity:'Equity',etf:'ETF/Index',bond:'Bond',bond_govt:'Govt Bond',bond_corp:'IG Corp Bond',
    bond_hy:'High Yield',structured:'Structured',reit:'REIT',property:'Property Fund',
    cash:'Cash',money_mkt:'Money Market',mixed:'Multi-Asset',alternatives:'Alternatives',
    commodities:'Commodities',crypto:'Crypto',other:'Other'
  };
  const REGION_LABELS = {sg:'Singapore',us:'US',global:'Global',asia:'Asia ex-JP',em:'Emerging Mkt',eu:'Europe',jp:'Japan',au:'Australia',cn:'China',other:'Other'};
  const SECTOR_LABELS = {
    multi_sector:'Multi-Sector / Diversified',
    tech:'Technology',healthcare:'Healthcare',financials:'Financials',realestate:'Real Estate',
    energy:'Energy & Oil/Gas',industrials:'Industrials',consumer_disc:'Consumer Discretionary',
    consumer_staple:'Consumer Staples',materials:'Materials & Chemicals',utilities:'Utilities',
    telecom:'Telecom & Media',biotech:'Biotech & Life Sciences',pharma:'Pharmaceuticals',
    semiconductor:'Semiconductors & Chips',ai_robotics:'AI & Robotics',cybersecurity:'Cybersecurity',
    cloud_saas:'Cloud & SaaS',fintech:'Fintech & Digital Payments',greentech:'Clean Energy & Green Tech',
    infra:'Infrastructure',logistics:'Logistics & Supply Chain',luxury:'Luxury & Premium Brands',
    media:'Media & Entertainment',auto:'Automotive & EV',aerospace:'Aerospace & Defence',
    mining:'Mining & Resources',agri:'Agriculture & Food',water:'Water & Sustainability',
    insurance:'Insurance',banking:'Banking & Wealth Mgmt',private_eq:'Private Equity / Alternatives',
    hedge:'Hedge / Absolute Return',commodities:'Commodities',gold:'Gold & Precious Metals',
    crypto_block:'Crypto & Blockchain',esg_impact:'ESG / Impact Investing',shariah:'Shariah-Compliant',
    dividend_inc:'Dividend & Income',bonds_fi:'Bonds & Fixed Income',money_mkt:'Money Market / Cash',
    infra_util:'Infrastructure & Utilities',resources:'Resources',other:'Other / Unclassified'
  };
  const AC_COLORS = {
    equity:'#1a56db',etf:'#0b9488',bond:'#5a6070',bond_govt:'#4a5568',bond_corp:'#718096',
    bond_hy:'#e67e22',structured:'#c84b4b',reit:'#c8820a',property:'#d4a017',cash:'#8a8f99',
    money_mkt:'#a0aec0',mixed:'#6d3fa0',alternatives:'#2c7a7b',commodities:'#d69e2e',
    crypto:'#805ad5',other:'#718096'
  };
  const GEO_COLORS = {
    sg:'#0b6b5c',us:'#1a56db',global:'#6d3fa0',asia:'#c8820a',em:'#c84b4b',
    eu:'#2c7a7b',jp:'#e67e22',au:'#38a169',cn:'#e53e3e',other:'#8a8f99'
  };
  const RISK_COLORS = ['#2d9cdb','#2db9a7','#48bb78','#68d391','#f6e05e','#f6ad55','#fc8181','#f56565','#e53e3e','#c53030'];

  // ── Derive filter options from data ──
  const assetClasses = useMemo(()=>[...new Set(FUND_DB.map(f=>f[1]))].sort(),[]);
  const regions = useMemo(()=>[...new Set(FUND_DB.map(f=>f[2]))].sort(),[]);
  const sectors = useMemo(()=>[...new Set(FUND_DB.map(f=>f[3]))].sort(),[]);

  const filtered = useMemo(() => {
    return FUND_DB.filter(f => {
      if(acFilter!=='all' && f[1]!==acFilter) return false;
      if(regionFilter!=='all' && f[2]!==regionFilter) return false;
      if(sectorFilter!=='all' && f[3]!==sectorFilter) return false;
      if(riskFilter!=='all') {
        const r = f[4];
        if(riskFilter==='low' && r>3) return false;
        if(riskFilter==='med' && (r<4||r>6)) return false;
        if(riskFilter==='high' && (r<7||r>8)) return false;
        if(riskFilter==='vhigh' && r<9) return false;
      }
      if(search) {
        const q = search.toLowerCase();
        if(!f[0].toLowerCase().includes(q) && !(f[6]||'').toLowerCase().includes(q)) return false;
      }
      return true;
    });
  }, [search,acFilter,regionFilter,sectorFilter,riskFilter]);

  useEffect(() => setPage(0), [search,acFilter,regionFilter,sectorFilter,riskFilter]);

  const paged = filtered.slice(page*PAGE_SIZE, (page+1)*PAGE_SIZE);
  const totalPages = Math.ceil(filtered.length/PAGE_SIZE);

  const riskColor = r => RISK_COLORS[Math.max(0,Math.min(9,(r||1)-1))];

  const acBadgeColor = t => AC_COLORS[t]||'#718096';

  const acCounts = useMemo(() => {
    const m={};FUND_DB.forEach(f=>{m[f[1]]=(m[f[1]]||0)+1});return m;

  const regionCounts = useMemo(() => {
    const m={};FUND_DB.forEach(f=>{m[f[2]]=(m[f[2]]||0)+1});return m;

    <div className="fade-in">
