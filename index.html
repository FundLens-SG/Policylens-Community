<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0b0f1a;--bg2:#111827;--bg3:#171f2e;--bg4:#1f2a3d;
--text:#e8dcc8;--text2:#a39580;--text3:#6b6050;
--border:#1e2738;--border2:#2a3548;
--gold:#d4a96a;--gold2:#e8c992;--gold3:#b8935a;--gold-dim:rgba(212,169,106,.12);
--green:#34d399;--green2:#6ee7b7;--green-dim:rgba(52,211,153,.12);
--red:#ef5350;--red2:#fca5a5;--red-dim:rgba(239,83,80,.1);
--blue:#5b8fd9;--blue2:#7daaec;--purple:#9d8abf;--orange:#d4a96a;--teal:#5ba8a0;--pink:#c97b9a;
--cat-protection:#5b8fd9;--cat-savings:#5ba8a0;--cat-health:#c97b9a;
--cat-investment:#9d8abf;--cat-retirement:#d4a96a;--cat-maternity:#c97b9a;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
#root{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
input,select,textarea{font-family:inherit;background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:13px;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder{color:var(--text3)}
select{cursor:pointer}
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--gold);color:#0b0f1a;font-weight:600}.btn-primary:hover{background:var(--gold2)}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}.btn-secondary:hover{background:var(--bg4);border-color:var(--gold3)}
.btn-danger{background:var(--red-dim);color:var(--red2)}.btn-danger:hover{background:rgba(239,83,80,.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border)}
td{padding:8px 12px;font-size:13px;border-bottom:1px solid var(--border)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{padding:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:720px;width:95%;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px}
.field{margin-bottom:12px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;background:var(--gold-dim);color:var(--gold)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
.fuzzy-alert{background:var(--gold-dim);border:1px solid rgba(212,169,106,.25);border-radius:10px;padding:14px;margin:12px 0}
.fuzzy-alert h4{color:var(--gold);font-size:13px;margin-bottom:6px}
.gap-bar{height:8px;border-radius:4px;background:var(--bg4);overflow:hidden;position:relative}
.gap-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
@media(max-width:768px){
.grid-2,.grid-3{grid-template-columns:1fr}
.desktop-only{display:none!important}
}

#auth-gate{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
#auth-gate .auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:400px;width:100%;padding:32px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
#auth-gate h2{font-size:22px;font-weight:700;margin-bottom:4px;color:var(--gold)}
#auth-gate .auth-sub{font-size:13px;color:var(--text3);margin-bottom:20px}
#auth-gate .af{margin-bottom:14px}
#auth-gate .af label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px}
#auth-gate .af input{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
#auth-gate .af input:focus{border-color:var(--gold)}
#auth-gate .abtn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.abtn-p{background:var(--gold);color:#0b0f1a}.abtn-p:hover{background:var(--gold2)}
.abtn-s{background:transparent;color:var(--text2);border:1px solid var(--border2)!important;margin-top:8px}.abtn-s:hover{background:var(--bg3)}
.auth-msg{font-size:12px;padding:10px;border-radius:8px;margin-bottom:12px}
.auth-msg-error{background:var(--red-dim);color:var(--red2);border:1px solid rgba(239,83,80,.2)}
.auth-msg-info{background:var(--green-dim);color:var(--green2);border:1px solid rgba(52,211,153,.2)}
.auth-link{font-size:12px;color:var(--gold);cursor:pointer;text-align:center;margin-top:12px}
.auth-pending{text-align:center;padding:20px 0}
.auth-pending-icon{font-size:40px;margin-bottom:12px}
.auth-pending-title{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--gold)}
.auth-pending-sub{font-size:13px;color:var(--text3);line-height:1.5}
#admin-fab{position:fixed;bottom:20px;right:20px;z-index:9998;background:var(--gold);color:#0b0f1a;border:none;border-radius:50%;width:48px;height:48px;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(212,169,106,.3);display:none}
#admin-panel{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px}
#admin-panel .acard{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:640px;width:100%;max-height:80vh;overflow-y:auto;padding:24px}
#admin-panel .atitle{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;color:var(--gold)}
#admin-panel table{width:100%;border-collapse:collapse}
#admin-panel th{text-align:left;padding:8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border)}
#admin-panel td{padding:8px;font-size:13px;border-bottom:1px solid var(--border)}
.logout-pill{display:none!important}

@media(max-width:768px){
  .modal{max-width:95vw!important;max-height:90vh!important;padding:16px!important;}
}
</style>
</head>

<script>
// ══════════════════════════════════════════════════
//  SUPABASE AUTH — UPDATE THESE 3 VALUES
// ══════════════════════════════════════════════════
var SB_URL = 'https://mgbxxwoasrwlraffcvab.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nYnh4d29hc3J3bHJhZmZjdmFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIzMjMsImV4cCI6MjA5MDM1ODMyM30.kJoq_dded4cmW56ymY3NmvmhNxYKFKrwOxbSJvBIfc4';
var ADMIN_EMAILS = ['chungakwanc@gmail.com'];

// ── SINGLE global Supabase client — created once, used by auth + React ──
var _SB = window.supabase ? window.supabase.createClient(SB_URL, SB_KEY) : null;

var _sb=null,_user=null,_prof=null,_isAdmin=false;
function sb(){return _SB;}
function authMsg(t,type){var e=document.getElementById('auth-message');e.className='auth-msg auth-msg-'+(type||'error');e.textContent=t;e.style.display='block';}
function authClear(){document.getElementById('auth-message').style.display='none';}
function authShow(v){authClear();['login','signup','reset','pending'].forEach(function(s){document.getElementById('auth-'+s).style.display=s===v?'':'none';});}

async function authLogin(){
  authClear();
  var e=document.getElementById('auth-email').value.trim(),p=document.getElementById('auth-pass').value;
  if(!e||!p)return authMsg('Please enter email and password');
  authMsg('Signing in…','info');
  try {
    var r = await _SB.auth.signInWithPassword({email:e,password:p});
    if(r.error) return authMsg(r.error.message);
    finishLogin(e);
  } catch(err) {
    if(ADMIN_EMAILS.indexOf(e)>=0){_isAdmin=true;_prof={email:e,approved:true,role:'admin'};authGrant();return;}
    authMsg('Login error: '+err.message);
  }
}

function finishLogin(email){
  if(ADMIN_EMAILS.indexOf(email)>=0){
    _isAdmin=true;
    _prof={email:email,full_name:'Admin',approved:true,role:'admin'};
    _SB.auth.getSession().then(function(s){
      _user=s?.data?.session?.user||{email:email};
      if(_user.id)_SB.from('profiles').upsert({id:_user.id,email:email,full_name:_user?.user_metadata?.full_name||'',approved:true,role:'admin'}).catch(function(){});
    }).catch(function(){});
    authGrant();
    return;
  }
  authCheck();
}

async function authSignup(){
  authClear();
  var n=document.getElementById('auth-sname').value.trim(),e=document.getElementById('auth-semail').value.trim(),p=document.getElementById('auth-spass').value;
  if(!n||!e||!p)return authMsg('Please fill in all fields');
  if(p.length<6)return authMsg('Password must be at least 6 characters');
  try {
    authMsg('Creating account…','info');
    var r=await sb().auth.signUp({email:e,password:p,options:{data:{full_name:n}}});
    if(r.error)return authMsg(r.error.message);
    // Create profile
    if(r.data&&r.data.user){
      var isAdm=ADMIN_EMAILS.indexOf(e)>=0;
      var pIns=await sb().from('profiles').upsert({id:r.data.user.id,email:e,full_name:n,approved:isAdm,role:isAdm?'admin':'user'});
      if(pIns.error) console.warn('[Auth] Profile upsert error (non-blocking):', pIns.error.message);
      if(isAdm){
        // Admin — sign in directly
        _user=r.data.user;_isAdmin=true;_prof={email:e,full_name:n,approved:true,role:'admin'};
        authGrant();return;
      }
    }
    authMsg('Account created! Awaiting admin approval.','info');
    setTimeout(function(){authShow('pending');},1500);
  } catch(err) {
    authMsg('Signup error: '+err.message);
  }
}

async function authReset(){
  authClear();
  var e=document.getElementById('auth-remail').value.trim();
  if(!e)return authMsg('Please enter your email');
  var r=await sb().auth.resetPasswordForEmail(e);
  if(r.error)return authMsg(r.error.message);
  authMsg('Reset link sent! Check your inbox.','info');
}

async function authLogout(){
  await sb().auth.signOut();
  _user=null;_prof=null;_isAdmin=false;
  document.getElementById('auth-gate').style.display='flex';
  document.getElementById('logout-pill').style.display='none';
  document.getElementById('admin-fab').style.display='none';
  authShow('login');
}

async function authCheck(){
  try {
  var s=sb();
  if(!s){authGrant();return;}
  var sess=await s.auth.getSession();
  if(!sess.data||!sess.data.session){document.getElementById('auth-gate').style.display='flex';return;}
  _user=sess.data.session.user;
  console.log('[Auth] User:', _user.email, 'UID:', _user.id);

  // ADMIN FAST PATH — skip all DB queries for admin emails
  var emailIsAdmin = ADMIN_EMAILS.indexOf(_user.email)>=0;
  if(emailIsAdmin){
    console.log('[Auth] Admin email — granting access immediately');
    _isAdmin=true;
    _prof={email:_user.email,full_name:_user.user_metadata?.full_name||'Admin',approved:true,role:'admin'};
    // Try to ensure profile exists (fire and forget — don't block on it)
    s.from('profiles').upsert({id:_user.id,email:_user.email,full_name:_user.user_metadata?.full_name||'',approved:true,role:'admin'}).then(()=>console.log('[Auth] Admin profile ensured'));
    authGrant();
    return;
  }

  // NON-ADMIN PATH — query profiles table
  var p=await s.from('profiles').select('*').eq('id',_user.id).maybeSingle();
  console.log('[Auth] Profile:', p.error?p.error.message:'ok', p.data?'found':'missing');
  
  if(p.data) {
    // Profile exists — check approval
    _prof=p.data;
    _isAdmin=_prof.role==='admin';
    if(!_prof.approved){authShow('pending');return;}
    authGrant();
    return;
  }
  
  // Profile missing or SELECT errored — try to create it
  var m=_user.user_metadata||{};
  var profileData={id:_user.id,email:_user.email,full_name:m.full_name||'',approved:false,role:'user'};
  console.log('[Auth] Creating profile for', _user.email);
  
  // Try insert first, then upsert as fallback
  var ins=await s.from('profiles').insert(profileData);
  if(ins.error) {
    console.warn('[Auth] Insert error:', ins.error.message, '— trying upsert');
    var ups=await s.from('profiles').upsert(profileData);
    if(ups.error) {
      console.error('[Auth] Upsert also failed:', ups.error.message);
      authMsg('Account setup failed: '+ups.error.message+'. Please contact your admin.');
      return;
    }
  }
  authShow('pending');return;
  } catch(err) {
    console.error('[Auth] Error:', err);
    if(_user && ADMIN_EMAILS.indexOf(_user.email)>=0){_isAdmin=true;authGrant();return;}
    authMsg('Auth error: '+err.message);
  }
}

function authGrant(){
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('logout-pill').style.display='block';
  if(_isAdmin)document.getElementById('admin-fab').style.display='flex';
  // Sync API keys from Supabase to IndexedDB on login
  syncKeysFromSupabase();
  // Check onboarding
  checkOnboarding();
}

// ── Sync API keys from Supabase user_settings → IndexedDB ──
async function syncKeysFromSupabase(){
  try {
    const s=getSB();if(!s||!_user) return;
    const {data,error}=await s.from('user_settings').select('gemini_api_key,anthropic_api_key').eq('user_id',_user.id).maybeSingle();
    if(error||!data) return;
    const uid=_user.id;
    if(data.gemini_api_key){
      await dbPut('settings',{key:'geminiKey_'+uid,value:data.gemini_api_key});
      await dbPut('settings',{key:'geminiKey',value:data.gemini_api_key});
    }
    if(data.anthropic_api_key){
      await dbPut('settings',{key:'anthropicKey_'+uid,value:data.anthropic_api_key});
      await dbPut('settings',{key:'anthropicKey',value:data.anthropic_api_key});
    }
    console.log('[Auth] API keys synced from Supabase');
  } catch(e){console.warn('[Auth] Key sync error:',e);}
}

// ── Save API key to Supabase user_settings ──
async function saveKeyToSupabase(keyType, value){
  try {
    const s=getSB();if(!s||!_user) return;
    const col = keyType==='gemini'?'gemini_api_key':'anthropic_api_key';
    const {error}=await s.from('user_settings').upsert({user_id:_user.id,[col]:value},{onConflict:'user_id'});
    if(error) console.warn('[Auth] Key save error:',error.message);
    else console.log('[Auth] '+keyType+' key saved to Supabase');
  } catch(e){console.warn('[Auth] Key save error:',e);}
}

// ── Onboarding check ──
async function checkOnboarding(){
  try {
    const s=getSB();if(!s||!_user) return;
    const {data}=await s.from('user_settings').select('onboarding_completed').eq('user_id',_user.id).maybeSingle();
    if(data && !data.onboarding_completed){
      window._showOnboarding = true;
      // Trigger React re-render by dispatching a custom event
      window.dispatchEvent(new Event('policylens-onboarding'));
    }
  } catch(e){console.warn('[Auth] Onboarding check error:',e);}
}

async function completeOnboarding(){
  try {
    const s=getSB();if(!s||!_user) return;
    await s.from('user_settings').upsert({user_id:_user.id,onboarding_completed:true},{onConflict:'user_id'});
    window._showOnboarding = false;
  } catch(e){console.warn('[Auth] Onboarding complete error:',e);}
}

// ── Admin ──
async function openAdmin(){document.getElementById('admin-panel').style.display='flex';await loadUsers();}
function closeAdmin(){document.getElementById('admin-panel').style.display='none';}
async function loadUsers(){
  var r=await sb().from('profiles').select('*').order('created_at',{ascending:false});
  if(r.error){document.getElementById('admin-list').innerHTML='<p style="color:var(--red2)">Error: '+r.error.message+'</p>';return;}
  var u=r.data||[],h='<table><thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Role</th><th>Joined</th><th>Action</th></tr></thead><tbody>';
  u.forEach(function(x){
    var ok=x.approved,col=ok?'var(--green2)':'var(--orange)',bg=ok?'rgba(16,185,129,.1)':'rgba(245,158,11,.1)';
    var d=x.created_at?new Date(x.created_at).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'}):'—';
    var uid=x.id;
    var uemail=x.email||'';
    var uname=x.full_name||'';
    var btn;
    if(ok){
      btn='<button onclick="adminAct(&quot;'+uid+'&quot;,false,&quot;'+uemail+'&quot;,&quot;'+uname+'&quot;)" style="background:rgba(239,68,68,.15);color:var(--red2);border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">Revoke</button>';
    } else {
      btn='<button onclick="adminAct(&quot;'+uid+'&quot;,true,&quot;'+uemail+'&quot;,&quot;'+uname+'&quot;)" style="background:rgba(16,185,129,.15);color:var(--green2);border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">Approve</button>';
    }
    h+='<tr><td style="font-weight:500">'+(x.full_name||'—')+'</td><td style="font-size:12px">'+(x.email||'—')+'</td>'
      +'<td><span class="badge" style="background:'+bg+';color:'+col+'">'+(ok?'Approved':'Pending')+'</span></td>'
      +'<td style="font-size:11px">'+(x.role||'user')+'</td><td style="font-size:11px;color:var(--text3)">'+d+'</td><td>'+btn+'</td></tr>';
  });
  h+='</tbody></table><div style="font-size:11px;color:var(--text3);margin-top:12px">'+u.length+' users · '+u.filter(function(x){return x.approved}).length+' approved</div>';
  document.getElementById('admin-list').innerHTML=h;
}
async function adminAct(id,approve,email,name){
  await sb().from('profiles').update({approved:approve}).eq('id',id);
  await loadUsers();
  if(approve && email) {
    // Try automated email via Edge Function
    try {
      const s = getSB();
      if(s) {
        const {data,error} = await s.functions.invoke('send-approval-email', {
          body: { to: email, name: name || 'there' }
        });
        if(!error) { console.log('[Admin] Approval email sent to', email); return; }
        console.warn('[Admin] Edge function error:', error.message);
      }
    } catch(e) { console.warn('[Admin] Auto-email failed:', e.message); }
    // Fallback: open mailto
    var subject = encodeURIComponent('PolicyLens Access Approved');
    var body = encodeURIComponent(
      'Hi ' + (name||'there') + ',\n\n' +
      'Great news — your PolicyLens account has been approved!\n\n' +
      'You can now sign in at:\nhttps://fundlens-sg.github.io/Policylens-Community/\n\n' +
      'Use the email and password you created during sign-up.\n\n' +
      'Quick start:\n' +
      '1. Sign in with your credentials\n' +
      '2. Go to Settings and add your Gemini API key\n' +
      '3. Use the Camera or Upload button to scan your first policy\n\n' +
      'Welcome aboard!\n' +
      '— PolicyLens Admin'
    );
    window.open('mailto:' + email + '?subject=' + subject + '&body=' + body, '_blank');
  }
}

// ── Init ──
document.addEventListener('DOMContentLoaded',function(){
  if(SB_KEY==='DISABLED'){console.warn('PolicyLens: Supabase auth disabled');authGrant();return;}
  authCheck();
  var s=sb();if(s)s.auth.onAuthStateChange(function(ev){
    if(ev==='SIGNED_OUT'){document.getElementById('auth-gate').style.display='flex';document.getElementById('logout-pill').style.display='none';document.getElementById('admin-fab').style.display='none';}
  });
});
