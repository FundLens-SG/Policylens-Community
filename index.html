      })()}

      {/* ═══ TIER 1: RETIREMENT READINESS METER ═══ */}
      {retRow && (annualIncome > 0 || retRow.totalCV > 0 || retRow.income > 0 || retirementLite.cpfPayout.mid > 0) && (
        <div className="card" style={{marginBottom:16,background:'linear-gradient(135deg,var(--bg2),rgba(212,169,106,.04))',border:'1px solid rgba(212,169,106,.2)'}}>
          <h3 style={{fontSize:13,fontWeight:600,marginBottom:12}}>Retirement Readiness</h3>
          <div className="resp-2col" style={{gap:16}}>
            {/* Left: Meter */}
            <div style={{textAlign:'center'}}>
              {(() => {
                const yearsToRet = Math.max(0, retAge - (age||35));
                const inflationRate = parseFloat(p.inflationRate) || 2.8;
                const inflationMultiplier = Math.pow(1 + inflationRate/100, yearsToRet);
                const baseMonthlyNeed = monthlyExpenses || monthlyIncome * 0.7 || 3000;
                const monthlyNeed = Math.round(baseMonthlyNeed * inflationMultiplier);
                const cpfLifeMonthly = retirementLite.cpfPayout.mid || 0;
                const cpfStartAge = parseInt(p.cpfStartAge) || 65;
                const cpfActive = retAge >= cpfStartAge && (p.cpfScheme||'FRS') !== 'none';
                const cpfAtRet = cpfActive ? cpfLifeMonthly : 0;
                const monthlyInc = Math.round(retRow.income/12) + Math.round(retRow.dividends/12);
                const otherMonthly = retirementLite.otherMonthly || 0;
                const totalMonthly = monthlyInc + cpfAtRet + otherMonthly;
                const lumpSum = retRow.totalCV + retRow.maturities;
                const drawdownMonths = lumpSum > 0 ? Math.round(lumpSum / monthlyNeed) : 0;
                const drawdownYrs = Math.round(drawdownMonths / 12);
                const incomePct = monthlyNeed > 0 ? Math.min(100, Math.round(totalMonthly / monthlyNeed * 100)) : 0;
                const readyScore = Math.min(100, incomePct + Math.min(40, drawdownYrs * 2));
                const readyColor = readyScore >= 70 ? 'var(--green2)' : readyScore >= 40 ? 'var(--gold)' : 'var(--red)';
                const readyLabel = readyScore >= 70 ? 'On Track' : readyScore >= 40 ? 'Needs Attention' : 'Action Required';
                return (
                  <div>
                    <div style={{position:'relative',width:120,height:120,margin:'0 auto 12px'}}>
                      <svg viewBox="0 0 120 120" style={{transform:'rotate(-90deg)'}}>
                        <circle cx="60" cy="60" r="52" fill="none" stroke="var(--bg4)" strokeWidth="8" />
                        <circle cx="60" cy="60" r="52" fill="none" stroke={readyColor} strokeWidth="8" strokeDasharray={`${readyScore * 3.27} 327`} strokeLinecap="round" />
                      </svg>
                      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                        <div style={{fontSize:28,fontWeight:700,color:readyColor}}>{readyScore}</div>
                        <div style={{fontSize:9,color:'var(--text3)'}}>/ 100</div>
                      </div>
                    </div>
                    <div style={{fontSize:13,fontWeight:600,color:readyColor}}>{readyLabel}</div>
                    <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>at age {retAge}</div>
                  </div>
                );
              })()}
            </div>
            {/* Right: Breakdown */}
            <div style={{display:'flex',flexDirection:'column',justifyContent:'center',gap:8}}>
              {(() => {
                const yearsToRet = Math.max(0, retAge - (age||35));
                const inflationRate = parseFloat(p.inflationRate) || 2.8;
                const inflationMultiplier = Math.pow(1 + inflationRate/100, yearsToRet);
                const baseMonthlyNeed = monthlyExpenses || monthlyIncome * 0.7 || 3000;
                const monthlyNeed = Math.round(baseMonthlyNeed * inflationMultiplier);
                const cpfLifeMonthly = retirementLite.cpfPayout.mid || 0;
                const cpfStartAge = parseInt(p.cpfStartAge) || 65;
                const cpfActive = retAge >= cpfStartAge && (p.cpfScheme||'FRS') !== 'none';
                const cpfAtRet = cpfActive ? cpfLifeMonthly : 0;
                const monthlyInc = Math.round(retRow.income/12);
                const monthlyDiv = Math.round(retRow.dividends/12);
                const otherMonthly = retirementLite.otherMonthly || 0;
                const totalMonthly = monthlyInc + monthlyDiv + cpfAtRet + otherMonthly;
                const lumpSum = retRow.totalCV + retRow.maturities;
                const gap = Math.max(0, monthlyNeed - totalMonthly);
                return (
                  <>
                    <div style={{padding:'8px 12px',background:'var(--bg3)',borderRadius:8}}>
                      <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',fontWeight:600}}>Monthly Passive Income</div>
                      <div style={{fontSize:20,fontWeight:700,color:'var(--green2)'}}>{fmt(totalMonthly)}<span style={{fontSize:11,color:'var(--text3)'}}>/mth</span></div>
                      {cpfAtRet > 0 && <div style={{fontSize:9,color:'var(--teal)'}}>CPF LIFE: {fmt(cpfAtRet)}</div>}
                      {monthlyInc > 0 && <div style={{fontSize:9,color:'var(--text3)'}}>Annuity/Income: {fmt(monthlyInc)}</div>}
                      {monthlyDiv > 0 && <div style={{fontSize:9,color:'#9d8abf'}}>Dividends: {fmt(monthlyDiv)}</div>}

                      {lumpSum > 0 && monthlyNeed > 0 && <div style={{fontSize:9,color:'var(--text3)'}}>Sustains {Math.round(lumpSum/monthlyNeed/12)} years at {fmt(monthlyNeed)}/mth</div>}

                      <div style={{padding:'6px 10px',background:'rgba(239,83,80,.05)',borderRadius:6,fontSize:10,color:'var(--red)'}}>

                      <div style={{padding:'6px 10px',background:'rgba(91,168,160,.08)',borderRadius:6,fontSize:10,color:'var(--green2)'}}>

      {/* ═══ RETIREMENT INCOME DASHBOARD (Lite RetireLens) ═══ */}
      {(retirementLite.desiredMonthly > 0 || retirementLite.cpfPayout.mid > 0 || retirementLite.policyMonthlyIncome > 0) && (
        <RetirementLiteDashboard data={retirementLite} age={age} retAge={retAge} p={p} policies={policies} cvTimeline={cvTimeline} toSGD={toSGD} fxRates={fxRates} />
      )}

      {/* ═══ TIER 1: RIDER COVERAGE MATRIX ═══ */}
      {policies.length > 0 && (() => {
        const benefitTypes = ['death','tpd','ci','eci','di','accidental','acc_medical','acc_tcm','acc_dismember','premium_waiver','other'];
        const benefitLabels = {death:'Death & TI',tpd:'TPD',ci:'Critical Illness',eci:'Early CI',di:'Disability Income',accidental:'Accidental Death',acc_medical:'Acc Medical Reimb.',acc_tcm:'Acc TCM Reimb.',acc_dismember:'Acc Dismemberment & Burns',premium_waiver:'Prem. Waiver',other:'Other'};
        // Build matrix: benefit type → array of {policy, sa}
        const matrix = {};
        benefitTypes.forEach(bt => matrix[bt] = []);
        policies.forEach(pol => {
          // Base SA for protection policies
          if(pol.category==='protection' && !['Personal Accident','Critical Illness','Early Critical Illness','Disability Income'].includes(pol.subType)) {
            const sa = parseFloat(pol.sumAssured)||0;
            if(sa > 0) { matrix.death.push({pol,sa}); matrix.tpd.push({pol,sa}); }
          }
          if(pol.subType==='Critical Illness') { const sa=parseFloat(pol.sumAssured)||0; if(sa>0) matrix.ci.push({pol,sa}); }
          if(pol.subType==='Early Critical Illness') { const sa=parseFloat(pol.sumAssured)||0; if(sa>0) matrix.eci.push({pol,sa}); }
          if(pol.subType==='Disability Income') { const sa=parseFloat(pol.diMonthlyBenefit)||0; if(sa>0) matrix.di.push({pol,sa,note:'/mth'}); }
          if(pol.subType==='Personal Accident') { const sa=parseFloat(pol.addSA)||0; if(sa>0) matrix.accidental.push({pol,sa}); }
          // Riders
          (pol.riders||[]).forEach(rd => {
            const sa = parseFloat(rd.sa)||0;
            if(sa > 0 && matrix[rd.type]) matrix[rd.type].push({pol,sa,rider:rd.riderName||rd.type,isRider:true});
          });
        });
        const hasData = benefitTypes.some(bt => matrix[bt].length > 0);
        if(!hasData) return null;
        return (
          <div className="card" style={{marginBottom:16}}>
            <h3 style={{fontSize:13,fontWeight:600,marginBottom:10}}>Rider Coverage Matrix</h3>

                <thead><tr style={{background:'var(--bg3)'}}>
                  <th style={{padding:'6px 8px',textAlign:'left',fontSize:10}}>Benefit</th>
                  <th style={{padding:'6px 8px',textAlign:'right',fontSize:10}}>Total</th>
                  <th style={{padding:'6px 8px',textAlign:'left',fontSize:10}}>Sources</th>
                </tr></thead>
                <tbody>
                  {benefitTypes.map(bt => {
                    const items = matrix[bt];
                    if(items.length === 0) return (
                      <tr key={bt} style={{borderTop:'1px solid var(--border)'}}>
                        <td style={{padding:'5px 8px',fontWeight:600}}>{benefitLabels[bt]}</td>
                        <td style={{padding:'5px 8px',textAlign:'right',color:'var(--red)'}}> — </td>
                        <td style={{padding:'5px 8px',color:'var(--red)',fontSize:9}}>Not covered</td>
                      </tr>
                    );
                    const total = items.reduce((s,it)=>s+it.sa,0);
                    return (
                      <tr key={bt} style={{borderTop:'1px solid var(--border)'}}>
                        <td style={{padding:'5px 8px',fontWeight:600}}>{benefitLabels[bt]}</td>
                        <td style={{padding:'5px 8px',textAlign:'right',fontWeight:700,color:'var(--green2)'}}>{bt==='di'?fmt(total)+'/mth':fmt(total)}</td>
                        <td style={{padding:'5px 8px'}}>
                          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                            {items.map((it,j) => (
                              <span key={j} style={{display:'inline-flex',alignItems:'center',gap:3,padding:'1px 6px',borderRadius:4,fontSize:9,background:it.isRider?'rgba(157,138,191,.1)':'rgba(91,168,160,.1)',color:it.isRider?'#9d8abf':'var(--green2)'}}>
                                {(it.pol.insurer||'').split(' ')[0]}: {bt==='di'?fmt(it.sa)+'/m':fmt(it.sa)}
                                {it.isRider && <span style={{fontSize:8,opacity:.7}}>rider</span>}
                              </span>
                            ))}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {/* Overlap detection — only for reimbursement-nature benefits */}
            {(() => {
              const reimbTypes = ['acc_medical','acc_tcm'];
              const overlaps = benefitTypes.filter(bt => reimbTypes.includes(bt) && matrix[bt] && matrix[bt].length >= 2).map(bt => ({type:benefitLabels[bt],count:matrix[bt].length}));
              // Also check ISP overlap (multiple ISPs)
              const ispCount = policies.filter(p=>p.subType==='Integrated Shield Plan'&&p.status!=='lapsed'&&p.status!=='surrendered').length;
              if(ispCount >= 2) overlaps.push({type:'ISP / Hospitalisation',count:ispCount});
              if(overlaps.length === 0) return null;
              return (
                <div style={{marginTop:8,padding:'6px 10px',background:'rgba(212,169,106,.06)',borderRadius:6,fontSize:10,color:'var(--gold)'}}>

                </div>
              );
            })()}
          </div>
        );
      })()}

      {/* ═══ TIER 1: PREMIUM CASHFLOW CHART ═══ */}
      <PremiumCashflowChart policies={policies} age={age} retAge={retAge} />

      {/* ═══ TIER 1: POLICY TIMELINE SWIMLANE ═══ */}
      {policies.length > 0 && (
        <div className="card" style={{marginBottom:16}}>
          <h3 style={{fontSize:13,fontWeight:600,marginBottom:10}}>Policy Timeline</h3>
          <div style={{overflowX:'auto'}}>
            {(() => {
              const minAge = Math.min(age, ...policies.map(p=>parseInt(p.premStartAge)||parseInt(p.ageAtEntry)||age));
              const maxAge = Math.max(retAge+10, 90, ...policies.map(p=>{
                const sa=parseInt(p.premStartAge)||parseInt(p.ageAtEntry)||age;
                return sa+(parseInt(p.endPolicyTerm)||parseInt(p.premTerm)||30);
              }));
              const range = maxAge - minAge;
              const pxPerYear = Math.max(8, Math.min(16, 800/range));
              const catColors = {protection:'#5b8fd9',savings:'#5ba8a0',health:'#c97b9a',investment:'#9d8abf',retirement:'#d4a96a',maternity:'#c97b9a',cash_investments:'#5ba8a0'};
              return (
                <div style={{position:'relative',paddingTop:20,paddingBottom:8}}>
                  {/* Age axis */}
                  <div style={{display:'flex',position:'relative',height:16,borderBottom:'1px solid var(--border)',marginBottom:4}}>
                    {Array.from({length:Math.ceil(range/5)+1},(_, i)=>minAge+i*5).filter(a=>a<=maxAge).map(a => (
                      <div key={a} style={{position:'absolute',left:(a-minAge)*pxPerYear,fontSize:9,color:'var(--text3)',transform:'translateX(-50%)',top:0}}>
                        {a}{a===age?' ●':''}

                    {/* Retirement marker */}
                    <div style={{position:'absolute',left:(retAge-minAge)*pxPerYear,top:-4,bottom:-200,width:1,background:'rgba(212,169,106,.3)',zIndex:0}} />
                    <div style={{position:'absolute',left:(retAge-minAge)*pxPerYear,top:-16,fontSize:8,color:'var(--gold)',transform:'translateX(-50%)',fontWeight:600}}>Ret {retAge}</div>
                  </div>
                  {/* Policy bars */}
                  {policies.map((pol,i) => {
                    const startAge = parseInt(pol.premStartAge)||parseInt(pol.ageAtEntry)||age;
                    const premTerm = pol.premSingle?1:(pol.premWholeLife?Math.max(65-(parseInt(pol.premStartAge)||parseInt(pol.ageAtEntry)||35),30):(parseInt(pol.premTerm)||(parseInt(pol.premEndAge)>0?parseInt(pol.premEndAge)-(parseInt(pol.premStartAge)||35):25)));
                    const policyEnd = pol.category==='savings' ? startAge+(parseInt(pol.endPolicyTerm)||(premTerm+(parseInt(pol.endWaitYrs)||0))) :
                      pol.category==='retirement' ? (parseInt(pol.annuityEndAge)||85) :
                      pol.premWholeLife ? maxAge : startAge + Math.max(premTerm, parseInt(pol.endPolicyTerm)||premTerm);
                    const premEnd = startAge + premTerm;
                    const color = catColors[pol.category]||'#888';
                    const label = (pol.insurer?pol.insurer.split(' ')[0]+' ':'')+(pol.productName||pol.subType||'Policy');
                    return (
                      <div key={i} style={{display:'flex',alignItems:'center',marginBottom:3,position:'relative',height:20}}>
                        <div style={{width:130,flexShrink:0,fontSize:9,fontWeight:500,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:4}} title={label}>{label}</div>
                        <div style={{position:'relative',flex:1,height:14}}>
                          {/* Full policy duration */}
                          <div style={{position:'absolute',left:Math.max(0,(startAge-minAge)*pxPerYear),width:Math.max(4,(policyEnd-startAge)*pxPerYear),height:14,borderRadius:3,background:color,opacity:.2}}></div>
                          {/* Premium paying period */}
                          <div style={{position:'absolute',left:Math.max(0,(startAge-minAge)*pxPerYear),width:Math.max(2,(premEnd-startAge)*pxPerYear),height:14,borderRadius:3,background:color,opacity:.7}}></div>
                          {/* Current age marker */}
                          {age >= startAge && age <= policyEnd && (
                            <div style={{position:'absolute',left:(age-minAge)*pxPerYear,top:0,width:2,height:14,background:'#fff',borderRadius:1,opacity:.8}}></div>
                          )}
                          {/* Maturity marker */}
                          {pol.category==='savings' && policyEnd < maxAge && (
                            <div style={{position:'absolute',left:(policyEnd-minAge)*pxPerYear-1,top:-2,fontSize:10}}>💰</div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                  {/* Legend */}
                  <div style={{display:'flex',gap:12,marginTop:8,flexWrap:'wrap'}}>
                    <div style={{display:'flex',alignItems:'center',gap:4,fontSize:9,color:'var(--text3)'}}><span style={{width:20,height:8,borderRadius:2,background:'#888',opacity:.7,display:'inline-block'}}></span> Premium paying</div>
                    <div style={{display:'flex',alignItems:'center',gap:4,fontSize:9,color:'var(--text3)'}}><span style={{width:20,height:8,borderRadius:2,background:'#888',opacity:.2,display:'inline-block'}}></span> Covered / accumulation</div>
                    <div style={{display:'flex',alignItems:'center',gap:4,fontSize:9,color:'var(--text3)'}}><span style={{width:2,height:8,background:'#fff',display:'inline-block'}}></span> Current age</div>
                    <div style={{display:'flex',alignItems:'center',gap:4,fontSize:9,color:'var(--gold)'}}><span style={{width:1,height:8,background:'var(--gold)',display:'inline-block'}}></span> Retirement</div>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {/* Category breakdown */}
      <div>
        <h3 style={{fontSize:13,fontWeight:600,marginBottom:10}}>By Category</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:10}}>
          {Object.entries(CATEGORIES).map(([k,v]) => {
            const ps = byCategory[k]||[];
            return (
              <div key={k} className="card card-sm" style={{borderLeft:`3px solid ${v.color}`,padding:12}}>
                <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:4}}>
                  <span style={{fontSize:13}}>{v.icon}</span>
                  <span style={{fontSize:12,fontWeight:600}}>{v.label}</span>
                </div>
                <div style={{fontSize:20,fontWeight:700}}>{ps.length}</div>
                <div style={{fontSize:10,color:'var(--text3)'}}>{fmt(ps.reduce((s,p)=>s+(parseFloat(p.annualPremium)||0),0))} premium</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function GapBar({label,current,rec,pct,fmt:fmtFn,color}) {
  const isShortfall = pct < 1;
  return (
    <div style={{marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
        <span style={{fontWeight:500}}>{label}</span>
        <span style={{color:isShortfall?'var(--red2)':'var(--green2)',fontWeight:600}}>
          {typeof current==='string'?current:fmtFn(current)} / {typeof rec==='string'?rec:fmtFn(rec)}
        </span>
      </div>
      <div className="gap-bar">
        <div className="gap-bar-fill" style={{width:`${pct*100}%`,background:isShortfall?`linear-gradient(90deg,${color},var(--red))`:`linear-gradient(90deg,${color},var(--green))`}} />
      </div>
      {isShortfall && <div style={{fontSize:10,color:'var(--red2)',marginTop:2}}>⚠ Shortfall — {Math.round((1-pct)*100)}% below recommended</div>}
    </div>
  );
}

// MODULE: PROFILE_MERGE — Smart profile extraction from policy scans
// ═══════════════════════════════════════════════════════════════
const PROFILE_FIELDS = {
  policyOwner:{profileKey:'name',label:'Client Name (Policy Owner)'},
  gender:{profileKey:'gender',label:'Gender'},
  dob:{profileKey:'dob',label:'Date of Birth'},
  smoker:{profileKey:'smoker',label:'Smoker Status'},
  nationality:{profileKey:'nationality',label:'Nationality'},
  occupation:{profileKey:'occupation',label:'Occupation'},
};

function normalName(n){ return (n||'').toLowerCase().replace(/[^a-z]/g,' ').split(/\s+/).sort().join(' ').trim(); }
function isNameMatch(a,b){ if(!a||!b)return false; return normalName(a)===normalName(b); }

function mergeToProfile(extracted, currentProfile, saveProfile) {
  if(!extracted || !currentProfile || !saveProfile) return;
  const adds = {};  // fields to silently add (profile is empty)
  const conflicts = []; // fields that differ (need confirmation)

  Object.entries(PROFILE_FIELDS).forEach(([extKey, {profileKey, label}]) => {
    const extVal = extracted[extKey];
    if(!extVal || extVal==='' || extVal==='—') return;
    const curVal = currentProfile[profileKey];

    if(!curVal || curVal==='') {
      // Profile field is empty — silently add
      adds[profileKey] = extVal;
    } else {
      // Both have values — check if evidently different
      if(profileKey==='name') {
        if(!isNameMatch(curVal, extVal)) conflicts.push({label, current:curVal, scanned:extVal, key:profileKey});
      } else if(String(curVal).toLowerCase().trim() !== String(extVal).toLowerCase().trim()) {
        conflicts.push({label, current:curVal, scanned:extVal, key:profileKey});
      }
    }
  });

  // Apply silent adds
  if(Object.keys(adds).length > 0) {
    const updated = {...currentProfile, ...adds};
    saveProfile(updated);
    console.log('[Profile Merge] Silently added:', Object.keys(adds).join(', '));
  }

  // Prompt for conflicts
  if(conflicts.length > 0) {
    const lines = conflicts.map(c => `• ${c.label}: "${c.current}" → "${c.scanned}"`);
    const msg = 'Policy scan found different client details:\n\n' + lines.join('\n') + '\n\nUpdate profile with scanned values?';
    if(confirm(msg)) {
      const overrides = {};
      conflicts.forEach(c => { overrides[c.key] = c.scanned; });
      const updated = {...currentProfile, ...adds, ...overrides};
      saveProfile(updated);
      console.log('[Profile Merge] Overrides applied:', conflicts.map(c=>c.key).join(', '));
    }
  }

  // ── Auto-add Life Assured as dependant if different from Policy Owner ──
  const liName = (extracted.lifeInsured||'').trim();
  const ownerName = (extracted.policyOwner||currentProfile.name||'').trim();
  if(liName && ownerName && !isNameMatch(liName, ownerName)) {
    const deps = currentProfile.dependants || [];
    const alreadyExists = deps.some(d => isNameMatch(d.name, liName));
    if(!alreadyExists) {
      const newDep = {
        id: 'dep_' + Date.now() + Math.random().toString(36).slice(2,4),
        name: liName,
        relationship: 'Life Assured',
        dob: extracted.dob || '',
        gender: extracted.gender || '',
        smoker: extracted.smoker || '',
        nationality: extracted.nationality || '',
        occupation: extracted.occupation || '',
      };
      const updatedProfile = {...currentProfile, ...adds, dependants: [...deps, newDep]};
      saveProfile(updatedProfile);
      console.log('[Profile Merge] Auto-added life assured as dependant:', liName);
    }
  }
}

// MODULE: BULK_VERIFY — Extraction review modal
// ═══════════════════════════════════════════════════════════════
function BulkVerifyModal({extracted, repo, policies:existingPolicies, onSavePolicy, onAccept, onClose, scanProgress}) {
  const [items, setItems] = useState(() => {
    const mapped = extracted.map((p,i) => ({
      ...p, _idx:i, _selected:true, _corrections:[], _repoMatch:null,
      _destination: (p._destination||'standalone'), _batch: (p._batch||1),
    }));
    // Persist to sessionStorage for refresh survival
    try { sessionStorage.setItem('policylens_pendingExtract', JSON.stringify(mapped.map(m => {const c={...m};delete c._repoMatch;return c;}))); } catch(e){}
    return mapped;
  });
  const [activeTab, setActiveTab] = useState('all');
  const batches = [...new Set(items.map(it => it._batch))].sort((a,b)=>a-b);
  const filtered = activeTab === 'all' ? items : items.filter(it => it._batch === activeTab);

  // Sync when new batches arrive (extracted prop updates progressively)
  useEffect(() => {
    if(!extracted || extracted.length === 0) return;
    setItems(prev => {
      const existingIds = new Set(prev.map(it => it.id || it._idx));
      const newItems = extracted.filter(p => !existingIds.has(p.id)).map((p,i) => ({
        ...p, _idx: prev.length + i, _selected:true, _corrections:[], _repoMatch:null,
        _destination: p._destination||'standalone', _batch: p._batch || Math.max(...prev.map(it=>it._batch||1), 0) + 1,
      }));
      if(newItems.length === 0) return prev;
      const merged = [...prev, ...newItems];
      try { sessionStorage.setItem('policylens_pendingExtract', JSON.stringify(merged.map(m => {const c={...m};delete c._repoMatch;return c;}))); } catch(e){}
      return merged;
    });
  }, [extracted?.length]);

  // Detect fund-like items
  const isFundLike = (item) => {
    const name = (item.productName||item.policyName||'').toLowerCase();
    const sub = (item.subType||'').toLowerCase();
    return sub === 'unit trust' || sub === 'other' || 
      (!item.category || item.category === 'investment') && 
      !sub.includes('ilp') && !sub.includes('whole') && !sub.includes('term') &&
      ['fund','dis','acc','payout','income','growth','equity','bond','bridge','global'].some(kw => name.includes(kw));
  };

  // Get existing ILP policies
  const ilpPolicies = (existingPolicies||[]).filter(p => p.subType==='ILP (Investment)' || p.subType==='ILP (Protection)');

  // Find repo matches for each item
  useEffect(() => {
    setItems(prev => prev.map(item => {
      const q = ((item.productName||'')+(item.insurer||'')).toLowerCase();
      if(!q || q.length < 3) return item;
      const match = repo.find(r => {
        const t = ((r.productName||'')+(r.insurer||'')).toLowerCase();
        return t.includes(q) || q.includes(t) || (item.productName && r.productName && r.productName.toLowerCase()===item.productName.toLowerCase() && r.insurer===item.insurer);
      });
      return {...item, _repoMatch: match||null};
    }));
  }, [repo]);

  const toggleSelect = (idx) => setItems(prev => prev.map(it => it._idx===idx ? {...it, _selected:!it._selected} : it));
  const updateField = (idx, field, value) => setItems(prev => prev.map(it => it._idx===idx ? {...it, [field]:value} : it));
  const toggleRider = (pIdx, rIdx) => setItems(prev => prev.map(it => {
    if(it._idx!==pIdx) return it;
    const riders = [...(it.riders||[])];
    riders[rIdx] = {...riders[rIdx], _selected: !riders[rIdx]._selected};
    return {...it, riders};
  }));
  const applyRepo = (idx) => setItems(prev => prev.map(it => {
    if(it._idx!==idx || !it._repoMatch) return it;
    const r = it._repoMatch;
    return {...it, productName:r.productName, insurer:r.insurer, category:r.category, subType:r.subType, currency:r.currency||it.currency, _appliedRepo:true};
  }));

  const handleAccept = async () => {
    const standalone = [];
    const ilpMerges = {}; // {policyId: [fund1, fund2, ...]}

    items.filter(it => it._selected).forEach(it => {
      const p = {...it};
      const provider = p._provider;
      delete p._idx; delete p._selected; delete p._corrections; delete p._repoMatch; delete p._appliedRepo; delete p._destination; delete p._provider;
      if(p.riders) p.riders = p.riders.filter(r => r._selected !== false).map(r => { const c={...r}; delete c._selected; return c; });

      if(it._destination && it._destination.startsWith('ilp_')) {
        const ilpId = it._destination.replace('ilp_','');
        if(!ilpMerges[ilpId]) ilpMerges[ilpId] = [];
        ilpMerges[ilpId].push({fundName: p.productName||p.policyName||'Unknown Fund', allocation: 0, riskRating: ''});
      } else if(it._destination === 'cpfoa') {
        p.category = 'investment'; p.subType = 'Unit Trust'; p.paymentMethod = 'CPF OA';
        if(provider) p.insurer = provider;
        standalone.push(p);
      } else if(it._destination === 'cpfsa') {
        p.category = 'investment'; p.subType = 'Unit Trust'; p.paymentMethod = 'CPF SA';
        if(provider) p.insurer = provider;
        standalone.push(p);
      } else if(it._destination === 'later') {
        // Keep as-is, mark for review
        p.userRemarks = (p.userRemarks ? p.userRemarks + ' · ' : '') + '⏳ Fund assignment pending';
        if(provider) p.insurer = provider;
        standalone.push(p);
      } else {
        // Standalone
        if(provider) p.insurer = provider;
        standalone.push(p);
      }
    });

    // Merge funds into existing ILPs
    for(const [ilpId, funds] of Object.entries(ilpMerges)) {
      const ilp = (existingPolicies||[]).find(p => p.id === ilpId);
      if(ilp && onSavePolicy) {
        const existing = ilp.fundAllocations || [];
        const merged = [...existing];
        funds.forEach(f => {
          if(!merged.some(e => e.fundName === f.fundName)) {
            // Auto-allocate: divide 100% equally if no existing, else add with 0%
            merged.push({...f, allocation: existing.length===0 ? Math.round(100/funds.length) : 0});
          }
        });
        await onSavePolicy({...ilp, fundAllocations: merged});
      }
    }

    if(Object.keys(ilpMerges).length > 0) {
      const fundCount = Object.values(ilpMerges).flat().length;
      const ilpCount = Object.keys(ilpMerges).length;
      toast(`Linked ${fundCount} fund${fundCount>1?'s':''} to ${ilpCount} ILP polic${ilpCount>1?'ies':'y'}`,'success');
    }

    try { sessionStorage.removeItem('policylens_pendingExtract'); } catch(e){}
    onAccept(standalone);
  };

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal" style={{maxWidth:900,maxHeight:'90vh'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <h3 style={{fontSize:16,fontWeight:700}}>Verify Extracted Policies</h3>
            <p style={{fontSize:11,color:'var(--text3)'}}>Review, correct, and select which policies to import. Uncheck to skip.</p>
          </div>
          <button onClick={onClose} style={{background:'none',color:'var(--text3)',fontSize:20,padding:4}}>×</button>
        </div>

        {/* Live extraction progress */}
        {scanProgress && scanProgress.pctComplete < 100 && (
          <div style={{padding:'8px 16px',background:'rgba(212,169,106,.06)',borderBottom:'1px solid var(--border)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <span style={{fontSize:10,fontWeight:600,color:'var(--gold)'}}>✨ Still extracting...</span>
              <span style={{fontSize:9,color:'var(--text3)'}}>Batch {scanProgress.batch}/{scanProgress.totalBatches}</span>
            </div>
            <div style={{height:4,background:'var(--bg4)',borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:scanProgress.pctComplete+'%',background:'linear-gradient(90deg,var(--gold),var(--green2))',borderRadius:2,transition:'width .5s ease'}} />
            </div>
            <div style={{fontSize:9,color:'var(--text3)',marginTop:2}}>Review these while the rest extract — new policies will appear automatically</div>
          </div>
        )}

        {/* Batch tabs */}
        {batches.length > 1 && (
          <div style={{display:'flex',gap:3,marginBottom:10,overflowX:'auto',paddingBottom:4}}>
            <button onClick={()=>setActiveTab('all')}
              style={{padding:'4px 10px',fontSize:10,borderRadius:6,border:'1px solid '+(activeTab==='all'?'var(--gold)':'var(--border)'),
                background:activeTab==='all'?'rgba(212,169,106,.12)':'var(--bg2)',color:activeTab==='all'?'var(--gold)':'var(--text3)',cursor:'pointer',fontWeight:activeTab==='all'?700:400,whiteSpace:'nowrap'}}>
              All ({items.length})
            </button>
            {batches.map(b => {
              const batchItems = items.filter(it=>it._batch===b);
              const accepted = batchItems.filter(it=>it._selected).length;
              return (
                <button key={b} onClick={()=>setActiveTab(b)}
                  style={{padding:'4px 10px',fontSize:10,borderRadius:6,border:'1px solid '+(activeTab===b?'var(--teal)':'var(--border)'),
                    background:activeTab===b?'rgba(91,168,160,.1)':'var(--bg2)',color:activeTab===b?'var(--teal)':'var(--text3)',cursor:'pointer',fontWeight:activeTab===b?700:400,whiteSpace:'nowrap'}}>
                  Batch {b} ({accepted}/{batchItems.length})
                </button>
              );
            })}
          </div>
        )}

        <div style={{maxHeight:'65vh',overflowY:'auto'}}>

          {/* ── WHAT'S MISSING CHECKLIST ── */}
          {items.length > 0 && (() => {
            const cats = {life:false, ci:false, isp:false, di:false, savings:false, retirement:false};
            items.filter(it=>it._selected).forEach(it => {
              if(it.category==='protection') cats.life=true;
              if(it.subType==='Critical Illness'||(it.riders||[]).some(r=>r.type==='ci')) cats.ci=true;
              if(it.subType==='Integrated Shield Plan') cats.isp=true;
              if(it.subType==='Disability Income'||(it.riders||[]).some(r=>r.type==='di')) cats.di=true;
              if(it.category==='savings') cats.savings=true;
              if(it.category==='retirement') cats.retirement=true;
            });
            const missing = [];
            if(!cats.life) missing.push('Life / Term cover');
            if(!cats.ci) missing.push('Critical Illness');
            if(!cats.isp) missing.push('Hospitalisation (ISP)');
            if(!cats.di) missing.push('Disability Income');

              <div style={{background:'rgba(239,83,80,.06)',border:'1px solid rgba(239,83,80,.15)',borderRadius:8,padding:10,marginBottom:10}}>

                </div>
                <div style={{fontSize:9,color:'var(--text3)',marginTop:4}}>Ask client if they have these — may not have been uploaded</div>
              </div>

                <span style={{fontSize:10,color:'var(--green2)',fontWeight:600}}>✅ Core coverage types detected: Life, CI, ISP, DI</span>
              </div>
            );
          })()}

          {/* ── DUPLICATE WARNINGS ── */}
          {items.filter(it=>it._dupOf).length > 0 && (
            <div style={{background:'rgba(212,169,106,.06)',border:'1px solid rgba(212,169,106,.15)',borderRadius:8,padding:8,marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--gold)'}}>🔄 Possible duplicates detected — deselected automatically. Re-check to import if needed.</div>
            </div>
          )}

          {/* ── MOBILE-FRIENDLY CARD GRID ── */}
          {filtered.map((item,i) => (
            <div key={item._idx} style={{background:item._selected?'var(--bg3)':'var(--bg)',borderRadius:8,padding:10,marginBottom:6,border:'1px solid '+(item._dupOf?'var(--gold3)':item._selected?'var(--border2)':'var(--border)'),opacity:item._selected?1:.4}}>
              {/* Row 1: Checkbox + Name + Insurer */}

                <input type="checkbox" checked={item._selected} onChange={()=>toggleSelect(item._idx)} style={{width:16,height:16,accentColor:'var(--gold)',flexShrink:0}} />
                <input value={item.productName||''} onChange={e=>updateField(item._idx,'productName',e.target.value)} style={{flex:1,fontSize:12,padding:'4px 6px',background:'transparent',border:'1px solid var(--border)',borderRadius:4,fontWeight:600,minWidth:0}} />
                <select value={item.insurer||''} onChange={e=>updateField(item._idx,'insurer',e.target.value)} style={{width:110,fontSize:10,padding:'4px 2px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:4,flexShrink:0}}>
                  <option value="">Insurer</option>{INSURER_LIST.map(n=><option key={n} value={n}>{n}</option>)}
                </select>
              </div>
              {/* Row 2: Category + Sub-type */}
              <div style={{display:'flex',gap:4,marginBottom:5}}>
                <select value={item.category||''} onChange={e=>updateField(item._idx,'category',e.target.value)} style={{flex:1,fontSize:10,padding:'3px 4px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:4}}>
                  {Object.entries(CATEGORIES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                </select>
                <select value={item.subType||''} onChange={e=>updateField(item._idx,'subType',e.target.value)} style={{flex:1,fontSize:10,padding:'3px 4px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:4}}>
                  <option value="">Sub-type</option>{(SUB_TYPES[item.category]||[]).map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              {/* Row 3: Premium + Freq + Method + SA */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 70px 70px 1fr',gap:4}}>
                <div>
                  <div style={{fontSize:8,color:'var(--text3)',marginBottom:1}}>PREMIUM</div>
                  <input type="number" value={item.annualPremium||''} onChange={e=>updateField(item._idx,'annualPremium',parseFloat(e.target.value)||0)} placeholder="$" style={{width:'100%',fontSize:11,padding:'3px 4px',background:'transparent',border:'1px solid var(--border)',borderRadius:4}} />
                </div>
                <div>
                  <div style={{fontSize:8,color:'var(--text3)',marginBottom:1}}>FREQ</div>
                  <select value={item.premFrequency||'annual'} onChange={e=>updateField(item._idx,'premFrequency',e.target.value)} style={{width:'100%',fontSize:9,padding:'3px 2px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:4}}>
                    <option value="annual">Annual</option><option value="monthly">Mthly</option><option value="single">Single</option><option value="unknown">?</option>
                  </select>
                </div>
                <div>
                  <div style={{fontSize:8,color:'var(--text3)',marginBottom:1}}>METHOD</div>
                  <select value={item.paymentMethod||'Cash'} onChange={e=>updateField(item._idx,'paymentMethod',e.target.value)} style={{width:'100%',fontSize:9,padding:'3px 2px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:4}}>
                    {(()=>{const _isISP=item.subType==='Integrated Shield Plan';const _isCSL=(item.subType||'').includes('CareShield')||(item.subType||'').includes('ElderShield');return(<>
                      <option>Cash</option>
                      {(_isISP||_isCSL)&&<option>MediSave</option>}
                      {(_isISP||_isCSL)&&<option>MediSave+Cash</option>}
                      {!_isISP&&!_isCSL&&<option>SRS</option>}
                      {!_isISP&&!_isCSL&&<option>CPF OA</option>}
                      {!_isISP&&!_isCSL&&<option>CPF SA</option>}
                    </>)})()}
                  </select>
                </div>
                <div>
                  <div style={{fontSize:8,color:'var(--text3)',marginBottom:1}}>SUM ASSURED</div>
                  <input type="number" value={item.sumAssured||''} onChange={e=>updateField(item._idx,'sumAssured',parseFloat(e.target.value)||0)} placeholder="$" style={{width:'100%',fontSize:11,padding:'3px 4px',background:'transparent',border:'1px solid var(--border)',borderRadius:4}} />
                </div>
              </div>
              {/* Riders inline */}
              {(item.riders||[]).length > 0 && <div style={{display:'flex',gap:3,flexWrap:'wrap',marginTop:5}}>
                {(item.riders||[]).map((rd,ri)=><span key={ri} onClick={()=>toggleRider(item._idx,ri)} style={{fontSize:8,padding:'2px 5px',borderRadius:4,cursor:'pointer',background:rd._selected!==false?({death:'#5b8fd922',ci:'#c97b9a22',tpd:'#9d8abf22',di:'#5ba8a022',acc_medical:'#5ba8a022',acc_tcm:'#5ba8a022',acc_dismember:'#d4a96a22'}[rd.type]||'var(--bg2)'):'var(--bg)',color:rd._selected!==false?({death:'#5b8fd9',ci:'#c97b9a',tpd:'#9d8abf',di:'#5ba8a0',acc_medical:'#5ba8a0',acc_tcm:'#5ba8a0',acc_dismember:'#d4a96a'}[rd.type]||'var(--text3)'):'var(--text3)',textDecoration:rd._selected===false?'line-through':'none'}}>{rd.riderName||(({death:'Death',tpd:'TPD',ci:'CI',eci:'ECI',di:'DI',accidental:'ADD',acc_medical:'Med',acc_tcm:'TCM',acc_dismember:'Dismem',premium_waiver:'Waiver',other:'Other'})[rd.type]||rd.type)} ${(+rd.sa||0).toLocaleString()}</span>)}
              </div>}
              {/* Fund classification */}
              {isFundLike(item) && (() => {
                const dest = item._destination||'standalone';
                return (<div style={{display:'flex',gap:3,flexWrap:'wrap',marginTop:5}}>
                  {['standalone','cpfoa','cpfsa','later'].map(o=>{const l={standalone:'📊 UT',cpfoa:'🏦 OA',cpfsa:'🏦 SA',later:'🏷 Later'};return <button key={o} onClick={()=>updateField(item._idx,'_destination',o)} style={{padding:'2px 6px',fontSize:8,borderRadius:4,border:'1px solid '+(dest===o?'var(--teal)':'var(--border)'),background:dest===o?'rgba(91,168,160,.1)':'transparent',color:dest===o?'var(--teal)':'var(--text3)',cursor:'pointer'}}>{l[o]}</button>;})}
                  {ilpPolicies.map(ilp=><button key={ilp.id} onClick={()=>updateField(item._idx,'_destination','ilp_'+ilp.id)} style={{padding:'2px 6px',fontSize:8,borderRadius:4,border:'1px solid '+(dest==='ilp_'+ilp.id?'var(--gold)':'var(--border)'),background:dest==='ilp_'+ilp.id?'rgba(212,169,106,.1)':'transparent',color:dest==='ilp_'+ilp.id?'var(--gold)':'var(--text3)',cursor:'pointer'}}>🔗 {(ilp.productName||'ILP').substring(0,15)}</button>)}
                </div>);
              })()}
              {/* Tags */}
              <div style={{display:'flex',gap:4,marginTop:4}}>
                {item._dupOf && <span style={{fontSize:8,padding:'1px 5px',borderRadius:3,background:'rgba(212,169,106,.1)',color:'var(--gold)'}}>🔄 Duplicate</span>}
                {item._batch > 1 && <span style={{fontSize:8,padding:'1px 5px',borderRadius:3,background:'rgba(91,168,160,.08)',color:'var(--teal)'}}>Batch {item._batch}</span>}
                {item.notes && <span style={{fontSize:8,color:'var(--text3)',fontStyle:'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}>📝 {item.notes}</span>}
              </div>
            </div>
          ))}
        </div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:16,paddingTop:12,borderTop:'1px solid var(--border)'}}>
          <div style={{fontSize:12,color:'var(--text2)'}}>{items.filter(it=>it._selected).length} of {items.length} policies selected</div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn-secondary" onClick={onClose}>Cancel</button>
            <button className="btn-primary" onClick={handleAccept} disabled={items.filter(it=>it._selected).length===0}>
              Import {items.filter(it=>it._selected).length} Policies
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// MODULE: ERROR_BOUNDARY — Catches render crashes
// ═══════════════════════════════════════════════════════════════
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){console.error('[ErrorBoundary]',error,info);}
  render(){
    if(this.state.hasError) return (
      <div style={{padding:20,margin:12,background:'rgba(239,83,80,.06)',border:'1px solid rgba(239,83,80,.2)',borderRadius:12}}>
        <div style={{fontSize:14,fontWeight:600,color:'var(--red)',marginBottom:8}}>Something went wrong</div>
        <div style={{fontSize:11,color:'var(--text3)',marginBottom:12,fontFamily:'monospace',whiteSpace:'pre-wrap',maxHeight:120,overflow:'auto'}}>{String(this.state.error?.message||this.state.error)}</div>
        <button className="btn-secondary btn-sm" onClick={()=>{this.setState({hasError:false,error:null});if(this.props.onReset)this.props.onReset();}}>Try Again</button>
      </div>
    );
    return this.props.children;
  }
}

function Policies() {
  const {policies,savePolicy,deletePolicy,repo,apiKey,saveRepo,clientProfile,saveProfile} = useContext(AppCtx);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState('all');
  const [selected, setSelected] = useState(new Set());
  const toggleSelect = (id) => setSelected(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const selectAll = () => { if(selected.size === filtered.length) setSelected(new Set()); else setSelected(new Set(filtered.map(p=>p.id))); };
  const deleteSelected = async () => {
    if(!selected.size) return;
    if(!confirm('Delete ' + selected.size + ' selected policies? This cannot be undone.')) return;
    for(const id of selected) await deletePolicy(id);
    setSelected(new Set());
  };
  const [scanning, setScanning] = useState(false);
  const [scanResult, setScanResult] = useState(null);
  const [staged, setStaged] = useState([]);
  const [scanProgress, setScanProgress] = useState(null); // {batch, totalBatches, totalFiles, status, pctComplete}
  const [draftBanner, setDraftBanner] = useState(false);
  const [bulkExtracted, setBulkExtracted] = useState(null); // for verification modal

  // ── Draft auto-save/restore ──
  const DRAFT_KEY = 'policylens_draft';
  const saveDraft = (formData) => {
    try { sessionStorage.setItem(DRAFT_KEY, JSON.stringify({form:formData,ts:Date.now()})); } catch(e){}
  };
  const loadDraft = () => {
    try {
      const raw = sessionStorage.getItem(DRAFT_KEY);
      if(!raw) return null;
      const d = JSON.parse(raw);
      if(Date.now() - d.ts > 30*60*1000) { sessionStorage.removeItem(DRAFT_KEY); return null; } // expire after 30min
      return d.form;
    } catch(e){ return null; }
  };
  const clearDraft = () => { try { sessionStorage.removeItem(DRAFT_KEY); } catch(e){} };

  // Check for draft on mount
  useEffect(() => {
    const draft = loadDraft();
    if(draft && draft.productName) setDraftBanner(true);
    // Pick up files dropped from Dashboard
    if(window._pendingDropFiles) {
      const files = window._pendingDropFiles;
      window._pendingDropFiles = null;
      setTimeout(()=>handleExtract(files), 100);
    }
  }, []);

  const restoreDraft = () => {
    const draft = loadDraft();
    if(draft) { setEditing(draft); setShowForm(true); setDraftBanner(false); }
  };
  const dismissDraft = () => { clearDraft(); setDraftBanner(false); };

  const handleFormClose = () => { setShowForm(false); };
  const handleFormSave = (p) => { savePolicy(p); setShowForm(false); setScanResult(null); clearDraft(); };

  const filtered = filter==='all'?policies:policies.filter(p=>p.category===filter);
  // Separate matured policies (FDs past maturity OR any policy with status=matured)
  const isMaturedPolicy = (pol) => {
    // FDs/T-bills past maturity date
    if(pol.category==='cash_investments' && pol.fdMaturityDate && new Date(pol.fdMaturityDate) < new Date() && !pol.fdAutoRenew) return true;
    // Any policy with status explicitly set to matured
    if(pol.status==='matured') return true;
    // Endowments past maturity date
    if(pol.maturityDate && new Date(pol.maturityDate) < new Date() && (pol.category==='savings' || pol.category==='cash_investments')) return true;
    return false;
  };
  const activePolicies = filtered.filter(p => !isMaturedPolicy(p));
  const maturedPolicies = filtered.filter(p => isMaturedPolicy(p));

  // ── MIME type detection ──
  const MIME_MAP = {
    pdf:'application/pdf', xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    xls:'application/vnd.ms-excel', csv:'text/csv', doc:'application/msword',
    docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    html:'text/html', htm:'text/html', txt:'text/plain', rtf:'application/rtf',
    jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png', gif:'image/gif', webp:'image/webp', heic:'image/heic',
  };
  const getExt = name => (name||'').split('.').pop().toLowerCase();
  const getMime = file => file.type || MIME_MAP[getExt(file.name)] || 'application/octet-stream';
  const isImage = file => getMime(file).startsWith('image/');
  const isText = file => ['text/plain','text/html','text/csv'].includes(getMime(file));

  const EXTRACT_PROMPT = `You are a senior insurance policy analyst for a Singapore Financial Advisory firm. Extract ALL insurance policies AND financial instruments from this document with institutional-level detail.

For EACH policy or instrument, return a JSON object with:

CORE: insurer, productName, policyName, policyNumber, category (protection/savings/health/investment/retirement/maternity/cash_investments/other_assets), subType (Term Life/Whole Life/Universal Life (UL)/Indexed UL (IUL)/Variable UL (VUL)/Critical Illness/Personal Accident/Disability Income/Long-term Care/Endowment/Lifetime Endowment/Education Plan/Short-term Endowment/Integrated Shield Plan/Hospital Income/CareShield Life Supplement/ElderShield 300/ElderShield 400/ILP (Protection)/ILP (Investment)/Unit Trust/Retirement/Annuity/Maternity Coverage/Fixed Deposit/T-bill/Singapore Savings Bond/Corporate Bond/Money Market/Property/Stocks\/Equities/Gold\/Precious Metals/Fixed Coupon Note (FCN)/Equity Linked Note (ELN)/Options\/Futures/Cryptocurrency/Other), currency (default SGD), sumAssured (number), annualPremium (number), premFrequency (annual/monthly/single/unknown — if document does not clearly state frequency, use unknown), premiumStructure (Single Premium/Regular Premium/Limited Pay/Flexible Premium), paymentMethod (Cash/MediSave/SRS/MediSave+Cash/CPF OA/CPF SA)
IMPORTANT: If document mentions CPFIS-OA, CPF-IS or CPF Investment Scheme, set paymentMethod to "CPF OA" or "CPF SA" accordingly. Standalone fund holdings (e.g. "Allianz Global High Payout", "First Sentier Bridge") without an insurance wrapper are category:investment, subType:"Unit Trust". If it mentions CPFIS, still category:investment subType:"Unit Trust".
PAYMENT METHODS: Any insurance policy can be paid via Cash, CPF OA, CPF SA, or SRS. Look for clues:
- "CPF Ordinary Account" / "CPFIS-OA" / "CPF OA" → paymentMethod:"CPF OA"
- "CPF Special Account" / "CPFIS-SA" / "CPF SA" → paymentMethod:"CPF SA"  
- "Supplementary Retirement Scheme" / "SRS" → paymentMethod:"SRS"
- "MediSave" → paymentMethod:"MediSave" (ISP/CareShield/ElderShield only)
- ISP plans: always "MediSave" or "MediSave+Cash"
- If no payment clue found, use "Cash" (default)

FIXED DEPOSITS / T-BILLS / SSB (category: cash_investments):
- insurer = bank name (e.g. "DBS", "OCBC", "ICBC", "BOC", "Standard Chartered")
- productName = descriptive name (e.g. "12-month FD", "6-month T-bill")
- fdPrincipal = deposit amount (number)
- fdYieldPct = interest rate / yield % p.a. (number, e.g. 3.25)
- fdStartDate = effective/start date (YYYY-MM-DD)
- fdMaturityDate = maturity date (YYYY-MM-DD)
- fdTenureMonths = tenure in months (number)
- fdAutoRenew = boolean
- status = "inforce" if not yet matured, "matured" if past maturity date, use "Fully Paid" from source as equivalent to "matured" for FDs
- For matured FDs, still include them — they will be grouped separately

SHORT-TERM ENDOWMENTS (≤3 years, single premium):
- category: "savings", subType: "Short-term Endowment"
- annualPremium = total premium paid (single premium amount)
- premiumStructure: "Single Premium"
- endYield = expected yield % p.a.
- endGuaranteedCV = expected maturity sum if given

CLIENT: policyOwner (string — name of policy owner/purchaser), lifeInsured (string — name of life assured/insured person, may differ from policyOwner), gender (Male/Female — of life insured), dob (YYYY-MM-DD — of life insured), ageAtEntry (number — of life insured at cover start), smoker (Non-smoker/Smoker), nationality (SC/PR/Foreigner), occupation

PREMIUM TERM: premStartAge (number), premTerm (number — PREMIUM PAYMENT years, NOT policy term. Calculate as premEndAge minus premStartAge), premEndAge (number — age when premium payments stop, NOT maturity age)

DATES: inceptionDate (YYYY-MM-DD), maturityDate (YYYY-MM-DD), status (inforce/lapsed/paid-up/surrendered/matured)

RIDERS: riders (JSON array). CRITICAL — capture-first approach:
1. For EVERY benefit/coverage/rider listed in the document, create a rider entry
2. ALWAYS set riderName to the EXACT benefit name as written (e.g. "Double Indemnity on Accidental Death", "Accidental Dismemberment and Burns", "TCM/Chiropractic Reimbursement", "Early CompleteCare Rider III")
3. THEN classify type from: death, tpd, ci, eci, di, accidental, acc_medical, acc_tcm, acc_dismember, premium_waiver, other
4. If the benefit name doesn't clearly match a type, use "other" — NEVER force-snap to "death" or "accidental" when unsure
5. NEVER create duplicate types for the same benefit. "Accidental Death $100k" + "Double Indemnity on Acc Death $100k" = TWO separate riders (type:accidental + type:other), NOT two "death" entries
Each rider: {type, riderName (ALWAYS filled — exact name from document), sa (number), premium (0 if part of plan), expiryAge, bundled (true if part of plan, false if separate add-on), multiClaim, totalClaimPct}
Type mapping guide: "death/terminal illness" → death, "total permanent disablement/disability" → tpd, "critical illness" → ci, "early CI" → eci, "disability income" → di, "accidental death" → accidental, "medical reimbursement/expenses" → acc_medical, "TCM/chiropractic" → acc_tcm, "dismemberment/burns" → acc_dismember, "premium waiver" → premium_waiver, anything else → other

SA MULTIPLIER: saMultiplier (number), multiplierEndAge (number)
ISP: ispClass (A/B1/B2+), hasRider, riderList, riderPremium, ispDeductible, ispCoinsurance
CASH VALUE: cashValue (number), cvGrowthRate (% p.a.), surrenderPeriod (years)
UL/IUL/VUL: creditingMechanism, creditingRates {current, guaranteed}, loyaltyBonus {rate, startYear}
ILP: ilpGrowth, ilpDivYield, ilpMgmtFee, fundAllocations (JSON array of {fundName:string, allocation:number (percentage e.g. 80)}). CRITICAL ILP FUND EXTRACTION: If the document mentions fund names with percentages like "80% Manulife Global Multi Asset 20% Neuberger Berman", extract as fundAllocations:[{fundName:"Manulife Global Multi Asset",allocation:80},{fundName:"Neuberger Berman",allocation:20}]. If only ONE fund is mentioned (e.g. "PRULink US Dividend Wealth Fund"), set allocation to 100. Look in remarks, notes columns, and any fund composition fields.

RETIREMENT/ANNUITY/INCOME PLANS: annuityPayout (annual payout amount, number), annuityMonthly (monthly payout, number), annuityStartAge (number), annuityEndAge (number), retMaturitySum (maturity/terminal value at end)

PREMIUM FINANCING: financed (boolean), finLoan (loan amount, number), finRate (interest rate %, number — use midpoint of range), finTenure (loan tenure years, number)

KEY HIGHLIGHTS — highlights (JSON array of strings, 5-8 items). MUST include:
- Total death/TI payout and conditions
- CI payout (single or multi-claim total)
- Surrender value at Year 5, 10, 20, maturity if available
- Projected maturity/endowment value
- Monthly income payout if retirement/annuity
- Bonus rates or illustrated yields
- Distribution cost % if stated
- Breakeven year (SV > total premiums)
- Any unique features (conversion, waiver triggers, multiplier)

NOTES: notes (string — concise 3-5 sentence FC review summary)
USER REMARKS: userRemarks (string — if the document contains handwritten notes, comments, annotations, or informal remarks by the user/advisor such as "worth it?", "only till 75 yo", "also have TCM/CHIRO $7", preserve them EXACTLY as written. Do NOT interpret, expand, or rephrase. Include the original text verbatim. If no user remarks detected, leave empty.)

EXCEL/SPREADSHEET HANDLING: If the input is a spreadsheet or tabular data:
- Each ROW is likely a separate policy. Extract ALL rows as separate policy objects.
- Column headers map to fields: look for columns like "Policy Name", "Plan Name", "Insurer", "Company", "Sum Assured", "SA", "Premium", "Annual Premium", etc.
- If a column mentions "rider" in its name or has separate rider premiums, those are SEPARATE riders (bundled=false, include riderName).
- If the spreadsheet has rider columns like "CI Rider", "TPD Rider" with SA values, create rider entries for each.
- Return an ARRAY of policy objects — one per row.
- Infer category and subType from plan names (e.g. "term" → Term Life, "whole life" / "WL" → Whole Life, "ISP" / "shield" → Integrated Shield Plan, "ILP" → ILP (Investment), "endowment" → Endowment, "annuity" / "income" → Retirement).
- If a plan has a separate rider premium column, set the rider's bundled=false and premium to that value.

PREMIUM AMOUNT SANITY: Double-check premium amounts:
- Short-term endowments (≤3yr): typically $10,000–$500,000 single premium. If "$30,000.00" appears in source, annualPremium=30000, NOT 3000000. Watch decimal places: "$30,000.00" = 30000, NOT 3000000. Be careful with comma-separated thousands: $30,000 = thirty thousand, $300,000 = three hundred thousand.
- Regular annual premiums for life/CI/endowment: typically $500–$50,000/year
- ILP/Investment single premiums: typically $10,000–$500,000

            if(!best) {
