// MODULE: FUND_LOOKUP — iFAST fund risk lookup
// ═══════════════════════════════════════════════════════════════

function FundLookup() {
  const [search, setSearch] = useState('');
  const [acFilter, setAcFilter] = useState('all');
  const [regionFilter, setRegionFilter] = useState('all');
  const [sectorFilter, setSectorFilter] = useState('all');
  const [riskFilter, setRiskFilter] = useState('all');
  const [page, setPage] = useState(0);
  const PAGE_SIZE = 50;

  // ── Exact FundLens label mappings ──
  const ASSET_LABELS = {
    equity:'Equity',etf:'ETF/Index',bond:'Bond',bond_govt:'Govt Bond',bond_corp:'IG Corp Bond',
    bond_hy:'High Yield',structured:'Structured',reit:'REIT',property:'Property Fund',
    cash:'Cash',money_mkt:'Money Market',mixed:'Multi-Asset',alternatives:'Alternatives',
    commodities:'Commodities',crypto:'Crypto',other:'Other'
  };
  const REGION_LABELS = {sg:'Singapore',us:'US',global:'Global',asia:'Asia ex-JP',em:'Emerging Mkt',eu:'Europe',jp:'Japan',au:'Australia',cn:'China',other:'Other'};
  const SECTOR_LABELS = {
    multi_sector:'Multi-Sector / Diversified',
    tech:'Technology',healthcare:'Healthcare',financials:'Financials',realestate:'Real Estate',
    energy:'Energy & Oil/Gas',industrials:'Industrials',consumer_disc:'Consumer Discretionary',
    consumer_staple:'Consumer Staples',materials:'Materials & Chemicals',utilities:'Utilities',
    telecom:'Telecom & Media',biotech:'Biotech & Life Sciences',pharma:'Pharmaceuticals',
    semiconductor:'Semiconductors & Chips',ai_robotics:'AI & Robotics',cybersecurity:'Cybersecurity',
    cloud_saas:'Cloud & SaaS',fintech:'Fintech & Digital Payments',greentech:'Clean Energy & Green Tech',
    infra:'Infrastructure',logistics:'Logistics & Supply Chain',luxury:'Luxury & Premium Brands',
    media:'Media & Entertainment',auto:'Automotive & EV',aerospace:'Aerospace & Defence',
    mining:'Mining & Resources',agri:'Agriculture & Food',water:'Water & Sustainability',
    insurance:'Insurance',banking:'Banking & Wealth Mgmt',private_eq:'Private Equity / Alternatives',
    hedge:'Hedge / Absolute Return',commodities:'Commodities',gold:'Gold & Precious Metals',
    crypto_block:'Crypto & Blockchain',esg_impact:'ESG / Impact Investing',shariah:'Shariah-Compliant',
    dividend_inc:'Dividend & Income',bonds_fi:'Bonds & Fixed Income',money_mkt:'Money Market / Cash',
    infra_util:'Infrastructure & Utilities',resources:'Resources',other:'Other / Unclassified'
  };
  const AC_COLORS = {
    equity:'#1a56db',etf:'#0b9488',bond:'#5a6070',bond_govt:'#4a5568',bond_corp:'#718096',
    bond_hy:'#e67e22',structured:'#c84b4b',reit:'#c8820a',property:'#d4a017',cash:'#8a8f99',
    money_mkt:'#a0aec0',mixed:'#6d3fa0',alternatives:'#2c7a7b',commodities:'#d69e2e',
    crypto:'#805ad5',other:'#718096'
  };
  const GEO_COLORS = {
    sg:'#0b6b5c',us:'#1a56db',global:'#6d3fa0',asia:'#c8820a',em:'#c84b4b',
    eu:'#2c7a7b',jp:'#e67e22',au:'#38a169',cn:'#e53e3e',other:'#8a8f99'
  };
  const RISK_COLORS = ['#2d9cdb','#2db9a7','#48bb78','#68d391','#f6e05e','#f6ad55','#fc8181','#f56565','#e53e3e','#c53030'];

  // ── Derive filter options from data ──
  const assetClasses = useMemo(()=>[...new Set(FUND_DB.map(f=>f[1]))].sort(),[]);
  const regions = useMemo(()=>[...new Set(FUND_DB.map(f=>f[2]))].sort(),[]);
  const sectors = useMemo(()=>[...new Set(FUND_DB.map(f=>f[3]))].sort(),[]);

  const filtered = useMemo(() => {
    return FUND_DB.filter(f => {
      if(acFilter!=='all' && f[1]!==acFilter) return false;
      if(regionFilter!=='all' && f[2]!==regionFilter) return false;
      if(sectorFilter!=='all' && f[3]!==sectorFilter) return false;
      if(riskFilter!=='all') {
        const r = f[4];
        if(riskFilter==='low' && r>3) return false;
        if(riskFilter==='med' && (r<4||r>6)) return false;
        if(riskFilter==='high' && (r<7||r>8)) return false;
        if(riskFilter==='vhigh' && r<9) return false;
      }
      if(search) {
        const q = search.toLowerCase();
        if(!f[0].toLowerCase().includes(q) && !(f[6]||'').toLowerCase().includes(q)) return false;
      }
      return true;
    });
  }, [search,acFilter,regionFilter,sectorFilter,riskFilter]);

  useEffect(() => setPage(0), [search,acFilter,regionFilter,sectorFilter,riskFilter]);

  const paged = filtered.slice(page*PAGE_SIZE, (page+1)*PAGE_SIZE);
  const totalPages = Math.ceil(filtered.length/PAGE_SIZE);

  const riskColor = r => RISK_COLORS[Math.max(0,Math.min(9,(r||1)-1))];
  const riskLabel = r => r>=9?'Very High':r>=7?'High':r>=5?'Medium-High':r>=3?'Medium':r>=2?'Low':'Very Low';
  const acBadgeColor = t => AC_COLORS[t]||'#718096';

  const acCounts = useMemo(() => {
    const m={};FUND_DB.forEach(f=>{m[f[1]]=(m[f[1]]||0)+1});return m;
  },[]);
  const regionCounts = useMemo(() => {
    const m={};FUND_DB.forEach(f=>{m[f[2]]=(m[f[2]]||0)+1});return m;
  },[]);

  return (
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:10}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:600}}>Fund & Instrument Risk Lookup</h2>
          <p style={{fontSize:12,color:'var(--text3)'}}>iFAST universe — {FUND_DB.length.toLocaleString()} instruments • Risk scale 1–10</p>
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name or ISIN…" style={{flex:'1 1 200px',maxWidth:300}} />
      </div>

      {/* Asset Composition chips — matches FundLens donut */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:5}}>Asset Composition</div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          <div onClick={()=>setAcFilter('all')} style={{padding:'4px 10px',borderRadius:8,fontSize:11,fontWeight:500,cursor:'pointer',
            background:acFilter==='all'?'var(--bg4)':'transparent',color:acFilter==='all'?'var(--text)':'var(--text3)',border:'1px solid '+(acFilter==='all'?'var(--border2)':'transparent')}}>
            All ({FUND_DB.length.toLocaleString()})
          </div>
          {Object.entries(acCounts).sort((a,b)=>b[1]-a[1]).map(([t,c])=>{
            const col=acBadgeColor(t);
            return <div key={t} onClick={()=>setAcFilter(acFilter===t?'all':t)} style={{
              padding:'4px 10px',borderRadius:8,fontSize:11,fontWeight:500,cursor:'pointer',
              background:acFilter===t?col+'22':'transparent',color:acFilter===t?col:'var(--text3)',
              border:'1px solid '+(acFilter===t?col+'55':'transparent'),
              opacity:acFilter!=='all'&&acFilter!==t?.4:1}}>
              <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:col,marginRight:4}} />
              {ASSET_LABELS[t]||t} ({c})
            </div>
          })}
        </div>
      </div>

      {/* Country chips — matches FundLens geo donut */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:5}}>Country / Region</div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          <div onClick={()=>setRegionFilter('all')} style={{padding:'4px 10px',borderRadius:8,fontSize:11,fontWeight:500,cursor:'pointer',
            background:regionFilter==='all'?'var(--bg4)':'transparent',color:regionFilter==='all'?'var(--text)':'var(--text3)',border:'1px solid '+(regionFilter==='all'?'var(--border2)':'transparent')}}>
            All
          </div>
          {Object.entries(regionCounts).sort((a,b)=>b[1]-a[1]).map(([r,c])=>{
            const col=GEO_COLORS[r]||'#718096';
            return <div key={r} onClick={()=>setRegionFilter(regionFilter===r?'all':r)} style={{
              padding:'4px 10px',borderRadius:8,fontSize:11,fontWeight:500,cursor:'pointer',
              background:regionFilter===r?col+'22':'transparent',color:regionFilter===r?col:'var(--text3)',
              border:'1px solid '+(regionFilter===r?col+'55':'transparent'),
              opacity:regionFilter!=='all'&&regionFilter!==r?.4:1}}>
              <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:col,marginRight:4}} />
              {REGION_LABELS[r]||r} ({c})
            </div>
          })}
        </div>
      </div>

      {/* Sector + Risk dropdowns */}
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
        <div>
          <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:3}}>Sector</div>
          <select value={sectorFilter} onChange={e=>setSectorFilter(e.target.value)} style={{fontSize:12,minWidth:160,maxWidth:'100%'}}>
            <option value="all">All Sectors</option>
            {sectors.map(s=><option key={s} value={s}>{SECTOR_LABELS[s]||s}</option>)}
          </select>
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:3}}>Risk Level</div>
          <select value={riskFilter} onChange={e=>setRiskFilter(e.target.value)} style={{fontSize:12}}>
            <option value="all">All Risk Levels</option>
            <option value="low">Low (1-3)</option>
            <option value="med">Medium (4-6)</option>
            <option value="high">High (7-8)</option>
            <option value="vhigh">Very High (9-10)</option>
          </select>
        </div>
        {(acFilter!=='all'||regionFilter!=='all'||sectorFilter!=='all'||riskFilter!=='all'||search) &&
          <button className="btn-secondary btn-sm" style={{marginTop:14}} onClick={()=>{setAcFilter('all');setRegionFilter('all');setSectorFilter('all');setRiskFilter('all');setSearch('')}}>Clear All Filters</button>}
      </div>

      {/* Results count + pagination */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontSize:12,color:'var(--text3)'}}>{filtered.length.toLocaleString()} results{filtered.length!==FUND_DB.length?' (filtered)':''}</span>
        {totalPages>1 && <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <button className="btn-secondary btn-sm" disabled={page===0} onClick={()=>setPage(p=>p-1)}>‹</button>
          <span style={{fontSize:11,color:'var(--text2)',minWidth:80,textAlign:'center'}}>Page {page+1} of {totalPages}</span>
          <button className="btn-secondary btn-sm" disabled={page>=totalPages-1} onClick={()=>setPage(p=>p+1)}>›</button>
        </div>}
      </div>

      <div className="card" style={{padding:0,overflow:'hidden',overflowX:'auto'}}>
        <table style={{minWidth:0}}>
          <thead><tr>
            <th style={{minWidth:140}}>Name</th>
            <th>Type</th>
            <th>Region</th>
            <th className="desktop-only">Sector</th>
            <th style={{textAlign:'center'}}>Risk</th>
            <th className="desktop-only">Inception</th>
            <th className="desktop-only">ISIN</th>
          </tr></thead>
          <tbody>
            {paged.map((f,i) => {
              const [name,ac,region,sector,risk,inception,isin] = f;
              const acCol = acBadgeColor(ac);
              const geoCol = GEO_COLORS[region]||'#718096';
              const rCol = riskColor(risk);
              return (
                <tr key={page*PAGE_SIZE+i}>
                  <td style={{fontWeight:500,maxWidth:240,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{name}</td>
                  <td>
                    <span className="badge" style={{background:acCol+'22',color:acCol,fontSize:9,padding:'1px 5px'}}>
                      {ASSET_LABELS[ac]||ac}
                    </span>
                  </td>
                  <td>
                    <span style={{fontSize:11,display:'inline-flex',alignItems:'center',gap:3}}>
                      <span style={{width:6,height:6,borderRadius:'50%',background:geoCol,flexShrink:0}} />
                      {REGION_LABELS[region]||region}
                    </span>
                  </td>
                  <td className="desktop-only" style={{fontSize:11,color:'var(--text2)'}}>{SECTOR_LABELS[sector]||sector}</td>
                  <td style={{textAlign:'center'}}>
                    <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:26,height:26,borderRadius:'50%',background:rCol+'22',color:rCol,fontWeight:700,fontSize:11}}>{risk}</div>
                  </td>
                  <td className="desktop-only" style={{fontSize:10,color:'var(--text3)'}}>{inception||'—'}</td>
                  <td className="desktop-only mono" style={{fontSize:9,color:'var(--text3)'}}>{isin||'—'}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length===0 && <div style={{padding:24,textAlign:'center',color:'var(--text3)'}}>No instruments match your search</div>}
      </div>

      {/* Bottom pagination */}
      {totalPages>1 && <div style={{display:'flex',justifyContent:'center',gap:4,marginTop:12}}>
        <button className="btn-secondary btn-sm" disabled={page===0} onClick={()=>setPage(0)}>First</button>
        <button className="btn-secondary btn-sm" disabled={page===0} onClick={()=>setPage(p=>p-1)}>‹ Prev</button>
        <span style={{fontSize:11,color:'var(--text2)',padding:'5px 10px'}}>Page {page+1} of {totalPages}</span>
        <button className="btn-secondary btn-sm" disabled={page>=totalPages-1} onClick={()=>setPage(p=>p+1)}>Next ›</button>
        <button className="btn-secondary btn-sm" disabled={page>=totalPages-1} onClick={()=>setPage(totalPages-1)}>Last</button>
      </div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MODULE: PDF_REPORT — Executive summary generation
// ═══════════════════════════════════════════════════════════════

function ReportTab() {
  const {policies,clientName,clientProfile} = useContext(AppCtx);
  const [generating, setGenerating] = useState(false);
  const p = clientProfile || {};
  const age = p.dob ? Math.floor((Date.now()-new Date(p.dob).getTime())/31557600000) : 35;
  const retAge = parseInt(p.retirementAge)||65;
  const annualIncome = parseFloat(p.annualIncome)||0;

  const generate = async () => {
    setGenerating(true);
    try {
      const advisorName = ((await dbGet('settings','advisorName').catch(()=>null))?.value||'').trim();
      const advisorCompany = ((await dbGet('settings','advisorCompany').catch(()=>null))?.value||'').trim();
      const {jsPDF} = window.jspdf;
      const doc = new jsPDF('p','mm','a4');
      const W=210, M=14, CW=W-2*M;
      let y=0;
      const NAVY=[11,15,26], GOLD=[212,169,106], CREAM=[232,220,200], GRAY=[100,100,100], DARK=[23,31,46], WHITE=[255,255,255];
      const today = new Date().toLocaleDateString('en-SG',{day:'numeric',month:'long',year:'numeric'});

      // ═══ HELPER: Page header ═══
      const pageHeader = (title, subtitle) => {
        doc.setFillColor(...NAVY);doc.rect(0,0,W,36,'F');
        doc.setFillColor(...GOLD);doc.rect(0,35,W,1.5,'F');
        // Logo mark
        doc.setDrawColor(...GOLD);doc.setLineWidth(0.5);doc.circle(M+4,18,3.5);
        doc.setFillColor(...GOLD);doc.circle(M+4,18,0.4,'F');
        doc.setLineWidth(0.25);doc.line(M+4,15.5,M+4,16.8);doc.line(M+4,19.2,M+4,20.5);doc.line(M+1.5,18,M+2.8,18);doc.line(M+5.2,18,M+6.5,18);
        doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(...GOLD);
        doc.text('PolicyLens',M+10,20);
        doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(...CREAM);
        doc.text(title,M+10,27);
        if(subtitle){doc.setFontSize(7);doc.setTextColor(160,160,160);doc.text(subtitle,M+10,32);}
        if(clientName){doc.setFontSize(8);doc.setTextColor(180,180,180);doc.text(clientName,W-M,20,{align:'right'});}
        doc.setFontSize(7);doc.setTextColor(130,130,130);doc.text(today,W-M,27,{align:'right'});
        return 44;
      };

      // ═══ HELPER: Section heading — navy band ═══
      const safeY = (v) => (typeof v === 'number' && !isNaN(v) && isFinite(v)) ? v : 48;
      const sectionHead = (title, yPos) => {
        yPos = safeY(yPos);
        doc.setFillColor(23,31,46);doc.roundedRect(M,yPos,CW,9,1.5,1.5,'F');
        doc.setFillColor(...GOLD);doc.rect(M,yPos,2.5,9,'F');
        doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...WHITE);
        doc.text(title,M+6,yPos+6.5);
        return yPos+13;
      };

      // ═══ HELPER: Footer on all pages ═══
      const addFooters = () => {
        const pageCount = doc.getNumberOfPages();
        for(let i=1;i<=pageCount;i++){
          doc.setPage(i);
          doc.setFillColor(...GOLD);doc.rect(0,283,W,0.5,'F');
          doc.setFillColor(...NAVY);doc.rect(0,283.5,W,14,'F');
          doc.setFontSize(7);doc.setTextColor(130,130,130);
          doc.text('PolicyLens V1.0 — Confidential · For Financial Consultant Use Only',M,290);
          if(advisorName) doc.text('Prepared by '+advisorName+(advisorCompany?' | '+advisorCompany:''),W/2,290,{align:'center'});
          doc.setTextColor(...GOLD);doc.text('Page '+i+' of '+pageCount,W-M,290,{align:'right'});
        }
      };

      // ═══ PAGE 1: EXECUTIVE SUMMARY ═══
      // Full navy cover
      doc.setFillColor(...NAVY);doc.rect(0,0,W,80,'F');
      // Gold accent bar on left
      doc.setFillColor(...GOLD);doc.rect(0,0,4,80,'F');
      // Bottom gold line
      doc.setFillColor(...GOLD);doc.rect(0,78,W,2,'F');
      // Logo mark (larger)
      doc.setDrawColor(...GOLD);doc.setLineWidth(0.8);doc.circle(M+8,28,6);
      doc.setFillColor(...GOLD);doc.circle(M+8,28,0.6,'F');
      doc.setLineWidth(0.35);doc.line(M+8,23.5,M+8,25.5);doc.line(M+8,30.5,M+8,32.5);doc.line(M+3.5,28,M+5.5,28);doc.line(M+10.5,28,M+12.5,28);
      // Eyebrow
      doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(...GOLD);
      doc.text('INSURANCE PORTFOLIO REVIEW',M+18,22);
      // Gold separator line under eyebrow
      doc.setDrawColor(...GOLD);doc.setLineWidth(0.3);doc.line(M+18,24,M+85,24);
      // Client name (large)
      doc.setFont('helvetica','bold');doc.setFontSize(24);doc.setTextColor(...WHITE);
      doc.text(clientName||'Client Portfolio',M+18,36);
      // Subtitle
      doc.setFont('helvetica','normal');doc.setFontSize(9.5);doc.setTextColor(...CREAM);
      doc.text('Protection coverage, cash value projections & retirement readiness',M+18,46);
      // Meta info in a clean row
      doc.setFontSize(8);doc.setTextColor(170,170,170);
      const metaItems = [];
      if(age) metaItems.push('Age '+age);
      if(retAge) metaItems.push('Retirement '+retAge);
      if(annualIncome>0) metaItems.push('Income '+fmt(annualIncome)+'/yr');
      metaItems.push(today);
      doc.text(metaItems.join('   ·   '),M+18,56);
      // Advisor info right-aligned
      if(advisorName) {
        doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(180,180,180);
        doc.text('Prepared by',W-M,50,{align:'right'});
        doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...CREAM);
        doc.text(advisorName+(advisorCompany?' | '+advisorCompany:''),W-M,57,{align:'right'});
      }
      y=88;

      // Coverage score badge
      const activePols2 = policies.filter(p=>p.status!=='matured'&&p.status!=='surrendered'&&p.status!=='lapsed'&&p.category!=='cash_investments'&&p.category!=='other_assets');
      const totalPrem = activePols2.filter(p=>!p.premSingle&&p.premiumStructure!=='Single Premium'&&p.premFrequency!=='single').reduce((s,p)=>s+(p.premFrequency==='monthly'?(parseFloat(p.annualPremium)||0)*12:(parseFloat(p.annualPremium)||0)),0);
      const totalSinglePrem2 = activePols2.filter(p=>p.premSingle||p.premiumStructure==='Single Premium'||p.premFrequency==='single').reduce((s,p)=>s+(parseFloat(p.annualPremium)||0),0);
      const totalCover = policies.filter(p=>p.status!=='matured'&&p.status!=='surrendered').reduce((s,p)=>s+(parseFloat(p.sumAssured)||0),0);
      // Premium breakdown by mode for PDF
      const premiumBreakdown = {totalAnnual:totalPrem,totalSingle:totalSinglePrem2,modes:{cash:{annual:0},medisave:{annual:0},srs:{annual:0},cpfoa:{annual:0},cpfsa:{annual:0}}};
      activePols2.filter(p=>!p.premSingle&&p.premiumStructure!=='Single Premium'&&p.premFrequency!=='single').forEach(p=>{
        const prem=p.premFrequency==='monthly'?(parseFloat(p.annualPremium)||0)*12:(parseFloat(p.annualPremium)||0);
        const m=(p.paymentMethod||'').toLowerCase();
        if(m.includes('medisave'))premiumBreakdown.modes.medisave.annual+=prem;
        else if(m.includes('srs'))premiumBreakdown.modes.srs.annual+=prem;
        else if(m.includes('cpf sa')||m.includes('cpfsa'))premiumBreakdown.modes.cpfsa.annual+=prem;
        else if(m.includes('cpf')||m.includes('cpfoa'))premiumBreakdown.modes.cpfoa.annual+=prem;
        else premiumBreakdown.modes.cash.annual+=prem;
      });

      // Compute coverage
      let cDeath=0,cTPD=0,cCI=0,cECI=0,cDI=0,hasISP=false;
      policies.forEach(pol => {
        (pol.riders||[]).forEach(rd => {
          const sa=parseFloat(rd.sa)||0;
          if(rd.type==='death')cDeath+=sa;if(rd.type==='tpd')cTPD+=sa;if(rd.type==='ci')cCI+=sa;if(rd.type==='eci')cECI+=sa;if(rd.type==='di')cDI+=sa;
        });
        if(pol.category==='protection'&&!['Personal Accident','Critical Illness'].includes(pol.subType)){const sa=parseFloat(pol.sumAssured)||0;const mult=parseFloat(pol.saMultiplier)||1;const multEnd=parseInt(pol.multiplierEndAge)||70;const effSA=age<multEnd?sa*mult:sa;cDeath+=effSA;cTPD+=effSA;}
        if(pol.subType==='Critical Illness')cCI+=parseFloat(pol.sumAssured)||0;
        if(pol.subType==='Integrated Shield Plan')hasISP=true;
        if(pol.subType==='Disability Income')cDI+=parseFloat(pol.diMonthlyBenefit)||0;
      });
      const pMonthlyExp = parseFloat(p.monthlyExpenses)||0;
      const pMortgage = parseFloat(p.mortgagePayment)||0;
      const pMedical = parseFloat(p.medicalBudget)||0;
      const pTotalMonthly = pMonthlyExp + pMortgage + pMedical;
      const pMonthlyForCI = pTotalMonthly > 0 ? pTotalMonthly : (annualIncome > 0 ? annualIncome/12 : 4000);
      const rDeath=annualIncome>0?annualIncome*10:500000;
      const rTPD=annualIncome>0?annualIncome*10:500000;
      const rCI=pMonthlyForCI*12*5;
      const rECI=pMonthlyForCI*12*2;
      const rDI=annualIncome>0?Math.round(annualIncome/12*0.75):3000;
      const gapRows=[
        ['Death & Total Invalidity',cDeath,rDeath,20],['Total Permanent Disability',cTPD,rTPD,20],['Critical Illness',cCI,rCI,25],
        ['Early CI',cECI,rECI,10],['Disability/mth',cDI,rDI,10],
        ['Hospitalisation',hasISP?1:0,1,15],
      ];
      const score=Math.round(gapRows.reduce((s,g)=>{const pct=g[3]===15?(g[1]>=g[2]?100:(g[1]>0?50:0)):Math.min(100,g[1]/Math.max(1,g[2])*100);return s+pct*g[3]/100;},0));

      // KPI Cards — navy blocks with gold/white text
      y=safeY(y);
      const kpiW = (CW-9)/4;
      const kpiData = [
        {label:'ACTIVE POLICIES',value:String(policies.filter(p=>p.status!=='matured'&&p.status!=='surrendered').length),color:WHITE},
        {label:'ANNUAL PREMIUMS',value:fmt(premiumBreakdown?.totalAnnual||totalPrem)+'/yr',color:GOLD},
        {label:'TOTAL COVERAGE',value:totalCover>=1e6?'$'+(totalCover/1e6).toFixed(1)+'M':fmt(totalCover),color:WHITE},
        {label:'COVERAGE SCORE',value:score+'%',color:score>=80?[91,168,160]:score>=50?GOLD:[239,83,80]},
      ];
      kpiData.forEach((kpi,i) => {
        const x = M + i*(kpiW+3);
        doc.setFillColor(23,31,46);doc.roundedRect(x,y,kpiW,24,2,2,'F');
        doc.setFont('helvetica','bold');doc.setFontSize(6);doc.setTextColor(140,140,140);
        doc.text(kpi.label,x+4,y+7);
        doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(...kpi.color);
        doc.text(kpi.value,x+4,y+19);
      });
      y+=30;

      // Gap analysis table
      y=sectionHead('Protection Gap Analysis (LIA Framework)',y);
      doc.autoTable({
        startY:y,margin:{left:M,right:M},
        head:[['Coverage','Current','Required','Gap','Status']],
        body:gapRows.map(g=>{
          const isFlag=g[0]==='Hospitalisation';
          const cur=isFlag?(g[1]?'Yes':'No'):fmt(g[1]);
          const need=isFlag?'Yes':fmt(g[2]);
          const gap=isFlag?'':(g[2]-g[1]>0?fmt(g[2]-g[1]):'-');
          const status=isFlag?(g[1]?'COVERED':'NO ISP'):(g[1]>=g[2]?'ADEQUATE':'SHORTFALL');
          return [g[0],cur,need,gap,status];
        }),
        styles:{fontSize:8,cellPadding:3.5},
        headStyles:{fillColor:NAVY,textColor:CREAM,fontStyle:'bold',fontSize:8},
        alternateRowStyles:{fillColor:[245,243,238]},
        didParseCell:(data)=>{
          if(data.section==='body'&&data.column.index===4){
            data.cell.styles.textColor=data.cell.raw==='COVERED'||data.cell.raw==='ADEQUATE'?[52,211,153]:[239,83,80];
            data.cell.styles.fontStyle='bold';
          }
        }
      });
      y=(doc.lastAutoTable?.finalY||y)+8;

      // ═══ RIDER COVERAGE MATRIX ═══
      y=sectionHead('Rider Coverage Matrix — All Policies',y);
      const riderMatrix = {};
      const riderTypes = ['death','tpd','ci','eci','di','accidental','premium_waiver'];
      riderTypes.forEach(t=>riderMatrix[t]={total:0,policies:[]});
      policies.forEach(pol=>{
        (pol.riders||[]).forEach(rd=>{
          if(riderMatrix[rd.type]){
            riderMatrix[rd.type].total+=parseFloat(rd.sa)||0;
            riderMatrix[rd.type].policies.push((pol.productName||pol.insurer||'')+(rd.riderName?' ('+rd.riderName+')':''));
          }
        });
      });
      doc.autoTable({
        startY:y,margin:{left:M,right:M},
        head:[['Benefit','Total Sum Assured','Policies Contributing']],
        body:riderTypes.map(t=>{
          const labels={death:'Death & Total Invalidity',tpd:'Total Permanent Disability',ci:'Critical Illness',eci:'Early Critical Illness',di:'Disability Income/mth',accidental:'Accidental Death',premium_waiver:'Premium Waiver'};
          return [labels[t]||t, riderMatrix[t].total>0?fmt(riderMatrix[t].total):'-', riderMatrix[t].policies.join(', ')||'None'];
        }),
        styles:{fontSize:7.5,cellPadding:2.5},
        headStyles:{fillColor:DARK,textColor:CREAM,fontStyle:'bold',fontSize:7.5},
        columnStyles:{2:{cellWidth:80,fontSize:7}},
      });
      y=(doc.lastAutoTable?.finalY||y)+8;

      // ═══ PREMIUM SUMMARY BY MODE ═══
      y=sectionHead('Premium Summary',y);
      if(y>240){doc.addPage();y=pageHeader('Premium Summary','');y+=4;}
      const premModes = [];
      const activePols = policies.filter(p=>p.status!=='matured'&&p.status!=='surrendered'&&p.status!=='lapsed'&&p.category!=='cash_investments'&&p.category!=='other_assets');
      const modeCalc = {cash:{annual:0,single:0},medisave:{annual:0,single:0},srs:{annual:0,single:0},cpfoa:{annual:0,single:0}};
      activePols.forEach(pol=>{
        const prem=parseFloat(pol.annualPremium)||0;if(!prem)return;
        const isSP=pol.premSingle||pol.premiumStructure==='Single Premium'||pol.premFrequency==='single';
        const ann=isSP?0:(pol.premFrequency==='monthly'?prem*12:prem);
        const sp=isSP?prem:0;
        const m=(pol.paymentMethod||'').toLowerCase();
        if(m.includes('medisave')){modeCalc.medisave.annual+=ann;modeCalc.medisave.single+=sp;}
        else if(m.includes('srs')){modeCalc.srs.annual+=ann;modeCalc.srs.single+=sp;}
        else if(m.includes('cpf')){modeCalc.cpfoa.annual+=ann;modeCalc.cpfoa.single+=sp;}
        else{modeCalc.cash.annual+=ann;modeCalc.cash.single+=sp;}
      });
      if(modeCalc.cash.annual>0) premModes.push(['Cash','$'+Math.round(modeCalc.cash.annual).toLocaleString()+'/yr','$'+Math.round(modeCalc.cash.annual/12).toLocaleString()+'/mth']);
      if(modeCalc.medisave.annual>0) premModes.push(['MediSave','$'+Math.round(modeCalc.medisave.annual).toLocaleString()+'/yr','$'+Math.round(modeCalc.medisave.annual/12).toLocaleString()+'/mth']);
      if(modeCalc.srs.annual>0) premModes.push(['SRS','$'+Math.round(modeCalc.srs.annual).toLocaleString()+'/yr','$'+Math.round(modeCalc.srs.annual/12).toLocaleString()+'/mth']);
      if(modeCalc.cpfoa.annual>0) premModes.push(['CPF OA','$'+Math.round(modeCalc.cpfoa.annual).toLocaleString()+'/yr','$'+Math.round(modeCalc.cpfoa.annual/12).toLocaleString()+'/mth']);
      const totAnn=Object.values(modeCalc).reduce((s,m)=>s+m.annual,0);
      const totSP=Object.values(modeCalc).reduce((s,m)=>s+m.single,0);
      premModes.push(['Total Annual','$'+Math.round(totAnn).toLocaleString()+'/yr','$'+Math.round(totAnn/12).toLocaleString()+'/mth']);
      if(totSP>0) premModes.push(['Single Premiums (one-time)','$'+Math.round(totSP).toLocaleString(),'']);
      doc.autoTable({
        startY:y,margin:{left:M,right:M},
        head:[['Payment Mode','Annual','Monthly']],
        body:premModes,
        styles:{fontSize:8,cellPadding:3},
        headStyles:{fillColor:DARK,textColor:CREAM,fontStyle:'bold',fontSize:8},
        didParseCell:function(data){if(data.section==='body'&&data.row.index===premModes.length-(totSP>0?2:1)){data.cell.styles.fontStyle='bold';data.cell.styles.textColor=GOLD;}},
      });
      y=(doc.lastAutoTable?.finalY||y)+8;

      // ═══ PREMIUM SCHEDULE — GROUPED ═══
      y=sectionHead('Premium Schedule',y);
      if(y>240){doc.addPage();y=pageHeader('Premium Schedule','Annual premium commitments');y+=4;}

      const pdfGroups = [
        {id:'protection', main:'Insurance', sub:'Protection', match: pol => pol.category==='protection' && !['Universal Life (UL)','Indexed UL (IUL)','Variable UL (VUL)'].includes(pol.subType)},
        {id:'ul', main:'Insurance', sub:'Universal Life', match: pol => ['Universal Life (UL)','Indexed UL (IUL)','Variable UL (VUL)'].includes(pol.subType)},
        {id:'investment', main:'Insurance', sub:'Investment', match: pol => pol.category==='investment'},
        {id:'savings', main:'Insurance', sub:'Endowment & Savings', match: pol => pol.category==='savings'},
        {id:'retirement', main:'Insurance', sub:'Retirement & Annuities', match: pol => pol.category==='retirement'},
        {id:'health', main:'Insurance', sub:'Accident & Medical', match: pol => pol.category==='health' || pol.category==='maternity'},
        {id:'fi', main:'Fixed Deposits, T-bills & Bonds', sub:null, match: pol => pol.category==='cash_investments'},
        {id:'other', main:'Other Assets', sub:null, match: pol => pol.category==='other_assets'},
      ].map(g => ({...g, items: policies.filter(p=>p.status!=='matured'&&p.status!=='surrendered'&&p.status!=='lapsed').filter(g.match).sort((a,b)=>(a.subType||'').localeCompare(b.subType||'')||(a.insurer||'').localeCompare(b.insurer||''))})).filter(g => g.items.length > 0);

      let pdfLastMain = '';
      pdfGroups.forEach(g => {
        const isFI = g.id === 'fi';
        if(y>240){doc.addPage();y=pageHeader('Premium Schedule (cont.)','');y+=4;}

        // Main header
        if(g.main !== pdfLastMain) {
          doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...GOLD);
          doc.text(g.main,M,y+4);
          doc.setDrawColor(...GOLD);doc.setLineWidth(0.3);doc.line(M+doc.getTextWidth(g.main)+3,y+2,W-M,y+2);
          y+=8;
          pdfLastMain = g.main;
        }
        // Sub header
        if(g.sub) {
          doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(120,120,120);
          doc.text(g.sub.toUpperCase()+' ('+g.items.length+')',M+2,y+3);
          y+=6;
        }

        if(isFI) {
          doc.autoTable({
            startY:y,margin:{left:M,right:M},
            head:[['Bank/Provider','Product','Principal','Yield % p.a.','Maturity']],
            body:g.items.map(pol=>[
              pol.insurer||'-',
              pol.productName||pol.subType||'-',
              pol.fdPrincipal?'$'+parseInt(pol.fdPrincipal).toLocaleString():'-',
              pol.fdYieldPct?pol.fdYieldPct+'%':'-',
              pol.fdMaturityDate?new Date(pol.fdMaturityDate).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'2-digit'}):'-',
            ]),
            styles:{fontSize:7.5,cellPadding:2},
            headStyles:{fillColor:DARK,textColor:CREAM,fontStyle:'bold',fontSize:7},
          });
        } else {
          doc.autoTable({
            startY:y,margin:{left:M,right:M},
            head:[['Policy','Insurer','Premium','Method','Term','Paid-up']],
            body:g.items.map(pol=>[
              pol.productName||pol.policyName||'-',
              pol.insurer||'-',
              (pol.currency||'SGD')+' '+(parseFloat(pol.annualPremium)||0).toLocaleString()+(pol.premFrequency==='monthly'?'/mth':pol.premSingle?'(SP)':'/yr'),
              pol.paymentMethod||'Cash',
              pol.premSingle?'Single':(pol.premTerm||'-')+' yrs',
              pol.premWholeLife?'Whole Life':pol.premEndAge||'-',
            ]),
            styles:{fontSize:7.5,cellPadding:2},
            headStyles:{fillColor:DARK,textColor:CREAM,fontStyle:'bold',fontSize:7},
          });
        }
        y=(doc.lastAutoTable?.finalY||y)+6;
      });
      // Total footer
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...DARK);
      doc.text('Total Annual Premiums: '+fmt(totalPrem)+'/yr',M,y+3);
      if(policies.some(p=>p.premSingle||p.premFrequency==='single')) {
        const singleTotal = policies.filter(p=>p.premSingle||p.premFrequency==='single').reduce((s,p)=>s+(parseFloat(p.annualPremium)||0),0);
        doc.text(' + '+fmt(singleTotal)+' single',M+doc.getTextWidth('Total Annual Premiums: '+fmt(totalPrem)+'/yr')+2,y+3);
      }
      y+=12;

      // ═══ PAGE 2+: PER-POLICY DETAIL BLOCKS — GROUPED ═══
      const detailGroups = [
        {label:'Protection', match: pol => pol.category==='protection' && !['Universal Life (UL)','Indexed UL (IUL)','Variable UL (VUL)'].includes(pol.subType)},
        {label:'Universal Life', match: pol => ['Universal Life (UL)','Indexed UL (IUL)','Variable UL (VUL)'].includes(pol.subType)},
        {label:'Investment', match: pol => pol.category==='investment'},
        {label:'Endowment & Savings', match: pol => pol.category==='savings'},
        {label:'Retirement & Annuities', match: pol => pol.category==='retirement'},
        {label:'Accident & Medical', match: pol => pol.category==='health' || pol.category==='maternity'},
        {label:'Fixed Deposits, T-bills & Bonds', match: pol => pol.category==='cash_investments'},
        {label:'Other Assets', match: pol => pol.category==='other_assets'},
      ].map(g => ({...g, items: policies.filter(g.match)})).filter(g => g.items.length > 0);

      detailGroups.forEach(({label:catLabel, items:ps}) => {
        if(y>220){doc.addPage();y=pageHeader('Policy Details','Individual policy analysis');}
        doc.setFillColor(...GOLD);doc.rect(M,y,CW,0.5,'F');
        y=sectionHead(catLabel+' — '+ps.length+' polic'+(ps.length===1?'y':'ies'),y+2);

        ps.sort((a,b)=>(a.subType||'').localeCompare(b.subType||'')||(a.insurer||'').localeCompare(b.insurer||''));
        ps.forEach(pol=>{
          if(y>220){doc.addPage();y=pageHeader('Policy Details',''+catLabel);}

          // Policy header — navy bar with insurer color accent
          const ins = getInsurer(pol.insurer);
          const c = ins.color||'#666';
          const rgb = [parseInt(c.slice(1,3),16)||100,parseInt(c.slice(3,5),16)||100,parseInt(c.slice(5,7),16)||100];
          y=safeY(y);
          doc.setFillColor(23,31,46);doc.roundedRect(M,y,CW,16,1.5,1.5,'F');
          doc.setFillColor(rgb[0],rgb[1],rgb[2]);doc.rect(M,y,3,16,'F');
          // Product name (white on navy)
          doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...WHITE);
          doc.text((pol.productName||pol.policyName||'Policy'),M+7,y+6);
          // Insurer | subtype | number
          doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(170,170,170);
          const metaParts = [pol.insurer, pol.subType, pol.policyNumber].filter(Boolean).join('  |  ');
          doc.text(metaParts,M+7,y+12);
          // Right side — SA or Principal
          if(pol.category==='cash_investments') {
            doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...GOLD);
            doc.text('$'+(parseFloat(pol.fdPrincipal)||0).toLocaleString(),W-M-4,y+6,{align:'right'});
            doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(170,170,170);
            doc.text((pol.fdYieldPct||'')+'% p.a.',W-M-4,y+12,{align:'right'});
          } else {
            doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...GOLD);
            const saVal = parseFloat(pol.sumAssured)||0;
            doc.text('Sum Assured '+(pol.currency||'SGD')+' '+(saVal>=1e6?(saVal/1e6).toFixed(1)+'M':saVal.toLocaleString()),W-M-4,y+6,{align:'right'});
            doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(170,170,170);
            const premLabel = pol.premSingle||pol.premFrequency==='single'?fmt(parseFloat(pol.annualPremium)||0)+' Single Premium':fmt(parseFloat(pol.annualPremium)||0)+'/yr';
            doc.text(premLabel+'  ·  '+(pol.paymentMethod||'Cash')+'  ·  '+(pol.status||'inforce'),W-M-4,y+12,{align:'right'});
          }
          y+=20;

          // Key metrics row
          const metrics = [];
          if(pol.category==='cash_investments') {
            if(pol.fdPrincipal) metrics.push(['Principal','$'+parseInt(pol.fdPrincipal).toLocaleString()]);
            if(pol.fdYieldPct) metrics.push(['Yield',pol.fdYieldPct+'% p.a.']);
            if(pol.fdStartDate) metrics.push(['Start',new Date(pol.fdStartDate).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'2-digit'})]);
            if(pol.fdMaturityDate) metrics.push(['Maturity',new Date(pol.fdMaturityDate).toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'2-digit'})]);
            if(pol.fdTenureMonths) metrics.push(['Tenure',pol.fdTenureMonths+' mths']);
            if(pol.fdAutoRenew) metrics.push(['Auto-Renew','Yes']);
          } else {
          if(pol.premStartAge||pol.ageAtEntry) metrics.push(['Entry Age',pol.premStartAge||pol.ageAtEntry||'-']);
          metrics.push(['Premium Term',pol.premSingle?'Single':(pol.premTerm?pol.premTerm+' yrs':'-')]);
          if(!pol.premSingle) metrics.push(['Premium End',pol.premWholeLife?'Whole Life':(pol.premEndAge||'-')]);
          if(pol.cashValue) metrics.push(['Cash Value',fmt(parseFloat(pol.cashValue))]);
          if(pol.paymentMethod) metrics.push(['Payment',pol.paymentMethod]);
          if(pol.category==='retirement') {
            if(parseFloat(pol.annuityMonthly)||parseFloat(pol.monthlyBenefit)) metrics.push(['Payout',fmt(parseFloat(pol.annuityMonthly)||parseFloat(pol.monthlyBenefit)||0)+'/mth']);
            if(pol.annuityStartAge) metrics.push(['Payout Age',(pol.annuityStartAge||'?')+(pol.annuityEndAge?' → '+pol.annuityEndAge:'')]);
          }
          if(pol.category==='savings') { if(pol.endYield) metrics.push(['Yield',pol.endYield+'%']); if(pol.endPolicyTerm) metrics.push(['Maturity Age',String((parseInt(pol.premStartAge)||30)+parseInt(pol.endPolicyTerm))]); }
          }

          doc.autoTable({
            startY:y,margin:{left:M,right:M},
            body:[metrics.map(m=>m[0]+':\n'+m[1])],
            styles:{fontSize:7,cellPadding:2,textColor:DARK},
            theme:'plain',
          });
          y=(doc.lastAutoTable?.finalY||y)+2;

          // Riders table for this policy
          if((pol.riders||[]).length>0){
            doc.autoTable({
              startY:y,margin:{left:M+3,right:M},
              head:[['Benefit','Sum Assured','Part of Plan','Rider Name','Expiry']],
              body:(pol.riders||[]).map(rd=>[
                {death:'Death & Total Invalidity',tpd:'Total Permanent Disability',ci:'Critical Illness',eci:'Early Critical Illness',di:'Disability Income/mth',accidental:'Accidental Death',premium_waiver:'Premium Waiver'}[rd.type]||rd.type,
                rd.sa?(parseFloat(rd.sa)||0).toLocaleString():'-',
                rd.bundled===false?'No':'Yes',
                rd.riderName||'-',
                rd.expiryAge||'-',
              ]),
              styles:{fontSize:7,cellPadding:2},
              headStyles:{fillColor:[35,45,60],textColor:CREAM,fontSize:7},
            });
            y=(doc.lastAutoTable?.finalY||y)+2;
          }

          // Notes / highlights
          if(pol.notes) {
            doc.setFillColor(245,243,238);doc.roundedRect(M,y,CW,12,1.5,1.5,'F');
            doc.setFillColor(23,31,46);doc.rect(M,y,2,12,'F');
            doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(80,80,80);
            const noteLines = doc.splitTextToSize(typeof pol.notes==='string'?pol.notes:JSON.stringify(pol.notes), CW-10);
            doc.text(noteLines.slice(0,3),M+6,y+4);
            y+=Math.min(noteLines.length,3)*4+6;
          }
          y+=6;
        });
      });

      // ═══ CASH VALUE TIMELINE PAGE ═══
      doc.addPage();
      y=pageHeader('Surrender Value & Income Timeline','Projected portfolio values from age '+age+' to '+(retAge+20));
      y=sectionHead('At Retirement (Age '+retAge+')',y);

      // Compute retirement row
      let retCV=0,retIncome=0,retMat=0,retDiv=0;
      // Simple computation for PDF
      policies.forEach(pol=>{
        const startAge=parseInt(pol.premStartAge)||age;
        const yif=retAge-startAge;if(yif<0)return;
        const prem=parseFloat(pol.annualPremium)||0;
        const pt=pol.premSingle?1:(pol.premWholeLife?Math.max(65-(parseInt(pol.premStartAge)||parseInt(pol.ageAtEntry)||35),30):(parseInt(pol.premTerm)||(parseInt(pol.premEndAge)>0?parseInt(pol.premEndAge)-(parseInt(pol.premStartAge)||35):25)));
        const r=(parseFloat(pol.cvGrowthRate)||parseFloat(pol.endYield)||parseFloat(pol.retAccumYield)||3)/100;
        if(pol.category==='savings'){
          const policyTerm=parseInt(pol.endPolicyTerm)||(pt+(parseInt(pol.endWaitYrs)||0));
          const matAge=startAge+policyTerm;
          const paid=Math.min(pt,yif+1);
          const cv=pol.premSingle?prem*Math.pow(1+r,yif):(r>0?prem*(Math.pow(1+r,paid)-1)/r*Math.pow(1+r,Math.max(0,yif-paid)):prem*paid);
          if(retAge>=matAge)retMat+=Math.round(cv);else retCV+=Math.round(cv);
        }
        if(pol.category==='retirement'){
          const ps=parseInt(pol.annuityStartAge)||65;const pe=parseInt(pol.annuityEndAge)||85;
          const ap=parseFloat(pol.annuityPayout)||(parseFloat(pol.annuityMonthly)||parseFloat(pol.monthlyBenefit)||0)*12;
          if(retAge>=ps&&retAge<=pe)retIncome+=ap;
          const paid=Math.min(pt,yif+1);
          retCV+=Math.round(pol.premSingle?prem*Math.pow(1+r,yif):(r>0?prem*(Math.pow(1+r,paid)-1)/r*Math.pow(1+r,Math.max(0,yif-paid)):prem*paid));
        }
        if(pol.category==='protection'&&!['Term Life','Personal Accident','Critical Illness'].includes(pol.subType)){
          const paid=Math.min(pt,yif+1);
          retCV+=Math.round(pol.premSingle?prem*Math.pow(1+r,yif):(r>0?prem*(Math.pow(1+r,paid)-1)/r*Math.pow(1+r,Math.max(0,yif-paid)):prem*paid));
        }
        if(pol.category==='investment'){
          const growth=(parseFloat(pol.ilpGrowth)||6)/100;
          const div=(parseFloat(pol.ilpDivYield)||0)/100;
          const fee=(parseFloat(pol.ilpMgmtFee)||1.5)/100;
          const nr=pol.divReinvest?(growth+div-fee):(growth-fee);
          const paid=Math.min(pt,yif+1);
          const fv=pol.premSingle?prem*Math.pow(1+nr,yif):(nr>0?prem*(Math.pow(1+nr,paid)-1)/nr*Math.pow(1+nr,Math.max(0,yif-paid)):prem*paid);
          if(!pol.divReinvest&&retAge>=(parseInt(pol.ilpDivDrawdownAge)||retAge)&&div>0)retDiv+=Math.round(fv*div);
          retCV+=Math.round(fv);
        }
      });

      // Retirement KPI cards
      y=safeY(y);doc.setFillColor(245,243,238);
      [0,1,2,3].forEach(i=>doc.roundedRect(M+i*(CW/4+1),y,CW/4-2,18,2,2,'F'));
      doc.setFont('helvetica','bold');doc.setFontSize(6);doc.setTextColor(150,150,150);
      ['TOTAL CASH VALUE','ANNUAL INCOME','MATURITIES DUE','DIVIDEND INCOME'].forEach((l,i)=>doc.text(l,M+2+i*(CW/4+1),y+5));
      doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...DARK);
      [fmt(retCV),fmt(retIncome),fmt(retMat),fmt(retDiv)].forEach((v,i)=>doc.text(v,M+2+i*(CW/4+1),y+14));
      y+=24;

      // ═══ RECOMMENDED NEXT STEPS ═══
      y=sectionHead('Recommended Next Steps',y);
      const steps = [];
      if(cDeath<rDeath) steps.push('Address life insurance gap of '+fmt(rDeath-cDeath)+' — review term life or whole life options');
      if(cTPD<rTPD) steps.push('TPD coverage shortfall of '+fmt(rTPD-cTPD)+' — consider adding TPD rider or standalone cover');
      if(cCI<rCI) steps.push('Increase critical illness coverage by '+fmt(rCI-cCI)+' — consider standalone CI or WL with CI rider');
      if(cECI<rECI) steps.push('Early CI coverage gap of '+fmt(rECI-cECI)+' — early-stage detection coverage recommended');
      if(cDI<rDI) steps.push('Disability income shortfall — current '+fmt(cDI)+'/mth vs '+fmt(rDI)+'/mth needed (75% of income)');
      if(!hasISP) steps.push('Obtain an Integrated Shield Plan to cover hospitalisation above MediShield Life');
      if(retIncome>0 && annualIncome>0 && retIncome<annualIncome*0.7) steps.push('Retirement income of '+fmt(retIncome)+'/yr may fall short of target '+fmt(Math.round(annualIncome*0.7))+'/yr (70% of current income)');
      if(totalPrem>0&&annualIncome>0&&totalPrem/annualIncome>0.15) steps.push('Premium-to-income ratio is '+(Math.round(totalPrem/annualIncome*100))+'% — review for optimisation');
      steps.push('Schedule comprehensive portfolio review in 6 months');

      doc.autoTable({
        startY:y,margin:{left:M,right:M},
        body:steps.map((s,i)=>[(i+1)+'. '+s]),
        styles:{fontSize:8,cellPadding:3,textColor:DARK},
        theme:'plain',
        columnStyles:{0:{cellWidth:CW}},
      });
      y=(doc.lastAutoTable?.finalY||y)+8;

      // Disclaimer
      doc.setFont('helvetica','italic');doc.setFontSize(7);doc.setTextColor(160,160,160);
      doc.text('This report is for illustrative purposes and does not constitute financial advice. All projections are estimates based on stated assumptions.',M,y);
      doc.text('Please consult your financial advisor for personalised recommendations. Generated by PolicyLens V1.0.',M,y+4);

      // ═══ FOOTERS ═══
      addFooters();

      doc.save('PolicyLens_Report_'+(clientName||'Client').replace(/\s+/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.pdf');
    } catch(e){console.error('[PDF] Error:', e);toast('PDF generation error: '+e.message,'error',5000)}
    setGenerating(false);
  };

  return (
    <div className="fade-in" style={{maxWidth:600}}>
      <h2 style={{fontSize:18,fontWeight:600,marginBottom:12}}>Generate PDF Report</h2>
      <div className="card">
        <p style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>
          Professional multi-page PDF report including: executive summary with coverage score, protection gap analysis (LIA framework),
          rider coverage matrix, premium schedule, per-policy detail blocks with riders & CV projections, cash value timeline at retirement,
          and recommended next steps. Set advisor name in Settings to brand the report.
        </p>
        <button className="btn-primary" onClick={generate} disabled={generating || policies.length===0}>
          {generating ? '⏳ Building Report…' : '📄 Generate Full Report'}
        </button>
        {policies.length===0 && <div style={{fontSize:11,color:'var(--text3)',marginTop:8}}>Add at least one policy to generate a report.</div>}
      </div>
    </div>
  );
}

// MODULE: SETTINGS — API keys, advisor info, admin tools
// ═══════════════════════════════════════════════════════════════

function PdfPasswordEditor() {
  const [passwords, setPasswords] = useState('');
  const [saved, setSaved] = useState(false);
  useEffect(() => {
    dbGet('settings','pdfPasswords').then(r => { if(r?.value) setPasswords(r.value); }).catch(()=>{});
  }, []);
  const save = async () => {
    await dbPut('settings', {key:'pdfPasswords', value:passwords});
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };
  return (
    <div>
      <textarea rows={4} value={passwords} onChange={e=>setPasswords(e.target.value)}
        placeholder={"One password per line, e.g.:\nS7918583C\n18061979\nmypassword123"}
        style={{width:'100%',fontFamily:'monospace',fontSize:12,marginBottom:8}} />
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <button className="btn-primary btn-sm" onClick={save}>{saved?'✅ Saved':'Save Passwords'}</button>
        <span style={{fontSize:11,color:'var(--text3)'}}>{passwords.split('\n').filter(s=>s.trim()).length} passwords stored</span>
      </div>
      <div style={{marginTop:8,fontSize:10,color:'var(--text3)',lineHeight:1.5}}>
        <strong>Auto-generated from My Profile:</strong> NRIC (full + digits + last 4), DOB (DDMMYYYY, YYYYMMDD, DD/MM/YYYY), plus all dependant NRICs and DOBs. These are tried automatically — you only need to add custom passwords here.
      </div>
    </div>
  );
}

function Settings() {
  const {apiKey,saveApiKey,clientName,saveClientName,policies,savePolicy,deletePolicy} = useContext(AppCtx);
  const [geminiKey, setGeminiKey] = useState('');
  const [anthropicKey, setAnthropicKey] = useState('');
  const [name, setName] = useState(clientName);
  const loadRef = useRef(null);

  const [advisorName, setAdvisorName] = useState('');
  const [advisorCompany, setAdvisorCompany] = useState('');

  // Load both keys from IndexedDB on mount
  useEffect(() => {
    (async () => {
      // Load API keys — try user-specific first, fallback to global
      const uid = window._user?.id || '';
      const gk = await dbGet('settings','geminiKey_'+uid).catch(()=>null) || await dbGet('settings','geminiKey').catch(()=>null);
      const ck = await dbGet('settings','anthropicKey_'+uid).catch(()=>null) || await dbGet('settings','anthropicKey').catch(()=>null);
      if(gk?.value) setGeminiKey(gk.value);
      if(ck?.value) setAnthropicKey(ck.value);
      // Load advisor details
      const an = await dbGet('settings','advisorName').catch(()=>null);
      const ac = await dbGet('settings','advisorCompany').catch(()=>null);
      if(an?.value) setAdvisorName(an.value);
      if(ac?.value) setAdvisorCompany(ac.value);
    })();
  }, []);

  // ── Save portfolio as JSON file ──
  const handleReset = async () => {
    if(!confirm('⚠️ RESET EVERYTHING?\n\nThis will permanently delete:\n• All policies\n• Client profile (name, NRIC, dependants)\n• All local settings\n\nThis CANNOT be undone. Are you sure?')) return;
    if(!confirm('Final confirmation: Type "RESET" mentally and click OK to proceed.')) return;
    for(const p of policies) await deletePolicy(p.id);
    saveClientName('');
    saveProfile({name:'',nric:'',dob:'',gender:'',smoker:'',nationality:'',occupation:'',phone:'',email:'',dependants:[]});
    toast('Portfolio reset complete','success');
    window.location.reload();
  };

  const handleSave = () => {
    const data = {
      version:'PolicyLens_V1',
      exportedAt: new Date().toISOString(),
      clientName: clientName,
      policies: policies,
    };
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `PolicyLens_${(clientName||'Portfolio').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // ── Load portfolio from JSON file ──
  const handleLoad = async (file) => {
    if(!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const arr = data.policies || (Array.isArray(data)?data:[]);
      if(!arr.length){toast('No policies found in file','warning');return;}
      const mode = confirm(`Found ${arr.length} policies${data.clientName?' for '+data.clientName:''}.\n\nOK = Replace current portfolio\nCancel = Add to existing portfolio`);
      if(mode){
        // Replace — delete all existing first
        for(const p of policies) await deletePolicy(p.id);
      }
      let count = 0;
      for(const p of arr){
        await savePolicy({...p, id: mode ? p.id : genId()});
        count++;
      }
      if(data.clientName && mode) await saveClientName(data.clientName);
      toast(`Loaded ${count} policies` + (mode?' (replaced)':' (added)'),'success');
    } catch(e){toast('Error loading file: '+e.message,'error');}
  };

  return (
    <div className="fade-in" style={{maxWidth:600}}>
      <h2 style={{fontSize:18,fontWeight:600,marginBottom:16}}>Settings</h2>

      {/* ═══ ADVISOR DETAILS (TOP) ═══ */}
      <div className="card" style={{marginBottom:16}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:4}}>Advisor Details</h3>
        <p style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>Appears on PDF report headers, footers, and client share view</p>
        <div className="grid-2">
          <div className="field"><label>Advisor Name</label><input value={advisorName} onChange={e=>setAdvisorName(e.target.value)} onBlur={e=>{dbPut('settings',{key:'advisorName',value:e.target.value});if(window.saveKeyToSupabase)saveKeyToSupabase('advisorName',e.target.value)}} placeholder="e.g. John Tan" /></div>
          <div className="field"><label>Company</label><input value={advisorCompany} onChange={e=>setAdvisorCompany(e.target.value)} onBlur={e=>{dbPut('settings',{key:'advisorCompany',value:e.target.value});if(window.saveKeyToSupabase)saveKeyToSupabase('advisorCompany',e.target.value)}} placeholder="e.g. ABC Advisory" /></div>
        </div>
      </div>

      {/* ═══ ADMIN: REPOSITORY RESET ═══ */}
      {window._isAdmin && (
        <div className="card" style={{marginBottom:16,borderColor:'rgba(239,83,80,.2)'}}>
          <h3 style={{fontSize:14,fontWeight:600,marginBottom:4}}>Admin Tools</h3>
          <p style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>Portfolio save/load/reset is on the Dashboard. Repository reset is admin-only.</p>
          <button className="btn-danger btn-sm" onClick={async()=>{
            const pw = prompt('Enter admin password to reset repository:');
            if(pw !== 'bprawn0011'){toast('Incorrect password','error');return;}
            if(!confirm('This removes ALL repository entries and re-seeds with verified products. Proceed?')) return;
            const s = getSB();
            if(s) {
              const {data} = await s.from('repository').select('id');
              if(data) for(const r of data) await s.from('repository').delete().eq('id', r.id);
              for(const seed of SEED_REPOSITORY) await sbRepoSave(seed);
            }
            try { const tx = (await openDB()).transaction('repository','readwrite'); tx.objectStore('repository').clear(); } catch(e){}
            window.location.reload();
          }}>🗑️ Reset Repository</button>
        </div>
      )}

      {/* ═══ AI KEYS ═══ */}
      <div className="card" style={{marginBottom:16}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:4}}>AI Document Extraction</h3>
        <p style={{fontSize:11,color:'var(--text3)',marginBottom:12}}>Dual AI: Gemini reads documents (free) → Claude extracts structured data (smart). Gemini-only if no Anthropic key.</p>

        {/* Gemini Key */}
        <div style={{padding:10,background:'var(--bg3)',borderRadius:8,marginBottom:10,border:'1px solid var(--border)'}}>
          <div className="field" style={{marginBottom:6}}>
            <label style={{color:'#4285f4',fontWeight:600}}>🔵 Google Gemini Key <span style={{fontWeight:400,color:'var(--text3)'}}>(required — free)</span></label>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <input type="text" value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} placeholder="AIza…" style={{flex:1,fontFamily:'monospace',fontSize:11}} autoComplete="off" spellCheck="false" />
              {geminiKey && <span style={{fontSize:10,color:'var(--text3)',flexShrink:0}}>{geminiKey.length}ch</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button className="btn-primary btn-sm" onClick={async()=>{
              const k=geminiKey.trim(); if(!k||!k.startsWith('AIza')){toast('Gemini keys start with AIza…','warning');return;}
              const uid=window._user?.id||''; await dbPut('settings',{key:'geminiKey_'+uid,value:k}); await dbPut('settings',{key:'geminiKey',value:k}); if(window.saveKeyToSupabase) await saveKeyToSupabase('gemini',k); toast('Gemini key saved & synced','success');
            }}>Save</button>
            <button className="btn-secondary btn-sm" onClick={async()=>{
              const k=((await dbGet('settings','geminiKey').catch(()=>null))?.value||'').trim();
              if(!k){toast('No Gemini key stored','warning');return;}
              try{const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+k,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:'Say hello'}]}],generationConfig:{maxOutputTokens:30}})});
              const d=await r.json();if(d.error)toast(d.error.message,'error');else toast('Gemini connected — working!','success');}catch(e){toast(e.message,'error');}
            }}>Test</button>
          </div>
          <p style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Get free: <a href="https://aistudio.google.com/apikey" target="_blank" style={{color:'#4285f4'}}>aistudio.google.com</a> → Create API key. 1,500 free req/day.</p>
        </div>

        {/* Anthropic Key */}
        <div style={{padding:10,background:'var(--bg3)',borderRadius:8,border:'1px solid var(--border)'}}>
          <div className="field" style={{marginBottom:6}}>
            <label style={{color:'#d97706',fontWeight:600}}>🟡 Anthropic Key <span style={{fontWeight:400,color:'var(--text3)'}}>(optional — better extraction)</span></label>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <input type="text" value={anthropicKey} onChange={e=>setAnthropicKey(e.target.value)} placeholder="sk-ant-api03-…" style={{flex:1,fontFamily:'monospace',fontSize:11}} autoComplete="off" spellCheck="false" />
              {anthropicKey && <span style={{fontSize:10,color:'var(--text3)',flexShrink:0}}>{anthropicKey.length}ch</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button className="btn-primary btn-sm" onClick={async()=>{
              const k=anthropicKey.trim(); if(!k||!k.startsWith('sk-ant-')){toast('Anthropic keys start with sk-ant-…','warning');return;}
              if(k.length<50){toast('Key too short — full keys are ~130 chars','warning',4500);return;}
              const uid2=window._user?.id||''; await dbPut('settings',{key:'anthropicKey_'+uid2,value:k}); await dbPut('settings',{key:'anthropicKey',value:k}); if(window.saveKeyToSupabase) await saveKeyToSupabase('anthropic',k); toast('Anthropic key saved & synced ('+k.length+' chars)','success');
            }}>Save</button>
            <button className="btn-secondary btn-sm" onClick={async()=>{
              const k=((await dbGet('settings','anthropicKey').catch(()=>null))?.value||'').trim();
              if(!k){toast('No Anthropic key stored','warning');return;}
              try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:30,messages:[{role:'user',content:'Say hello'}]})});
              const d=await r.json();if(d.error)toast(d.error.message,'error');else toast('Claude connected — working!','success');}catch(e){toast(e.message,'error');}
            }}>Test</button>
          </div>
          <p style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Get key: <a href="https://console.anthropic.com/settings/keys" target="_blank" style={{color:'#d97706'}}>console.anthropic.com</a> → Create Key → copy FULL key (~130 chars). ~$0.003/scan.</p>
        </div>

        {/* Pipeline status */}
        <div style={{marginTop:10,padding:8,background:'var(--bg2)',borderRadius:6,fontSize:11}}>
          <strong>Pipeline: </strong>
          {geminiKey && anthropicKey && anthropicKey.length>50 ? <span style={{color:'var(--green2)'}}>✅ Dual AI — Gemini reads → Claude extracts (best quality)</span>
           : geminiKey ? <span style={{color:'#4285f4'}}>🔵 Gemini-only mode (good, free)</span>
           : <span style={{color:'var(--red)'}}>⚠️ No keys — AI scanning disabled</span>}
        </div>
      </div>

      {/* ═══ PDF PASSWORDS ═══ */}
      <div className="card" style={{marginBottom:16}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:4}}>🔓 PDF Unlock Passwords</h3>
        <p style={{fontSize:11,color:'var(--text3)',marginBottom:10}}>Preset passwords to auto-unlock protected policy documents. Common: NRIC number, DOB (DDMMYYYY). Client NRIC and DOB from My Profile are tried automatically.</p>
        <PdfPasswordEditor />
      </div>

      <div className="card">
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:8}}>About PolicyLens V1.0</h3>
        <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>
          <p>Institutional-grade policy review toolkit for Singapore Financial Consultants. AI-powered document capture with rider-level extraction, shared cloud repository with role-based editing, and comprehensive portfolio analysis.</p>
          <p style={{marginTop:8}}>Coverage & Riders system with SA multipliers, multi-claim CI, ISP premium breakdown, ILP fund projections, and UL crediting structures. Gap analysis against LIA recommended coverage levels.</p>
          <p style={{marginTop:6}}>Fund risk lookup covers {FUND_DB.length.toLocaleString()} instruments from the iFAST/FundLens universe.</p>
          <p style={{marginTop:6}}>Single-file HTML | React 18 | Chart.js | IndexedDB | jsPDF | Supabase Auth</p>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MODULE: RENDER — React root mount

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
