<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;width:100%}
@media screen and (orientation:landscape) and (max-height:500px) {
  html,body{width:100vh!important;height:100vw!important}
  body{transform:rotate(-90deg) translateX(-100%);transform-origin:top left;overflow-y:auto;overflow-x:hidden}
  .modal-overlay{width:100vh!important;height:100vw!important}
}
:root{
--bg:#0b0f1a;--bg2:#111827;--bg3:#171f2e;--bg4:#1f2a3d;
--text:#e8dcc8;--text2:#a39580;--text3:#6b6050;
--border:#1e2738;--border2:#2a3548;
--gold:#d4a96a;--gold2:#e8c992;--gold3:#b8935a;--gold-dim:rgba(212,169,106,.12);
--green:#34d399;--green2:#6ee7b7;--green-dim:rgba(52,211,153,.12);
--red:#ef5350;--red2:#fca5a5;--red-dim:rgba(239,83,80,.1);
--blue:#5b8fd9;--blue2:#7daaec;--purple:#9d8abf;--orange:#d4a96a;--teal:#5ba8a0;--pink:#c97b9a;
--cat-protection:#5b8fd9;--cat-savings:#5ba8a0;--cat-health:#c97b9a;
--cat-investment:#9d8abf;--cat-retirement:#d4a96a;--cat-maternity:#c97b9a;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
#root{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
input,select,textarea{font-family:inherit;background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:13px;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder{color:var(--text3)}
select{cursor:pointer}
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--gold);color:#0b0f1a;font-weight:600}.btn-primary:hover{background:var(--gold2)}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}.btn-secondary:hover{background:var(--bg4);border-color:var(--gold3)}
.btn-danger{background:var(--red-dim);color:var(--red2)}.btn-danger:hover{background:rgba(239,83,80,.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border)}
td{padding:8px 12px;font-size:13px;border-bottom:1px solid var(--border)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{padding:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:720px;width:95%;max-height:85vh;overflow-y:auto;padding:24px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px}
.field{margin-bottom:12px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;background:var(--gold-dim);color:var(--gold)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease-out}

/* ══════ TOAST NOTIFICATIONS ══════ */
@keyframes toastIn{from{opacity:0;transform:translateY(16px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-8px) scale(.95)}}
.toast-container{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none;max-width:min(420px,90vw)}
.toast{pointer-events:auto;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:500;line-height:1.4;box-shadow:0 8px 24px rgba(0,0,0,.35);animation:toastIn .25s ease-out;display:flex;align-items:center;gap:8px;backdrop-filter:blur(12px)}
.toast.exiting{animation:toastOut .2s ease-in forwards}
.toast-success{background:rgba(91,168,160,.15);border:1px solid rgba(91,168,160,.3);color:var(--green2)}
.toast-error{background:rgba(239,83,80,.12);border:1px solid rgba(239,83,80,.25);color:var(--red)}
.toast-info{background:rgba(91,143,217,.12);border:1px solid rgba(91,143,217,.25);color:var(--blue2)}
.toast-warning{background:rgba(212,169,106,.12);border:1px solid rgba(212,169,106,.25);color:var(--gold)}

/* ══════ SKELETON SHIMMER ══════ */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{border-radius:6px;background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite ease-in-out}
.fuzzy-alert{background:var(--gold-dim);border:1px solid rgba(212,169,106,.25);border-radius:10px;padding:14px;margin:12px 0}
.fuzzy-alert h4{color:var(--gold);font-size:13px;margin-bottom:6px}
.gap-bar{height:8px;border-radius:4px;background:var(--bg4);overflow:hidden;position:relative}
.gap-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
@media(max-width:768px){
.grid-2,.grid-3{grid-template-columns:1fr}
.desktop-only{display:none!important}
}

/* ══════ RESPONSIVE UTILITIES ══════ */
.resp-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.resp-5col{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.resp-side{display:grid;grid-template-columns:1fr 260px;gap:12px}

/* ══════ MOBILE OPTIMISATION ══════ */
@media(max-width:640px){
  .card{padding:10px;border-radius:10px}
  .card-sm{padding:8px}
  table th,table td{padding:5px 6px;font-size:11px}
  h2{font-size:16px!important}
  h3{font-size:13px!important}
  input,select,textarea{font-size:14px!important;padding:8px 10px!important}
  .btn-sm{padding:6px 10px;font-size:11px}
  .field{margin-bottom:10px}
  label{font-size:10px!important}
  .resp-2col,.resp-5col,.resp-side{grid-template-columns:1fr!important}
  canvas{max-width:100%!important}
}
@media(max-width:480px){
  .grid-2,.grid-3{grid-template-columns:1fr!important;gap:8px!important}
  .resp-2col,.resp-5col,.resp-side{grid-template-columns:1fr!important}
}

/* ══════ AUTH GATE ══════ */
#auth-gate{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
#auth-gate .auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:400px;width:100%;padding:32px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
#auth-gate h2{font-size:22px;font-weight:700;margin-bottom:4px;color:var(--gold)}
#auth-gate .auth-sub{font-size:13px;color:var(--text3);margin-bottom:20px}
#auth-gate .af{margin-bottom:14px}
#auth-gate .af label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px}
#auth-gate .af input{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
#auth-gate .af input:focus{border-color:var(--gold)}
#auth-gate .abtn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.abtn-p{background:var(--gold);color:#0b0f1a}.abtn-p:hover{background:var(--gold2)}
.abtn-s{background:transparent;color:var(--text2);border:1px solid var(--border2)!important;margin-top:8px}.abtn-s:hover{background:var(--bg3)}
.auth-msg{font-size:12px;padding:10px;border-radius:8px;margin-bottom:12px}
.auth-msg-error{background:var(--red-dim);color:var(--red2);border:1px solid rgba(239,83,80,.2)}
.auth-msg-info{background:var(--green-dim);color:var(--green2);border:1px solid rgba(52,211,153,.2)}
.auth-link{font-size:12px;color:var(--gold);cursor:pointer;text-align:center;margin-top:12px}
.auth-pending{text-align:center;padding:20px 0}
.auth-pending-icon{font-size:40px;margin-bottom:12px}

#admin-fab{position:fixed;bottom:20px;right:20px;z-index:9998;background:var(--gold);color:#0b0f1a;border:none;border-radius:50%;width:48px;height:48px;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(212,169,106,.3);display:none}
#admin-panel{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;padding:20px}
#admin-panel .acard{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;max-width:640px;width:100%;max-height:80vh;overflow-y:auto;padding:24px}
#admin-panel .atitle{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;color:var(--gold)}
#admin-panel table{width:100%;border-collapse:collapse}
#admin-panel th{text-align:left;padding:8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border)}
#admin-panel td{padding:8px;font-size:13px;border-bottom:1px solid var(--border)}
.logout-pill{display:none!important}


/* ── Mobile nav: hide scrollbar, compact spacing ── */
@media(max-width:768px){
  .modal{max-width:95vw!important;max-height:90vh!important;padding:16px!important;}
}
</style>

<script>
// ══════════════════════════════════════════════════
//  SUPABASE AUTH — UPDATE THESE 3 VALUES
// ══════════════════════════════════════════════════
var SB_URL = 'https://mgbxxwoasrwlraffcvab.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nYnh4d29hc3J3bHJhZmZjdmFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIzMjMsImV4cCI6MjA5MDM1ODMyM30.kJoq_dded4cmW56ymY3NmvmhNxYKFKrwOxbSJvBIfc4';
var ADMIN_EMAILS = ['chungakwanc@gmail.com'];

// ── SINGLE global Supabase client — created once, used by auth + React ──
var _SB = null;
try { if(window.supabase) _SB = window.supabase.createClient(SB_URL, SB_KEY, {
  auth: { storageKey: 'policylens-auth', autoRefreshToken: true, persistSession: true, detectSessionInUrl: false, flowType: 'implicit' }
}); } catch(e){ console.warn('[Auth] Supabase init error:',e); }

var _sb=null,_user=null,_prof=null,_isAdmin=false;
function sb(){return _SB;}
function authMsg(t,type){var e=document.getElementById('auth-message');e.className='auth-msg auth-msg-'+(type||'error');e.textContent=t;e.style.display='block';}
function authClear(){document.getElementById('auth-message').style.display='none';}
function authShow(v){authClear();['login','signup','reset','pending'].forEach(function(s){document.getElementById('auth-'+s).style.display=s===v?'':'none';});}

async function authLogin(){
  authClear();
  var e=document.getElementById('auth-email').value.trim(),p=document.getElementById('auth-pass').value;
  if(!e||!p)return authMsg('Please enter email and password');
  authMsg('Signing in…','info');
  try {
    var r = await _SB.auth.signInWithPassword({email:e,password:p});
    if(r.error) return authMsg(r.error.message);
    finishLogin(e);
  } catch(err) {
    if(ADMIN_EMAILS.indexOf(e)>=0){_isAdmin=true;_prof={email:e,approved:true,role:'admin'};authGrant();return;}
    authMsg('Login error: '+err.message);
  }
}

function finishLogin(email){
  if(ADMIN_EMAILS.indexOf(email)>=0){
    _isAdmin=true;
    _prof={email:email,full_name:'Admin',approved:true,role:'admin'};
    _SB.auth.getSession().then(function(s){
      _user=s?.data?.session?.user||{email:email};
      if(_user.id)_SB.from('profiles').upsert({id:_user.id,email:email,full_name:_user?.user_metadata?.full_name||'',approved:true,role:'admin'}).catch(function(){});
    }).catch(function(){});
    authGrant();
    return;
  }
  authCheck();
}

async function authSignup(){
  authClear();
  var n=document.getElementById('auth-sname').value.trim(),e=document.getElementById('auth-semail').value.trim(),p=document.getElementById('auth-spass').value;
  if(!n||!e||!p)return authMsg('Please fill in all fields');
  if(p.length<6)return authMsg('Password must be at least 6 characters');
  try {
    authMsg('Creating account…','info');
    var r=await sb().auth.signUp({email:e,password:p,options:{data:{full_name:n}}});
    if(r.error)return authMsg(r.error.message);
    // Create profile
    if(r.data&&r.data.user){
      var isAdm=ADMIN_EMAILS.indexOf(e)>=0;
      var pIns=await sb().from('profiles').upsert({id:r.data.user.id,email:e,full_name:n,approved:isAdm,role:isAdm?'admin':'user'});
      if(pIns.error) console.warn('[Auth] Profile upsert error (non-blocking):', pIns.error.message);
      if(isAdm){
        // Admin — sign in directly
        _user=r.data.user;_isAdmin=true;_prof={email:e,full_name:n,approved:true,role:'admin'};
        authGrant();return;
      }
    }
    authMsg('Account created! Awaiting admin approval.','info');
    setTimeout(function(){authShow('pending');},1500);
  } catch(err) {
    authMsg('Signup error: '+err.message);
  }
}

async function authReset(){
  authClear();
  var e=document.getElementById('auth-remail').value.trim();
  if(!e)return authMsg('Please enter your email');
  var r=await sb().auth.resetPasswordForEmail(e);
  if(r.error)return authMsg(r.error.message);
  authMsg('Reset link sent! Check your inbox.','info');
}

async function authLogout(){
  await sb().auth.signOut();
  _user=null;_prof=null;_isAdmin=false;
  document.getElementById('auth-gate').style.display='flex';
  document.getElementById('logout-pill').style.display='none';
  document.getElementById('admin-fab').style.display='none';
  authShow('login');
}

async function authCheck(){
  try {
  var s=sb();
  if(!s){authGrant();return;}
  var sess=await s.auth.getSession();
  if(!sess.data||!sess.data.session){document.getElementById('auth-gate').style.display='flex';return;}
  _user=sess.data.session.user;
  console.log('[Auth] User:', _user.email, 'UID:', _user.id);

  // ADMIN FAST PATH — skip all DB queries for admin emails
  var emailIsAdmin = ADMIN_EMAILS.indexOf(_user.email)>=0;
  if(emailIsAdmin){
    console.log('[Auth] Admin email — granting access immediately');
    _isAdmin=true;
    _prof={email:_user.email,full_name:_user.user_metadata?.full_name||'Admin',approved:true,role:'admin'};
    // Try to ensure profile exists (fire and forget — don't block on it)
    s.from('profiles').upsert({id:_user.id,email:_user.email,full_name:_user.user_metadata?.full_name||'',approved:true,role:'admin'}).then(()=>console.log('[Auth] Admin profile ensured'));
    authGrant();
    return;
  }

  // NON-ADMIN PATH — query profiles table
  var p=await s.from('profiles').select('*').eq('id',_user.id).maybeSingle();
  console.log('[Auth] Profile:', p.error?p.error.message:'ok', p.data?'found':'missing');
  
  if(p.data) {
    // Profile exists — check approval
    _prof=p.data;
    _isAdmin=_prof.role==='admin';
    if(!_prof.approved){authShow('pending');return;}
    authGrant();
    return;
  }
  
  // Profile missing or SELECT errored — try to create it
  var m=_user.user_metadata||{};
  var profileData={id:_user.id,email:_user.email,full_name:m.full_name||'',approved:false,role:'user'};
  console.log('[Auth] Creating profile for', _user.email);
  
  // Try insert first, then upsert as fallback
  var ins=await s.from('profiles').insert(profileData);
  if(ins.error) {
    console.warn('[Auth] Insert error:', ins.error.message, '— trying upsert');
    var ups=await s.from('profiles').upsert(profileData);
    if(ups.error) {
      console.error('[Auth] Upsert also failed:', ups.error.message);
      authMsg('Account setup failed: '+ups.error.message+'. Please contact your admin.');
      return;
    }
  }
  authShow('pending');return;
  } catch(err) {
    console.error('[Auth] Error:', err);
    if(_user && ADMIN_EMAILS.indexOf(_user.email)>=0){_isAdmin=true;authGrant();return;}
    authMsg('Auth error: '+err.message);
  }
}

function authGrant(){
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('logout-pill').style.display='block';
  if(_isAdmin)document.getElementById('admin-fab').style.display='flex';
  // Sync API keys from Supabase to IndexedDB on login
  syncKeysFromSupabase();
  // Check onboarding
  checkOnboarding();
}

// ── Sync API keys from Supabase user_settings → IndexedDB ──
async function syncKeysFromSupabase(){
  try {
    const s=getSB();if(!s||!_user) return;
    const {data,error}=await s.from('user_settings').select('gemini_api_key,anthropic_api_key,advisor_name,advisor_company').eq('user_id',_user.id).maybeSingle();
    if(error||!data) return;
    const uid=_user.id;
    if(data.gemini_api_key){
      await dbPut('settings',{key:'geminiKey_'+uid,value:data.gemini_api_key});
      await dbPut('settings',{key:'geminiKey',value:data.gemini_api_key});
    }
    if(data.anthropic_api_key){
      await dbPut('settings',{key:'anthropicKey_'+uid,value:data.anthropic_api_key});
      await dbPut('settings',{key:'anthropicKey',value:data.anthropic_api_key});
    }
    if(data.advisor_name) await dbPut('settings',{key:'advisorName',value:data.advisor_name});
    if(data.advisor_company) await dbPut('settings',{key:'advisorCompany',value:data.advisor_company});
    console.log('[Auth] API keys + advisor info synced from Supabase');
    // Notify React to reload keys
    window.dispatchEvent(new Event('policylens-keys-synced'));
  } catch(e){console.warn('[Auth] Key sync error:',e);}
}

// ── Save API key to Supabase user_settings ──
async function saveKeyToSupabase(keyType, value){
  try {
    const s=getSB();if(!s||!_user) return;
    const colMap = {gemini:'gemini_api_key', anthropic:'anthropic_api_key', advisorName:'advisor_name', advisorCompany:'advisor_company'};
    const col = colMap[keyType];
    if(!col) return;
    const {error}=await s.from('user_settings').upsert({user_id:_user.id,[col]:value},{onConflict:'user_id'});
    if(error) console.warn('[Auth] Key save error:',error.message);
    else console.log('[Auth] '+keyType+' saved to Supabase');
  } catch(e){console.warn('[Auth] Key save error:',e);}
}

// ── Onboarding check ──
async function checkOnboarding(){
  try {
    const s=getSB();if(!s||!_user) return;
    const {data}=await s.from('user_settings').select('onboarding_completed').eq('user_id',_user.id).maybeSingle();
    if(data && !data.onboarding_completed){
      window._showOnboarding = true;
      // Trigger React re-render by dispatching a custom event
      window.dispatchEvent(new Event('policylens-onboarding'));

  } catch(e){console.warn('[Auth] Onboarding check error:',e);}
}

async function completeOnboarding(){
  try {
    const s=getSB();if(!s||!_user) return;
    await s.from('user_settings').upsert({user_id:_user.id,onboarding_completed:true},{onConflict:'user_id'});
    window._showOnboarding = false;
  } catch(e){console.warn('[Auth] Onboarding complete error:',e);}
}

// PERFORMANCE: useDebounce hook — delays heavy operations until typing stops
// ═══════════════════════════════════════════════════════════════
function useDebounce(callback, delay) {
  const timerRef = useRef(null);
  const callbackRef = useRef(callback);
  callbackRef.current = callback;
  useEffect(() => () => { if(timerRef.current) clearTimeout(timerRef.current); }, []);
  return useCallback((...args) => {
    if(timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => callbackRef.current(...args), delay);
  }, [delay]);
}

// UX: Toast notification system — replaces alert() throughout app
// ═══════════════════════════════════════════════════════════════
const _toastListeners = new Set();
const _toastQueue = [];
function toast(message, type='success', duration=3500) {
  const id = Date.now() + Math.random();
  const t = {id, message, type, duration};
  _toastQueue.push(t);
  _toastListeners.forEach(fn => fn([..._toastQueue]));
  setTimeout(() => {
    const idx = _toastQueue.findIndex(x => x.id === id);
    if(idx >= 0) { _toastQueue[idx] = {..._toastQueue[idx], exiting:true}; _toastListeners.forEach(fn => fn([..._toastQueue])); }
    setTimeout(() => {
      const idx2 = _toastQueue.findIndex(x => x.id === id);
      if(idx2 >= 0) _toastQueue.splice(idx2, 1);
      _toastListeners.forEach(fn => fn([..._toastQueue]));
    }, 220);
  }, duration);
  return id;
}
const TOAST_ICONS = {success:'✓',error:'✕',info:'ℹ',warning:'⚠'};
function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => { _toastListeners.add(setToasts); return () => _toastListeners.delete(setToasts); }, []);
  if(!toasts.length) return null;
  return ReactDOM.createPortal(
    <div className="toast-container">
      {toasts.slice(-4).map(t => (
        <div key={t.id} className={`toast toast-${t.type}${t.exiting?' exiting':''}`}>
          <span style={{fontSize:14,fontWeight:700}}>{TOAST_ICONS[t.type]||'✓'}</span>
          <span>{t.message}</span>
        </div>
      ))}
    </div>,
    document.body
  );
}

function getMSLPremium(age) {
  // age = current age (last birthday). Convert to ANB = age + 1 for lookup.
  const anb = age + 1;
  const row = MSL_PREMIUM_TABLE.find(r => anb >= r.anbMin && anb <= r.anbMax);
  return row ? row.premium : 2826;
}
function getMSLPremiumByANB(anb) {
  const row = MSL_PREMIUM_TABLE.find(r => anb >= r.anbMin && anb <= r.anbMax);
  return row ? row.premium : 2826;
}
// AWL — Additional Withdrawal Limits for ISP (MOH, unchanged since 2015)
// Source: ask.gov.sg/moh/questions/cm2vt2dzv00cra71bgenqlr0h
function getISPAWL(age) {
  const anb = age + 1;
  if (anb <= 40) return 300;
  if (anb <= 70) return 600;
  return 900;
}
function getISPAWLByANB(anb) {
  if (anb <= 40) return 300;
  if (anb <= 70) return 600;
  return 900;
}
function calcISPBreakdown(totalPrem, age) {
  const msl = getMSLPremium(age);
  const awl = getISPAWL(age);
  const ispAdditional = Math.max(0, totalPrem - msl);
  const ispMediSave = Math.min(ispAdditional, awl);
  const ispCash = Math.max(0, ispAdditional - awl);
  return { msl, awl, ispAdditional, ispMediSave, ispCash, totalMediSave: msl + ispMediSave, totalCash: ispCash };
}

function getCPFContribRate(age) {
  return CPF_CONTRIBUTION_RATES.find(r => age <= r.maxAge) || CPF_CONTRIBUTION_RATES[CPF_CONTRIBUTION_RATES.length-1];
}
function getCPFAllocRate(age) {
  return CPF_ALLOCATION_RATES.find(r => age <= r.maxAge) || CPF_ALLOCATION_RATES[CPF_ALLOCATION_RATES.length-1];
}

// Project CPF balances from current age to payout start age
// Inputs: currentAge, monthlySalary, oaBal, saBal, maBal, payoutStartAge (65-70)
function projectCPFToRetirement(currentAge, monthlySalary, oaBal, saBal, maBal, payoutStartAge=65) {
  let oa = oaBal || 0, sa = saBal || 0, ma = maBal || 0, ra = 0;
  const BHS = CPF_CONSTANTS.BRS_2026 > 0 ? 79000 : 75500; // 2026 BHS

  for(let age = currentAge; age < payoutStartAge; age++) {
    // Annual CPF contribution (capped at OW ceiling)
    const cappedSalary = Math.min(monthlySalary, CPF_CONSTANTS.OW_CEILING);
    const contribRate = getCPFContribRate(age);
    const allocRate = getCPFAllocRate(age);
    const annualContrib = cappedSalary * contribRate.total * 12;

    if(age < 55) {
      // Pre-55: OA + SA + MA
      const toMA = annualContrib * allocRate.ma;
      const toSA = annualContrib * allocRate.sa;
      const toOA = annualContrib - toMA - toSA;
      oa += toOA;
      sa += toSA;
      ma = Math.min(ma + toMA, BHS); // MA capped at BHS
    } else if(age === 55) {
      // At 55: SA closes, transfers to RA up to FRS. OA fills the rest up to FRS.
      const frs = CPF_CONSTANTS.FRS_2026;
      ra = Math.min(sa, frs);
      sa = 0;
      if(ra < frs) {
        const fromOA = Math.min(oa, frs - ra);
        ra += fromOA;
        oa -= fromOA;
      }
      // Then allocate this year's contribution
      const toMA = annualContrib * allocRate.ma;
      const toRA = annualContrib * allocRate.sa; // 'sa' column becomes RA for ≥55
      const toOA = annualContrib - toMA - toRA;
      ra += toRA;
      oa += toOA;
      ma = Math.min(ma + toMA, BHS);
    } else {
      // Post-55: contributions go to RA (up to FRS), then OA
      const toMA = annualContrib * allocRate.ma;
      const toRA = annualContrib * allocRate.sa; // 'sa/ra' column
      const toOA = annualContrib - toMA - toRA;
      const frs = CPF_CONSTANTS.FRS_2026;
      if(ra < frs) {
        ra += toRA + toOA; // All to RA up to FRS
        if(ra > frs) { oa += (ra - frs); ra = frs; }
      } else {
        oa += toOA + toRA;
      }
      ma = Math.min(ma + toMA, BHS);
    }

    // Annual interest
    oa *= (1 + CPF_CONSTANTS.OA_RATE);
    sa *= (1 + CPF_CONSTANTS.SA_RATE);
    ma *= (1 + CPF_CONSTANTS.MA_RATE);
    ra *= (1 + CPF_CONSTANTS.RA_RATE);

    // Extra interest (simplified: +1% on first $60k combined for <55, +2% on first $30k for ≥55)
    if(age < 55) {
      const combined = oa + sa + ma;
      const extraBase = Math.min(combined, 60000);
      const extraInt = extraBase * 0.01;
      // Extra interest goes to SA for <55
      sa += extraInt;
    } else {
      const combined = oa + ra + ma;
      const extra2 = Math.min(combined, 30000) * 0.02;
      const extra1 = Math.max(0, Math.min(combined, 60000) - 30000) * 0.01;
      ra += extra2 + extra1;
    }
  }

  return { oa: Math.round(oa), sa: Math.round(sa), ma: Math.round(ma), ra: Math.round(ra) };
}

// Estimate monthly CPF LIFE payout
// IMPORTANT: raBalance should be the RA at age 65 (not at payout age)
// Deferment bonus (+7%/yr for ages 66-70) is applied on top
function estimateCPFLifePayout(raAt65, plan='standard', payoutStartAge=65) {
  const annuitisationRate = {
    standard: 0.0669,
    basic: 0.0600,
    escalating: 0.0555,
  };
  const rate = annuitisationRate[plan] || annuitisationRate.standard;
  // Base payout at 65 (no deferment)
  const basePayout = raAt65 * rate;
  // Deferment: +7% per year deferred beyond 65 (CPF Board published rate, already includes extra interest + longevity credit)
  const deferYears = Math.max(0, Math.min(5, payoutStartAge - 65));
  const deferMultiplier = 1 + deferYears * CPF_CONSTANTS.DEFER_BONUS_PER_YEAR;
  const annualPayout = basePayout * deferMultiplier;
  const monthly = Math.round(annualPayout / 12);
  return { monthly, annual: Math.round(annualPayout) };
}

function getCPFLifePayout(scheme='FRS', plan='standard', startAge=65) {
  const base = CPF_CONSTANTS.LIFE_PAYOUTS[scheme]?.[plan] || CPF_CONSTANTS.LIFE_PAYOUTS.FRS.standard;
  const deferYears = Math.max(0, Math.min(5, startAge - 65));
  const multiplier = 1 + deferYears * CPF_CONSTANTS.DEFER_BONUS_PER_YEAR;
  return { low: Math.round(base.low * multiplier), mid: Math.round(base.mid * multiplier), high: Math.round(base.high * multiplier) };
}

// Get all 3 plan payouts for a given RA balance at payout age
function getCPFLifePayoutAll(raBalance, payoutStartAge=65) {
  const plans = ['standard','basic','escalating'];
  const result = {};
  plans.forEach(plan => {
    const est = estimateCPFLifePayout(raBalance, plan, payoutStartAge);
    result[plan] = est.monthly;
  });
  return result;
}

// Project RA balance at a given age, starting from RA at 55
function projectRAToAge(raAt55, targetAge) {
  if(targetAge <= 55) return raAt55;
  let ra = raAt55;
  for(let age = 55; age < targetAge; age++) {
    // RA earns 4% + extra interest
    ra *= (1 + CPF_CONSTANTS.RA_RATE);
    // Extra interest for 55+: +2% on first $30k, +1% on next $30k
    const extra2 = Math.min(ra, 30000) * 0.02;
    const extra1 = Math.max(0, Math.min(ra, 60000) - 30000) * 0.01;
    ra += extra2 + extra1;
  }
  return Math.round(ra);
}

function getCPFSchemeAmount(scheme='FRS', year=2026) {
  const key = scheme + '_' + year;
  return CPF_CONSTANTS[key] || CPF_CONSTANTS[scheme + '_2025'] || 213000;
}

// ═══ PDF UNLOCK — tries preset passwords to decrypt locked PDFs ═══
async function getPresetPasswords() {
  const stored = await dbGet('settings','pdfPasswords').catch(()=>null);
  const custom = (stored?.value || '').split('\n').map(s=>s.trim()).filter(Boolean);
  // Auto-generate from client profile
  const cp = await dbGet('settings','clientProfile').catch(()=>null);
  const p = cp?.value || {};
  const auto = [];
  if(p.nric) {
    auto.push(p.nric); // Full NRIC: S1234567X
    auto.push(p.nric.toUpperCase());
    auto.push(p.nric.toLowerCase());
    auto.push(p.nric.slice(1,8)); // digits only: 1234567
    auto.push(p.nric.slice(-4)); // last 4: 567X
  }
  if(p.dob) {
    const d = new Date(p.dob);
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yyyy = String(d.getFullYear());
    const yy = yyyy.slice(-2);
    auto.push(dd+mm+yyyy); // 18061979
    auto.push(yyyy+mm+dd); // 19790618
    auto.push(dd+mm+yy);   // 180679
    auto.push(dd+'/'+mm+'/'+yyyy); // 18/06/1979
    auto.push(dd+'-'+mm+'-'+yyyy); // 18-06-1979
    auto.push(yyyy+'-'+mm+'-'+dd); // 1979-06-18
  }
  // Also try dependant NRICs/DOBs
  (p.dependants||[]).forEach(dep => {
    if(dep.nric) { auto.push(dep.nric); auto.push(dep.nric.toUpperCase()); auto.push(dep.nric.slice(1,8)); }
    if(dep.dob) {
      const d2 = new Date(dep.dob);
      auto.push(String(d2.getDate()).padStart(2,'0')+String(d2.getMonth()+1).padStart(2,'0')+String(d2.getFullYear()));
    }
  });
  // Dedupe
  return [...new Set([...custom, ...auto])].filter(Boolean);
}

async function tryUnlockPDF(arrayBuffer) {
  const data = new Uint8Array(arrayBuffer);
  // Try without password first
  try {
    const doc = await pdfjsLib.getDocument({data}).promise;
    return {doc, password: null, wasLocked: false};
  } catch(e) {
    if(e.name !== 'PasswordException') throw e;
    console.log('[PDF] Password-protected, trying preset passwords...');
  }
  // Try preset passwords
  const passwords = await getPresetPasswords();
  // Also add common SG insurance PDF patterns
  const commonPW = ['123456','12345678','password','1234','abcd1234'];
  const allPW = [...new Set([...passwords, ...commonPW])];
  for(const pw of allPW) {
    try {
      const doc = await pdfjsLib.getDocument({data: new Uint8Array(arrayBuffer), password: pw}).promise;
      console.log('[PDF] Unlocked with password:', pw.slice(0,3)+'***');
      return {doc, password: pw, wasLocked: true};
    } catch(e) {
      if(e.name !== 'PasswordException') throw e;
    }
  }
  console.log('[PDF] All', allPW.length, 'passwords failed');
  // Prompt user as last resort
  const manual = prompt('This PDF is password-protected.\n\nTried ' + allPW.length + ' passwords (including NRIC/DOB from profile).\nCommon passwords: NRIC, DOB (DDMMYYYY), policy number\n\nEnter password:');
  if(!manual) throw new Error('PDF is locked and no password provided');
  try {
    const doc = await pdfjsLib.getDocument({data: new Uint8Array(arrayBuffer), password: manual}).promise;
    return {doc, password: manual, wasLocked: true};
  } catch(e) {
    throw new Error('Wrong password — PDF could not be unlocked');
  }
}

async function pdfToImages(pdfDoc, maxPages=12) {
  const pages = Math.min(pdfDoc.numPages, maxPages);
  const images = [];
  for(let i=1; i<=pages; i++) {
    const page = await pdfDoc.getPage(i);
    const scale = 2; // high-res for OCR
    const vp = page.getViewport({scale});
    const canvas = document.createElement('canvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    const ctx = canvas.getContext('2d');
    await page.render({canvasContext:ctx, viewport:vp}).promise;
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    images.push(dataUrl.split(',')[1]); // base64 only
  }
  return images;
}

// Master function: takes a File, returns content blocks ready for AI
async function processFile(file) {
  const isPDF = file.type === 'application/pdf' || file.name?.toLowerCase().endsWith('.pdf');
  const isExcel = file.name?.match(/\.(xlsx|xls|csv)$/i) || file.type?.includes('spreadsheet') || file.type?.includes('excel');
  const isWord = file.name?.match(/\.(docx|doc|rtf)$/i) || file.type?.includes('wordprocessing') || file.type?.includes('msword');
  
  // ── Excel → convert to CSV text via SheetJS ──
  if(isExcel) {
    try {
      if(file.name?.match(/\.csv$/i)) {
        const text = await file.text();
        return [{type:'text', text:'[Spreadsheet: '+file.name+']\n'+text.slice(0,80000)}];
      }
      const ab = await file.arrayBuffer();
      if(typeof XLSX !== 'undefined') {
        const wb = XLSX.read(ab, {type:'array'});
        let allText = '[Spreadsheet: '+file.name+']\n';
        for(const sheetName of wb.SheetNames) {
          const ws = wb.Sheets[sheetName];
          if(!ws || !ws['!ref']) continue;
          // Get range and limit to actual data area
          const range = XLSX.utils.decode_range(ws['!ref']);
          // Find last column with actual data (scan first 5 rows)
          let maxCol = 0;
          for(let r=range.s.r; r<=Math.min(range.s.r+30, range.e.r); r++) {
            for(let c=range.s.c; c<=range.e.c; c++) {
              const cell = ws[XLSX.utils.encode_cell({r,c})];
              if(cell && cell.v !== null && cell.v !== undefined && String(cell.v).trim() !== '') maxCol = Math.max(maxCol, c);
            }
          }
          // Limit range to actual data columns
          const limitedRange = {s:{r:range.s.r, c:range.s.c}, e:{r:Math.min(range.e.r, range.s.r + 200), c:Math.min(maxCol + 1, 20)}};
          const csv = XLSX.utils.sheet_to_csv(ws, {blankrows:false, range:limitedRange});
          // Clean: remove trailing commas per line and skip fully empty lines
          const cleaned = csv.split('\n').map(line => line.replace(/,+$/g, '')).filter(line => line.replace(/,/g,'').trim() !== '').join('\n');
          if(cleaned.trim()) allText += '\n--- Sheet: '+sheetName+' ---\n'+cleaned;
        }
        return [{type:'text', text:allText.slice(0,60000)}];
      }
    } catch(e) { console.warn('[ProcessFile] Excel parse error:', e); }
    // Final fallback: tell AI we couldn't read it
    return [{type:'text', text:'[File: '+file.name+'] — Excel file could not be parsed. SheetJS may not be loaded.'}];
  }

  // ── Word .docx → extract text (basic XML parse), or send to Claude directly ──
  if(isWord && file.name?.match(/\.docx$/i)) {
    try {
      const ab = await file.arrayBuffer();
      const uint8 = new Uint8Array(ab);
      const decoder = new TextDecoder('utf-8', {fatal:false});
      const raw = decoder.decode(uint8);
      const matches = raw.match(/<w:t[^>]*>([^<]*)<\/w:t>/g);
      if(matches && matches.length > 10) {
        const text = matches.map(m => m.replace(/<[^>]+>/g,'')).join(' ');
        return [{type:'text', text:'[Document: '+file.name+']\n'+text.slice(0,50000)}];
      }
    } catch(e) { console.warn('[ProcessFile] Word parse error:', e); }
    // Fallback: send as document block for Claude (Gemini can't handle docx)
    const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});
    return [{type:'document', source:{type:'base64', media_type:file.type||'application/octet-stream', data:b64}, _forceAnthropic:true}];
  }
  // ── Word .doc / .rtf → force Anthropic ──
  if(isWord) {
    const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});
    return [{type:'document', source:{type:'base64', media_type:file.type||'application/octet-stream', data:b64}, _forceAnthropic:true}];
  }

  // ── PDF ──
  if(isPDF) {
    const arrayBuffer = await file.arrayBuffer();
    try {
      if(typeof pdfjsLib === 'undefined') throw new Error('pdf.js not loaded');
      const {doc, wasLocked} = await tryUnlockPDF(arrayBuffer);
      if(wasLocked) {
        console.log('[PDF] Locked PDF unlocked, rendering to images...');
        const images = await pdfToImages(doc);
        return images.map(b64 => ({type:'image', source:{type:'base64', media_type:'image/jpeg', data:b64}}));
      } else {
        // Check if PDF has pages before sending to Gemini
        if(doc.numPages === 0) throw new Error('PDF has no pages');
        const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});
        return [{type:'document', source:{type:'base64', media_type:'application/pdf', data:b64}}];
      }
    } catch(e) {
      console.warn('[PDF] Error:', e.name, e.message);
      // If it's a password/lock issue, alert and stop — don't send locked PDF to Gemini
      if(e.name === 'PasswordException' || e.message?.includes('locked') || e.message?.includes('password') || e.message?.includes('Password')) {
        toast('PDF is password-protected — add the password in Settings → PDF Unlock Passwords','warning',5000);
        return [];
      }
      // For other errors (pdf.js not loaded, corrupt file), try sending raw to Gemini
      console.warn('[PDF] Falling back to raw PDF send');
      const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});
      return [{type:'document', source:{type:'base64', media_type:'application/pdf', data:b64}}];
    }
  }
  
  // ── Images (Gemini + Claude both handle these) ──
  const b64 = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});
  const mime = file.type || 'application/octet-stream';
  if(mime.startsWith('image/')) return [{type:'image', source:{type:'base64', media_type:mime, data:b64}}];
  
  // ── Text files ──
  if(mime.startsWith('text/') || file.name?.match(/\.(txt|csv|json|md|html|htm)$/i)) {
    const text = await file.text();
    return [{type:'text', text:'[File: '+file.name+']\n'+text.slice(0,50000)}];
  }
  
  // ── Anything else → try text first, fallback to Claude document block ──
  try {
    const text = await file.text();
    if(text && text.length > 20 && !text.match(/[\x00-\x08\x0E-\x1F]/)) {
      return [{type:'text', text:'[File: '+file.name+']\n'+text.slice(0,50000)}];
    }
  } catch(e){}
  // Unknown binary → force Anthropic (Claude handles more MIME types than Gemini)
  return [{type:'document', source:{type:'base64', media_type:mime, data:b64}, _forceAnthropic:true}];
}

  return React.createElement('div',null,

  );

// Fuzzy autocomplete input — shows matching suggestions from a list as user types
const FuzzyInput = ({value,onChange,suggestions,placeholder,style,onSelect}) => {
  const [open,setOpen] = useState(false);
  const [filtered,setFiltered] = useState([]);
  const [typing,setTyping] = useState(false);
  const inputRef = useRef(null);
  const dropRef = useRef(null);
  const [pos,setPos] = useState({top:0,left:0,width:0});

  // Re-filter whenever value OR suggestions change
  useEffect(() => {
    if(!value || value.length < 1 || !suggestions || suggestions.length === 0) { setFiltered([]); if(typing) setOpen(false); return; }
    const q = value.toLowerCase().trim();
    if(!q) { setFiltered([]); setOpen(false); return; }
    const scored = suggestions.map(s => {
      const t = (s.label||s||'').toLowerCase();
      let score = 0;
      if(t === q) score = 100;
      else if(t.startsWith(q)) score = 80;
      else if(t.includes(q)) score = 60;
      else { const chars = q.split(''); let idx = 0; for(const c of chars) { const fi = t.indexOf(c, idx); if(fi >= 0) { score += 3; idx = fi + 1; } } }
      return {item:s, score};
    }).filter(m => m.score > 5).sort((a,b) => b.score - a.score).slice(0, 10);
    setFiltered(scored.map(m => m.item));
    if(typing) setOpen(scored.length > 0);
  }, [value, suggestions]);

  useEffect(() => {
    const handler = (e) => {
      if(inputRef.current && !inputRef.current.contains(e.target) && dropRef.current && !dropRef.current.contains(e.target)) { setOpen(false); setTyping(false); }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const updatePos = useCallback(() => {
    if(!inputRef.current) return;
    const rect = inputRef.current.getBoundingClientRect();
    setPos({top:rect.bottom+2, left:rect.left, width:rect.width});
  }, []);

  return (
    <>
      <input ref={inputRef} value={value||''} onChange={e=>{setTyping(true);onChange(e.target.value);updatePos();}}
        onFocus={()=>{setTyping(true);updatePos();if(filtered.length>0)setOpen(true);}} placeholder={placeholder} style={{...style,width:'100%'}} />
      {open && filtered.length > 0 && ReactDOM.createPortal(
        <div ref={dropRef} style={{position:'fixed',top:pos.top,left:pos.left,width:pos.width,background:'var(--bg3)',border:'1px solid var(--gold3)',borderRadius:8,maxHeight:240,overflowY:'auto',zIndex:10000,boxShadow:'0 8px 32px rgba(0,0,0,.5)'}}>
          {filtered.map((item,i) => {
            const label = item.label || item;
            const sub = item.sub || '';
            return (
              <div key={i} style={{padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--border)',fontSize:12,transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--bg4)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                onMouseDown={e=>{e.preventDefault();onChange(label);if(onSelect)onSelect(item);setOpen(false);setTyping(false);}}>
                <div style={{fontWeight:600,color:'var(--gold)'}}>{label}</div>
                {sub && <div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>{sub}</div>}
              </div>
            );
          })}
        </div>,
        document.body
      )}
    </>
  );
};

// MODULE: INDEXEDDB — Database layer + batch operations
// ═══════════════════════════════════════════════════════════════

const DB_NAME='PolicyLensV4';const DB_VER=1;
const openDB=()=>new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{
    const db=e.target.result;
    if(!db.objectStoreNames.contains('policies'))db.createObjectStore('policies',{keyPath:'id'});
    if(!db.objectStoreNames.contains('repository'))db.createObjectStore('repository',{keyPath:'id'});
    if(!db.objectStoreNames.contains('settings'))db.createObjectStore('settings',{keyPath:'key'});
  };
  r.onsuccess=e=>res(e.target.result);
  r.onerror=e=>rej(e.target.error);
});
const dbOp=(store,mode,fn)=>openDB().then(db=>new Promise((res,rej)=>{
  const tx=db.transaction(store,mode);const s=tx.objectStore(store);const r=fn(s);
  r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);
}));
const dbGetAll=store=>dbOp(store,'readonly',s=>s.getAll());
const dbPut=(store,val)=>dbOp(store,'readwrite',s=>s.put(val));
const dbDel=(store,id)=>dbOp(store,'readwrite',s=>s.delete(id));
const dbGet=(store,key)=>dbOp(store,'readonly',s=>s.get(key));

// PERFORMANCE: Batch load — one DB open, one transaction for policies + settings
const dbBatchLoad = async (settingKeys) => {
  const db = await openDB();
  const [policies, settings] = await Promise.all([
    new Promise((res,rej) => {
      const tx = db.transaction('policies','readonly');
      const r = tx.objectStore('policies').getAll();
      r.onsuccess = e => res(e.target.result || []);
      r.onerror = e => rej(e.target.error);
    }),
    new Promise((res,rej) => {
      const tx = db.transaction('settings','readonly');
      const store = tx.objectStore('settings');
      const results = {};
      let pending = settingKeys.length;
      if(pending === 0) return res(results);
      settingKeys.forEach(key => {
        const r = store.get(key);
        r.onsuccess = e => { results[key] = e.target.result || null; if(--pending === 0) res(results); };
        r.onerror = () => { results[key] = null; if(--pending === 0) res(results); };
      });
    })
  ]);
  return { policies, settings };
};

// ── Domain API — clean interface for app code (use these instead of raw dbGet/dbPut) ──
const PolicyDB = {
  // Policies
  getAllPolicies: () => dbGetAll('policies'),
  savePolicy: (p) => dbPut('policies', p),
  deletePolicy: (id) => dbDel('policies', id),
  // Settings (key-value)
  getSetting: async (key) => { const r = await dbGet('settings', key).catch(()=>null); return r?.value ?? null; },
  saveSetting: (key, value) => dbPut('settings', {key, value}),
  // Client profile (convenience)
  getProfile: async () => { const r = await dbGet('settings','clientProfile').catch(()=>null); return r?.value || null; },
  saveProfile: (p) => dbPut('settings', {key:'clientProfile', value:p}),
  // Repository
  getAllRepo: () => dbGetAll('repository'),
  saveRepoItem: (item) => dbPut('repository', item),
  deleteRepoItem: (id) => dbDel('repository', id),
  // Batch load (initial app start)
  batchLoad: dbBatchLoad,
  // Wipe all (danger)
  clearStore: async (store) => { const db = await openDB(); return new Promise((res,rej)=>{try{const tx=db.transaction(store,'readwrite');tx.objectStore(store).clear();tx.oncomplete=()=>res();tx.onerror=e=>rej(e);}catch(e){rej(e)}}); },
};

// ═══════════════════════════════════════════════════════════════
// MODULE: FUZZY — Fuzzy matching engine
// ═══════════════════════════════════════════════════════════════

function fuzzyMatch(input, candidates, threshold=0.4) {
  const normalize = s => (s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  const ngrams = (s,n=2) => {const r=[];for(let i=0;i<=s.length-n;i++)r.push(s.slice(i,i+n));return r;};
  const similarity = (a,b) => {
    const na=normalize(a),nb=normalize(b);
    if(na===nb)return 1;
    if(!na||!nb)return 0;
    // Dice coefficient on bigrams
    const ga=ngrams(na),gb=ngrams(nb);
    const setB=new Set(gb);
    let inter=0;ga.forEach(g=>{if(setB.has(g))inter++});
    return (2*inter)/(ga.length+gb.length);
  };
  const results = candidates.map(c => {
    // Match on product name and product code
    const nameScore = similarity(input, c.productName);
    const codeScore = similarity(input, c.productCode || '');
    const insurerScore = similarity(input, c.insurer || '');
    const best = Math.max(nameScore, codeScore, insurerScore * 0.7);
    // Also check if input contains key tokens from product
    const inputLow = input.toLowerCase();
    const tokens = (c.productName + ' ' + (c.productCode||'')).toLowerCase().split(/\s+/);
    const tokenHits = tokens.filter(t => t.length > 2 && inputLow.includes(t)).length;
    const tokenBonus = tokenHits / Math.max(tokens.length, 1) * 0.3;
    return {...c, score: Math.min(best + tokenBonus, 1)};
  }).filter(c => c.score >= threshold).sort((a,b) => b.score - a.score);
  return results;
}

function getSB() {
  return window._SB || null;
}

async function sbRepoLoad() {
  const s = getSB();
  if(!s) return null;
  try {
    const {data,error} = await s.from('repository').select('*').order('created_at',{ascending:true});
    if(error) { console.warn('[Repo] Supabase load error:', error.message); return null; }
    return (data||[]).map(r => ({...r.data, _sbId:r.id, _createdBy:r.created_by}));
  } catch(e) { console.warn('[Repo] Supabase unreachable:', e.message); return null; }
}

async function sbRepoSave(item) {
  try {
    const s = getSB();
    if(!s) return false;
    const email = window._user?.email || '';
    const {error} = await s.from('repository').upsert({id:item.id, data:item, created_by:email});
    if(error) console.warn('[Repo] Save error:', error.message);
    return !error;
  } catch(e) { console.warn('[Repo] Save failed:', e.message); return false; }
}

async function sbRepoDelete(id) {
  try {
    const s = getSB();
    if(!s) return false;
    const {error} = await s.from('repository').delete().eq('id', id);
    if(error) console.warn('[Repo] Delete error:', error.message);
    return !error;
  } catch(e) { console.warn('[Repo] Delete failed:', e.message); return false; }
}

// ═══════════════════════════════════════════════════════════════

let _cameraResolve = null;
function openCameraModal() {
  return new Promise(resolve => {
    _cameraResolve = resolve;
    window.dispatchEvent(new Event('policylens-open-camera'));
  });
}

function CameraModal() {
  const [open, setOpen] = useState(false);
  const [shots, setShots] = useState([]);
  const containerRef = useRef(null);
  const shotCountRef = useRef(0);
  const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

  useEffect(() => {
    const handler = () => { setShots([]); shotCountRef.current = 0; setOpen(true); };
    window.addEventListener('policylens-open-camera', handler);
    return () => window.removeEventListener('policylens-open-camera', handler);
  }, []);

  // Auto-open camera on first mount (mobile only)
  useEffect(() => {
    if (open && shotCountRef.current === 0 && isMobile) {
      setTimeout(() => triggerNative('camera'), 150);
    }
  }, [open]);

  // Create fresh input each time to avoid browser caching the intent
  const triggerNative = (source) => {
    if (!containerRef.current) return;
    containerRef.current.innerHTML = '';
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    if (source === 'camera' && isMobile) {
      inp.setAttribute('capture', 'environment');
    } else {
      inp.setAttribute('multiple', 'true');
    }
    inp.style.display = 'none';
    inp.addEventListener('change', (e) => {
      const files = e.target.files;
      if (!files || !files.length) {
        if (shotCountRef.current === 0) finish([]);
        return;
      }
      const newShots = [];
      for (const f of Array.from(files)) newShots.push({ file: f, preview: URL.createObjectURL(f) });
      setShots(prev => { const updated = [...prev, ...newShots].slice(0, 20); shotCountRef.current = updated.length; return updated; });
      if (containerRef.current) containerRef.current.innerHTML = '';
    });
    containerRef.current.appendChild(inp);
    setTimeout(() => inp.click(), 50);
  };

  const removeShot = (idx) => {
    setShots(prev => { const n = [...prev]; URL.revokeObjectURL(n[idx].preview); n.splice(idx, 1); shotCountRef.current = n.length; return n; });
  };
  const finish = (result) => {
    setOpen(false);
    if (_cameraResolve) { _cameraResolve(result || shots.map(s => s.file)); _cameraResolve = null; }
  };
  const cancel = () => {
    shots.forEach(s => URL.revokeObjectURL(s.preview)); setShots([]); shotCountRef.current = 0; finish([]);
  };

  if (!open) return null;

  return (
    <div style={{position:'fixed',inset:0,zIndex:10000,background:'var(--bg)',display:'flex',flexDirection:'column'}}>
      <div ref={containerRef} style={{display:'none'}} />

      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'12px 16px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <button onClick={cancel}
          style={{background:'none',border:'none',color:'var(--text3)',fontSize:14,cursor:'pointer',padding:'4px 8px'}}>
          ✕ Cancel
        </button>
        <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>
          {shots.length} item{shots.length !== 1 ? 's' : ''} staged
        </div>
        <button onClick={() => finish()}
          style={{background:shots.length > 0 ? 'var(--gold)' : 'var(--bg3)',
            color:shots.length > 0 ? '#0b0f1a' : 'var(--text3)',
            border:'none',borderRadius:8,padding:'6px 14px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
          Done ✓
        </button>
      </div>

      {/* Photo grid */}
      <div style={{flex:1,overflow:'auto',padding:12}}>
        {shots.length === 0 ? (
          <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}}>
            <div style={{fontSize:48,marginBottom:12}}>📷</div>
            <div style={{fontSize:15,fontWeight:600,color:'var(--text2)',marginBottom:4}}>
              {isMobile ? 'Camera is opening...' : 'Select images below'}
            </div>
            <div style={{fontSize:12}}>
              {isMobile
                ? 'Take a photo, or pick from gallery. Add as many as you need before extracting.'
                : 'Select multiple files with Ctrl/Cmd+Click'}
            </div>
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(90px,1fr))',gap:8}}>
            {shots.map((s, i) => (
              <div key={i} style={{position:'relative',paddingBottom:'100%',borderRadius:10,overflow:'hidden',
                border:'2px solid var(--border2)'}}>
                <img src={s.preview}
                  style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}} />
                <button onClick={() => removeShot(i)}
                  style={{position:'absolute',top:4,right:4,width:22,height:22,borderRadius:'50%',
                    background:'rgba(0,0,0,.7)',color:'#fff',border:'none',fontSize:12,
                    cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                <div style={{position:'absolute',bottom:4,left:4,background:'rgba(0,0,0,.6)',
                  color:'#fff',fontSize:10,padding:'1px 6px',borderRadius:4}}>{i + 1}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Bottom action buttons */}
      <div style={{padding:'12px 16px 24px',borderTop:'1px solid var(--border)',flexShrink:0}}>
        <div style={{display:'flex',gap:8,marginBottom:shots.length > 0 ? 10 : 0}}>
          {isMobile && (
            <button onClick={() => triggerNative('camera')}
              style={{flex:1,background:'var(--bg3)',border:'2px dashed var(--gold3)',borderRadius:12,
                padding:'14px 8px',cursor:'pointer',textAlign:'center'}}>
              <span style={{fontSize:22}}>📷</span>
              <div style={{fontSize:12,fontWeight:600,color:'var(--gold2)',marginTop:3}}>Take Photo</div>
            </button>
          )}
          <button onClick={() => triggerNative('gallery')}
            style={{flex:1,background:'var(--bg3)',border:'2px dashed var(--blue)',borderRadius:12,
              padding:'14px 8px',cursor:'pointer',textAlign:'center'}}>
            <span style={{fontSize:22}}>🖼️</span>
            <div style={{fontSize:12,fontWeight:600,color:'var(--blue2)',marginTop:3}}>
              {isMobile ? 'Gallery' : 'Select Files'}
            </div>
            <div style={{fontSize:9,color:'var(--text3)',marginTop:2}}>Multi-select</div>
          </button>
        </div>
        {shots.length > 0 && (
          <button onClick={() => finish()}
            style={{width:'100%',background:'var(--gold)',border:'none',borderRadius:12,
              padding:'14px',cursor:'pointer',textAlign:'center'}}>
            <span style={{fontSize:20}}>✨</span>
            <span style={{fontSize:14,fontWeight:700,color:'#0b0f1a',marginLeft:8}}>
              Extract {shots.length} Item{shots.length > 1 ? 's' : ''}
            </span>
          </button>
        )}
      </div>
    </div>
  );
}

// MODULE: APP — Main App component + state management
// ═══════════════════════════════════════════════════════════════

function App() {
  const [tab, setTab] = useState('dashboard');
  const [policies, setPolicies] = useState([]);
  const [repo, setRepo] = useState([]);
  const [apiKey, setApiKey] = useState('');
  const [clientName, setClientName] = useState('');
  const [clientProfile, setClientProfile] = useState({name:'',nric:'',dob:'',gender:'',smoker:'',nationality:'',occupation:'',phone:'',email:'',dependants:[]});
  const [loading, setLoading] = useState(true);
  const [repoSource, setRepoSource] = useState('loading'); // 'supabase' | 'local' | 'loading'

  useEffect(() => {
    (async () => {
      // PERFORMANCE: Batch load — single DB open, parallel reads for policies + all settings
      const {policies: ps, settings: stg} = await dbBatchLoad(['apiKey','clientName','clientProfile']);
      setPolicies(ps || []);
      if(stg.apiKey) setApiKey(stg.apiKey.value||'');
      if(stg.clientName) setClientName(stg.clientName.value||'');
      if(stg.clientProfile?.value) setClientProfile(stg.clientProfile.value);

      // Load repository from Supabase (primary) with local fallback
      // Only try Supabase if user is authenticated (session exists)
      const s = getSB();
      let hasSession = false;
      if(s) { try { const sess = await s.auth.getSession(); hasSession = !!(sess?.data?.session); } catch(e){} }
      
      let repoData = hasSession ? await sbRepoLoad() : null;
      if(repoData !== null) {
        setRepoSource('supabase');
        // Merge: ensure seed products exist in Supabase (add missing, never overwrite)
        const sbIds = new Set(repoData.map(r=>r.id));
        const sbNames = new Set(repoData.map(r=>(r.insurer||'')+'|'+(r.productName||'')));
        let seeded = 0;
        for(const s of SEED_REPOSITORY) {
          if(!sbIds.has(s.id) && !sbNames.has(s.insurer+'|'+s.productName)) { await sbRepoSave(s); repoData.push(s); seeded++; }
        }
        if(seeded) console.log('[Repo] Seeded', seeded, 'missing products to Supabase');
        setRepo(repoData);
        console.log('[Repo] Loaded', repoData.length, 'products from Supabase');
      } else {
        // Fallback to local IndexedDB
        setRepoSource('local');
        const rs = await dbGetAll('repository').catch(()=>[]);
        if(!rs || rs.length === 0) {
          // Merge seed: only add if not exists
          const existingNames = new Set(rs.map(r=>(r.insurer||'')+'|'+(r.productName||'')));
          for(const s of SEED_REPOSITORY) { if(!existingNames.has(s.insurer+'|'+s.productName)) await dbPut('repository', s); }
          setRepo(SEED_REPOSITORY);
        } else {
          setRepo(rs);
        }
        console.log('[Repo] Fallback to local IndexedDB');
      }
      setLoading(false);
    })();
  }, []);

  // Reload API keys when Supabase sync completes (fixes race condition on login)
  useEffect(() => {
    const handler = async () => {
      const gk = await dbGet('settings','geminiKey').catch(()=>null);
      const ck = await dbGet('settings','anthropicKey').catch(()=>null);
      if(gk?.value || ck?.value) console.log('[App] API keys reloaded after Supabase sync');
    };
    window.addEventListener('policylens-keys-synced', handler);
    return () => window.removeEventListener('policylens-keys-synced', handler);
  }, []);

  // Repo reload triggered manually via refreshRepo or on initial load

  const savePolicy = async (p) => {
    await dbPut('policies', p);
    setPolicies(prev => {const idx=prev.findIndex(x=>x.id===p.id);if(idx>=0){const n=[...prev];n[idx]=p;return n}return[...prev,p]});
  };
  const deletePolicy = async (id) => {
    await dbDel('policies', id);
    setPolicies(prev => prev.filter(x=>x.id!==id));
  };

  // Repo operations — Supabase primary, local fallback
  const saveRepo = async (item) => {
    if(repoSource==='supabase') {
      await sbRepoSave(item);
    } else {
      await dbPut('repository', item);
    }
    setRepo(prev => {const idx=prev.findIndex(x=>x.id===item.id);if(idx>=0){const n=[...prev];n[idx]=item;return n}return[...prev,item]});
  };
  const deleteRepo = async (id) => {
    if(repoSource==='supabase') {
      await sbRepoDelete(id);
    } else {
      await dbDel('repository', id);
    }
    setRepo(prev => prev.filter(x=>x.id!==id));
  };
  // Force refresh from Supabase
  const refreshRepo = async () => {
    const data = await sbRepoLoad();
    if(data !== null) { setRepo(data); setRepoSource('supabase'); return true; }
    return false;
  };

  const saveApiKey = async (k) => {
    const trimmed=k.trim().replace(/^["']+|["']+$/g,'');
    setApiKey(trimmed);
    await dbPut('settings',{key:'apiKey',value:trimmed});
  };
  const saveClientName = async (n) => {
    setClientName(n);
    await dbPut('settings',{key:'clientName',value:n});
  };
  const saveProfile = async (p) => {
    setClientProfile(p);
    setClientName(p.name||'');
    await dbPut('settings',{key:'clientProfile',value:p});
    await dbPut('settings',{key:'clientName',value:p.name||''});
    // ── GLOBAL SYNC: Recalculate ageAtEntry for all policies when DOB changes ──
    if(p.dob) {
      const dob = new Date(p.dob);
      if(!isNaN(dob.getTime())) {
        let updated = 0;
        for(const pol of policies) {
          if(!pol.inceptionDate) continue;
          const inception = new Date(pol.inceptionDate);
          if(isNaN(inception.getTime())) continue;
          const entryAge = Math.floor((inception.getTime()-dob.getTime())/31557600000);
          if(entryAge <= 0 || entryAge >= 100) continue;
          const needsUpdate = !pol.ageAtEntry || !pol.premStartAge || 
            (pol.inceptionDate && Math.abs(parseInt(pol.ageAtEntry||0)-entryAge) > 1);
          if(needsUpdate) {
            const upd = {...pol, ageAtEntry:String(entryAge), premStartAge:String(entryAge)};
            if(parseInt(pol.premTerm)>0 && !pol.premEndAge) upd.premEndAge = String(entryAge+parseInt(pol.premTerm));
            else if(parseInt(pol.premTerm)>0) upd.premEndAge = String(entryAge+parseInt(pol.premTerm));
            await dbPut('policies',upd);
            updated++;
          }
        }
        if(updated > 0) {
          console.log('[Sync] Updated ageAtEntry for '+updated+' policies from DOB');
          // Reload policies
          const all = await dbGetAll('policies');
          setPolicies(all);
        }
      }
    }
  };

  const ctx = {policies,repo,apiKey,clientName,clientProfile,savePolicy,deletePolicy,saveRepo,deleteRepo,refreshRepo,repoSource,saveApiKey,saveClientName,saveProfile,tab,setTab};

  if(loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh'}}>
    <div style={{textAlign:'center'}}><LogoMark size={36} /><div style={{color:'var(--text2)',fontSize:14,marginTop:8}}>Loading PolicyLens…</div></div>
  </div>;

  return (
    <AppCtx.Provider value={ctx}>
      <ToastContainer />
      <CameraModal />
      <OnboardingModal />
      <Header />
      <div style={{flex:1,overflow:'auto',padding:'12px clamp(10px, 3vw, 20px) 40px'}}>
        {tab==='profile' && <ErrorBoundary key="profile"><ProfileTab /></ErrorBoundary>}
        {tab==='dashboard' && <ErrorBoundary key="dashboard"><Dashboard /></ErrorBoundary>}
        <div style={{display:tab==='policies'?'block':'none'}}><Policies /></div>
        {tab==='repository' && <ErrorBoundary key="repo"><Repository /></ErrorBoundary>}
        {tab==='funds' && <FundLookup />}
        {tab==='report' && <ErrorBoundary key="report"><ReportTab /></ErrorBoundary>}
        {tab==='settings' && <Settings />}
      </div>
    </AppCtx.Provider>
  );
}

// ═══════════════════════════════════════════════════════════════
// MODULE: OPENAI_HELPER — Converts content blocks to OpenAI format
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
// MODULE: JSON_REPAIR — Fixes truncated JSON from token limits
// ═══════════════════════════════════════════════════════════════
function repairJSON(raw) {
  let s = raw.replace(/```json\s*|```\s*/g,'').trim();
  // If it doesn't start with { or [, try to find the first one
  const firstBrace = s.indexOf('{');
  const firstBracket = s.indexOf('[');
  if(firstBrace>0 && (firstBracket<0 || firstBrace<firstBracket)) s = s.slice(firstBrace);
  else if(firstBracket>=0 && firstBracket<firstBrace) s = s.slice(firstBracket);
  
  // Try parsing as-is first
  try { return JSON.parse(s); } catch(e) {}
  
  // Count open/close braces and brackets
  let braces=0, brackets=0;
  for(const c of s) {
    if(c==='{') braces++;
    if(c==='}') braces--;
    if(c==='[') brackets++;
    if(c===']') brackets--;
  }
  
  // Truncated string — close any open quotes
  if((s.match(/"/g)||[]).length % 2 !== 0) s += '"';
  
  // Close open structures
  while(brackets>0) { s+=']'; brackets--; }
  while(braces>0) { s+='}'; braces--; }
  
  // Remove trailing comma before closing
  s = s.replace(/,\s*}/g,'}').replace(/,\s*]/g,']');
  
  try { return JSON.parse(s); } catch(e2) {
    // ── Truncated array recovery ──
    // Find the array inside a wrapper object like {"policies":[...]}
    // Extract all COMPLETE objects from the array
    const arrayMatch = s.match(/\[\s*\{/);
    if(arrayMatch) {
      const arrStart = s.indexOf('[', arrayMatch.index);
      const completeObjects = [];
      let depth=0, objStart=-1;
      for(let i=arrStart+1; i<s.length; i++) {
        if(s[i]==='{') { if(depth===0) objStart=i; depth++; }
        if(s[i]==='}') { depth--; if(depth===0 && objStart>=0) {
          try { const obj = JSON.parse(s.slice(objStart, i+1)); completeObjects.push(obj); } catch(e3) {}
          objStart=-1;
        }}
      }
      if(completeObjects.length > 0) {
        console.log('[repairJSON] Recovered '+completeObjects.length+' complete objects from truncated response');
        return completeObjects;
      }
    }
    
    // Last resort — try to extract first complete object
    let depth2=0, start=-1;
    for(let i=0;i<s.length;i++){
      if(s[i]==='{'){if(start<0)start=i;depth2++;}
      if(s[i]==='}'){depth2--;if(depth2===0&&start>=0){try{return JSON.parse(s.slice(start,i+1));}catch(e3){start=-1;}}}
    }
    console.error('[repairJSON] Failed to parse. First 500 chars:', s.substring(0, 500));
    throw new Error('Could not parse AI response as JSON. Check browser console (F12) for the raw response.');
  }
}

// ═══════════════════════════════════════════════════════════════
// MODULE: AI_PIPELINE — Gemini reads docs, Claude extracts structured data
// Fallback: Gemini-only if no Anthropic key
// ═══════════════════════════════════════════════════════════════

// Step 1: Gemini reads PDFs/images → returns raw text
async function geminiRead(geminiKey, contentBlocks) {
  const parts = [];
  for(const block of contentBlocks) {
    if(block.type==='text') parts.push({text:block.text});
    else if(block.type==='image') parts.push({inlineData:{mimeType:block.source.media_type,data:block.source.data}});
    else if(block.type==='document') parts.push({inlineData:{mimeType:block.source.media_type||'application/pdf',data:block.source.data}});
  }
  console.log('[Gemini Read] Sending:', parts.filter(p=>p.inlineData).length, 'files');
  let resp;
  try {
    resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+geminiKey,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts}],
        systemInstruction:{parts:[{text:'You are a document reader. Extract ALL text, numbers, tables, and data from these documents. Preserve table structures. Include every detail — policy numbers, dates, amounts, rider names, conditions, charges. Output as plain text, organized by section.'}]},
        generationConfig:{maxOutputTokens:16000}
      })
    });
  } catch(fetchErr) {
    throw new Error('Gemini: NetworkError when attempting to fetch resource.');
  }
  if(!resp.ok) {
    const errData = await resp.json().catch(()=>({}));
    throw new Error('Gemini read error ('+resp.status+'): '+(errData.error?.message||resp.statusText));
  }
  const data = await resp.json();
  if(data.error) throw new Error('Gemini: '+data.error.message);
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text||'';
  console.log('[Gemini Read] Extracted:', text.length, 'chars');
  return text;
}

// Step 2: Claude structures the extracted text → perfect JSON
async function claudeExtract(anthropicKey, systemPrompt, rawText, maxTokens) {
  console.log('[Claude Extract] Sending:', rawText.length, 'chars to Claude');
  let resp;
  try {
    resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens||4000,
        system:systemPrompt+'\n\nRespond with ONLY valid JSON. Start with { end with }.',
        messages:[{role:'user',content:rawText}]
      })
    });
  } catch(fetchErr) {
    throw new Error('Claude: NetworkError when attempting to fetch resource.');
  }
  const data = await resp.json();
  if(data.error) throw new Error('Claude: '+data.error.message);
  const raw = data.content?.[0]?.text||'';
  console.log('[Claude Extract] Response:', raw.length, 'chars');
  return raw.replace(/```json\s*|```\s*/g,'').trim();
}

// Gemini-only fallback (if no Anthropic key)
async function geminiExtract(geminiKey, systemPrompt, contentBlocks, maxTokens) {
  const parts = [];
  for(const block of contentBlocks) {
    if(block.type==='text') parts.push({text:block.text});
    else if(block.type==='image') parts.push({inlineData:{mimeType:block.source.media_type,data:block.source.data}});
    else if(block.type==='document') parts.push({inlineData:{mimeType:block.source.media_type||'application/pdf',data:block.source.data}});
  }
  if(parts.length === 0) throw new Error('No content to extract from');
  let resp;
  try {
    resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+geminiKey,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts}],
        systemInstruction:{parts:[{text:systemPrompt+'\n\nYou MUST respond with ONLY valid JSON. Start with { or [. End with } or ]. No markdown, no backticks, no explanation.'}]},
        generationConfig:{maxOutputTokens:maxTokens||8000,responseMimeType:'application/json'}
      })
    });
  } catch(fetchErr) {
    throw new Error('Gemini: NetworkError when attempting to fetch resource.');
  }
  if(!resp.ok) {
    const errData = await resp.json().catch(()=>({}));
    throw new Error('Gemini API error ('+resp.status+'): '+(errData.error?.message||resp.statusText));
  }
  const data = await resp.json();
  if(data.error) throw new Error('Gemini: '+data.error.message);
  if(!data.candidates || !data.candidates.length) {
    const blockReason = data.promptFeedback?.blockReason;
    throw new Error('Gemini returned no response'+(blockReason?' (blocked: '+blockReason+')':'') +'. Try a different image or document.');
  }
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text||'';
  if(!raw || raw.length < 5) throw new Error('Gemini returned empty response. The document may be unreadable. Try a clearer image.');
  console.log('[Gemini Extract] Response:', raw.length, 'chars, starts with:', raw.substring(0,50));
  return raw.replace(/```json\s*|```\s*/g,'').trim();
}

// Main entry point — uses dual pipeline if both keys exist, Gemini-only otherwise
async function callAI(systemPrompt, contentBlocks, maxTokens) {
  console.log('[callAI] Starting. Blocks:', contentBlocks.length, 'types:', contentBlocks.map(b=>b.type).join(','));
  const uid = window._user?.id || '';
  const gk = ((await dbGet('settings','geminiKey_'+uid).catch(()=>null))?.value || (await dbGet('settings','geminiKey').catch(()=>null))?.value || '').trim();
  const ck = ((await dbGet('settings','anthropicKey_'+uid).catch(()=>null))?.value || (await dbGet('settings','anthropicKey').catch(()=>null))?.value || '').trim();
  
  console.log('[callAI] Keys loaded — Gemini:', gk ? gk.substring(0,8)+'...' : 'NONE', 'Anthropic:', ck ? ck.substring(0,8)+'...' : 'NONE');
  if(!gk && !ck) throw new Error('Set your Gemini or Anthropic API key in Settings first');
  
  const hasMedia = contentBlocks.some(b=>b.type==='image'||b.type==='document');
  const forceAnthropic = contentBlocks.some(b=>b._forceAnthropic);
  const textParts = contentBlocks.filter(b=>b.type==='text').map(b=>b.text).join('\n');
  
  // ── Text-only → Claude directly (cheapest), fallback to Gemini ──
  if(ck && !hasMedia) {
    console.log('[AI] Text-only → Claude direct');
    try {
      return await claudeExtract(ck, systemPrompt, textParts, maxTokens);
    } catch(claudeErr) {
      console.warn('[AI] Claude failed:', claudeErr.message);
      if(gk) {
        // Fall back to Gemini for any network/fetch error, overload, or rate limit
        const msg = (claudeErr.message||'').toLowerCase();
        if(msg.includes('fetch') || msg.includes('network') || msg.includes('failed') || msg.includes('overload') || msg.includes('529') || msg.includes('rate') || claudeErr instanceof TypeError) {
          console.log('[AI] Falling back to Gemini for text extraction');
          return await geminiExtract(gk, systemPrompt, [{type:'text',text:textParts}], maxTokens);
        }
      }
      throw claudeErr;
    }
  }

  // ── Force Anthropic (e.g. docx files Gemini can't handle) — with fallback ──
  if(forceAnthropic && ck) {
    console.log('[AI] Forced Anthropic route (unsupported Gemini MIME)');
    try {
      const claudeContent = contentBlocks.map(b => {
        if(b.type === 'text') return {type:'text', text:b.text};
        if(b.type === 'image') return {type:'image', source:b.source};
        if(b.type === 'document') return {type:'document', source:b.source};
        return null;
      }).filter(Boolean);
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':ck,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:maxTokens||8000,
          system:systemPrompt,
          messages:[{role:'user', content:claudeContent}]
        })
      });
      if(!resp.ok) { const e = await resp.json().catch(()=>({})); throw new Error('Claude: '+(e.error?.message||resp.status)); }
      const data = await resp.json();
      return data.content?.map(c=>c.text||'').join('') || '';
    } catch(claudeErr) {
      console.warn('[AI] Claude forceAnthropic failed:', claudeErr.message, '→ falling back to Gemini');
      if(gk) return await geminiExtract(gk, systemPrompt, contentBlocks, maxTokens);
      throw claudeErr;
    }
  }

  // ── Dual pipeline: Gemini reads → Claude extracts (with fallback) ──
  if(ck && hasMedia) {
    console.log('[AI] Dual pipeline: Gemini read → Claude extract');
    let geminiText = null;
    try {
      geminiText = await geminiRead(gk, contentBlocks);
    } catch(geminiError) {
      console.warn('[AI] Gemini read failed:', geminiError.message, '→ trying Gemini extract directly');
      return await geminiExtract(gk, systemPrompt, contentBlocks, maxTokens);
    }
    // Gemini read succeeded — try Claude extract
    try {
      return await claudeExtract(ck, systemPrompt, geminiText + '\n\n' + textParts, maxTokens);
    } catch(claudeError) {
      console.warn('[AI] Claude extract failed:', claudeError.message, '→ falling back to Gemini extract');
      // Claude unreachable — use Gemini for extraction too
      return await geminiExtract(gk, systemPrompt, [{type:'text', text: geminiText + '\n\n' + textParts}], maxTokens);
    }
  }
  
  // ── Gemini only (no Anthropic key) — with error handling ──
  if(gk) {
    console.log('[AI] Gemini-only mode');
    try {
      return await geminiExtract(gk, systemPrompt, contentBlocks, maxTokens);
    } catch(e) {
      throw new Error('Gemini: ' + e.message + (ck ? '' : '. Add an Anthropic key in Settings for better file support.'));
    }
  }

  throw new Error('No API keys configured. Go to Settings.');
}
