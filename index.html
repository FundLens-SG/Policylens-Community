        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name or ISIN…" style={{width:260}} />
      </div>

      {/* Asset Composition chips — matches FundLens donut */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:5}}>Asset Composition</div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          <div onClick={()=>setAcFilter('all')} style={{padding:'4px 10px',borderRadius:8,fontSize:11,fontWeight:500,cursor:'pointer',
            background:acFilter==='all'?'var(--bg4)':'transparent',color:acFilter==='all'?'var(--text)':'var(--text3)',border:'1px solid '+(acFilter==='all'?'var(--border2)':'transparent')}}>
            All ({FUND_DB.length.toLocaleString()})
          </div>
          {Object.entries(acCounts).sort((a,b)=>b[1]-a[1]).map(([t,c])=>{
            const col=acBadgeColor(t);
            return <div key={t} onClick={()=>setAcFilter(acFilter===t?'all':t)} style={{
              padding:'4px 10px',borderRadius:8,fontSize:11,fontWeight:500,cursor:'pointer',
              background:acFilter===t?col+'22':'transparent',color:acFilter===t?col:'var(--text3)',
              border:'1px solid '+(acFilter===t?col+'55':'transparent'),
              opacity:acFilter!=='all'&&acFilter!==t?.4:1}}>
              <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:col,marginRight:4}} />
              {ASSET_LABELS[t]||t} ({c})
            </div>
          })}
        </div>
      </div>

      {/* Country chips — matches FundLens geo donut */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:5}}>Country / Region</div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          <div onClick={()=>setRegionFilter('all')} style={{padding:'4px 10px',borderRadius:8,fontSize:11,fontWeight:500,cursor:'pointer',
            background:regionFilter==='all'?'var(--bg4)':'transparent',color:regionFilter==='all'?'var(--text)':'var(--text3)',border:'1px solid '+(regionFilter==='all'?'var(--border2)':'transparent')}}>
            All
          </div>
          {Object.entries(regionCounts).sort((a,b)=>b[1]-a[1]).map(([r,c])=>{
            const col=GEO_COLORS[r]||'#718096';
            return <div key={r} onClick={()=>setRegionFilter(regionFilter===r?'all':r)} style={{
              padding:'4px 10px',borderRadius:8,fontSize:11,fontWeight:500,cursor:'pointer',
              background:regionFilter===r?col+'22':'transparent',color:regionFilter===r?col:'var(--text3)',
              border:'1px solid '+(regionFilter===r?col+'55':'transparent'),
              opacity:regionFilter!=='all'&&regionFilter!==r?.4:1}}>
              <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:col,marginRight:4}} />
              {REGION_LABELS[r]||r} ({c})
            </div>
          })}
        </div>
      </div>

      {/* Sector + Risk dropdowns */}
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
        <div>
          <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:3}}>Sector</div>
          <select value={sectorFilter} onChange={e=>setSectorFilter(e.target.value)} style={{fontSize:12,minWidth:220}}>
            <option value="all">All Sectors</option>
            {sectors.map(s=><option key={s} value={s}>{SECTOR_LABELS[s]||s}</option>)}
          </select>
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:3}}>Risk Level</div>
          <select value={riskFilter} onChange={e=>setRiskFilter(e.target.value)} style={{fontSize:12}}>
            <option value="all">All Risk Levels</option>
            <option value="low">Low (1-3)</option>
            <option value="med">Medium (4-6)</option>
            <option value="high">High (7-8)</option>
            <option value="vhigh">Very High (9-10)</option>
          </select>
        </div>
        {(acFilter!=='all'||regionFilter!=='all'||sectorFilter!=='all'||riskFilter!=='all'||search) &&
          <button className="btn-secondary btn-sm" style={{marginTop:14}} onClick={()=>{setAcFilter('all');setRegionFilter('all');setSectorFilter('all');setRiskFilter('all');setSearch('')}}>Clear All Filters</button>}
      </div>

      {/* Results count + pagination */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontSize:12,color:'var(--text3)'}}>{filtered.length.toLocaleString()} results{filtered.length!==FUND_DB.length?' (filtered)':''}</span>
        {totalPages>1 && <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <button className="btn-secondary btn-sm" disabled={page===0} onClick={()=>setPage(p=>p-1)}>‹</button>
          <span style={{fontSize:11,color:'var(--text2)',minWidth:80,textAlign:'center'}}>Page {page+1} of {totalPages}</span>
          <button className="btn-secondary btn-sm" disabled={page>=totalPages-1} onClick={()=>setPage(p=>p+1)}>›</button>
        </div>}
      </div>

      <div className="card" style={{padding:0,overflow:'hidden',overflowX:'auto'}}>
        <table>
          <thead><tr>
            <th>Name</th>
            <th>Asset Composition</th>
            <th>Country</th>
            <th>Sector</th>
            <th style={{textAlign:'center'}}>Risk</th>
            <th>Level</th>
            <th>Inception</th>
            <th>ISIN</th>
          </tr></thead>
          <tbody>
            {paged.map((f,i) => {
              const [name,ac,region,sector,risk,inception,isin] = f;
              const acCol = acBadgeColor(ac);
              const geoCol = GEO_COLORS[region]||'#718096';
              const rCol = riskColor(risk);
              return (
                <tr key={page*PAGE_SIZE+i}>
                  <td style={{fontWeight:500,maxWidth:320,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{name}</td>
                  <td>
                    <span className="badge" style={{background:acCol+'22',color:acCol,fontSize:10}}>
                      {ASSET_LABELS[ac]||ac}
                    </span>
                  </td>
                  <td>
                    <span style={{fontSize:12,display:'inline-flex',alignItems:'center',gap:4}}>
                      <span style={{width:6,height:6,borderRadius:'50%',background:geoCol,flexShrink:0}} />
                      {REGION_LABELS[region]||region}
                    </span>
                  </td>
                  <td style={{fontSize:11,color:'var(--text2)'}}>{SECTOR_LABELS[sector]||sector}</td>
                  <td style={{textAlign:'center'}}>
                    <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:28,height:28,borderRadius:'50%',background:rCol+'22',color:rCol,fontWeight:700,fontSize:12}}>{risk}</div>
                  </td>
                  <td><span className="badge" style={{background:rCol+'22',color:rCol}}>{riskLabel(risk)}</span></td>
                  <td style={{fontSize:11,color:'var(--text3)'}}>{inception||'—'}</td>
                  <td className="mono" style={{fontSize:10,color:'var(--text3)'}}>{isin||'—'}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length===0 && <div style={{padding:24,textAlign:'center',color:'var(--text3)'}}>No instruments match your search</div>}
      </div>

      {/* Bottom pagination */}
      {totalPages>1 && <div style={{display:'flex',justifyContent:'center',gap:4,marginTop:12}}>
        <button className="btn-secondary btn-sm" disabled={page===0} onClick={()=>setPage(0)}>First</button>
        <button className="btn-secondary btn-sm" disabled={page===0} onClick={()=>setPage(p=>p-1)}>‹ Prev</button>
        <span style={{fontSize:11,color:'var(--text2)',padding:'5px 10px'}}>Page {page+1} of {totalPages}</span>
        <button className="btn-secondary btn-sm" disabled={page>=totalPages-1} onClick={()=>setPage(p=>p+1)}>Next ›</button>
        <button className="btn-secondary btn-sm" disabled={page>=totalPages-1} onClick={()=>setPage(totalPages-1)}>Last</button>
      </div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// PDF REPORT — Executive Summary
// ═══════════════════════════════════════════════════════════════

function ReportTab() {
  const {policies,clientName} = useContext(AppCtx);
  const [generating, setGenerating] = useState(false);

  const generate = async () => {
    setGenerating(true);
    try {
      const {jsPDF} = window.jspdf;
      const doc = new jsPDF('p','mm','a4');
      const W=210, M=15, CW=W-2*M;
      let y=20;

      // Color constants
      const NAVY=[16,24,48], BLUE=[59,130,246], WHITE=[255,255,255], GRAY=[148,163,184], DARK=[30,41,59];

      // Header
      doc.setFillColor(...NAVY);
      doc.rect(0,0,W,48,'F');
      doc.setFillColor(...BLUE);
      doc.rect(0,46,W,2,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(22);doc.setTextColor(...WHITE);
      doc.text('PolicyLens',M,28);
      doc.setFontSize(11);doc.setFont('helvetica','normal');
      doc.text('Insurance Portfolio Report',M,36);
      if(clientName){doc.setFontSize(10);doc.text(`Client: ${clientName}`,W-M,28,{align:'right'});}
      doc.setFontSize(9);doc.setTextColor(180,180,180);
      doc.text(`Generated: ${new Date().toLocaleDateString('en-SG',{day:'numeric',month:'long',year:'numeric'})}`,W-M,36,{align:'right'});

      y=58;

      // Summary stats
      const totalPrem = policies.reduce((s,p)=>s+(parseFloat(p.annualPremium)||0),0);
      const totalCover = policies.reduce((s,p)=>s+(parseFloat(p.sumAssured)||0),0);
      const cats = {};policies.forEach(p=>{if(!cats[p.category])cats[p.category]=[];cats[p.category].push(p)});

      doc.setFillColor(245,247,250);doc.rect(M,y,CW,22,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...DARK);
      doc.text('PORTFOLIO SUMMARY',M+4,y+8);
      doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100,100,100);
      const stats=[`${policies.length} Policies`,`Annual Premium: ${fmt(totalPrem)}`,`Total Coverage: ${fmt(totalCover)}`,`${Object.keys(cats).length} Categories`];
      doc.text(stats.join('   |   '),M+4,y+16);
      y+=30;

      // Gap Analysis section
      doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...DARK);
      doc.text('Gap Analysis',M,y);y+=8;

      const protPolicies = cats.protection||[];
      const deathCover = protPolicies.reduce((s,p)=>s+(parseFloat(p.sumAssured)||0),0);
      const ciCover = protPolicies.filter(p=>p.subType==='Critical Illness').reduce((s,p)=>s+(parseFloat(p.sumAssured)||0),0);
      const hasISP = (cats.health||[]).some(p=>p.subType==='Integrated Shield Plan');
      const retIncome = (cats.retirement||[]).reduce((s,p)=>s+(parseFloat(p.monthlyBenefit)||0),0);

      const gapRows = [
        ['Death / TPD Coverage',fmt(deathCover),fmt(RECOMMENDED_COVERAGE.protection.death),deathCover>=RECOMMENDED_COVERAGE.protection.death?'Adequate':'Shortfall'],
        ['Critical Illness',fmt(ciCover),fmt(RECOMMENDED_COVERAGE.protection.ci),ciCover>=RECOMMENDED_COVERAGE.protection.ci?'Adequate':'Shortfall'],
        ['Integrated Shield Plan',hasISP?'Yes':'No','Yes',hasISP?'Adequate':'Not Covered'],
        ['Retirement Income (Monthly)',fmt(retIncome)+'/mo',fmt(RECOMMENDED_COVERAGE.retirement.monthlyIncome)+'/mo',retIncome>=RECOMMENDED_COVERAGE.retirement.monthlyIncome?'Adequate':'Shortfall'],
      ];

      doc.autoTable({
        startY:y, margin:{left:M,right:M},
        head:[['Coverage Area','Current','Recommended','Status']],
        body:gapRows,
        styles:{fontSize:9,cellPadding:3},
        headStyles:{fillColor:NAVY,textColor:WHITE,fontStyle:'bold'},
        columnStyles:{3:{fontStyle:'bold'}},
        didParseCell:(data)=>{
          if(data.section==='body'&&data.column.index===3){
            data.cell.styles.textColor=data.cell.raw==='Adequate'?[16,185,129]:[239,68,68];
          }
        }
      });
      y=doc.lastAutoTable.finalY+12;

      // Policy details by category
      Object.entries(cats).forEach(([cat,ps])=>{
        if(y>240){doc.addPage();y=20;}
        const catLabel = CATEGORIES[cat]?.label||cat;
        doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...BLUE);
        doc.text(`${CATEGORIES[cat]?.icon||''} ${catLabel}`,M,y);y+=6;

        const rows = ps.map(p=>[
          p.policyName||p.productName||'—',
          p.insurer||'—',
          p.subType||'—',
          `${p.currency||'SGD'} ${(parseFloat(p.sumAssured)||0).toLocaleString()}`,
          `${p.currency||'SGD'} ${(parseFloat(p.annualPremium)||0).toLocaleString()}`,
          p.status||'inforce',
        ]);

        doc.autoTable({
          startY:y, margin:{left:M,right:M},
          head:[['Policy','Insurer','Sub-type','Sum Assured','Premium','Status']],
          body:rows,
          styles:{fontSize:8,cellPadding:2.5},
          headStyles:{fillColor:DARK,textColor:WHITE,fontStyle:'bold',fontSize:8},
        });
        y=doc.lastAutoTable.finalY+10;
      });

      // UL Policy Details
      const ulPolicies = policies.filter(p=>UL_FAMILY.includes(p.subType));
      if(ulPolicies.length>0){
        if(y>230){doc.addPage();y=20;}
        doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...BLUE);
        doc.text('Universal Life Details',M,y);y+=6;
        ulPolicies.forEach(p=>{
          if(y>250){doc.addPage();y=20;}
          const details = [];
          details.push(['Product',`${p.insurer} ${p.productName}`]);
          details.push(['Sub-type',p.subType]);
          details.push(['Crediting',p.creditingMechanism||'-']);
          if(p.creditingRates?.current) details.push(['Crediting Rate',`${p.creditingRates.current}% current / ${p.creditingRates.guaranteed}% guaranteed`]);
          if(p.loyaltyBonus?.rate) details.push(['Loyalty Bonus',`${p.loyaltyBonus.rate}% from Yr${p.loyaltyBonus.startYear}`]);
          if(p.solvedPremium) details.push(['Solved Premium',`${p.currency} ${parseFloat(p.solvedPremium).toLocaleString()}`]);
          if(p.assumedReturn) details.push(['Assumed Return',`${p.assumedReturn}%`]);

          doc.autoTable({
            startY:y,margin:{left:M,right:M},body:details,
            styles:{fontSize:8,cellPadding:2},
            columnStyles:{0:{fontStyle:'bold',cellWidth:45}},
            theme:'plain',
          });
          y=doc.lastAutoTable.finalY+6;
        });
      }

      // Footer
      const pageCount = doc.getNumberOfPages();
      for(let i=1;i<=pageCount;i++){
        doc.setPage(i);
        doc.setFillColor(...NAVY);doc.rect(0,285,W,12,'F');
        doc.setFontSize(7);doc.setTextColor(180,180,180);
        doc.text('PolicyLens v4 — For Financial Consultant Use Only',M,291);
        doc.text(`Page ${i} of ${pageCount}`,W-M,291,{align:'right'});
      }

      doc.save(`PolicyLens_Report_${(clientName||'Client').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
    } catch(e){console.error(e);alert('PDF generation error: '+e.message)}
    setGenerating(false);
  };

  return (
    <div className="fade-in" style={{maxWidth:600}}>
      <h2 style={{fontSize:18,fontWeight:600,marginBottom:12}}>Generate PDF Report</h2>
      <div className="card">
        <p style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>
          Generate a comprehensive executive summary PDF covering portfolio overview, gap analysis, policy details by category, and UL-specific breakdowns.
        </p>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:16}}>
          <div>📋 {policies.length} policies loaded</div>
          <div>👤 Client: {clientName || 'Not set (configure in Settings)'}</div>
        </div>
        <button className="btn-primary" onClick={generate} disabled={generating || policies.length===0}
          style={{fontSize:14,padding:'10px 24px',opacity:policies.length===0?.5:1}}>
          {generating ? 'Generating…' : '📄 Generate PDF Report'}
        </button>
        {policies.length===0 && <div style={{fontSize:12,color:'var(--orange)',marginTop:8}}>Add policies first to generate a report</div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════════

function Settings() {
  const {apiKey,saveApiKey,clientName,saveClientName,policies,savePolicy,deletePolicy} = useContext(AppCtx);
  const [key, setKey] = useState(apiKey);
  const [name, setName] = useState(clientName);
  const loadRef = useRef(null);

  // ── Save portfolio as JSON file ──
  const handleSave = () => {
    const data = {
      version:'PolicyLens_v4',
      exportedAt: new Date().toISOString(),
      clientName: clientName,
      policies: policies,
    };
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `PolicyLens_${(clientName||'Portfolio').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // ── Load portfolio from JSON file ──
  const handleLoad = async (file) => {
    if(!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const arr = data.policies || (Array.isArray(data)?data:[]);
      if(!arr.length){alert('No policies found in file');return;}
      const mode = confirm(`Found ${arr.length} policies${data.clientName?' for '+data.clientName:''}.\n\nOK = Replace current portfolio\nCancel = Add to existing portfolio`);
      if(mode){
        // Replace — delete all existing first
        for(const p of policies) await deletePolicy(p.id);
      }
      let count = 0;
      for(const p of arr){
        await savePolicy({...p, id: mode ? p.id : genId()});
        count++;
      }
      if(data.clientName && mode) await saveClientName(data.clientName);
      alert(`Loaded ${count} policies` + (mode?' (replaced)':' (added)'));
    } catch(e){alert('Error loading file: '+e.message);}
  };

  return (
    <div className="fade-in" style={{maxWidth:500}}>
      <h2 style={{fontSize:18,fontWeight:600,marginBottom:16}}>Settings</h2>

      {/* Save / Load Portfolio */}
      <div className="card" style={{marginBottom:16}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:8}}>Portfolio File</h3>
        <p style={{fontSize:12,color:'var(--text3)',marginBottom:12}}>
          Save your portfolio to a file for backup, or load a file from another advisor. Data auto-saves to your browser between sessions.
        </p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn-primary btn-sm" onClick={handleSave} disabled={policies.length===0}>
            💾 Save Portfolio ({policies.length})
          </button>
          <input ref={loadRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleLoad(e.target.files[0]);e.target.value=''}} />
          <button className="btn-secondary btn-sm" onClick={()=>loadRef.current?.click()}>
            📂 Load Portfolio
          </button>
          <button className="btn-danger btn-sm" onClick={async()=>{
            if(!confirm('Reset repository to verified products only?\nThis removes ALL entries (including Supabase shared data) and re-seeds from scratch.')) return;
            // Clear Supabase repo
            const s = getSB();
            if(s) {
              const {data} = await s.from('repository').select('id');
              if(data) for(const r of data) await s.from('repository').delete().eq('id', r.id);
              for(const seed of SEED_REPOSITORY) await sbRepoSave(seed);
            }
            // Also clear local fallback
            try { const tx = (await openDB()).transaction('repository','readwrite'); tx.objectStore('repository').clear(); } catch(e){}
            window.location.reload();
          }}>🗑️ Reset Repository</button>
        </div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div className="field">
          <label>Client Name</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Client name for reports" />
        </div>
        <button className="btn-primary btn-sm" onClick={()=>saveClientName(name)}>Save</button>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <div className="field">
          <label>Anthropic API Key (for AI Capture)</label>
          <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-…" />
        </div>
        <button className="btn-primary btn-sm" onClick={()=>{saveApiKey(key);alert('API key saved!');}}>Save</button>
        <p style={{fontSize:11,color:'var(--text3)',marginTop:6}}>Used for AI-powered document extraction. Stored locally in IndexedDB.</p>
        {apiKey && <p style={{fontSize:11,color:'var(--green2)',marginTop:4}}>✓ Key configured ({apiKey.slice(0,12)}…)</p>}
      </div>
      <div className="card">
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:8}}>About PolicyLens v4</h3>
        <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>
          <p>Full sub-type system with UL/IUL/VUL and Maternity schemas. Repository seeded with Manulife SIULS III, Signature Wealth SGD, Heirloom VII, and Great Eastern ReadyMummy.</p>
          <p style={{marginTop:6}}>Fuzzy matching informs on variations without auto-merging. Gap analysis against recommended coverage levels. Fund risk lookup covers {FUND_DB.length.toLocaleString()} instruments from the iFAST/FundLens universe — unit trusts, ETFs, REITs, stocks, bonds, and money market funds with risk ratings 1–10.</p>
          <p style={{marginTop:6}}>Single-file HTML • React 18 • Chart.js • IndexedDB • jsPDF • Supabase Auth</p>
        </div>
      </div>
    </div>
  );
}
