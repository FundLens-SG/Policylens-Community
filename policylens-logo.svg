  <circle cx="210" cy="210" r="175" fill="none" stroke="#60a5fa" stroke-width="4" opacity="0.5"/>
  <!-- Inner lens glass -->
  <circle cx="210" cy="210" r="148" fill="#0f172a" opacity="0.85"/>
  <circle cx="210" cy="210" r="148" fill="url(#g2)" opacity="0.08"/>
  <!-- Shield inside lens -->
  <path d="M210 95 C210 95 280 120 290 130 C300 140 300 210 290 250 C280 290 210 330 210 330 C210 330 140 290 130 250 C120 210 120 140 130 130 C140 120 210 95 210 95Z" fill="url(#g3)" opacity="0.25" stroke="#60a5fa" stroke-width="2.5" opacity="0.6"/>
  <!-- Document lines inside shield -->
  <rect x="172" y="155" width="76" height="5" rx="2.5" fill="#93c5fd" opacity="0.8"/>
  <rect x="172" y="175" width="60" height="5" rx="2.5" fill="#93c5fd" opacity="0.6"/>
  <rect x="172" y="195" width="76" height="5" rx="2.5" fill="#93c5fd" opacity="0.8"/>
  <rect x="172" y="215" width="50" height="5" rx="2.5" fill="#93c5fd" opacity="0.5"/>
  <rect x="172" y="235" width="68" height="5" rx="2.5" fill="#93c5fd" opacity="0.7"/>
  <!-- Checkmark on shield -->
  <path d="M194 258 L208 274 L238 240" fill="none" stroke="#34d399" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lens glare -->
